<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tools Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #08081a;
            background-image:
                radial-gradient(ellipse 80% 50% at 20% 0%, rgba(99, 102, 241, 0.18) 0%, transparent 50%),
                radial-gradient(ellipse 60% 40% at 80% 10%, rgba(168, 85, 247, 0.14) 0%, transparent 50%),
                radial-gradient(ellipse 70% 50% at 50% 60%, rgba(236, 72, 153, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse 50% 40% at 90% 80%, rgba(14, 165, 233, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse 60% 35% at 10% 90%, rgba(52, 211, 153, 0.06) 0%, transparent 50%),
                linear-gradient(180deg, #08081a 0%, #0c0c24 40%, #0a0a1a 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        .page-wrap {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
            position: relative;
            z-index: 1;
        }

        /* ======== HEADER ======== */
        .header {
            padding: 36px 0 28px;
            text-align: center;
            position: relative;
        }

        .try-webos-btn {
            position: absolute;
            top: 36px;
            right: 0;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: linear-gradient(135deg, #6366f1, #ec4899);
            border: 1px solid rgba(139,92,246,0.4);
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            box-shadow: 0 4px 20px rgba(139,92,246,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .try-webos-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 28px rgba(236,72,153,0.45);
        }
        @media (max-width: 720px) {
            .try-webos-btn {
                position: static;
                margin-bottom: 16px;
            }
        }

        .header-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 7px 20px;
            background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(236,72,153,0.2));
            border: 1px solid rgba(139,92,246,0.3);
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 700;
            color: #d4bfff;
            margin-bottom: 16px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            backdrop-filter: blur(8px);
        }

        h1 {
            font-size: 3.8rem;
            font-weight: 900;
            letter-spacing: -0.05em;
            line-height: 1;
            background: linear-gradient(135deg, #fff 10%, #c084fc 50%, #fb7185 90%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            position: relative;
        }
        /* Title glow */
        h1::after {
            content: 'Tools Hub';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #c084fc 30%, #fb7185 70%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: blur(30px);
            opacity: 0.4;
            pointer-events: none;
            z-index: -1;
        }

        .subtitle {
            color: #8b95b3;
            font-size: 1.05rem;
            margin-bottom: 24px;
            font-weight: 400;
        }

        /* ======== SEARCH ======== */
        .search-wrap {
            max-width: 540px;
            margin: 0 auto;
            position: relative;
        }

        .search-wrap > i {
            position: absolute;
            left: 20px; top: 50%;
            transform: translateY(-50%);
            color: #7c3aed;
            font-size: 0.95rem;
            pointer-events: none;
            transition: color 0.2s;
        }

        .search-box {
            width: 100%;
            padding: 16px 60px 16px 50px;
            font-size: 1rem;
            font-family: inherit;
            font-weight: 500;
            border: 1px solid rgba(139,92,246,0.2);
            border-radius: 16px;
            background: rgba(255,255,255,0.04);
            color: #fff;
            outline: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
        }

        .search-box::placeholder { color: #4a5070; }

        .search-box:focus {
            border-color: rgba(139,92,246,0.5);
            box-shadow: 0 0 0 4px rgba(139,92,246,0.1), 0 8px 32px rgba(139,92,246,0.12);
            background: rgba(255,255,255,0.06);
        }

        .search-box:focus ~ i { color: #a78bfa; }

        .search-shortcut {
            position: absolute;
            right: 16px; top: 50%;
            transform: translateY(-50%);
            padding: 4px 10px;
            border-radius: 8px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            color: #4a5070;
            font-size: 0.7rem;
            font-family: inherit;
            font-weight: 600;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .search-box:focus ~ .search-shortcut { opacity: 0; }


        /* ======== CATEGORIES GRID (masonry) ======== */
        .categories-grid {
            columns: 3;
            column-gap: 14px;
            margin-top: 8px;
        }

        /* ======== CATEGORY CARD ======== */
        .cat-card {
            background: rgba(255,255,255,0.025);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 20px 16px 16px;
            break-inside: avoid;
            margin-bottom: 14px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(6px);
        }

        /* Subtle inner glow on hover */
        .cat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 80px;
            border-radius: 20px 20px 0 0;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .cat-card:hover {
            border-color: rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.04);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            transform: translateY(-2px);
        }

        .cat-card:hover::before { opacity: 1; }

        /* Category card top glows per theme */
        .cat-math::before        { background: linear-gradient(180deg, rgba(99,102,241,0.08), transparent); }
        .cat-converters::before   { background: linear-gradient(180deg, rgba(249,115,22,0.08), transparent); }
        .cat-utilities::before    { background: linear-gradient(180deg, rgba(14,165,233,0.08), transparent); }
        .cat-time::before         { background: linear-gradient(180deg, rgba(245,158,11,0.08), transparent); }
        .cat-textcode::before     { background: linear-gradient(180deg, rgba(148,163,184,0.08), transparent); }
        .cat-productivity::before { background: linear-gradient(180deg, rgba(59,130,246,0.08), transparent); }
        .cat-language::before     { background: linear-gradient(180deg, rgba(20,184,166,0.08), transparent); }
        .cat-fun::before          { background: linear-gradient(180deg, rgba(234,179,8,0.08), transparent); }
        .cat-dev::before          { background: linear-gradient(180deg, rgba(6,182,212,0.08), transparent); }
        .cat-creative::before     { background: linear-gradient(180deg, rgba(139,92,246,0.08), transparent); }
        .cat-media::before        { background: linear-gradient(180deg, rgba(192,38,211,0.08), transparent); }
        .cat-education::before    { background: linear-gradient(180deg, rgba(16,185,129,0.08), transparent); }
        .cat-fonts::before        { background: linear-gradient(180deg, rgba(236,72,153,0.08), transparent); }

        .cat-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
            position: relative;
            z-index: 1;
        }

        .cat-icon {
            width: 32px; height: 32px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            flex-shrink: 0;
        }

        .cat-label {
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: #cbd5e1;
        }

        .cat-count {
            margin-left: auto;
            font-size: 0.65rem;
            font-weight: 600;
            color: #64748b;
            background: rgba(255,255,255,0.05);
            padding: 2px 9px;
            border-radius: 100px;
        }

        /* ======== TOOL GRID (4-col inside cards) ======== */
        .tool-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
            position: relative;
            z-index: 1;
        }

        .tool-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 7px;
            padding: 12px 4px 10px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.68rem;
            font-weight: 600;
            color: #b0b8d0;
            background: transparent;
            transition: all 0.25s ease;
            text-decoration: none;
            position: relative;
        }

        .tool-btn:hover {
            background: rgba(255,255,255,0.07);
            color: #fff;
            transform: translateY(-3px);
        }

        .tool-btn:active { transform: translateY(0); }

        .t-icon {
            width: 50px; height: 50px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .tool-btn:hover .t-icon { transform: scale(1.12); }

        .t-name {
            text-align: center;
            line-height: 1.2;
            max-width: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ============ COLOR THEMES ============ */
        .cat-productivity .cat-icon { background: linear-gradient(135deg, #3b82f6, #1d4ed8); color: #fff; }
        .cat-productivity .t-icon  { background: linear-gradient(135deg, #3b82f6, #1d4ed8); color: #fff; box-shadow: 0 4px 14px rgba(59,130,246,0.3); }
        .cat-productivity .tool-btn:hover .t-icon { box-shadow: 0 6px 24px rgba(59,130,246,0.5); }

        .cat-creative .cat-icon { background: linear-gradient(135deg, #a78bfa, #7c3aed); color: #fff; }
        .cat-creative .t-icon  { background: linear-gradient(135deg, #a78bfa, #6d28d9); color: #fff; box-shadow: 0 4px 14px rgba(139,92,246,0.3); }
        .cat-creative .tool-btn:hover .t-icon { box-shadow: 0 6px 24px rgba(139,92,246,0.5); }

        .cat-time .cat-icon { background: linear-gradient(135deg, #fbbf24, #d97706); color: #422006; }
        .cat-time .t-icon  { background: linear-gradient(135deg, #fbbf24, #d97706); color: #422006; box-shadow: 0 4px 14px rgba(245,158,11,0.3); }
        .cat-time .tool-btn:hover .t-icon { box-shadow: 0 6px 24px rgba(245,158,11,0.5); }

        .cat-education .cat-icon { background: linear-gradient(135deg, #34d399, #059669); color: #fff; }
        .cat-education .t-icon  { background: linear-gradient(135deg, #34d399, #059669); color: #fff; box-shadow: 0 4px 14px rgba(16,185,129,0.3); }
        .cat-education .tool-btn:hover .t-icon { box-shadow: 0 6px 24px rgba(16,185,129,0.5); }

        .cat-math .cat-icon { background: linear-gradient(135deg, #818cf8, #4f46e5); color: #fff; }
        .cat-math .t-icon  { background: linear-gradient(135deg, #818cf8, #4f46e5); color: #fff; box-shadow: 0 4px 14px rgba(99,102,241,0.3); }
        .cat-math .tool-btn:hover .t-icon { box-shadow: 0 6px 24px rgba(99,102,241,0.5); }

        .cat-converters .cat-icon { background: linear-gradient(135deg, #fb923c, #ea580c); color: #fff; }
        .cat-converters .t-icon  { background: linear-gradient(135deg, #fb923c, #ea580c); color: #fff; box-shadow: 0 4px 14px rgba(249,115,22,0.3); }
        .cat-converters .tool-btn:hover .t-icon { box-shadow: 0 6px 24px rgba(249,115,22,0.5); }

        .cat-textcode .cat-icon { background: linear-gradient(135deg, #94a3b8, #475569); color: #fff; }
        .cat-textcode .t-icon  { background: linear-gradient(135deg, #94a3b8, #475569); color: #fff; box-shadow: 0 4px 14px rgba(100,116,139,0.3); }
        .cat-textcode .tool-btn:hover .t-icon { box-shadow: 0 6px 24px rgba(100,116,139,0.5); }

        .cat-dev .cat-icon { background: linear-gradient(135deg, #22d3ee, #0891b2); color: #083344; }
        .cat-dev .t-icon  { background: linear-gradient(135deg, #22d3ee, #0891b2); color: #083344; box-shadow: 0 4px 14px rgba(6,182,212,0.3); }
        .cat-dev .tool-btn:hover .t-icon { box-shadow: 0 6px 24px rgba(6,182,212,0.5); }

        .cat-language .cat-icon { background: linear-gradient(135deg, #2dd4bf, #0d9488); color: #042f2e; }
        .cat-language .t-icon  { background: linear-gradient(135deg, #2dd4bf, #0d9488); color: #042f2e; box-shadow: 0 4px 14px rgba(20,184,166,0.3); }
        .cat-language .tool-btn:hover .t-icon { box-shadow: 0 6px 24px rgba(20,184,166,0.5); }

        .cat-fonts .cat-icon { background: linear-gradient(135deg, #f472b6, #db2777); color: #fff; }
        .cat-fonts .t-icon  { background: linear-gradient(135deg, #f472b6, #db2777); color: #fff; box-shadow: 0 4px 14px rgba(236,72,153,0.3); }
        .cat-fonts .tool-btn:hover .t-icon { box-shadow: 0 6px 24px rgba(236,72,153,0.5); }

        .cat-media .cat-icon { background: linear-gradient(135deg, #e879f9, #c026d3); color: #fff; }
        .cat-media .t-icon  { background: linear-gradient(135deg, #e879f9, #c026d3); color: #fff; box-shadow: 0 4px 14px rgba(192,38,211,0.3); }
        .cat-media .tool-btn:hover .t-icon { box-shadow: 0 6px 24px rgba(192,38,211,0.5); }

        .cat-utilities .cat-icon { background: linear-gradient(135deg, #38bdf8, #0284c7); color: #fff; }
        .cat-utilities .t-icon  { background: linear-gradient(135deg, #38bdf8, #0284c7); color: #fff; box-shadow: 0 4px 14px rgba(14,165,233,0.3); }
        .cat-utilities .tool-btn:hover .t-icon { box-shadow: 0 6px 24px rgba(14,165,233,0.5); }

        .cat-fun .cat-icon { background: linear-gradient(135deg, #facc15, #ca8a04); color: #422006; }
        .cat-fun .t-icon  { background: linear-gradient(135deg, #facc15, #ca8a04); color: #422006; box-shadow: 0 4px 14px rgba(234,179,8,0.3); }
        .cat-fun .tool-btn:hover .t-icon { box-shadow: 0 6px 24px rgba(234,179,8,0.5); }

        /* ======== FOOTER ======== */
        .footer {
            text-align: center;
            padding: 40px 0 28px;
            color: #1e2540;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
        }

        /* ======== ANIMATIONS ======== */
        .cat-card {
            animation: fadeUp 0.45s ease both;
        }
        .cat-card:nth-child(1)  { animation-delay: 0s; }
        .cat-card:nth-child(2)  { animation-delay: 0.04s; }
        .cat-card:nth-child(3)  { animation-delay: 0.06s; }
        .cat-card:nth-child(4)  { animation-delay: 0.1s; }
        .cat-card:nth-child(5)  { animation-delay: 0.14s; }
        .cat-card:nth-child(6)  { animation-delay: 0.18s; }
        .cat-card:nth-child(7)  { animation-delay: 0.22s; }
        .cat-card:nth-child(8)  { animation-delay: 0.26s; }
        .cat-card:nth-child(9)  { animation-delay: 0.3s; }
        .cat-card:nth-child(10) { animation-delay: 0.34s; }
        .cat-card:nth-child(11) { animation-delay: 0.38s; }
        .cat-card:nth-child(12) { animation-delay: 0.42s; }
        .cat-card:nth-child(13) { animation-delay: 0.46s; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ======== NO RESULTS ======== */
        .no-results {
            display: none;
            text-align: center;
            padding: 80px 20px;
            color: #4a5070;
        }
        .no-results i { font-size: 2.5rem; margin-bottom: 14px; display: block; color: #333a55; }
        .no-results.visible { display: block; }

        /* ======== RESPONSIVE ======== */
        @media (max-width: 1100px) {
            .categories-grid { columns: 2; }
        }

        @media (max-width: 700px) {
            .header { padding: 24px 0 20px; }
            h1 { font-size: 2.4rem; }
            .categories-grid { columns: 1; }
            .tool-grid { grid-template-columns: repeat(4, 1fr); }
            .t-icon { width: 44px; height: 44px; font-size: 1.1rem; }
        }

        @media (max-width: 400px) {
            .tool-grid { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>
    <div class="page-wrap">
        <div class="header">
            <a href="https://github.com/krishnasaigaruda/webOS" target="_blank" rel="noopener" class="try-webos-btn"><i class="fas fa-desktop"></i> Try WebOS</a>
            <div class="header-badge"><i class="fas fa-bolt"></i> 60+ Tools</div>
            <h1>Tools Hub</h1>
            <p class="subtitle">Your all-in-one productivity toolkit</p>
            <div class="search-wrap">
                <input type="text" class="search-box" id="searchBox" placeholder="Search tools..." oninput="filterTools()">
                <i class="fas fa-search"></i>
                <span class="search-shortcut">/</span>
            </div>
        </div>

        <div class="categories-grid" id="categoriesGrid">

            <!-- 1. Math & Science -->
            <div class="cat-card cat-math">
                <div class="cat-header">
                    <div class="cat-icon"><i class="fas fa-square-root-alt"></i></div>
                    <span class="cat-label">Math & Science</span>
                    <span class="cat-count">6</span>
                </div>
                <div class="tool-grid">
                    <button class="tool-btn" onclick="openTool('calculator')"><div class="t-icon"><i class="fas fa-calculator"></i></div><span class="t-name">Calculator</span></button>
                    <button class="tool-btn" onclick="openTool('scientific-calc')"><div class="t-icon"><i class="fas fa-square-root-alt"></i></div><span class="t-name">Scientific</span></button>
                    <button class="tool-btn" onclick="openTool('percentage-calc')"><div class="t-icon"><i class="fas fa-percent"></i></div><span class="t-name">Percentage</span></button>
                    <button class="tool-btn" onclick="openTool('graph-plotter')"><div class="t-icon"><i class="fas fa-chart-line"></i></div><span class="t-name">Graphs</span></button>
                    <button class="tool-btn" onclick="openTool('matrix-calc')"><div class="t-icon"><i class="fas fa-border-all"></i></div><span class="t-name">Matrix</span></button>
                    <button class="tool-btn" onclick="openTool('stats-calculator')"><div class="t-icon"><i class="fas fa-chart-bar"></i></div><span class="t-name">Statistics</span></button>
                </div>
            </div>

            <!-- 2. Converters -->
            <div class="cat-card cat-converters">
                <div class="cat-header">
                    <div class="cat-icon"><i class="fas fa-arrows-rotate"></i></div>
                    <span class="cat-label">Converters</span>
                    <span class="cat-count">12</span>
                </div>
                <div class="tool-grid">
                    <button class="tool-btn" onclick="openTool('currency-converter')"><div class="t-icon"><i class="fas fa-money-bill-wave"></i></div><span class="t-name">Currency</span></button>
                    <button class="tool-btn" onclick="openTool('temp-converter')"><div class="t-icon"><i class="fas fa-thermometer-half"></i></div><span class="t-name">Temp</span></button>
                    <button class="tool-btn" onclick="openTool('length-converter')"><div class="t-icon"><i class="fas fa-ruler"></i></div><span class="t-name">Length</span></button>
                    <button class="tool-btn" onclick="openTool('weight-converter')"><div class="t-icon"><i class="fas fa-balance-scale"></i></div><span class="t-name">Weight</span></button>
                    <button class="tool-btn" onclick="openTool('area-converter')"><div class="t-icon"><i class="fas fa-vector-square"></i></div><span class="t-name">Area</span></button>
                    <button class="tool-btn" onclick="openTool('speed-converter')"><div class="t-icon"><i class="fas fa-tachometer-alt"></i></div><span class="t-name">Speed</span></button>
                    <button class="tool-btn" onclick="openTool('data-converter')"><div class="t-icon"><i class="fas fa-database"></i></div><span class="t-name">Data</span></button>
                    <button class="tool-btn" onclick="openTool('volume-converter')"><div class="t-icon"><i class="fas fa-cube"></i></div><span class="t-name">Volume</span></button>
                    <button class="tool-btn" onclick="openTool('time-converter')"><div class="t-icon"><i class="fas fa-hourglass-half"></i></div><span class="t-name">Time</span></button>
                    <button class="tool-btn" onclick="openTool('angle-converter')"><div class="t-icon"><i class="fas fa-compass-drafting"></i></div><span class="t-name">Angle</span></button>
                    <button class="tool-btn" onclick="openTool('number-converter')"><div class="t-icon"><i class="fas fa-hashtag"></i></div><span class="t-name">Number</span></button>
                    <button class="tool-btn" onclick="openTool('roman-numerals')"><div class="t-icon"><i class="fas fa-landmark"></i></div><span class="t-name">Roman</span></button>
                </div>
            </div>

            <!-- 3. Utilities -->
            <div class="cat-card cat-utilities">
                <div class="cat-header">
                    <div class="cat-icon"><i class="fas fa-wrench"></i></div>
                    <span class="cat-label">Utilities</span>
                    <span class="cat-count">3</span>
                </div>
                <div class="tool-grid">

            'roman-numerals': 'tools/roman-numerals.html',
            'text-editor': 'tools/text-editor.html',
            'code-editor': 'tools/code-editor.html',

            'character-counter': 'tools/character-counter.html',

            'html-fiddle': 'tools/html-fiddle.html',
            'random-word': 'tools/random-word.html',
            'font-preview': 'tools/font-preview.html'
        };

        function openTool(toolName) {
            if (availableTools[toolName]) {
                window.location.href = availableTools[toolName];
            } else {
                alert(`${toolName.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase())} - Coming soon!`);
            }
        }

        function filterTools() {
            const searchTerm = document.getElementById('searchBox').value.toLowerCase().trim();
            const cards = document.querySelectorAll('.cat-card');
            const noResults = document.getElementById('noResults');
            let anyVisible = false;

            if (!searchTerm) {
                cards.forEach(card => {
                    card.style.display = '';
                    card.querySelectorAll('.tool-btn').forEach(btn => btn.style.display = '');
                });
                noResults.classList.remove('visible');
                return;
            }

            cards.forEach(card => {
                const buttons = card.querySelectorAll('.tool-btn');
                let hasVisible = false;

                buttons.forEach(btn => {
                    const name = btn.querySelector('.t-name').textContent.toLowerCase();
                    const match = name.includes(searchTerm);
                    btn.style.display = match ? '' : 'none';
                    if (match) hasVisible = true;
                });

                card.style.display = hasVisible ? '' : 'none';
                if (hasVisible) anyVisible = true;
            });

            noResults.classList.toggle('visible', !anyVisible);
        }

        document.addEventListener('keydown', e => {
            if (e.key === '/' && document.activeElement !== document.getElementById('searchBox')) {
                e.preventDefault();
                document.getElementById('searchBox').focus();
            }
            if (e.key === 'Escape') {
                document.getElementById('searchBox').blur();
            }
        });
    </script>
