<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Form Converter</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --panel: #1e293b;
            --border: #334155;
            --accent: #d97706;
            --accent2: #fbbf24;
            --accent-dim: rgba(217,119,6,0.08);
            --text: #e2e8f0;
            --muted: #94a3b8;
            --dim: #64748b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            display: flex; align-items: center; padding: 14px 24px;
            background: var(--panel); border-bottom: 1px solid var(--border); gap: 16px;
        }
        .back-btn {
            background: none; border: 1px solid #475569; color: var(--muted);
            padding: 8px 14px; border-radius: 8px; cursor: pointer;
            font-size: 0.85rem; transition: all 0.2s; font-family: inherit;
        }
        .back-btn:hover { background: var(--border); color: var(--text); }
        .header h1 { font-size: 1.3rem; color: var(--accent); font-weight: 700; }

        .main-wrap { flex: 1; display: flex; justify-content: center; padding: 40px 24px; align-items: flex-start; }
        .converter {
            width: 560px; background: var(--panel); border-radius: 20px; padding: 28px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(217,119,6,0.1);
        }
        .conv-title { font-size: 1.1rem; font-weight: 700; color: var(--accent2); margin-bottom: 6px; }
        .conv-desc { font-size: 0.78rem; color: var(--dim); margin-bottom: 24px; }
        .input-label { font-size: 0.72rem; font-weight: 700; color: var(--dim); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }

        .input-section {
            margin-bottom: 20px;
            padding: 16px;
            background: var(--bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            transition: border-color 0.2s;
        }
        .input-section:focus-within {
            border-color: var(--accent);
        }
        .input-section h3 {
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--muted);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .input-section h3 i { color: var(--accent); font-size: 0.85rem; }

        .input-row {
            display: flex; gap: 10px; align-items: center;
        }
        .input-row input {
            background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
            padding: 12px 16px; color: var(--text); font-family: 'JetBrains Mono', monospace;
            font-size: 1rem; font-weight: 600; outline: none; transition: border-color 0.2s;
            flex: 1;
        }
        .input-row input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(217,119,6,0.1); }
        .input-row input::placeholder { color: #475569; }
        .input-row .sep {
            font-size: 1.4rem; color: var(--dim); font-weight: 700; min-width: 16px; text-align: center;
        }

        .result-main {
            text-align: center; padding: 20px; background: var(--bg); border-radius: 14px;
            border: 1px solid var(--border); margin-bottom: 20px; display: none;
        }
        .result-main.show { display: block; animation: slideIn 0.3s ease; }
        .result-main .value { font-family: 'JetBrains Mono', monospace; font-size: 2rem; font-weight: 700; color: var(--accent2); }
        .result-main .label { font-size: 0.78rem; color: var(--dim); margin-top: 4px; }

        .results-title { font-size: 0.72rem; font-weight: 700; color: var(--dim); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }
        .results-grid { display: none; }
        .results-grid.show { display: block; animation: slideIn 0.3s ease; }
        .result-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px; background: var(--bg); border-radius: 10px;
            margin-bottom: 8px; border: 1px solid var(--border); cursor: pointer; transition: all 0.15s;
        }
        .result-row:hover { border-color: var(--accent); background: rgba(217,119,6,0.03); }
        .result-row .rr-label { font-size: 0.78rem; color: var(--dim); font-weight: 600; }
        .result-row .rr-value { font-family: 'JetBrains Mono', monospace; font-size: 1rem; font-weight: 700; color: var(--accent2); }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .copy-toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
            background: var(--accent); color: #0f172a; padding: 8px 20px; border-radius: 8px;
            font-size: 0.8rem; font-weight: 700; opacity: 0; transition: all 0.25s; pointer-events: none;
        }
        .copy-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        @media (max-width: 620px) { .converter { width: 100%; padding: 20px 16px; } }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="window.location.href='../Tools.html'"><i class="fas fa-arrow-left"></i> Back</button>
        <h1><i class="fas fa-hashtag"></i> Number Form Converter</h1>
    </div>

    <div class="main-wrap">
        <div class="converter">
            <div class="conv-title">Number Form Converter</div>
            <div class="conv-desc">Convert between decimal, fraction, percentage, and ratio. Enter a value in any field.</div>

            <div class="input-section">
                <h3><i class="fas fa-calculator"></i> Decimal</h3>
                <div class="input-row">
                    <input type="number" id="decInput" placeholder="e.g. 0.75" step="any" oninput="fromDecimal()">
                </div>
            </div>

            <div class="input-section">
                <h3><i class="fas fa-divide"></i> Fraction</h3>
                <div class="input-row">
                    <input type="number" id="fracNum" placeholder="Numerator" oninput="fromFraction()">
                    <span class="sep">/</span>
                    <input type="number" id="fracDen" placeholder="Denominator" oninput="fromFraction()">
                </div>
            </div>

            <div class="input-section">
                <h3><i class="fas fa-percent"></i> Percentage</h3>
                <div class="input-row">
                    <input type="number" id="pctInput" placeholder="e.g. 75" step="any" oninput="fromPercentage()">
                    <span class="sep">%</span>
                </div>
            </div>

            <div class="result-main" id="resultMain">
                <div class="value" id="resultValue"></div>
                <div class="label" id="resultLabel"></div>
            </div>

            <div class="results-title">All Forms</div>
            <div class="results-grid" id="resultsGrid"></div>
        </div>
    </div>

    <div class="copy-toast" id="copyToast">Copied!</div>

    <script>
    let updating = false;

    function gcd(a, b) {
        a = Math.abs(Math.round(a));
        b = Math.abs(Math.round(b));
        while (b) { [a, b] = [b, a % b]; }
        return a;
    }

    function decimalToFraction(d) {
        if (d === 0) return { num: 0, den: 1 };
        if (Number.isInteger(d)) return { num: d, den: 1 };
        const sign = d < 0 ? -1 : 1;
        d = Math.abs(d);
        const str = d.toString();
        const dotIdx = str.indexOf('.');
        if (dotIdx === -1) return { num: d * sign, den: 1 };
        const decimals = str.length - dotIdx - 1;
        let num = Math.round(d * Math.pow(10, decimals));
        let den = Math.pow(10, decimals);
        const g = gcd(num, den);
        return { num: (num / g) * sign, den: den / g };
    }

    function formatNum(n) {
        return parseFloat(n.toPrecision(10));
    }

    function showResults(num, den) {
        const decimal = num / den;
        const g = gcd(Math.abs(num), Math.abs(den));
        const sNum = num / g;
        const sDen = den / g;
        const percentage = decimal * 100;

        // Ratio: simplify num:den
        const rG = gcd(Math.abs(sNum), Math.abs(sDen));
        const rA = Math.abs(sNum) / rG;
        const rB = Math.abs(sDen) / rG;

        // Mixed number
        let mixedStr = '';
        if (Math.abs(sNum) > Math.abs(sDen) && sDen !== 1) {
            const whole = Math.trunc(sNum / sDen);
            const rem = Math.abs(sNum) % Math.abs(sDen);
            if (rem !== 0) mixedStr = `${whole} ${rem}/${Math.abs(sDen)}`;
        }

        const mainRes = document.getElementById('resultMain');
        document.getElementById('resultValue').textContent = formatNum(decimal);
        document.getElementById('resultLabel').textContent = 'Decimal Value';
        mainRes.classList.add('show');

        const rows = [
            { label: 'Decimal', value: formatNum(decimal), copy: formatNum(decimal).toString() },
            { label: 'Fraction (simplified)', value: `${sNum} / ${sDen}`, copy: `${sNum}/${sDen}` },
            { label: 'Percentage', value: `${formatNum(percentage)}%`, copy: `${formatNum(percentage)}%` },
            { label: 'Ratio', value: `${rA} : ${rB}`, copy: `${rA}:${rB}` }
        ];
        if (mixedStr) {
            rows.splice(2, 0, { label: 'Mixed Number', value: mixedStr, copy: mixedStr });
        }

        const grid = document.getElementById('resultsGrid');
        grid.innerHTML = rows.map(r => `
            <div class="result-row" onclick="copyVal('${r.copy.replace(/'/g, "\\'")}')">
                <span class="rr-label">${r.label}</span>
                <span class="rr-value">${r.value}</span>
            </div>
        `).join('');
        grid.classList.add('show');
    }

    function hideResults() {
        document.getElementById('resultMain').classList.remove('show');
        document.getElementById('resultsGrid').classList.remove('show');
    }

    function fromDecimal() {
        if (updating) return;
        updating = true;
        const val = parseFloat(document.getElementById('decInput').value);
        if (isNaN(val)) { updating = false; hideResults(); return; }

        const frac = decimalToFraction(val);
        document.getElementById('fracNum').value = frac.num;
        document.getElementById('fracDen').value = frac.den;
        document.getElementById('pctInput').value = formatNum(val * 100);

        showResults(frac.num, frac.den);
        updating = false;
    }

    function fromFraction() {
        if (updating) return;
        updating = true;
        const num = parseFloat(document.getElementById('fracNum').value);
        const den = parseFloat(document.getElementById('fracDen').value);
        if (isNaN(num) || isNaN(den) || den === 0) { updating = false; hideResults(); return; }

        const decimal = num / den;
        document.getElementById('decInput').value = formatNum(decimal);
        document.getElementById('pctInput').value = formatNum(decimal * 100);

        const g = gcd(Math.abs(num), Math.abs(den));
        showResults(num / g, den / g);
        updating = false;
    }

    function fromPercentage() {
        if (updating) return;
        updating = true;
        const pct = parseFloat(document.getElementById('pctInput').value);
        if (isNaN(pct)) { updating = false; hideResults(); return; }

        const decimal = pct / 100;
        document.getElementById('decInput').value = formatNum(decimal);
        const frac = decimalToFraction(decimal);
        document.getElementById('fracNum').value = frac.num;
        document.getElementById('fracDen').value = frac.den;

        showResults(frac.num, frac.den);
        updating = false;
    }

    function copyVal(val) {
        navigator.clipboard.writeText(val).then(() => {
            const t = document.getElementById('copyToast');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 1200);
        });
    }
    </script>
</body>
</html>
