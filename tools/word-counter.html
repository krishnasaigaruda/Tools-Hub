<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Counter</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            display: flex;
            align-items: center;
            padding: 14px 24px;
            background: #475569;
            border-bottom: 1px solid #64748b;
            gap: 16px;
        }
        .back-btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
            color: #e0e7ff;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
            font-family: inherit;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .back-btn:hover { background: rgba(255,255,255,0.25); color: #fff; }
        .header h1 {
            font-size: 1.3rem;
            color: #fff;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header h1 i { font-size: 1.1rem; }

        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 24px;
            flex: 1;
        }

        /* Textarea Section */
        .input-section {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #334155;
            margin-bottom: 20px;
        }
        .input-section label {
            font-size: 0.9rem;
            color: #94a3b8;
            font-weight: 500;
            margin-bottom: 10px;
            display: block;
        }
        .textarea-wrap {
            position: relative;
        }
        #textInput {
            width: 100%;
            min-height: 220px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 16px;
            color: #e2e8f0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.92rem;
            line-height: 1.7;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
        }
        #textInput:focus { border-color: #64748b; }
        #textInput::placeholder { color: #475569; }

        .live-stats {
            display: flex;
            gap: 16px;
            margin-top: 10px;
            font-size: 0.82rem;
            color: #64748b;
            font-family: 'JetBrains Mono', monospace;
        }
        .live-stats span { display: flex; align-items: center; gap: 5px; }

        /* Buttons Row */
        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 7px;
        }
        .btn-primary {
            background: #475569;
            color: #fff;
            padding: 12px 32px;
            font-size: 1rem;
        }
        .btn-primary:hover { background: #64748b; transform: translateY(-1px); }
        .btn-secondary {
            background: #1e293b;
            color: #94a3b8;
            border: 1px solid #334155;
        }
        .btn-secondary:hover { background: #334155; color: #e2e8f0; }
        .btn-danger {
            background: rgba(239,68,68,0.15);
            color: #f87171;
            border: 1px solid rgba(239,68,68,0.25);
        }
        .btn-danger:hover { background: rgba(239,68,68,0.25); }

        /* Results */
        #resultsSection {
            display: none;
            animation: fadeSlideIn 0.4s ease;
        }
        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .results-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .results-header h2 {
            font-size: 1.15rem;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .action-btns { display: flex; gap: 8px; flex-wrap: wrap; }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: #1e293b;
            border-radius: 10px;
            padding: 18px;
            border: 1px solid #334155;
            transition: border-color 0.2s, transform 0.2s;
        }
        .stat-card:hover { border-color: #475569; transform: translateY(-2px); }
        .stat-card .label {
            font-size: 0.78rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            font-weight: 600;
        }
        .stat-card .value {
            font-size: 1.6rem;
            font-weight: 800;
            color: #f8fafc;
            font-family: 'JetBrains Mono', monospace;
        }
        .stat-card .value.text-val {
            font-size: 1rem;
            font-weight: 600;
            word-break: break-all;
        }

        /* Charts Section */
        .chart-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }
        .chart-panel {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #334155;
        }
        .chart-panel h3 {
            font-size: 0.95rem;
            color: #cbd5e1;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Bar Chart */
        .bar-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .bar-word {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.82rem;
            color: #94a3b8;
            width: 100px;
            text-align: right;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .bar-track {
            flex: 1;
            height: 22px;
            background: #0f172a;
            border-radius: 4px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #475569, #64748b);
            border-radius: 4px;
            transition: width 0.5s ease;
            min-width: 2px;
        }
        .bar-count {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: #64748b;
            width: 36px;
            text-align: right;
            flex-shrink: 0;
        }

        /* Distribution */
        .dist-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .dist-label {
            font-size: 0.85rem;
            color: #94a3b8;
            width: 100px;
            flex-shrink: 0;
        }
        .dist-bar-track {
            flex: 1;
            height: 18px;
            background: #0f172a;
            border-radius: 4px;
            overflow: hidden;
        }
        .dist-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        .dist-pct {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: #64748b;
            width: 50px;
            text-align: right;
            flex-shrink: 0;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #1e293b;
            color: #e2e8f0;
            padding: 12px 20px;
            border-radius: 10px;
            border: 1px solid #334155;
            font-size: 0.88rem;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 9999;
            animation: toastIn 0.3s ease;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 900px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .chart-section { grid-template-columns: 1fr; }
        }
        @media (max-width: 600px) {
            .stats-grid { grid-template-columns: 1fr; }
            .container { padding: 14px; }
            .header { padding: 12px 16px; }
            .header h1 { font-size: 1.1rem; }
        }

        /* Print Styles */
        @media print {
            body { background: #fff; color: #000; }
            .header { background: #475569; }
            .input-section { display: none; }
            .action-btns { display: none !important; }
            #resultsSection { display: block !important; }
            .stat-card { background: #f1f5f9; border-color: #cbd5e1; }
            .stat-card .label { color: #475569; }
            .stat-card .value { color: #0f172a; }
            .chart-panel { background: #f1f5f9; border-color: #cbd5e1; break-inside: avoid; }
            .bar-fill { background: #475569; }
            .bar-word, .bar-count, .dist-label, .dist-pct { color: #334155; }
            .bar-track, .dist-bar-track { background: #e2e8f0; }
            .results-header h2 { color: #0f172a; }
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="../Tools.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
        <h1><i class="fas fa-file-word"></i> Word Counter</h1>
    </div>

    <div class="container">
        <!-- Input Section -->
        <div class="input-section">
            <label>Paste or type your text below</label>
            <div class="textarea-wrap">
                <textarea id="textInput" placeholder="Start typing or paste your text here..."></textarea>
            </div>
            <div class="live-stats">
                <span><i class="fas fa-font"></i> <span id="liveWords">0</span> words</span>
                <span><i class="fas fa-text-width"></i> <span id="liveChars">0</span> characters</span>
            </div>
            <div class="btn-row">
                <button class="btn btn-primary" onclick="analyzeText()"><i class="fas fa-calculator"></i> Count</button>
                <button class="btn btn-secondary" onclick="pasteText()"><i class="fas fa-paste"></i> Paste</button>
                <button class="btn btn-secondary" onclick="loadSample()"><i class="fas fa-file-alt"></i> Sample Text</button>
                <button class="btn btn-danger" onclick="clearAll()"><i class="fas fa-trash"></i> Clear</button>
            </div>
        </div>

        <!-- Results Section -->
        <div id="resultsSection">
            <div class="results-header">
                <h2><i class="fas fa-chart-bar"></i> Analysis Results</h2>
                <div class="action-btns">
                    <button class="btn btn-secondary" onclick="copyResults()"><i class="fas fa-copy"></i> Copy Results</button>
                    <button class="btn btn-secondary" onclick="saveAsPNG()"><i class="fas fa-image"></i> Save as PNG</button>
                    <button class="btn btn-secondary" onclick="printResults()"><i class="fas fa-print"></i> Print</button>
                    <button class="btn btn-secondary" onclick="shareResults()"><i class="fas fa-share-alt"></i> Share</button>
                </div>
            </div>

            <div class="stats-grid" id="statsGrid"></div>

            <div class="chart-section">
                <div class="chart-panel">
                    <h3><i class="fas fa-list-ol"></i> Top 10 Most Frequent Words</h3>
                    <div id="barChart"></div>
                </div>
                <div class="chart-panel">
                    <h3><i class="fas fa-chart-pie"></i> Character Distribution</h3>
                    <div id="distChart"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const textInput = document.getElementById('textInput');
        let lastResults = null;

        // Live stats on input
        textInput.addEventListener('input', () => {
            const text = textInput.value;
            const words = text.trim() ? text.trim().split(/\s+/).length : 0;
            document.getElementById('liveWords').textContent = words;
            document.getElementById('liveChars').textContent = text.length;
        });

        function getWords(text) {
            return text.trim() ? text.trim().split(/\s+/) : [];
        }

        function getSentences(text) {
            const s = text.split(/[.!?]+/).map(s => s.trim()).filter(s => s.length > 0);
            return s;
        }

        function analyzeText() {
            const text = textInput.value;
            if (!text.trim()) {
                showToast('Please enter some text first.', 'fa-exclamation-circle');
                return;
            }

            const words = getWords(text);
            const wordCount = words.length;
            const charWithSpaces = text.length;
            const charWithoutSpaces = text.replace(/\s/g, '').length;
            const sentences = getSentences(text);
            const sentenceCount = sentences.length;
            const paragraphs = text.split(/\n\s*\n/).filter(p => p.trim().length > 0).length || 1;
            const lines = text.split('\n').length;
            const avgWordLen = wordCount > 0 ? (words.reduce((a, w) => a + w.length, 0) / wordCount).toFixed(1) : '0';
            const avgSentenceLen = sentenceCount > 0 ? (wordCount / sentenceCount).toFixed(1) : '0';
            const longestWord = wordCount > 0 ? words.reduce((a, b) => a.length >= b.length ? a : b, '') : '-';

            // Word frequency
            const freq = {};
            words.forEach(w => {
                const lower = w.replace(/[^a-zA-Z0-9'-]/g, '').toLowerCase();
                if (lower) freq[lower] = (freq[lower] || 0) + 1;
            });
            const sorted = Object.entries(freq).sort((a, b) => b[1] - a[1]);
            const mostCommon = sorted.length > 0 ? sorted[0][0] : '-';
            const uniqueWords = Object.keys(freq).length;
            const top10 = sorted.slice(0, 10);

            const readingTime = formatTime(Math.ceil(wordCount / 200));
            const speakingTime = formatTime(Math.ceil(wordCount / 130));

            // Character distribution
            const letters = (text.match(/[a-zA-Z]/g) || []).length;
            const numbers = (text.match(/[0-9]/g) || []).length;
            const spaces = (text.match(/\s/g) || []).length;
            const punctuation = (text.match(/[^\w\s]/g) || []).length;
            const total = charWithSpaces || 1;

            lastResults = {
                wordCount, charWithSpaces, charWithoutSpaces, sentenceCount,
                paragraphs, lines, avgWordLen, avgSentenceLen, longestWord,
                mostCommon, readingTime, speakingTime, uniqueWords, top10,
                letters, numbers, spaces, punctuation, total
            };

            renderResults(lastResults);
            document.getElementById('resultsSection').style.display = 'block';
            document.getElementById('resultsSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function formatTime(minutes) {
            if (minutes < 1) return '< 1 min';
            if (minutes < 60) return minutes + ' min';
            const h = Math.floor(minutes / 60);
            const m = minutes % 60;
            return h + 'h ' + m + 'm';
        }

        function renderResults(r) {
            const stats = [
                { label: 'Words', value: r.wordCount.toLocaleString() },
                { label: 'Characters (with spaces)', value: r.charWithSpaces.toLocaleString() },
                { label: 'Characters (no spaces)', value: r.charWithoutSpaces.toLocaleString() },
                { label: 'Sentences', value: r.sentenceCount.toLocaleString() },
                { label: 'Paragraphs', value: r.paragraphs.toLocaleString() },
                { label: 'Lines', value: r.lines.toLocaleString() },
                { label: 'Avg Word Length', value: r.avgWordLen + ' chars' },
                { label: 'Avg Sentence Length', value: r.avgSentenceLen + ' words' },
                { label: 'Unique Words', value: r.uniqueWords.toLocaleString() },
                { label: 'Reading Time', value: r.readingTime },
                { label: 'Speaking Time', value: r.speakingTime },
                { label: 'Longest Word', value: r.longestWord, isText: true },
                { label: 'Most Common Word', value: r.mostCommon, isText: true },
            ];

            const grid = document.getElementById('statsGrid');
            grid.innerHTML = stats.map(s => `
                <div class="stat-card">
                    <div class="label">${s.label}</div>
                    <div class="value${s.isText ? ' text-val' : ''}">${s.value}</div>
                </div>
            `).join('');

            // Bar chart
            const maxCount = r.top10.length > 0 ? r.top10[0][1] : 1;
            const barChart = document.getElementById('barChart');
            if (r.top10.length === 0) {
                barChart.innerHTML = '<div style="color:#64748b;font-size:0.85rem;">No words to display.</div>';
            } else {
                barChart.innerHTML = r.top10.map(([word, count]) => `
                    <div class="bar-row">
                        <div class="bar-word" title="${word}">${word}</div>
                        <div class="bar-track">
                            <div class="bar-fill" style="width:${(count / maxCount * 100).toFixed(1)}%"></div>
                        </div>
                        <div class="bar-count">${count}</div>
                    </div>
                `).join('');
            }

            // Distribution chart
            const distColors = ['#475569', '#64748b', '#94a3b8', '#cbd5e1'];
            const distData = [
                { label: 'Letters', value: r.letters, color: distColors[0] },
                { label: 'Numbers', value: r.numbers, color: distColors[1] },
                { label: 'Spaces', value: r.spaces, color: distColors[2] },
                { label: 'Punctuation', value: r.punctuation, color: distColors[3] },
            ];
            const distChart = document.getElementById('distChart');
            distChart.innerHTML = distData.map(d => {
                const pct = (d.value / r.total * 100).toFixed(1);
                return `
                    <div class="dist-row">
                        <div class="dist-label">${d.label}</div>
                        <div class="dist-bar-track">
                            <div class="dist-bar-fill" style="width:${pct}%;background:${d.color}"></div>
                        </div>
                        <div class="dist-pct">${pct}%</div>
                    </div>
                `;
            }).join('');
        }

        async function pasteText() {
            try {
                const text = await navigator.clipboard.readText();
                textInput.value = text;
                textInput.dispatchEvent(new Event('input'));
                showToast('Pasted from clipboard', 'fa-check');
            } catch (e) {
                showToast('Clipboard access denied', 'fa-exclamation-circle');
            }
        }

        function loadSample() {
            textInput.value = `The quick brown fox jumps over the lazy dog. This classic sentence is known for containing every letter of the English alphabet. It has been used for decades by typewriter and keyboard enthusiasts to test their equipment.

Language is a powerful tool that connects people across cultures and generations. Words carry meaning, emotion, and intention. From ancient manuscripts to modern digital communication, the written word has shaped civilizations and driven progress.

Technology continues to evolve at an unprecedented pace. Artificial intelligence, machine learning, and natural language processing are transforming how we interact with information. These advancements promise to make our lives more efficient and connected.

Reading expands the mind, builds vocabulary, and improves comprehension. Whether it is fiction or non-fiction, every book offers a new perspective. The habit of reading is one of the most valuable skills a person can develop throughout their lifetime.`;
            textInput.dispatchEvent(new Event('input'));
            showToast('Sample text loaded', 'fa-check');
        }

        function clearAll() {
            textInput.value = '';
            textInput.dispatchEvent(new Event('input'));
            document.getElementById('resultsSection').style.display = 'none';
            lastResults = null;
            showToast('Cleared', 'fa-check');
        }

        function buildPlainTextResults() {
            if (!lastResults) return '';
            const r = lastResults;
            let text = '=== Word Counter Results ===\n\n';
            text += `Words: ${r.wordCount}\n`;
            text += `Characters (with spaces): ${r.charWithSpaces}\n`;
            text += `Characters (no spaces): ${r.charWithoutSpaces}\n`;
            text += `Sentences: ${r.sentenceCount}\n`;
            text += `Paragraphs: ${r.paragraphs}\n`;
            text += `Lines: ${r.lines}\n`;
            text += `Avg Word Length: ${r.avgWordLen} chars\n`;
            text += `Avg Sentence Length: ${r.avgSentenceLen} words\n`;
            text += `Unique Words: ${r.uniqueWords}\n`;
            text += `Reading Time: ${r.readingTime}\n`;
            text += `Speaking Time: ${r.speakingTime}\n`;
            text += `Longest Word: ${r.longestWord}\n`;
            text += `Most Common Word: ${r.mostCommon}\n`;
            text += `\nTop 10 Words:\n`;
            r.top10.forEach(([w, c], i) => { text += `  ${i + 1}. ${w} (${c})\n`; });
            text += `\nCharacter Distribution:\n`;
            text += `  Letters: ${(r.letters / r.total * 100).toFixed(1)}%\n`;
            text += `  Numbers: ${(r.numbers / r.total * 100).toFixed(1)}%\n`;
            text += `  Spaces: ${(r.spaces / r.total * 100).toFixed(1)}%\n`;
            text += `  Punctuation: ${(r.punctuation / r.total * 100).toFixed(1)}%\n`;
            return text;
        }

        async function copyResults() {
            const text = buildPlainTextResults();
            try {
                await navigator.clipboard.writeText(text);
                showToast('Results copied to clipboard', 'fa-check');
            } catch (e) {
                showToast('Failed to copy', 'fa-exclamation-circle');
            }
        }

        function saveAsPNG() {
            const resultsEl = document.getElementById('resultsSection');
            // Use canvas approach: create a temporary styled clone
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const text = buildPlainTextResults();
            const lines = text.split('\n');
            const lineHeight = 22;
            const padding = 40;
            canvas.width = 600;
            canvas.height = lines.length * lineHeight + padding * 2;

            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#e2e8f0';
            ctx.font = '14px "JetBrains Mono", monospace';
            lines.forEach((line, i) => {
                if (line.startsWith('===')) {
                    ctx.fillStyle = '#f8fafc';
                    ctx.font = 'bold 16px "JetBrains Mono", monospace';
                } else {
                    ctx.fillStyle = '#e2e8f0';
                    ctx.font = '14px "JetBrains Mono", monospace';
                }
                ctx.fillText(line, padding, padding + i * lineHeight);
            });

            const link = document.createElement('a');
            link.download = 'word-counter-results.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
            showToast('PNG saved', 'fa-check');
        }

        function printResults() {
            window.print();
        }

        async function shareResults() {
            const text = buildPlainTextResults();
            if (navigator.share) {
                try {
                    await navigator.share({ title: 'Word Counter Results', text: text });
                } catch (e) {
                    // User cancelled or error
                }
            } else {
                try {
                    await navigator.clipboard.writeText(text);
                    showToast('Results copied to clipboard (sharing not supported)', 'fa-check');
                } catch (e) {
                    showToast('Could not share or copy', 'fa-exclamation-circle');
                }
            }
        }

        function showToast(message, icon) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i class="fas ${icon || 'fa-info-circle'}"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.3s'; }, 2200);
            setTimeout(() => toast.remove(), 2500);
        }
    </script>
</body>
</html>
