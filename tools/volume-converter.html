<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volume Converter</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --panel: #1e293b;
            --border: #334155;
            --accent: #d97706;
            --accent2: #fbbf24;
            --accent-dim: rgba(217,119,6,0.08);
            --text: #e2e8f0;
            --muted: #94a3b8;
            --dim: #64748b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            display: flex;
            align-items: center;
            padding: 14px 24px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            gap: 16px;
        }
        .back-btn {
            background: none;
            border: 1px solid #475569;
            color: var(--muted);
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
            font-family: inherit;
        }
        .back-btn:hover { background: var(--border); color: var(--text); }
        .header h1 { font-size: 1.3rem; color: var(--accent); font-weight: 700; }

        .main-wrap {
            flex: 1;
            display: flex;
            justify-content: center;
            padding: 40px 24px;
            align-items: flex-start;
        }
        .converter {
            width: 560px;
            background: var(--panel);
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(217,119,6,0.1);
        }
        .conv-title { font-size: 1.1rem; font-weight: 700; color: var(--accent2); margin-bottom: 6px; }
        .conv-desc { font-size: 0.78rem; color: var(--dim); margin-bottom: 24px; }
        .input-label { font-size: 0.72rem; font-weight: 700; color: var(--dim); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
        .input-group {
            display: flex; gap: 10px; align-items: center; margin-bottom: 16px;
        }
        .input-group input, .input-group select {
            background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
            padding: 12px 16px; color: var(--text); font-family: 'JetBrains Mono', monospace;
            font-size: 1rem; font-weight: 600; outline: none; transition: border-color 0.2s;
        }
        .input-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(217,119,6,0.1); }
        .input-group input { flex: 1; }
        .input-group select { font-family: 'Outfit', sans-serif; font-size: 0.85rem; cursor: pointer; min-width: 130px; }
        .input-group input::placeholder { color: #475569; }

        .row-selects { display: flex; gap: 12px; margin-bottom: 16px; align-items: flex-end; }
        .row-selects > div { flex: 1; }
        .swap-btn { display: flex; align-items: flex-end; padding-bottom: 4px; cursor: pointer; background: none; border: none; }
        .swap-btn i { color: var(--accent); font-size: 1.1rem; transition: transform 0.3s; }
        .swap-btn:hover i { transform: rotate(180deg); }

        .result-main {
            text-align: center; padding: 20px; background: var(--bg); border-radius: 14px;
            border: 1px solid var(--border); margin-bottom: 20px; display: none;
        }
        .result-main.show { display: block; animation: slideIn 0.3s ease; }
        .result-main .value { font-family: 'JetBrains Mono', monospace; font-size: 2rem; font-weight: 700; color: var(--accent2); }
        .result-main .label { font-size: 0.78rem; color: var(--dim); margin-top: 4px; }

        .results-title { font-size: 0.72rem; font-weight: 700; color: var(--dim); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }
        .results-grid { display: none; }
        .results-grid.show { display: block; animation: slideIn 0.3s ease; }
        .result-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px; background: var(--bg); border-radius: 10px;
            margin-bottom: 8px; border: 1px solid var(--border); cursor: pointer; transition: all 0.15s;
        }
        .result-row:hover { border-color: var(--accent); background: rgba(217,119,6,0.03); }
        .result-row .rr-label { font-size: 0.78rem; color: var(--dim); font-weight: 600; }
        .result-row .rr-value { font-family: 'JetBrains Mono', monospace; font-size: 1rem; font-weight: 700; color: var(--accent2); }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .copy-toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
            background: var(--accent); color: #0f172a; padding: 8px 20px; border-radius: 8px;
            font-size: 0.8rem; font-weight: 700; opacity: 0; transition: all 0.25s; pointer-events: none;
        }
        .copy-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        @media (max-width: 620px) { .converter { width: 100%; padding: 20px 16px; } .row-selects { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="window.location.href='../Tools.html'"><i class="fas fa-arrow-left"></i> Back</button>
        <h1><i class="fas fa-cube"></i> Volume Converter</h1>
    </div>

    <div class="main-wrap">
        <div class="converter">
            <div class="conv-title">Volume Converter</div>
            <div class="conv-desc">Convert between volume and capacity units.</div>

            <div class="input-label">Value</div>
            <div class="input-group">
                <input type="number" id="inputVal" placeholder="Enter value" step="any" oninput="convert()">
            </div>

            <div class="row-selects">
                <div>
                    <div class="input-label">From</div>
                    <div class="input-group"><select id="fromUnit" onchange="convert()" style="flex:1;"></select></div>
                </div>
                <button class="swap-btn" onclick="swapUnits()"><i class="fas fa-arrows-rotate"></i></button>
                <div>
                    <div class="input-label">To</div>
                    <div class="input-group"><select id="toUnit" onchange="convert()" style="flex:1;"></select></div>
                </div>
            </div>

            <div class="result-main" id="resultMain">
                <div class="value" id="resultValue"></div>
                <div class="label" id="resultLabel"></div>
            </div>

            <div class="results-title">All Conversions</div>
            <div class="results-grid" id="resultsGrid"></div>
        </div>
    </div>

    <div class="copy-toast" id="copyToast">Copied!</div>

    <script>
    const units = {
        'L':     { name: 'Liter',        factor: 1 },
        'mL':    { name: 'Milliliter',   factor: 0.001 },
        'm³':    { name: 'Cubic Meter',  factor: 1000 },
        'gal':   { name: 'US Gallon',    factor: 3.78541 },
        'qt':    { name: 'US Quart',     factor: 0.946353 },
        'pt':    { name: 'US Pint',      factor: 0.473176 },
        'cup':   { name: 'US Cup',       factor: 0.236588 },
        'fl oz': { name: 'US Fl Oz',     factor: 0.0295735 },
        'tbsp':  { name: 'Tablespoon',   factor: 0.0147868 },
        'tsp':   { name: 'Teaspoon',     factor: 0.00492892 },
        'imp gal': { name: 'Imperial Gallon', factor: 4.54609 },
        'imp pt':  { name: 'Imperial Pint',   factor: 0.568261 },
        'cm³':     { name: 'Cubic Centimeter', factor: 0.001 },
        'in³':     { name: 'Cubic Inch',       factor: 0.0163871 },
        'ft³':     { name: 'Cubic Foot',       factor: 28.3168 },
        'bbl':     { name: 'Barrel (Oil)',     factor: 158.987 },
        'µL':      { name: 'Microliter',         factor: 0.000001 },
        'dL':      { name: 'Deciliter',          factor: 0.1 },
        'cL':      { name: 'Centiliter',         factor: 0.01 },
        'hL':      { name: 'Hectoliter',         factor: 100 },
        'kL':      { name: 'Kiloliter',          factor: 1000 },
        'mm³':     { name: 'Cubic Millimeter',   factor: 0.000001 },
        'yd³':     { name: 'Cubic Yard',         factor: 764.555 },
        'imp qt':  { name: 'Imperial Quart',     factor: 1.13652 },
        'imp cup': { name: 'Imperial Cup',       factor: 0.284131 },
        'imp fl oz': { name: 'Imperial Fl Oz',   factor: 0.0284131 },
        'imp tbsp': { name: 'Imperial Tablespoon', factor: 0.0177582 },
        'imp tsp': { name: 'Imperial Teaspoon',  factor: 0.00591939 },
        'drop':    { name: 'Drop',               factor: 0.00005 },
        'gill':    { name: 'Gill',               factor: 0.118294 },
        'bu':      { name: 'Bushel',             factor: 35.2391 },
        'pk':      { name: 'Peck',               factor: 8.80977 },
        'hhd':     { name: 'Hogshead',           factor: 238.481 },
        'fl dr':   { name: 'Dram/Fluid Dram',    factor: 0.003697 }
    };

    const fromSel = document.getElementById('fromUnit');
    const toSel = document.getElementById('toUnit');

    for (const [key, u] of Object.entries(units)) {
        fromSel.innerHTML += `<option value="${key}">${u.name} (${key})</option>`;
        toSel.innerHTML += `<option value="${key}">${u.name} (${key})</option>`;
    }
    toSel.selectedIndex = 1;

    function swapUnits() {
        const tmp = fromSel.value;
        fromSel.value = toSel.value;
        toSel.value = tmp;
        convert();
    }

    function formatResult(n) {
        if (Math.abs(n) > 1e12 || (Math.abs(n) < 1e-6 && n !== 0)) return n.toExponential(6);
        return parseFloat(n.toPrecision(10)).toLocaleString('en-US', { maximumFractionDigits: 10 });
    }

    function convert() {
        const val = parseFloat(document.getElementById('inputVal').value);
        const mainRes = document.getElementById('resultMain');
        const grid = document.getElementById('resultsGrid');

        if (isNaN(val)) { mainRes.classList.remove('show'); grid.classList.remove('show'); return; }

        const from = fromSel.value;
        const to = toSel.value;
        const liters = val * units[from].factor;
        const result = liters / units[to].factor;

        document.getElementById('resultValue').textContent = formatResult(result);
        document.getElementById('resultLabel').textContent = `${units[to].name} (${to})`;
        mainRes.classList.add('show');

        let html = '';
        for (const [key, u] of Object.entries(units)) {
            if (key === from) continue;
            const r = liters / u.factor;
            html += `<div class="result-row" onclick="copyVal('${parseFloat(r.toPrecision(10))}')">
                <span class="rr-label">${u.name} (${key})</span>
                <span class="rr-value">${formatResult(r)}</span>
            </div>`;
        }
        grid.innerHTML = html;
        grid.classList.add('show');
    }

    function copyVal(val) {
        navigator.clipboard.writeText(val).then(() => {
            const t = document.getElementById('copyToast');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 1200);
        });
    }
    </script>
</body>
</html>
