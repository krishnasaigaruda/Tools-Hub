                            <option value="multiply" ${layer.blendMode === 'multiply' ? 'selected' : ''}>Multiply</option>
                            <option value="screen" ${layer.blendMode === 'screen' ? 'selected' : ''}>Screen</option>
                            <option value="overlay" ${layer.blendMode === 'overlay' ? 'selected' : ''}>Overlay</option>
                            <option value="darken" ${layer.blendMode === 'darken' ? 'selected' : ''}>Darken</option>
                            <option value="lighten" ${layer.blendMode === 'lighten' ? 'selected' : ''}>Lighten</option>
                            <option value="color-dodge" ${layer.blendMode === 'color-dodge' ? 'selected' : ''}>Color Dodge</option>
                            <option value="color-burn" ${layer.blendMode === 'color-burn' ? 'selected' : ''}>Color Burn</option>
                            <option value="hard-light" ${layer.blendMode === 'hard-light' ? 'selected' : ''}>Hard Light</option>
                            <option value="soft-light" ${layer.blendMode === 'soft-light' ? 'selected' : ''}>Soft Light</option>
                            <option value="difference" ${layer.blendMode === 'difference' ? 'selected' : ''}>Difference</option>
                            <option value="exclusion" ${layer.blendMode === 'exclusion' ? 'selected' : ''}>Exclusion</option>
                        </select>
                    </div>
                    <div class="layer-controls">
                        <button class="layer-btn ${layer.alphaLock ? 'active' : ''}" onclick="event.stopPropagation(); toggleAlphaLock(${index})" title="Alpha Lock">
                            <i class="fas fa-lock"></i>
                        </button>
                        <button class="layer-btn ${layer.clippingMask ? 'active' : ''}" onclick="event.stopPropagation(); toggleClippingMask(${index})" title="Clipping Mask">
                            <i class="fas fa-layer-group"></i>
                        </button>
                        <button class="layer-btn" onclick="event.stopPropagation(); toggleLayerVisibility(${index})">
                            <i class="fas fa-eye${layer.visible ? '' : '-slash'}"></i>
                        </button>
                        <button class="layer-btn" onclick="event.stopPropagation(); duplicateLayer(${index})" title="Duplicate">
                            <i class="fas fa-copy"></i>
                        </button>
                        <button class="layer-btn" onclick="event.stopPropagation(); deleteLayer(${index})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        function selectLayer(index) {
            currentLayerIndex = index;
            renderLayers();
        }

        function toggleLayerVisibility(index) {
            layers[index].visible = !layers[index].visible;
            renderLayers();
            composeLayers();
        }

        function updateLayerOpacity(index, value) {
            layers[index].opacity = value / 100;
            renderLayers();
            composeLayers();
        }

        function toggleAlphaLock(index) {
            layers[index].alphaLock = !layers[index].alphaLock;
            renderLayers();
        }

        function toggleClippingMask(index) {
            layers[index].clippingMask = !layers[index].clippingMask;
            renderLayers();
            composeLayers();
        }

        function duplicateLayer(index) {
            const originalLayer = layers[index];
            const newLayer = {
                id: Date.now(),
                name: `${originalLayer.name} Copy`,
                canvas: document.createElement('canvas'),
                visible: true,
                opacity: originalLayer.opacity,
                blendMode: originalLayer.blendMode,
                alphaLock: false,
                clippingMask: false
            };
            newLayer.canvas.width = canvas.width;
            newLayer.canvas.height = canvas.height;

            const newLayerCtx = newLayer.canvas.getContext('2d');
            newLayerCtx.drawImage(originalLayer.canvas, 0, 0);

            layers.splice(index + 1, 0, newLayer);
            currentLayerIndex = index + 1;
            renderLayers();
            composeLayers();
        }

        function deleteLayer(index) {
            if (layers.length === 1) {
                alert('Cannot delete the last layer');
                return;
            }
            layers.splice(index, 1);
            if (currentLayerIndex >= layers.length) {
                currentLayerIndex = layers.length - 1;
            }
            renderLayers();
            composeLayers();
        }

        function composeLayers() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Fill with white background
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            layers.forEach(layer => {
                if (layer.visible) {
                    ctx.save();
                    ctx.globalAlpha = layer.opacity;
                    ctx.globalCompositeOperation = layer.blendMode || 'normal';
                    ctx.drawImage(layer.canvas, 0, 0);
                    ctx.restore();
                }
            });
            ctx.globalAlpha = 1;
            ctx.globalCompositeOperation = 'source-over';
        }

        // History (Undo/Redo)
        function saveHistory() {
            historyStep++;
            if (historyStep < history.length) {
                history.splice(historyStep);
            }
            history.push(canvas.toDataURL());
            if (history.length > 50) {
                history.shift();
                historyStep--;
            }
        }

        function undo() {
            if (historyStep > 0) {
                historyStep--;
                restoreFromHistory();
            }
        }

        function redo() {
            if (historyStep < history.length - 1) {
                historyStep++;
                restoreFromHistory();
            }
        }

        function restoreFromHistory() {
            const img = new Image();
            img.onload = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);
            };
            img.src = history[historyStep];
        }

        // Canvas operations
        function newCanvas() {
            document.getElementById('newCanvasModal').classList.add('show');
        }

        function createNewCanvas() {
            const width = parseInt(document.getElementById('canvasWidth').value);
            const height = parseInt(document.getElementById('canvasHeight').value);

            if (width && height && width > 0 && height > 0) {
                canvas.width = width;
                canvas.height = height;
                ctx.fillStyle = 'white';
                ctx.fillRect(0, 0, width, height);

                layers = [];
                initLayers();
                history = [];
                historyStep = -1;
                saveHistory();

                document.getElementById('canvasSize').textContent = `${width} × ${height} px`;
                closeModal('newCanvasModal');
            }
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('show');
        }

        // Export
        function exportImage() {
            const link = document.createElement('a');
            link.download = 'drawing_' + Date.now() + '.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        // IndexedDB
        function openIndexedDB() {
            const request = indexedDB.open('DrawingPadDB', 1);

            request.onerror = () => console.error('IndexedDB error');
            request.onsuccess = () => {
                db = request.result;
            };

            request.onupgradeneeded = (event) => {
                db = event.target.result;
                if (!db.objectStoreNames.contains('drawings')) {
                    db.createObjectStore('drawings', { keyPath: 'id' });
                }
            };
        }

        function saveProject() {
            if (!db) return;

            const transaction = db.transaction(['drawings'], 'readwrite');
            const store = transaction.objectStore('drawings');

            const project = {
                id: 'current',
                data: canvas.toDataURL(),
                timestamp: new Date().toISOString()
            };

            store.put(project);
            document.getElementById('statusText').textContent = 'Saved!';
            setTimeout(() => {
                document.getElementById('statusText').textContent = 'Ready';
            }, 2000);
        }

        // Symmetry
        function toggleSymmetry() {
            symmetryEnabled = !symmetryEnabled;
            const btn = document.getElementById('symmetryBtn');
            btn.classList.toggle('active', symmetryEnabled);
        }

        // Transform functions
        function flipHorizontal() {
            const currentLayer = layers[currentLayerIndex];
            const layerCtx = currentLayer.canvas.getContext('2d');
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = currentLayer.canvas.width;
            tempCanvas.height = currentLayer.canvas.height;
            const tempCtx = tempCanvas.getContext('2d');

            tempCtx.drawImage(currentLayer.canvas, 0, 0);
            layerCtx.clearRect(0, 0, currentLayer.canvas.width, currentLayer.canvas.height);
            layerCtx.save();
            layerCtx.scale(-1, 1);
            layerCtx.drawImage(tempCanvas, -currentLayer.canvas.width, 0);
            layerCtx.restore();

            composeLayers();
            saveHistory();
        }

        function flipVertical() {
            const currentLayer = layers[currentLayerIndex];
            const layerCtx = currentLayer.canvas.getContext('2d');
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = currentLayer.canvas.width;
            tempCanvas.height = currentLayer.canvas.height;
            const tempCtx = tempCanvas.getContext('2d');

            tempCtx.drawImage(currentLayer.canvas, 0, 0);
            layerCtx.clearRect(0, 0, currentLayer.canvas.width, currentLayer.canvas.height);
            layerCtx.save();
            layerCtx.scale(1, -1);
            layerCtx.drawImage(tempCanvas, 0, -currentLayer.canvas.height);
            layerCtx.restore();

            composeLayers();
            saveHistory();
        }

        function rotateCanvas(degrees) {
            const currentLayer = layers[currentLayerIndex];
            const layerCtx = currentLayer.canvas.getContext('2d');
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = currentLayer.canvas.width;
            tempCanvas.height = currentLayer.canvas.height;
            const tempCtx = tempCanvas.getContext('2d');

            tempCtx.drawImage(currentLayer.canvas, 0, 0);
            layerCtx.clearRect(0, 0, currentLayer.canvas.width, currentLayer.canvas.height);
            layerCtx.save();
            layerCtx.translate(currentLayer.canvas.width / 2, currentLayer.canvas.height / 2);
            layerCtx.rotate(degrees * Math.PI / 180);
            layerCtx.drawImage(tempCanvas, -currentLayer.canvas.width / 2, -currentLayer.canvas.height / 2);
            layerCtx.restore();

            composeLayers();
            saveHistory();
        }

        // Blend mode
        function changeBlendMode(index, mode) {
            layers[index].blendMode = mode;
            composeLayers();
        }

        // Smudge tool
        function smudge(x, y) {
            const currentLayer = layers[currentLayerIndex];
            const layerCtx = currentLayer.canvas.getContext('2d');
            const size = brushSize;
            const imageData = layerCtx.getImageData(x - size/2, y - size/2, size, size);

            // Blur the pixels slightly
            const blurred = blurImageData(imageData, 2);
            layerCtx.putImageData(blurred, x - size/2, y - size/2);
            composeLayers();
        }

        // Blur tool
        function blur(x, y) {
            const currentLayer = layers[currentLayerIndex];
            const layerCtx = currentLayer.canvas.getContext('2d');
            const size = brushSize;
            const imageData = layerCtx.getImageData(x - size/2, y - size/2, size, size);

            const blurred = blurImageData(imageData, 3);
            layerCtx.putImageData(blurred, x - size/2, y - size/2);
            composeLayers();
        }

        function blurImageData(imageData, radius) {
            const pixels = imageData.data;
            const width = imageData.width;
            const height = imageData.height;
            const output = new ImageData(width, height);

            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    let r = 0, g = 0, b = 0, a = 0, count = 0;

                    for (let dy = -radius; dy <= radius; dy++) {
                        for (let dx = -radius; dx <= radius; dx++) {
                            const nx = x + dx;
                            const ny = y + dy;

                            if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
                                const idx = (ny * width + nx) * 4;
                                r += pixels[idx];
                                g += pixels[idx + 1];
                                b += pixels[idx + 2];
                                a += pixels[idx + 3];
                                count++;
                            }
                        }
                    }

                    const idx = (y * width + x) * 4;
                    output.data[idx] = r / count;
                    output.data[idx + 1] = g / count;
                    output.data[idx + 2] = b / count;
                    output.data[idx + 3] = a / count;
                }
            }

            return output;
        }

        // Import image
        function importImage() {
            document.getElementById('importInput').click();
        }

        function handleImageImport(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const currentLayer = layers[currentLayerIndex];
                    const layerCtx = currentLayer.canvas.getContext('2d');
                    layerCtx.drawImage(img, 0, 0, currentLayer.canvas.width, currentLayer.canvas.height);
                    composeLayers();
                    saveHistory();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // Timelapse
        let timelapsePlayer = null;
        let timelapseCurrentFrame = 0;

        function toggleTimelapse() {
            recordingTimelapse = !recordingTimelapse;
            const btn = document.getElementById('timelapseBtn');
            btn.classList.toggle('active', recordingTimelapse);

            if (recordingTimelapse) {
                timelapseFrames = [];
                // Start interval to capture frames
                timelapseInterval = setInterval(captureTimelapseFrame, 200); // Capture every 200ms
                document.getElementById('statusText').textContent = 'Recording timelapse...';
            } else {
                if (timelapseInterval) {
                    clearInterval(timelapseInterval);
                    timelapseInterval = null;
                }
                if (timelapseFrames.length > 0) {
                    showTimelapseModal();
                }
                document.getElementById('statusText').textContent = 'Ready';
            }
        }

        function captureTimelapseFrame() {
            if (!recordingTimelapse) return;
            timelapseFrames.push(canvas.toDataURL('image/jpeg', 0.7));
        }

        function showTimelapseModal() {
            document.getElementById('timelapseModal').classList.add('show');
            const slider = document.getElementById('timelapseSlider');
            slider.max = timelapseFrames.length - 1;
            slider.value = 0;
            updateTimelapseProgress();
            seekTimelapse(0);
        }

        function playTimelapse() {
            document.getElementById('playBtn').style.display = 'none';
            document.getElementById('pauseBtn').style.display = 'block';

            timelapsePlayer = setInterval(() => {
                timelapseCurrentFrame++;
                if (timelapseCurrentFrame >= timelapseFrames.length) {
                    timelapseCurrentFrame = 0;
                }
                seekTimelapse(timelapseCurrentFrame);
            }, 50); // Play at ~20fps
        }

        function pauseTimelapse() {
            document.getElementById('playBtn').style.display = 'block';
            document.getElementById('pauseBtn').style.display = 'none';
            if (timelapsePlayer) {
                clearInterval(timelapsePlayer);
                timelapsePlayer = null;
            }
        }

        function seekTimelapse(frame) {
            timelapseCurrentFrame = parseInt(frame);
            const slider = document.getElementById('timelapseSlider');
            slider.value = timelapseCurrentFrame;

            if (timelapseFrames[timelapseCurrentFrame]) {
                const timelapseCanvas = document.getElementById('timelapseCanvas');
                const timelapseCtx = timelapseCanvas.getContext('2d');
                const img = new Image();
                img.onload = function() {
                    timelapseCtx.clearRect(0, 0, timelapseCanvas.width, timelapseCanvas.height);
                    timelapseCtx.drawImage(img, 0, 0, timelapseCanvas.width, timelapseCanvas.height);
                };
                img.src = timelapseFrames[timelapseCurrentFrame];
            }

            updateTimelapseProgress();
        }

        function updateTimelapseProgress() {
            document.getElementById('timelapseProgress').textContent =
                `${timelapseCurrentFrame + 1} / ${timelapseFrames.length}`;
        }

        function exportTimelapseVideo() {
            if (timelapseFrames.length === 0) {
                alert('No frames to export');
                return;
            }

            // Export as a series of images or the final frame
            const zip = confirm('Export all frames as ZIP? (Cancel to export final frame only)');
            if (zip) {
                alert(`This would export ${timelapseFrames.length} frames. Feature requires additional library.`);
            } else {
                const link = document.createElement('a');
                link.download = 'timelapse_final.png';
                link.href = timelapseFrames[timelapseFrames.length - 1];
                link.click();
            }
        }

        // Actions menu
        function showActions() {
            document.getElementById('actionsModal').classList.add('show');
        }

        function adjustBrightness() {
            const value = prompt('Enter brightness adjustment (-100 to 100):', '20');
            if (value === null) return;

            const brightness = parseInt(value);
            const currentLayer = layers[currentLayerIndex];
            const layerCtx = currentLayer.canvas.getContext('2d');
            const imageData = layerCtx.getImageData(0, 0, currentLayer.canvas.width, currentLayer.canvas.height);
            const data = imageData.data;

            for (let i = 0; i < data.length; i += 4) {
                data[i] = Math.max(0, Math.min(255, data[i] + brightness));
                data[i + 1] = Math.max(0, Math.min(255, data[i + 1] + brightness));
                data[i + 2] = Math.max(0, Math.min(255, data[i + 2] + brightness));
            }

            layerCtx.putImageData(imageData, 0, 0);
            composeLayers();
            saveHistory();
            closeModal('actionsModal');
        }

        function adjustContrast() {
            const value = prompt('Enter contrast adjustment (-100 to 100):', '20');
            if (value === null) return;

            const contrast = parseInt(value) / 100 + 1;
            const currentLayer = layers[currentLayerIndex];
            const layerCtx = currentLayer.canvas.getContext('2d');
            const imageData = layerCtx.getImageData(0, 0, currentLayer.canvas.width, currentLayer.canvas.height);
            const data = imageData.data;

            for (let i = 0; i < data.length; i += 4) {
                data[i] = Math.max(0, Math.min(255, ((data[i] - 128) * contrast) + 128));
                data[i + 1] = Math.max(0, Math.min(255, ((data[i + 1] - 128) * contrast) + 128));
                data[i + 2] = Math.max(0, Math.min(255, ((data[i + 2] - 128) * contrast) + 128));
            }

            layerCtx.putImageData(imageData, 0, 0);
            composeLayers();
            saveHistory();
            closeModal('actionsModal');
        }

        function adjustHue() {
            const value = prompt('Enter hue rotation (0-360 degrees):', '30');
            if (value === null) return;

            const hue = parseInt(value);
            const currentLayer = layers[currentLayerIndex];
            const layerCtx = currentLayer.canvas.getContext('2d');

            layerCtx.save();
            layerCtx.filter = `hue-rotate(${hue}deg)`;
            layerCtx.drawImage(currentLayer.canvas, 0, 0);
            layerCtx.restore();

            composeLayers();
            saveHistory();
            closeModal('actionsModal');
        }

        function invertColors() {
            const currentLayer = layers[currentLayerIndex];
            const layerCtx = currentLayer.canvas.getContext('2d');
            const imageData = layerCtx.getImageData(0, 0, currentLayer.canvas.width, currentLayer.canvas.height);
            const data = imageData.data;

            for (let i = 0; i < data.length; i += 4) {
                data[i] = 255 - data[i];
                data[i + 1] = 255 - data[i + 1];
                data[i + 2] = 255 - data[i + 2];
            }

            layerCtx.putImageData(imageData, 0, 0);
            composeLayers();
            saveHistory();
            closeModal('actionsModal');
        }

        function applyGaussianBlur() {
            const value = prompt('Enter blur radius (1-10):', '5');
            if (value === null) return;

            const radius = parseInt(value);
            const currentLayer = layers[currentLayerIndex];
            const layerCtx = currentLayer.canvas.getContext('2d');
            const imageData = layerCtx.getImageData(0, 0, currentLayer.canvas.width, currentLayer.canvas.height);
            const blurred = blurImageData(imageData, radius);

            layerCtx.putImageData(blurred, 0, 0);
            composeLayers();
            saveHistory();
            closeModal('actionsModal');
        }

        function sharpenImage() {
            const currentLayer = layers[currentLayerIndex];
            const layerCtx = currentLayer.canvas.getContext('2d');
            const imageData = layerCtx.getImageData(0, 0, currentLayer.canvas.width, currentLayer.canvas.height);
            const data = imageData.data;
            const output = new ImageData(imageData.width, imageData.height);

            // Sharpen kernel
            const kernel = [
                [0, -1, 0],
                [-1, 5, -1],
                [0, -1, 0]
            ];

            for (let y = 1; y < imageData.height - 1; y++) {
                for (let x = 1; x < imageData.width - 1; x++) {
                    let r = 0, g = 0, b = 0;

                    for (let ky = 0; ky < 3; ky++) {
                        for (let kx = 0; kx < 3; kx++) {
                            const px = x + kx - 1;
                            const py = y + ky - 1;
                            const idx = (py * imageData.width + px) * 4;
                            const weight = kernel[ky][kx];

                            r += data[idx] * weight;
                            g += data[idx + 1] * weight;
                            b += data[idx + 2] * weight;
                        }
                    }

                    const idx = (y * imageData.width + x) * 4;
                    output.data[idx] = Math.max(0, Math.min(255, r));
                    output.data[idx + 1] = Math.max(0, Math.min(255, g));
                    output.data[idx + 2] = Math.max(0, Math.min(255, b));
                    output.data[idx + 3] = data[idx + 3];
                }
            }

            layerCtx.putImageData(output, 0, 0);
            composeLayers();
            saveHistory();
            closeModal('actionsModal');
        }

        // Grid overlay
        function toggleGrid() {
            gridEnabled = !gridEnabled;
            document.getElementById('gridBtn').classList.toggle('active', gridEnabled);
            composeLayers(); // Redraw to show/hide grid
        }

        function drawGrid() {
            // Grid is drawn on a separate layer for overlay
            if (gridEnabled) {
                ctx.save();
                ctx.strokeStyle = 'rgba(100, 100, 255, 0.3)';
                ctx.lineWidth = 1;

                for (let x = 0; x <= canvas.width; x += gridSize) {
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, canvas.height);
                    ctx.stroke();
                }

                for (let y = 0; y <= canvas.height; y += gridSize) {
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(canvas.width, y);
                    ctx.stroke();
                }

                ctx.restore();
            }
        }

        // QuickShape
        function toggleQuickShape() {
            quickShapeEnabled = !quickShapeEnabled;
            document.getElementById('quickShapeBtn').classList.toggle('active', quickShapeEnabled);
        }

        // Merge layers
        function mergeLayers() {
            if (layers.length < 2) {
                alert('Need at least 2 layers to merge');
                return;
            }

            const mergedLayer = {
                id: Date.now(),
                name: 'Merged Layer',
                canvas: document.createElement('canvas'),
                visible: true,
                opacity: 1,
                blendMode: 'normal',
                alphaLock: false,
                clippingMask: false
            };
            mergedLayer.canvas.width = canvas.width;
            mergedLayer.canvas.height = canvas.height;

            const mergedCtx = mergedLayer.canvas.getContext('2d');
            mergedCtx.fillStyle = '#FFFFFF';
            mergedCtx.fillRect(0, 0, mergedLayer.canvas.width, mergedLayer.canvas.height);

            layers.forEach(layer => {
                if (layer.visible) {
                    mergedCtx.save();
                    mergedCtx.globalAlpha = layer.opacity;
                    mergedCtx.globalCompositeOperation = layer.blendMode || 'normal';
                    mergedCtx.drawImage(layer.canvas, 0, 0);
                    mergedCtx.restore();
                }
            });

            layers = [mergedLayer];
            currentLayerIndex = 0;
            renderLayers();
            composeLayers();
            saveHistory();
        }

        function goBack() {
            saveProject();
            window.location.href = '../Tools.html';
        }

        // Redraw with grid overlay
        const originalComposeLayers = composeLayers;
        composeLayers = function() {
            originalComposeLayers.call(this);
            if (gridEnabled) {
                drawGrid();
            }
        };

        // Auto-save every 30 seconds
        setInterval(saveProject, 30000);

        // Initialize on load
        init();
    </script>
</body>
</html>
