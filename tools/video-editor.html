    <script>
        // Global variables
        let mediaLibraryItems = [];
        let timelineClips = [];
        let currentTab = 'media';
        let isPlaying = false;
        let currentTime = 0;
        let totalDuration = 0;
        let selectedClip = null;
        let selectedTransition = null;
        let canvas, ctx;
        let animationFrame;
        let projectData = {};
        let textOverlays = [];
        let selectedTextOverlay = null;
        let pixelsPerSecond = 0.5; // Very compact timeline - 10x shorter frames
        let compressedPixelsPerSecond = 0.5; // Standard compressed timeline
        let originalPixelsPerSecond = 7.5; // 15x larger (expanded) timeline
        let isTimelineCompressed = true; // Track whether timeline is in compressed state
        const TRACK_START = 100;
        let lastActiveClipId = null;

        // Cache playhead container for performance
        let cachedPlayheadContainer = null;

        function getCachedPlayheadContainer() {
            if (!cachedPlayheadContainer) {
                cachedPlayheadContainer = document.querySelector('.timeline-tracks-container');
            }
            return cachedPlayheadContainer;
        }

        // Global mousemove handler for playhead dragging only
        let playheadUpdateScheduled = false;
        let lastPlayheadMouseEvent = null;

        document.addEventListener('mousemove', function(e) {
            // Playhead dragging - batch updates with RAF
            if (typeof isDraggingPlayhead !== 'undefined' && isDraggingPlayhead) {
                lastPlayheadMouseEvent = e;
                if (!playheadUpdateScheduled) {
                    playheadUpdateScheduled = true;
                    requestAnimationFrame(function() {
                        if (isDraggingPlayhead && lastPlayheadMouseEvent) {
                            const container = getCachedPlayheadContainer();
                            const rect = container.getBoundingClientRect();
                            const scrollLeft = container.scrollLeft;
                            const x = lastPlayheadMouseEvent.clientX - rect.left + scrollLeft;
                            const newTime = Math.max(0, Math.min((x - TRACK_START) / pixelsPerSecond, totalDuration));
                            currentTime = newTime;
                            updatePlayheadPosition();
                            updatePlaybackUI();
                            renderFrame();
                        }
                        playheadUpdateScheduled = false;
                    });
                }
            }
        }, false);

        // Initialize
        window.onload = function() {
            const savedProject = sessionStorage.getItem('currentProject');
            if (savedProject) {
                projectData = JSON.parse(savedProject);
                document.getElementById('projectName').textContent = projectData.name || 'My Video Project';
            }

            canvas = document.getElementById('previewCanvas');
            ctx = canvas.getContext('2d');

            // Set default canvas size (will be updated when media is loaded)
            canvas.width = 1920;
            canvas.height = 1080;

            loadProjectData();
            renderFrame();

            // Make playhead draggable
            initPlayheadDragging();
        };

        // Initialize playhead dragging functionality
        function initPlayheadDragging() {
            const playhead = document.getElementById('playhead');
            const timelineContainer = document.querySelector('.timeline-tracks-container');
            let isDraggingPlayhead = false;

            playhead.addEventListener('mousedown', function(e) {
                e.preventDefault();
                e.stopPropagation();
                isDraggingPlayhead = true;

                // Pause playback while dragging
                if (isPlaying) {
                    togglePlay();
                }

                document.body.style.cursor = 'ew-resize';
            });

            // Playhead mousemove now handled by global consolidated handler above

            document.addEventListener('mouseup', function(e) {
                if (isDraggingPlayhead) {
                    isDraggingPlayhead = false;
                    document.body.style.cursor = 'default';
                }
            });
        }

        // Switch sidebar tabs
        function switchTab(tab, clickedElement) {
            currentTab = tab;

            // Update active tab button
            document.querySelectorAll('.sidebar-tab').forEach(btn => btn.classList.remove('active'));

            // If called from a click event, use the event target
            if (clickedElement && clickedElement.target) {
                clickedElement.target.closest('.sidebar-tab').classList.add('active');
            } else {
                // Otherwise, find the button by its onclick attribute
                const tabButtons = {
                    'media': document.querySelector('[onclick*="switchTab(\'media\')"]'),
                    'properties': document.querySelector('[onclick*="switchTab(\'properties\')"]'),
                    'text': document.querySelector('[onclick*="switchTab(\'text\')"]')
                };
                if (tabButtons[tab]) {
                    tabButtons[tab].classList.add('active');
                }
            }

            // Show/hide tab content
            document.getElementById('mediaTab').style.display = tab === 'media' ? 'block' : 'none';
            document.getElementById('propertiesTab').style.display = tab === 'properties' ? 'block' : 'none';
            document.getElementById('textTab').style.display = tab === 'text' ? 'block' : 'none';
        }

        // Handle media import
        function handleMediaImport(event) {
            const files = Array.from(event.target.files);

            files.forEach(file => {
                const item = {
                    id: Date.now() + Math.random(),
                    name: file.name,
                    type: file.type.startsWith('video/') ? 'video' : file.type.startsWith('audio/') ? 'audio' : 'image',
                    file: file,
                    url: URL.createObjectURL(file),
                    duration: 0
                };

                if (item.type === 'video') {
                    const video = document.createElement('video');
                    video.src = item.url;
                    video.preload = 'auto'; // Changed from metadata to auto for better playback
                    video.muted = false; // Will be controlled by volume slider
                    video.playsInline = true; // Better mobile support

                    video.onloadedmetadata = function() {
                        item.duration = video.duration;
                        item.element = video;
                        addMediaToLibrary(item);
                    };

                    // Ensure video is ready for playback
                    video.load();
                } else if (item.type === 'image') {
                    const img = new Image();
                    img.src = item.url;
                    img.onload = function() {
                        item.duration = 5;
                        item.element = img;
                        addMediaToLibrary(item);
                    };
                } else if (item.type === 'audio') {
                    const audio = new Audio(item.url);
                    audio.preload = 'auto'; // Changed from metadata to auto for better playback
                    audio.onloadedmetadata = function() {
                        item.duration = audio.duration;
                        item.element = audio;
                        addMediaToLibrary(item);
                    };
                    // Ensure audio is ready for playback
                    audio.load();
                }
            });

            event.target.value = '';
        }

        // Add media to library
        function addMediaToLibrary(item) {
            mediaLibraryItems.push(item);

            const library = document.getElementById('mediaLibrary');
            const mediaItem = document.createElement('div');
            mediaItem.className = 'media-item';
            mediaItem.draggable = true;
            mediaItem.dataset.itemId = item.id;

            if (item.type === 'video') {
                mediaItem.innerHTML = `
                    <video src="${item.url}"></video>
                    <div class="media-item-overlay">
                        <i class="fas fa-video" style="font-size: 2rem;"></i>
                    </div>
                    <div class="media-item-duration">${formatTime(item.duration)}</div>
                `;
            } else if (item.type === 'image') {
                mediaItem.innerHTML = `
                    <img src="${item.url}">
                    <div class="media-item-overlay">
                        <i class="fas fa-image" style="font-size: 2rem;"></i>
                    </div>
                `;
            } else if (item.type === 'audio') {
                mediaItem.innerHTML = `
                    <div style="display: flex; align-items: center; justify-content: center; height: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                        <i class="fas fa-music" style="font-size: 3rem;"></i>
                    </div>
                    <div class="media-item-duration">${formatTime(item.duration)}</div>
                `;
            }

            mediaItem.ondragstart = handleDragStart;
            library.appendChild(mediaItem);
        }

        // Drag and drop
        function handleDragStart(e) {
            e.dataTransfer.effectAllowed = 'copy';
            e.dataTransfer.setData('itemId', e.target.dataset.itemId);
            e.dataTransfer.setData('dragType', 'newMedia');
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.stopPropagation();

            // Check if we're dragging a clip or new media
            const isClipMove = window.draggedClipId !== undefined && window.draggedClipId !== null;
            e.dataTransfer.dropEffect = isClipMove ? 'move' : 'copy';

            // Show drop indicator line
            const track = e.currentTarget;
            const rect = track.getBoundingClientRect();
            const scrollLeft = track.parentElement.scrollLeft;
            const x = e.clientX - rect.left + scrollLeft;

            // Remove old indicator if exists
            const oldIndicator = track.querySelector('.drop-indicator');
            if (oldIndicator) {
                oldIndicator.remove();
            }

            // Create new indicator
            const indicator = document.createElement('div');
            indicator.className = 'drop-indicator';
            indicator.style.left = x + 'px';
            track.appendChild(indicator);
        }

        function handleDragLeave(e) {
            // Remove drop indicator when leaving track
            const track = e.currentTarget;
            const indicator = track.querySelector('.drop-indicator');
            if (indicator) {
                indicator.remove();
            }
        }

        function handleDrop(e) {
            e.preventDefault();
            e.stopPropagation();
            const track = e.currentTarget;

            // Remove drop indicator
            const indicator = track.querySelector('.drop-indicator');
            if (indicator) {
                indicator.remove();
            }

            // Check if we're moving an existing clip
            if (window.draggedClipId !== undefined && window.draggedClipId !== null) {
                // Moving existing clip to new track or repositioning
                const clipId = window.draggedClipId;
                const clip = timelineClips.find(c => c.id === clipId);

                if (clip) {
                    // Save original position in case we need to revert
                    const originalTrack = clip.track;
                    const originalStartTime = clip.startTime;

                    // Calculate drop position - place exactly where dropped
                    const rect = track.getBoundingClientRect();
                    const scrollLeft = track.parentElement.scrollLeft;
                    const x = e.clientX - rect.left + scrollLeft;

                    // Determine correct scale for this clip type
                    let dropScale = pixelsPerSecond;
                    if (isTimelineCompressed && clip.type === 'audio') {
                        dropScale = pixelsPerSecond / 15; // Audio is 15x smaller when compressed
                    }
                    const dropTime = Math.max(0, (x - TRACK_START) / dropScale);

                    // Prevent images from being placed in audio track
                    if (clip.type === 'image' && track.dataset.track.startsWith('audio')) {
                        console.log('Cannot place image in audio track');
                        // Restore clip to original position
                        clip.startTime = originalStartTime;
                        clip.position = TRACK_START + (originalStartTime * dropScale); // Use original dropScale
                        clip.track = originalTrack;

                        const originalTrackElement = document.querySelector(`.timeline-track[data-track="${originalTrack}"]`);
                        if (originalTrackElement) {
                            renderTimelineClip(clip, originalTrackElement);
                        }
                        window.draggedClipId = null;
                        return;
                    }

                    // Prevent audio files from being placed in video track
                    if (clip.type === 'audio' && track.dataset.track === 'video1') {
                        console.log('Cannot place audio in video track');
                        // Restore clip to original position
                        clip.startTime = originalStartTime;
                        clip.position = TRACK_START + (originalStartTime * dropScale); // Use original dropScale
                        clip.track = originalTrack;

                        const originalTrackElement = document.querySelector(`.timeline-track[data-track="${originalTrack}"]`);
                        if (originalTrackElement) {
                            renderTimelineClip(clip, originalTrackElement);
                        }
                        window.draggedClipId = null;
                        return;
                    }

                    // Check for overlap only if placing an image on top of a video
                    if (clip.type === 'image' && track.dataset.track === 'video1') {
                        const clipDuration = clip.duration;
                        const proposedEnd = dropTime + clipDuration;

                        // Check for overlaps with video clips in the same track
                        const otherClips = timelineClips.filter(c => c.track === track.dataset.track && c.id !== clip.id && c.type === 'video');
                        let hasOverlap = false;

                        for (const otherClip of otherClips) {
                            const otherEnd = otherClip.startTime + otherClip.duration;

                            // Check if clips would overlap
                            if (dropTime < otherEnd && proposedEnd > otherClip.startTime) {
                                hasOverlap = true;
                                break;
                            }
                        }

                        // Only allow drop if there's no overlap with videos
                        if (hasOverlap) {
                            console.log('Cannot place image here - would overlap with a video');
                            // Restore clip to original position
                            clip.startTime = originalStartTime;
                            clip.position = TRACK_START + (originalStartTime * pixelsPerSecond);
                            clip.track = originalTrack;

                            const originalTrackElement = document.querySelector(`.timeline-track[data-track="${originalTrack}"]`);
                            if (originalTrackElement) {
                                renderTimelineClip(clip, originalTrackElement);
                            }
                            window.draggedClipId = null;
                            return;
                        }
                    }

                    // Remove old container
                    const oldContainer = document.querySelector(`.timeline-clip-container[data-clip-id="${clipId}"]`);
                    if (oldContainer) {
                        oldContainer.remove();
                    }

                    // Remove all transition markers associated with this clip
                    document.querySelectorAll(`.transition-marker[data-clip1="${clipId}"], .transition-marker[data-clip2="${clipId}"]`).forEach(marker => {
                        marker.remove();
                    });

                    // Clear transition data
                    clip.transition = { type: 'none', duration: 0 };

                    // Update clip data - place exactly at drop position
                    const oldTrack = clip.track;
                    const oldTime = clip.startTime;
                    clip.track = track.dataset.track;
                    clip.startTime = dropTime;
                    clip.position = TRACK_START + (dropTime * dropScale);

                    // Re-render clip in the track
                    renderTimelineClip(clip, track);
                    updateTotalDuration();

                    // Auto-create transitions for adjacent clips
                    createAutoTransitions();

                    const sameTrack = oldTrack === track.dataset.track;
                    console.log(sameTrack ?
                        `Repositioned clip within ${oldTrack} from ${oldTime.toFixed(2)}s to ${dropTime.toFixed(2)}s` :
                        `Moved clip from ${oldTrack} to ${track.dataset.track} at time ${dropTime.toFixed(2)}s`
                    );
                }

                // Clear the global variable
                window.draggedClipId = null;
            } else {
                // Adding new media item
                const itemId = parseFloat(e.dataTransfer.getData('itemId'));
                const item = mediaLibraryItems.find(i => i.id === itemId);

                if (item) {
                    addClipToTimeline(item, track);
                }
            }
        }

        // Find a non-overlapping position for a clip
        function findNonOverlappingPosition(clip, trackName, preferredTime) {
            const trackClips = timelineClips.filter(c => c.track === trackName && c.id !== clip.id);

            if (trackClips.length === 0) {
                return Math.max(0, preferredTime);
            }

            // Sort clips by start time
            trackClips.sort((a, b) => a.startTime - b.startTime);

            const originalItem = mediaLibraryItems.find(i => i.id === clip.itemId);
            const clipFullDuration = originalItem ? originalItem.duration : clip.duration;

            // Build list of all available gaps
            const gaps = [];

            // Gap before first clip
            const firstClip = trackClips[0];
            if (firstClip.startTime > 0) {
                gaps.push({
                    start: 0,
                    end: firstClip.startTime,
                    size: firstClip.startTime
                });
            }

            // Gaps between clips
            for (let i = 0; i < trackClips.length - 1; i++) {
                const currentClip = trackClips[i];
                const nextClip = trackClips[i + 1];

                const currentOriginalItem = mediaLibraryItems.find(item => item.id === currentClip.itemId);
                const currentFullDuration = currentOriginalItem ? currentOriginalItem.duration : currentClip.duration;
                const currentEnd = currentClip.startTime + currentFullDuration;

                const gapSize = nextClip.startTime - currentEnd;
                if (gapSize > 0) {
                    gaps.push({
                        start: currentEnd,
                        end: nextClip.startTime,
                        size: gapSize
                    });
                }
            }

            // Gap after last clip (infinite)
            const lastClip = trackClips[trackClips.length - 1];
            const lastOriginalItem = mediaLibraryItems.find(i => i.id === lastClip.itemId);
            const lastFullDuration = lastOriginalItem ? lastOriginalItem.duration : lastClip.duration;
            const lastEnd = lastClip.startTime + lastFullDuration;
            gaps.push({
                start: lastEnd,
                end: Infinity,
                size: Infinity
            });

            // Find the best gap for the clip
            const requiredSpace = clipFullDuration;
            let bestPosition = preferredTime;
            let bestDistance = Infinity;

            for (const gap of gaps) {
                // Check if clip fits in this gap
                if (gap.size >= requiredSpace || gap.size === Infinity) {
                    // Try to place at preferred position within this gap
                    let position = Math.max(gap.start, Math.min(preferredTime, gap.end - requiredSpace));

                    // Calculate distance from preferred position
                    const distance = Math.abs(position - preferredTime);

                    if (distance < bestDistance) {
                        bestDistance = distance;
                        bestPosition = position;
                    }
                }
            }

            console.log('Found non-overlapping position:', bestPosition, 'for clip duration:', clipFullDuration);
            return bestPosition;
        }

        // Add clip to timeline
        function addClipToTimeline(item, track) {
            // Prevent images from being added to audio track
            if (item.type === 'image' && track.dataset.track.startsWith('audio')) {
                console.log('Cannot add image to audio track');
                return;
            }

            // Prevent audio files from being added to video track
            if (item.type === 'audio' && track.dataset.track === 'video1') {
                console.log('Cannot add audio to video track');
                return;
            }

            const trackClips = timelineClips.filter(c => c.track === track.dataset.track);

            // Create temporary clip to find position
            const tempClip = {
                id: Date.now() + Math.random(),
                itemId: item.id,
                duration: item.duration
            };

            // For audio track, place clips end-to-end (no overlap)
            // For other tracks, find non-overlapping position
            let startTime = 0;
            if (track.dataset.track.startsWith('audio') && trackClips.length > 0) {
                // Sort by start time and get the last clip's end
                const sortedClips = [...trackClips].sort((a, b) => a.startTime - b.startTime);
                const lastClip = sortedClips[sortedClips.length - 1];
                const lastOriginalItem = mediaLibraryItems.find(i => i.id === lastClip.itemId);
                const lastOriginalDuration = lastOriginalItem ? lastOriginalItem.duration : lastClip.duration;
                startTime = lastClip.startTime + lastOriginalDuration;
            } else {
                const preferredTime = trackClips.length > 0 ?
                    (() => {
                        const sortedClips = [...trackClips].sort((a, b) => a.startTime - b.startTime);
                        const lastClip = sortedClips[sortedClips.length - 1];
                        const lastOriginalItem = mediaLibraryItems.find(i => i.id === lastClip.itemId);
                        const lastOriginalDuration = lastOriginalItem ? lastOriginalItem.duration : lastClip.duration;
                        return lastClip.startTime + lastOriginalDuration;
                    })() : 0;
                startTime = findNonOverlappingPosition(tempClip, track.dataset.track, preferredTime);
            }

            const clip = {
                id: tempClip.id,
                itemId: item.id,
                name: item.name,
                type: item.type,
                url: item.url,
                element: item.element,
                duration: item.duration,
                startTime: startTime,
                position: TRACK_START + (startTime * pixelsPerSecond),
                track: track.dataset.track,
                trimStart: 0, // How much is trimmed from the start of the original media
                effects: {
                    exposure: 100,
                    brightness: 100,
                    contrast: 100,
                    saturation: 100,
                    blur: 0,
                    sharpen: 0,
                    vignette: 0,
                    rotate: 0,
                    filter: 'none'
                },
                volume: 100,
                speed: 100
            };

            timelineClips.push(clip);
            renderTimelineClip(clip, track);
            updateTotalDuration();

            // Auto-create transitions for adjacent clips
            createAutoTransitions();
        }

        // Render timeline clip
        function renderTimelineClip(clip, track) {
            // Get original media duration
            const originalItem = mediaLibraryItems.find(i => i.id === clip.itemId);
            const originalDuration = originalItem ? originalItem.duration : clip.duration;
            const trimStart = clip.trimStart || 0;
            const trimEnd = originalDuration - (trimStart + clip.duration);

            // Determine scale based on clip type and compression state
            let scale = pixelsPerSecond;
            if (isTimelineCompressed && clip.type === 'audio') {
                scale = pixelsPerSecond / 15; // Audio is 15x smaller when compressed
            }
            clip.displayScale = scale; // Store scale for later use

            // Create container for clip and trimmed sections
            const container = document.createElement('div');
            container.className = 'timeline-clip-container';
            container.dataset.clipId = clip.id;
            // Recalculate position based on the actual scale being used
            const displayPosition = TRACK_START + (clip.startTime * scale);
            container.style.left = displayPosition + 'px';

            // Calculate total width including trimmed sections and gap
            const totalWidth = (originalDuration * scale) + 10; // 10px gap after each clip
            container.style.width = totalWidth + 'px';

            // Create left trimmed section if any
            if (trimStart > 0) {
                const leftTrimmed = document.createElement('div');
                leftTrimmed.className = 'trimmed-section left';
                leftTrimmed.style.width = (trimStart * scale) + 'px';
                leftTrimmed.style.left = '0px';
                container.appendChild(leftTrimmed);
            }

            // Create the actual visible clip
            const clipElement = document.createElement('div');
            clipElement.className = 'timeline-clip' + (clip.type === 'image' ? ' image-clip' : '');
            clipElement.style.left = (trimStart * scale) + 'px';
            clipElement.style.width = (clip.duration * scale) + 'px';
            clipElement.innerHTML = `
                <div class="clip-resize-handle left"></div>
                <div class="timeline-clip-name">${clip.name}</div>
                <div class="timeline-clip-duration">${formatTime(clip.duration)}</div>
                <div class="clip-resize-handle right"></div>
            `;

            // Make the entire container draggable
            container.draggable = true;

            container.ondragstart = function(e) {
                // Check if we're clicking on a resize handle
                if (e.target.classList.contains('clip-resize-handle')) {
                    e.preventDefault();
                    return false;
                }

                // Pause playback when editing timeline
                if (isPlaying) {
                    togglePlay();
                }

                // Set data transfer
                e.dataTransfer.effectAllowed = 'move';
                e.dataTransfer.setData('text/plain', 'clip'); // Required for some browsers

                // Store clip ID globally as backup
                window.draggedClipId = clip.id;

                // Visual feedback
                container.style.opacity = '0.5';

                console.log('Started dragging clip:', clip.id, clip.name);
            };

            container.ondragend = function(e) {
                container.style.opacity = '1';
                window.draggedClipId = null;
                console.log('Finished dragging clip');
            };

            // Click handler for selection
            clipElement.onclick = function(e) {
                // Don't select if clicking on resize handles
                if (e.target.classList.contains('clip-resize-handle')) {
                    return;
                }
                e.stopPropagation();
                selectClip(clip.id);
            };

            container.appendChild(clipElement);

            // Create right trimmed section if any
            if (trimEnd > 0) {
                const rightTrimmed = document.createElement('div');
                rightTrimmed.className = 'trimmed-section right';
                rightTrimmed.style.width = (trimEnd * scale) + 'px';
                rightTrimmed.style.left = ((trimStart + clip.duration) * scale) + 'px';
                container.appendChild(rightTrimmed);
            }

            // Add resize functionality
            const leftHandle = clipElement.querySelector('.clip-resize-handle.left');
            const rightHandle = clipElement.querySelector('.clip-resize-handle.right');

            let isResizing = false;
            let resizeDirection = null;
            let startX = 0;
            let originalClipDuration = 0;
            let originalStartTime = 0;
            let originalTrimStart = 0;

            function startResize(e, direction) {
                e.stopPropagation();
                e.preventDefault();

                // Pause playback when editing timeline
                if (isPlaying) {
                    togglePlay();
                }

                isResizing = true;
                resizeDirection = direction;
                startX = e.clientX;
                originalClipDuration = clip.duration;
                originalStartTime = clip.startTime;
                originalTrimStart = clip.trimStart || 0;

                // Disable dragging on container while resizing
                container.draggable = false;
                clipElement.classList.add('resizing');
                document.body.style.cursor = 'ew-resize';
            }

            leftHandle.onmousedown = (e) => startResize(e, 'left');
            rightHandle.onmousedown = (e) => startResize(e, 'right');

            function updateTrimmedSections() {
                // Remove old trimmed sections
                container.querySelectorAll('.trimmed-section').forEach(el => el.remove());

                const originalItem = mediaLibraryItems.find(i => i.id === clip.itemId);
                const originalDuration = originalItem ? originalItem.duration : clip.duration;
                const trimStart = clip.trimStart || 0;
                const trimEnd = originalDuration - (trimStart + clip.duration);

                // Add left trimmed section
                if (trimStart > 0) {
                    const leftTrimmed = document.createElement('div');
                    leftTrimmed.className = 'trimmed-section left animating';
                    leftTrimmed.style.width = (trimStart * scale) + 'px';
                    leftTrimmed.style.left = '0px';
                    container.insertBefore(leftTrimmed, clipElement);

                    // Remove animation class after animation completes
                    setTimeout(() => leftTrimmed.classList.remove('animating'), 500);
                }

                // Add right trimmed section
                if (trimEnd > 0) {
                    const rightTrimmed = document.createElement('div');
                    rightTrimmed.className = 'trimmed-section right animating';
                    rightTrimmed.style.width = (trimEnd * scale) + 'px';
                    rightTrimmed.style.left = ((trimStart + clip.duration) * scale) + 'px';
                    container.appendChild(rightTrimmed);

                    // Remove animation class after animation completes
                    setTimeout(() => rightTrimmed.classList.remove('animating'), 500);
                }
            }

            document.addEventListener('mousemove', function(e) {
                if (!isResizing) return;

                const deltaX = e.clientX - startX;
                const scale = pixelsPerSecond;
                const deltaSeconds = deltaX / scale;

                if (resizeDirection === 'right') {
                    const newDuration = Math.max(0.1, originalDuration + deltaSeconds);
                    selectedClip.duration = newDuration;
                } else if (resizeDirection === 'left') {
                    const newTrimStart = Math.max(0, originalTrimStart + deltaSeconds);
                    selectedClip.trimStart = newTrimStart;
                    selectedClip.duration = Math.max(0.1, originalDuration - (newTrimStart - originalTrimStart));
                }

                updateTotalDuration();
                renderFrame();
            });

            document.addEventListener('mouseup', function() {
                if (isResizing) {
                    isResizing = false;
                    resizeDirection = null;
                    clipElement.classList.remove('resizing');
                    container.draggable = true; // Re-enable dragging
                    document.body.style.cursor = 'default';

                    // Add animation to trimmed sections
                    updateTrimmedSections();

                    // Auto-create transitions for adjacent clips after resizing
                    createAutoTransitions();

                    // Update transition markers positions
                    document.querySelectorAll('.transition-marker').forEach(marker => {
                        const clip2 = timelineClips.find(c => c.id == marker.dataset.clip2);
                        if (clip2) {
                            marker.style.left = (clip2.position - 15) + 'px';
                        }
                    });

                    renderFrame();
                }
            });

            track.appendChild(container);
        }

        // Add transition marker
        function addTransitionMarker(clip1, clip2) {
            const marker = document.createElement('div');
            marker.className = 'transition-marker';
            marker.dataset.clip1 = clip1.id;
            marker.dataset.clip2 = clip2.id;
            marker.innerHTML = '<i class="fas fa-random"></i>';
            marker.style.left = (clip2.position - 15) + 'px';
            marker.title = 'Left-click: change transition | Right-click: delete transition';

            // Left click - change transition
            marker.onclick = function(e) {
                e.stopPropagation();
                selectedTransition = { clip1, clip2, marker, type: 'none', duration: 0 };
                document.getElementById('transitionModal').classList.add('show');
            };

            // Right click - delete transition
            marker.oncontextmenu = function(e) {
                e.preventDefault();
                e.stopPropagation();
                deleteTransition(marker, clip2);
            };

            const track = document.querySelector(`[data-track="${clip2.track}"]`);
            track.appendChild(marker);

            // Default transition data
            if (!clip2.transition) {
                clip2.transition = { type: 'none', duration: 0 };
            }
        }

        // Delete transition
        function deleteTransition(marker, clip) {
            if (marker) {
                marker.remove();
            }
            if (clip) {
                clip.transition = { type: 'none', duration: 0 };
            }
        }

        // Auto-create transitions between adjacent clips
        function createAutoTransitions() {
            // Get all tracks
            const tracks = ['video1', 'audio'];

            tracks.forEach(trackName => {
                // Get clips in this track, sorted by start time
                const trackClips = timelineClips
                    .filter(c => c.track === trackName)
                    .sort((a, b) => a.startTime - b.startTime);

                // Check each pair of adjacent clips
                for (let i = 0; i < trackClips.length - 1; i++) {
                    const clip1 = trackClips[i];
                    const clip2 = trackClips[i + 1];

                    // Get full durations
                    const originalItem1 = mediaLibraryItems.find(item => item.id === clip1.itemId);
                    const clip1Duration = originalItem1 ? originalItem1.duration : clip1.duration;
                    const clip1End = clip1.startTime + clip1Duration;

                    // Check if clips are touching (no gap)
                    const gap = Math.abs(clip2.startTime - clip1End);
                    const isTouching = gap < 0.1; // Allow small rounding errors

                    if (isTouching) {
                        // Check if transition marker already exists
                        const existingMarker = document.querySelector(
                            `.transition-marker[data-clip1="${clip1.id}"][data-clip2="${clip2.id}"]`
                        );

                        if (!existingMarker) {
                            // Create transition marker
                            addTransitionMarker(clip1, clip2);

                            // Set default fade transition
                            if (!clip2.transition || clip2.transition.type === 'none') {
                                clip2.transition = { type: 'fade', duration: 0.5 };
                            }
                        }
                    }
                }
            });
        }

        // Select clip
        function selectClip(clipId) {
            document.querySelectorAll('.timeline-clip').forEach(el => el.classList.remove('selected'));

            const container = document.querySelector(`.timeline-clip-container[data-clip-id="${clipId}"]`);
            if (container) {
                const clipElement = container.querySelector('.timeline-clip');
                clipElement.classList.add('selected');
                selectedClip = timelineClips.find(c => c.id === clipId);

                // Enable/disable buttons
                document.getElementById('splitBtn').disabled = false;
                document.getElementById('sizeToggleBtn').disabled = false;
                document.getElementById('deleteBtn').disabled = false;
                document.getElementById('detachBtn').disabled = selectedClip.type !== 'video';
                document.getElementById('goToStartBtn').disabled = false;
                document.getElementById('goToEndBtn').disabled = false;

                // Show properties
                showClipProperties();
            }
        }

        // Show clip properties
        function showClipProperties() {
            if (!selectedClip) return;

            // Auto-switch to Edit tab
            switchTab('properties');

            document.getElementById('noSelectionMsg').style.display = 'none';
            document.getElementById('clipProperties').style.display = 'block';

            const visualControls = document.getElementById('visualControls');
            const audioControls = document.getElementById('audioControls');
            const videoControls = document.getElementById('videoControls');

            // Determine if this is an audio-only clip (audio file OR video in audio track)
            const isAudioOnly = selectedClip.type === 'audio' || (selectedClip.type === 'video' && selectedClip.track.startsWith('audio'));

            if (isAudioOnly) {
                // Hide visual editing controls, show audio controls
                visualControls.style.display = 'none';
                videoControls.style.display = 'none';
                audioControls.style.display = 'block';

                // Update audio controls
                const audioVolumeSlider = audioControls.querySelector('[oninput*="volume"]');
                const audioSpeedSlider = audioControls.querySelector('[oninput*="speed"]');

                audioVolumeSlider.value = selectedClip.volume;
                document.getElementById('audioVolumeValue').textContent = selectedClip.volume + '%';

                audioSpeedSlider.value = selectedClip.speed;
                document.getElementById('audioSpeedValue').textContent = (selectedClip.speed / 100).toFixed(2) + 'x';
            } else {
                // Show visual controls, hide audio controls
                visualControls.style.display = 'block';
                audioControls.style.display = 'none';

                // Update sliders
                const effects = selectedClip.effects;
                document.querySelector('#visualControls [oninput*="exposure"]').value = effects.exposure;
                document.getElementById('exposureValue').textContent = effects.exposure + '%';

                document.querySelector('#visualControls [oninput*="brightness"]').value = effects.brightness;
                document.getElementById('brightnessValue').textContent = effects.brightness + '%';

                document.querySelector('#visualControls [oninput*="contrast"]').value = effects.contrast;
                document.getElementById('contrastValue').textContent = effects.contrast + '%';

                document.querySelector('#visualControls [oninput*="saturation"]').value = effects.saturation;
                document.getElementById('saturationValue').textContent = effects.saturation + '%';

                document.querySelector('#visualControls [oninput*="blur"]').value = effects.blur;
                document.getElementById('blurValue').textContent = effects.blur + 'px';

                document.querySelector('#visualControls [oninput*="sharpen"]').value = effects.sharpen;
                document.getElementById('sharpenValue').textContent = effects.sharpen + '%';

                document.querySelector('#visualControls [oninput*="vignette"]').value = effects.vignette;
                document.getElementById('vignetteValue').textContent = effects.vignette + '%';

                document.querySelector('#visualControls [oninput*="rotate"]').value = effects.rotate;
                document.getElementById('rotateValue').textContent = effects.rotate + '°';

                // Update filter buttons
                document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                document.querySelector(`[onclick*="${effects.filter}"]`)?.classList.add('active');

                // Show/hide video controls (only for videos in video track)
                if (selectedClip.type === 'video') {
                    videoControls.style.display = 'block';
                    const videoSpeedSlider = videoControls.querySelector('[oninput*="speed"]');
                    const videoVolumeSlider = videoControls.querySelector('[oninput*="volume"]');

                    videoSpeedSlider.value = selectedClip.speed;
                    document.getElementById('speedValue').textContent = (selectedClip.speed / 100).toFixed(2) + 'x';

                    videoVolumeSlider.value = selectedClip.volume;
                    document.getElementById('volumeValue').textContent = selectedClip.volume + '%';
                } else {
                    videoControls.style.display = 'none';
                }
            }
        }

        // Update audio property (for audio controls)
        function updateAudioProperty(property, value) {
            if (!selectedClip) return;

            value = parseFloat(value);

            if (property === 'volume') {
                selectedClip.volume = value;
                document.getElementById('audioVolumeValue').textContent = value + '%';
                // Update volume immediately without rewinding
                if (selectedClip.element && (selectedClip.type === 'audio' || selectedClip.type === 'video')) {
                    selectedClip.element.volume = Math.min(value / 100, 1.0);
                }
            } else if (property === 'speed') {
                selectedClip.speed = value;
                document.getElementById('audioSpeedValue').textContent = (value / 100).toFixed(2) + 'x';
                // Update playback rate immediately
                if (selectedClip.element && (selectedClip.type === 'audio' || selectedClip.type === 'video')) {
                    selectedClip.element.playbackRate = value / 100;
                }
            }
        }

        // Update clip property
        function updateClipProperty(property, value) {
            if (!selectedClip) return;

            value = parseFloat(value);

            if (property === 'exposure') {
                selectedClip.effects.exposure = value;
                document.getElementById('exposureValue').textContent = value + '%';
            } else if (property === 'brightness') {
                selectedClip.effects.brightness = value;
                document.getElementById('brightnessValue').textContent = value + '%';
            } else if (property === 'contrast') {
                selectedClip.effects.contrast = value;
                document.getElementById('contrastValue').textContent = value + '%';
            } else if (property === 'saturation') {
                selectedClip.effects.saturation = value;
                document.getElementById('saturationValue').textContent = value + '%';
            } else if (property === 'blur') {
                selectedClip.effects.blur = value;
                document.getElementById('blurValue').textContent = value + 'px';
            } else if (property === 'sharpen') {
                selectedClip.effects.sharpen = value;
                document.getElementById('sharpenValue').textContent = value + '%';
            } else if (property === 'vignette') {
                selectedClip.effects.vignette = value;
                document.getElementById('vignetteValue').textContent = value + '%';
            } else if (property === 'rotate') {
                selectedClip.effects.rotate = value;
                document.getElementById('rotateValue').textContent = value + '°';
            } else if (property === 'speed') {
                selectedClip.speed = value;
                document.getElementById('speedValue').textContent = (value / 100).toFixed(2) + 'x';

                // Update duration and position
                const originalItem = mediaLibraryItems.find(i => i.id === selectedClip.itemId);
                selectedClip.duration = originalItem.duration / (value / 100);

                const clipElement = document.querySelector(`[data-clip-id="${selectedClip.id}"]`);
                clipElement.style.width = (selectedClip.duration * pixelsPerSecond) + 'px';
                clipElement.querySelector('.timeline-clip-duration').textContent = formatTime(selectedClip.duration);

                updateTotalDuration();
            } else if (property === 'volume') {
                selectedClip.volume = value;
                document.getElementById('volumeValue').textContent = value + '%';
                // Update volume immediately if the clip is playing
                if (selectedClip.element && selectedClip.type === 'video') {
                    selectedClip.element.volume = value / 100;
                }
            }

            // Only render frame if not playing (during playback, the animation loop handles it)
            if (!isPlaying) {
                renderFrame();
            }
        }

        // Toggle filter
        function toggleFilter(filter) {
            if (!selectedClip) return;

            selectedClip.effects.filter = filter;

            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.closest('.filter-btn').classList.add('active');

            // Only render frame if not playing
            if (!isPlaying) {
                renderFrame();
            }
        }

        // Reset all effects
        function resetClipEffects() {
            if (!selectedClip) return;

            // Reset all effect properties to defaults
            selectedClip.effects = {
                exposure: 100,
                brightness: 100,
                contrast: 100,
                saturation: 100,
                blur: 0,
                sharpen: 0,
                vignette: 0,
                rotate: 0,
                filter: 'none'
            };

            // Reset speed and volume for all clips
            selectedClip.speed = 100;
            selectedClip.volume = 100;

            // Update the audio/video element immediately
            if (selectedClip.element && (selectedClip.type === 'audio' || selectedClip.type === 'video')) {
                selectedClip.element.volume = 1.0;
                selectedClip.element.playbackRate = 1.0;
            }

            // Update UI to reflect reset values
            showClipProperties();

            // Render frame if not playing
            if (!isPlaying) {
                renderFrame();
            }
        }

        // Timeline controls
        function splitClip() {
            if (!selectedClip) return;

            const clipStartTime = selectedClip.startTime;
            const clipEndTime = clipStartTime + selectedClip.duration;

            if (currentTime <= clipStartTime || currentTime >= clipEndTime) {
                alert('Move the playhead to a position within the selected clip to split it');
                return;
            }

            const splitPoint = currentTime - clipStartTime;
            const clip1Duration = splitPoint;
            const clip2Duration = selectedClip.duration - splitPoint;

            // Update first clip
            selectedClip.duration = clip1Duration;
            const container = document.querySelector(`.timeline-clip-container[data-clip-id="${selectedClip.id}"]`);
            const clipElement = container.querySelector('.timeline-clip');
            clipElement.style.width = (clip1Duration * pixelsPerSecond) + 'px';
            clipElement.querySelector('.timeline-clip-duration').textContent = formatTime(clip1Duration);

            // Update trimmed sections for first clip
            container.querySelectorAll('.trimmed-section.right').forEach(el => el.remove());
            const originalItem = mediaLibraryItems.find(i => i.id === selectedClip.itemId);
            const originalDuration = originalItem ? originalItem.duration : selectedClip.duration;
            const trimStart = selectedClip.trimStart || 0;
            const trimEnd = originalDuration - (trimStart + clip1Duration);

            if (trimEnd > 0) {
                const rightTrimmed = document.createElement('div');
                rightTrimmed.className = 'trimmed-section right';
                rightTrimmed.style.width = (trimEnd * pixelsPerSecond) + 'px';
                rightTrimmed.style.left = ((trimStart + clip1Duration) * pixelsPerSecond) + 'px';
                container.appendChild(rightTrimmed);
            }

            // Create second clip
            const newClip = {
                ...selectedClip,
                id: Date.now() + Math.random(),
                duration: clip2Duration,
                startTime: currentTime,
                position: selectedClip.position + (clip1Duration * pixelsPerSecond),
                trimStart: (selectedClip.trimStart || 0) + clip1Duration, // Adjust trim for second part
                effects: { ...selectedClip.effects }
            };

            timelineClips.push(newClip);
            const track = document.querySelector(`[data-track="${newClip.track}"]`);
            renderTimelineClip(newClip, track);

            updateTotalDuration();
        }

        function zoomTimeline(direction) {
            if (direction === 'in') {
                pixelsPerSecond *= 1.5;

            // Re-render all clips
            timelineClips.forEach(clip => {

                    container.style.left = clip.position + 'px';

                    // Update container and clip widths
                    const originalItem = mediaLibraryItems.find(i => i.id === clip.itemId);
                    const originalDuration = originalItem ? originalItem.duration : clip.duration;
                    const totalWidth = (originalDuration * pixelsPerSecond) + 10;
                    container.style.width = totalWidth + 'px';

                    const trimStart = clip.trimStart || 0;
                    clipElement.style.left = (trimStart * pixelsPerSecond) + 'px';
                    clipElement.style.width = (clip.duration * pixelsPerSecond) + 'px';

                    // Update trimmed sections
                    const leftTrimmed = container.querySelector('.trimmed-section.left');
                    if (leftTrimmed) {
                        leftTrimmed.style.width = (trimStart * pixelsPerSecond) + 'px';
                    }

                    const trimEnd = originalDuration - (trimStart + clip.duration);
                    const rightTrimmed = container.querySelector('.trimmed-section.right');
                    if (rightTrimmed) {
                        rightTrimmed.style.width = (trimEnd * pixelsPerSecond) + 'px';
                        rightTrimmed.style.left = ((trimStart + clip.duration) * pixelsPerSecond) + 'px';

        // Text overlays
        function addTextOverlay() {
            // Get canvas position and size in the viewport
            const canvasRect = canvas.getBoundingClientRect();

            // Calculate center of the visible canvas
            const centerX = canvasRect.left + (canvasRect.width / 2);
            const centerY = canvasRect.top + (canvasRect.height / 2);

            const overlay = {
                id: Date.now(),
                text: 'Your Text Here',
                size: 48,
                color: '#ffffff',
                x: centerX,
                y: centerY
            };

            textOverlays.push(overlay);
            renderTextOverlay(overlay);
            selectTextOverlay(overlay);
        }

        function renderTextOverlay(overlay) {
            const element = document.createElement('div');
            element.className = 'text-overlay';
            element.textContent = overlay.text;
            element.style.fontSize = overlay.size + 'px';
            element.style.color = overlay.color || '#ffffff';
            element.style.position = 'fixed'; // Use fixed positioning relative to viewport
            element.style.left = overlay.x + 'px';
            element.style.top = overlay.y + 'px';
            element.style.transform = 'translate(-50%, -50%)';
            element.dataset.overlayId = overlay.id;

            element.onclick = () => selectTextOverlay(overlay);

            // Make draggable
            let isDragging = false;
            let startX, startY;

            element.onmousedown = function(e) {
                isDragging = true;
                startX = e.clientX - overlay.x;
                startY = e.clientY - overlay.y;
                e.preventDefault();
            };

            document.addEventListener('mousemove', function(e) {
                if (isDragging && element.dataset.overlayId == overlay.id) {
                    overlay.x = e.clientX - startX;
                    overlay.y = e.clientY - startY;
                    element.style.left = overlay.x + 'px';
                    element.style.top = overlay.y + 'px';
                }
            });

            document.addEventListener('mouseup', function() {
                isDragging = false;
            });

            document.getElementById('textOverlayContainer').appendChild(element);
            overlay.element = element;
        }

        function selectTextOverlay(overlay) {
            selectedTextOverlay = overlay;

            // Find the index of this overlay to determine its number
            const overlayIndex = textOverlays.findIndex(t => t.id === overlay.id);
            const textNumber = overlayIndex + 1;

            // Update the title to show which text is selected
            document.getElementById('textTitle').textContent = 'Text ' + textNumber;

            document.getElementById('textProperties').style.display = 'block';
            document.getElementById('textSizeValue').textContent = overlay.size + 'px';
            document.querySelector('#textTab input[type="range"]').value = overlay.size;

                item.style.cssText = `

                item.onmouseenter = () => {

        function updateTextProperty(property, value) {
            if (!selectedTextOverlay) return;

            if (property === 'size') {
                selectedTextOverlay.size = parseInt(value);
                selectedTextOverlay.element.style.fontSize = value + 'px';

        function deleteTextOverlay() {

            if (selectedTextOverlay.element) {
