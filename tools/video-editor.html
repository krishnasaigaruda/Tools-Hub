<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Editor - iMovie Style</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }

        /* Header */
        .header {
            background: #2d2d2d;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #3d3d3d;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            transition: background 0.3s;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .project-name {
            font-size: 1rem;
            font-weight: 500;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .header-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .header-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .header-btn.primary {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .header-btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(79, 172, 254, 0.4);
        }

        /* Main Layout */
        .main-container {
            display: flex;
            height: calc(100vh - 60px);
        }

        /* Sidebar */
        .sidebar {
            width: 400px;
            background: #2d2d2d;
            border-right: 1px solid #3d3d3d;
            display: flex;
            flex-direction: column;
        }

        .sidebar-tabs {
            display: flex;
            border-bottom: 1px solid #3d3d3d;
        }

        .sidebar-tab {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            font-size: 11px;
            transition: all 0.3s;
        }

        .sidebar-tab.active {
            color: #fff;
            background: rgba(79, 172, 254, 0.2);
            border-bottom: 2px solid #4facfe;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .import-area {
            border: 2px dashed rgba(255,255,255,0.3);
            border-radius: 8px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        .import-area:hover {
            border-color: #4facfe;
            background: rgba(79, 172, 254, 0.1);
        }

        .import-area i {
            font-size: 2.5rem;
            color: #4facfe;
            margin-bottom: 10px;
        }

        .import-area p {
            color: rgba(255,255,255,0.7);
            font-size: 13px;
        }

        .media-library {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .media-item {
            position: relative;
            aspect-ratio: 16/9;
            border-radius: 6px;
            overflow: hidden;
            cursor: grab;
            background: #3d3d3d;
        }

        .media-item:active {
            cursor: grabbing;
        }

        .media-item video,
        .media-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .media-item-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .media-item:hover .media-item-overlay {
            opacity: 1;
        }

        .media-item-duration {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: rgba(0,0,0,0.8);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 11px;
        }

        /* Properties Panel */
        .properties-panel {
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .properties-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #4facfe;
        }

        .property-group {
            margin-bottom: 15px;
        }

        .property-label {
            font-size: 12px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 8px;
            display: block;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .slider {
            flex: 1;
            height: 4px;
            border-radius: 2px;
            background: rgba(255,255,255,0.2);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #4facfe;
            cursor: pointer;
        }

        .slider::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #4facfe;
            cursor: pointer;
            border: none;
        }

        .slider-value {
            font-size: 12px;
            min-width: 45px;
            text-align: right;
            color: rgba(255,255,255,0.8);
        }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .filter-btn {
            background: rgba(255,255,255,0.1);
            border: 2px solid transparent;
            color: white;
            padding: 12px 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            font-size: 11px;
        }

        .filter-btn:hover {
            background: rgba(79, 172, 254, 0.3);
        }

        .filter-btn.active {
            border-color: #4facfe;
            background: rgba(79, 172, 254, 0.4);
        }

        .filter-btn i {
            display: block;
            margin-bottom: 5px;
            font-size: 1.2rem;
        }

        /* Preview Area */
        .preview-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1a1a1a;
            min-width: 0;
            overflow: hidden;
        }

        /* Preview area - aligns video/picture to the left with offset */
        .preview-area {
            flex: 1;
            display: flex;
            align-items: center;        
            justify-content: left;        
            left: 330px;                  
            background: #000;
            position: relative;
            overflow: hidden;
        }

        #previewCanvas {
            max-width: 95%;
            max-height: 95%;
            background: #000;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .text-overlay-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
        }

        .text-overlay {
            color: white;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            cursor: move;
            pointer-events: all;
            user-select: none;
            z-index: 1000;
        }

        /* Playback Controls */
        .playback-controls {
            background: #2d2d2d;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-top: 1px solid #3d3d3d;
            overflow: hidden;
        }

        .play-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.5);
        }

        .time-display {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            min-width: 120px;
        }

        .progress-bar {
            flex: 1;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
            min-width: 0;
            max-width: 100%;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s;
        }

        .playback-speed {
            padding: 6px 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            color: white;
            font-size: 13px;
            cursor: pointer;
        }

        /* Timeline */
        .timeline-container {
            height: 200px;
            background: #252525;
            border-top: 1px solid #3d3d3d;
            display: flex;
            flex-direction: column;
        }

        .timeline-toolbar {
            background: #2d2d2d;
            padding: 10px 15px;
            display: flex;
            gap: 10px;
            border-bottom: 1px solid #3d3d3d;
        }

        .timeline-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.3s;
        }

        .timeline-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .timeline-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .timeline-tracks-container {
            flex: 1;
            overflow-x: auto;
            overflow-y: hidden;
            position: relative;
            scroll-behavior: smooth;
        }

        /* Custom scrollbar styling for native scroll */
        .timeline-tracks-container::-webkit-scrollbar {
            height: 8px;
        }

        .timeline-tracks-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        .timeline-tracks-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 4px;
        }

        .timeline-tracks-container::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.5);
        }


        .drop-indicator {
            position: absolute;
            width: 3px;
            top: 0;
            bottom: 0;
            background: #00f2fe;
            box-shadow: 0 0 10px #00f2fe;
            z-index: 1000;
            pointer-events: none;
        }

        .timeline-tracks {
            position: relative;
            min-width: 100%;
        }

        .timeline-track {
            min-height: 50px;
            border-bottom: 1px solid #3d3d3d;
            position: relative;
            display: flex;
            align-items: center;
            padding: 5px 10px 5px 100px;
            overflow: visible;
        }

        .timeline-track-label {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 90px;
            background: #2d2d2d;
            padding: 5px 10px;
            font-size: 12px;
            color: rgba(255,255,255,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 1px solid #3d3d3d;
            z-index: 10;
        }

        .timeline-clip-container {
            position: absolute;
            height: 38px;
        }

        .timeline-clip-container:active {
            cursor: grabbing !important;
        }

        .timeline-clip {
            position: absolute;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border-radius: 4px;
            padding: 5px 8px;
            user-select: none;
            min-width: 100px;
            height: 38px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border: 2px solid transparent;
            overflow: visible;
            transition: none;
            cursor: grab;
        }

        .timeline-clip:active:not(:has(.clip-resize-handle:hover)) {
            cursor: grabbing;
        }

        .timeline-clip.resizing {
            transition: none;
        }

        .trimmed-section {
            position: absolute;
            top: 0;
            height: 38px;
            background: repeating-linear-gradient(
                45deg,
                rgba(79, 172, 254, 0.2),
                rgba(79, 172, 254, 0.2) 10px,
                rgba(79, 172, 254, 0.3) 10px,
                rgba(79, 172, 254, 0.3) 20px
            );
            border: 1px dashed rgba(79, 172, 254, 0.5);
            border-radius: 4px;
            opacity: 0.6;
            pointer-events: none !important;
        }

        .trimmed-section.left {
            left: 0;
            border-top-right-radius: 0;
            border-bottom-right-radius: 0;
        }

        .trimmed-section.right {
            right: 0;
            border-top-left-radius: 0;
            border-bottom-left-radius: 0;
        }

        .clip-resize-handle {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 12px;
            cursor: ew-resize !important;
            z-index: 100;
            background: rgba(255, 255, 255, 0.6);
            opacity: 1;
            transition: background 0.2s;
            pointer-events: all;
        }

        .clip-resize-handle:hover {
            background: rgba(255, 255, 255, 0.9);
        }

        .clip-resize-handle.left {
            left: 0;
            border-left: 3px solid #fff;
            border-radius: 4px 0 0 4px;
        }

        .clip-resize-handle.right {
            right: 0;
            border-right: 3px solid #fff;
            border-radius: 0 4px 4px 0;
        }

        @keyframes trim-pulse {
            0%, 100% {
                opacity: 0.6;
            }
            50% {
                opacity: 0.9;
            }
        }

        .trimmed-section.animating {
            animation: trim-pulse 0.5s ease-in-out;
        }

        .timeline-clip.image-clip {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .timeline-clip:hover {
            border-color: #fff;
            transform: translateY(-2px);
        }

        .timeline-clip.selected {
            border-color: #ffd700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        .timeline-clip-name {
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            pointer-events: none;
        }

        .timeline-clip-duration {
            font-size: 9px;
            opacity: 0.8;
            margin-top: 2px;
            pointer-events: none;
        }

        .transition-marker {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 30px;
            height: 30px;
            background: #a855f7;
            border-radius: 50%;
            border: 2px solid #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            font-size: 10px;
            transition: all 0.3s;
        }

        .transition-marker:hover {
            transform: translateY(-50%) scale(1.2);
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.6);
        }

        .playhead {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #ff0000;
            z-index: 100;
            pointer-events: all;
            cursor: ew-resize;
        }

        .playhead:hover {
            width: 3px;
            background: #ff3333;
        }

        .playhead::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-top: 8px solid #ff0000;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #2d2d2d;
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            border: 1px solid #3d3d3d;
        }

        .modal-header {
            margin-bottom: 20px;
        }

        .modal-header h2 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .modal-body {
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: rgba(255,255,255,0.8);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .modal-btn.cancel {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .modal-btn.cancel:hover {
            background: rgba(255,255,255,0.2);
        }

        .modal-btn.confirm {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .modal-btn.confirm:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(79, 172, 254, 0.4);
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <button class="back-btn" onclick="goBack()">
                <i class="fas fa-arrow-left"></i>
                Back
            </button>
            <div class="project-name" id="projectName">My Video Project</div>
        </div>
        <div class="header-actions">
            <button class="header-btn" onclick="saveProject()">
                <i class="fas fa-save"></i> Save
            </button>
            <button class="header-btn primary" onclick="exportVideo()">
                <i class="fas fa-file-export"></i> Export
            </button>
        </div>
    </div>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-tabs">
                <button class="sidebar-tab active" onclick="switchTab('media', event)">
                    <i class="fas fa-photo-video"></i><br>Media
                </button>
                <button class="sidebar-tab" onclick="switchTab('properties', event)">
                    <i class="fas fa-sliders-h"></i><br>Edit
                </button>
                <button class="sidebar-tab" onclick="switchTab('text', event)">
                    <i class="fas fa-font"></i><br>Text
                </button>
                <button class="sidebar-tab" style="opacity: 0.3; cursor: not-allowed;">
                    <i class="fas fa-plus"></i><br>More
                </button>
            </div>

            <div class="sidebar-content">
                <!-- Media Tab -->
                <div id="mediaTab" class="tab-content">
                    <div class="import-area" onclick="document.getElementById('videoInput').click()">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p><strong>Import Media</strong></p>
                        <p>Videos, images, or audio</p>
                    </div>
                    <input type="file" id="videoInput" accept="video/*,image/*,audio/*" multiple style="display: none;" onchange="handleMediaImport(event)">

                    <div class="media-library" id="mediaLibrary">
                        <!-- Media items will be added here -->
                    </div>
                </div>

                <!-- Properties Tab -->
                <div id="propertiesTab" class="tab-content" style="display: none;">
                    <div id="noSelectionMsg" style="text-align: center; padding: 40px 20px; color: rgba(255,255,255,0.5);">
                        <i class="fas fa-hand-pointer" style="font-size: 3rem; margin-bottom: 15px; display: block;"></i>
                        <p>Select a clip to edit its properties</p>
                    </div>

                    <div id="clipProperties" style="display: none;">
                        <!-- Visual Editing (hidden for audio clips) -->
                        <div id="visualControls">
                        <!-- Adjustments -->
                        <div class="properties-panel">
                            <div class="properties-title">Adjustments</div>
                            <div class="property-group">
                                <label class="property-label">Exposure</label>
                                <div class="slider-container">
                                    <input type="range" class="slider" min="0" max="200" value="100" oninput="updateClipProperty('exposure', this.value)">
                                    <span class="slider-value" id="exposureValue">100%</span>
                                </div>
                            </div>
                            <div class="property-group">
                                <label class="property-label">Brightness</label>
                                <div class="slider-container">
                                    <input type="range" class="slider" min="0" max="200" value="100" oninput="updateClipProperty('brightness', this.value)">
                                    <span class="slider-value" id="brightnessValue">100%</span>
                                </div>
                            </div>
                            <div class="property-group">
                                <label class="property-label">Contrast</label>
                                <div class="slider-container">
                                    <input type="range" class="slider" min="0" max="200" value="100" oninput="updateClipProperty('contrast', this.value)">
                                    <span class="slider-value" id="contrastValue">100%</span>
                                </div>
                            </div>
                            <div class="property-group">
                                <label class="property-label">Saturation</label>
                                <div class="slider-container">
                                    <input type="range" class="slider" min="0" max="200" value="100" oninput="updateClipProperty('saturation', this.value)">
                                    <span class="slider-value" id="saturationValue">100%</span>
                                </div>
                            </div>
                            <div class="property-group">
                                <label class="property-label">Blur</label>
                                <div class="slider-container">
                                    <input type="range" class="slider" min="0" max="20" value="0" oninput="updateClipProperty('blur', this.value)">
                                    <span class="slider-value" id="blurValue">0px</span>
                                </div>
                            </div>
                            <div class="property-group">
                                <label class="property-label">Sharpen</label>
                                <div class="slider-container">
                                    <input type="range" class="slider" min="0" max="200" value="0" oninput="updateClipProperty('sharpen', this.value)">
                                    <span class="slider-value" id="sharpenValue">0%</span>
