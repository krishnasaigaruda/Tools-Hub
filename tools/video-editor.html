        // Playback
        function togglePlay() {
            const playBtn = document.getElementById('playBtn');

            if (isPlaying) {
                // Currently playing, so pause
                isPlaying = false;
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
                stopPlayback();
            } else {
                // Don't allow playing if there's no content
                if (timelineClips.length === 0) {
                    console.log('No content to play');
                    return;
                }

                // If at the end, restart from beginning
                if (currentTime >= totalDuration) {
                    currentTime = 0;
                }

                // Currently paused, so play
                isPlaying = true;
                playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                startPlayback();
            }
        }

        function startPlayback() {
            // Don't start if there are no clips
            if (totalDuration === 0) {
                stopPlayback();
                return;
            }

            // Cancel any existing animation frame
            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
                animationFrame = null;
            }

            let lastTime = Date.now();

            function animate() {
                if (!isPlaying) {
                    // Clean up if stopped externally
                    if (animationFrame) {
                        cancelAnimationFrame(animationFrame);
                        animationFrame = null;
                    }
                    return;
                }

                const now = Date.now();
                const delta = (now - lastTime) / 1000;
                lastTime = now;

                currentTime += delta;

                // Skip over trimmed sections
                let skipped = false;
                do {
                    skipped = false;
                    for (const clip of timelineClips) {
                        const trimStart = clip.trimStart || 0;
                        const clipActualStartTime = clip.startTime + trimStart;
                        const clipActualEndTime = clipActualStartTime + clip.duration;

                        // Check if we're in a trimmed section (between clip.startTime and clipActualStartTime)
                        if (trimStart > 0 && currentTime >= clip.startTime && currentTime < clipActualStartTime) {
                            // Skip to the actual start of the clip
                            currentTime = clipActualStartTime;
                            skipped = true;
                            break;
                        }

                        // Check if we're in the gap after the clip ends (trimmed end section)
                        const originalItem = mediaLibraryItems.find(i => i.id === clip.itemId);
                        if (originalItem) {
                            const originalDuration = originalItem.duration;
                            const clipEndInTimeline = clip.startTime + originalDuration;

                            if (currentTime >= clipActualEndTime && currentTime < clipEndInTimeline) {
                                // Skip to the end of the clip's original duration
                                currentTime = clipEndInTimeline;
                                skipped = true;
                                break;
                            }
                        }
                    }
                } while (skipped); // Keep skipping until we're in a valid region

                if (currentTime >= totalDuration) {
                    currentTime = totalDuration;
                    stopPlayback();

                    // Show black screen at the end
                    const canvas = document.getElementById('previewCanvas');
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = '#000';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    // Update play button to show play icon
                    document.getElementById('playBtn').innerHTML = '<i class="fas fa-play"></i>';
                    updatePlaybackUI();
                    return;
                }

                updatePlaybackUI();
                renderFrame();
                animationFrame = requestAnimationFrame(animate);
            }

            animate();
        }

        function stopPlayback() {
            isPlaying = false;
            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
                animationFrame = null;
            }

            // Pause all video and audio elements
            timelineClips.forEach(clip => {
                if (clip.element && (clip.type === 'video' || clip.type === 'audio')) {
                    clip.element.pause();
                }
            });

            // Update the display to show paused state
            renderFrame();
        }

        function updatePlaybackUI() {
            const progress = totalDuration > 0 ? (currentTime / totalDuration) * 100 : 0;
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('timeDisplay').textContent =
                `${formatTime(currentTime)} / ${formatTime(totalDuration)}`;

            updatePlayheadPosition();
        }

        function updatePlayheadPosition() {
            const playhead = document.getElementById('playhead');
            const playheadPosition = TRACK_START + currentTime * pixelsPerSecond;
            playhead.style.left = playheadPosition + 'px';

            // Auto-scroll timeline to keep playhead in view
            if (isPlaying) {
                const timelineContainer = document.querySelector('.timeline-tracks-container');
                const containerWidth = timelineContainer.clientWidth;
                const scrollLeft = timelineContainer.scrollLeft;
                const playheadRelativePos = playheadPosition - scrollLeft;

                // Keep playhead in the center-right area of the visible timeline
                if (playheadRelativePos > containerWidth - 200 || playheadRelativePos < 100) {
                    // Scroll to keep playhead at 1/3 from the left
                    timelineContainer.scrollLeft = playheadPosition - containerWidth / 3;
                }
            }
        }

        function seekTo(event) {
            const bar = event.currentTarget;
            const rect = bar.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const percentage = x / rect.width;
            currentTime = totalDuration * percentage;

            // Pause all media when seeking
            timelineClips.forEach(clip => {
                if (clip.element && (clip.type === 'video' || clip.type === 'audio')) {
                    clip.element.pause();
                }
            });

            updatePlaybackUI();
            renderFrame();

            // Resume playback if it was playing
            if (isPlaying) {
                // Media will be re-synced and played in renderFrame during next animation frame
            }
        }

        // Render frame
        function renderFrame() {
            // Find active clips at current time (considering trimStart offset)
            const activeClips = timelineClips
                .filter(clip => {
                    const trimStart = clip.trimStart || 0;
                    const clipActualStartTime = clip.startTime + trimStart;
                    const clipActualEndTime = clipActualStartTime + clip.duration;
                    return currentTime >= clipActualStartTime && currentTime <= clipActualEndTime;
                })
                .sort((a, b) => {
                    const trackOrder = { 'video1': 0, 'audio1': 1 };
                    return (trackOrder[a.track] || 0) - (trackOrder[b.track] || 0);
                });

            // Check if active video/image clip has changed - update canvas size if needed
            // Only consider clips in video track for visual display
            const currentActiveClip = activeClips.find(c => (c.type === 'video' || c.type === 'image') && c.track === 'video1');
            const currentActiveClipId = currentActiveClip ? currentActiveClip.id : null;

            if (currentActiveClipId !== lastActiveClipId && currentActiveClip && currentActiveClip.element) {
                lastActiveClipId = currentActiveClipId;
                const element = currentActiveClip.element;
                const mediaWidth = element.videoWidth || element.naturalWidth || element.width;
                const mediaHeight = element.videoHeight || element.naturalHeight || element.height;

                if (mediaWidth && mediaHeight) {
                    // Set canvas to actual media dimensions
                    canvas.width = mediaWidth;
                    canvas.height = mediaHeight;
                }
            }

            // Clear canvas
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            activeClips.forEach(clip => {
                // Skip audio clips and videos in audio track (audio-only)
                if (clip.type === 'audio') return;
                if (clip.type === 'video' && clip.track.startsWith('audio')) return;

                const trimStart = clip.trimStart || 0;
                const clipActualStartTime = clip.startTime + trimStart;
                const clipTime = Math.max(0, Math.min(currentTime - clipActualStartTime, clip.duration));
                const element = clip.element;

                if (!element) return;

                ctx.save();

                // Apply rotation if needed
                if (clip.effects.rotate !== 0) {
                    ctx.translate(canvas.width / 2, canvas.height / 2);
                    ctx.rotate((clip.effects.rotate * Math.PI) / 180);
                    ctx.translate(-canvas.width / 2, -canvas.height / 2);
                }

                // Apply filters
                let filters = [];

                // Apply filter presets first
                if (clip.effects.filter === 'grayscale') {
                    filters.push('grayscale(100%)');
                } else if (clip.effects.filter === 'sepia') {
                    filters.push('sepia(100%)');
                } else if (clip.effects.filter === 'invert') {
                    filters.push('invert(100%)');
                } else if (clip.effects.filter === 'vintage') {
                    filters.push('sepia(50%)');
                } else if (clip.effects.filter === 'cool') {
                    filters.push('hue-rotate(180deg)');
                }

                // Then apply manual adjustments (these take precedence)
                if (clip.effects.exposure !== 100) {
                    filters.push(`brightness(${clip.effects.exposure}%)`);
                }
                if (clip.effects.brightness !== 100) {
                    filters.push(`brightness(${clip.effects.brightness}%)`);
                }
                if (clip.effects.contrast !== 100) {
                    filters.push(`contrast(${clip.effects.contrast}%)`);
                }
                if (clip.effects.saturation !== 100) {
                    filters.push(`saturate(${clip.effects.saturation}%)`);
                }
                if (clip.effects.blur > 0) {
                    filters.push(`blur(${clip.effects.blur}px)`);
                }
                if (clip.effects.sharpen > 0) {
                    // Sharpen by increasing contrast - higher values = more sharpening
                    const sharpenAmount = 100 + clip.effects.sharpen;
                    filters.push(`contrast(${sharpenAmount}%)`);
                }

                ctx.filter = filters.join(' ') || 'none';

                // Handle transitions
                if (clip.transition && clip.transition.type !== 'none') {
                    const transitionProgress = Math.min(clipTime / clip.transition.duration, 1);

                    if (clip.transition.type === 'fade') {
                        ctx.globalAlpha = transitionProgress;
                    }
                }

                // Draw media
                if (clip.type === 'video') {
                    if (element) {
                        // Set volume and playback rate
                        element.volume = clip.volume / 100;
                        element.playbackRate = clip.speed / 100;

                        // Calculate target time (trimStart is already accounted for in clipTime calculation)
                        const trimStartOffset = clip.trimStart || 0;
                        const speedAdjustedTime = clipTime * (clip.speed / 100);
                        const targetTime = Math.max(0, Math.min(trimStartOffset + speedAdjustedTime, element.duration || trimStartOffset + speedAdjustedTime));

                        if (isPlaying) {
                            // Sync video time if needed (with larger tolerance to avoid constant seeking)
                            const timeDiff = Math.abs(element.currentTime - targetTime);
                            if (timeDiff > 0.5) {
                                element.currentTime = targetTime;
                            }

                            // Ensure video is playing
                            if (element.paused && element.readyState >= 2) {
                                const playPromise = element.play();
                                if (playPromise !== undefined) {
                                    playPromise.catch(e => {
                                        // Silently handle play failures
                                        console.log('Play failed:', e);
                                    });
                                }
                            }
                        } else {
                            // When paused, ensure video is synced but don't pause repeatedly
                            if (!element.paused) {
                                element.pause();
                            }
                            // Sync to position when paused (with tolerance to avoid jitter)
                            const timeDiff = Math.abs(element.currentTime - targetTime);
                            if (timeDiff > 0.1) {
                                element.currentTime = targetTime;
                            }
                        }

                        // Draw the frame
                        try {
                            ctx.drawImage(element, 0, 0, canvas.width, canvas.height);
                        } catch (e) {
                            // Video might not be ready yet
                        }
                    }
                } else if (clip.type === 'image') {
                    if (element) {
                        ctx.drawImage(element, 0, 0, canvas.width, canvas.height);
                    }
                }

                // Apply vignette effect (draw after the image)
                if (clip.effects.vignette > 0) {
                    const centerX = canvas.width / 2;
                    const centerY = canvas.height / 2;
                    const radius = Math.sqrt(centerX * centerX + centerY * centerY);

                    const gradient = ctx.createRadialGradient(centerX, centerY, radius * 0.3, centerX, centerY, radius);
                    gradient.addColorStop(0, 'rgba(0, 0, 0, 0)');
                    gradient.addColorStop(1, `rgba(0, 0, 0, ${clip.effects.vignette / 100})`);

                    ctx.fillStyle = gradient;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }

                ctx.restore();
            });

            // Handle audio clips and videos in audio track (audio-only playback)
            activeClips.forEach(clip => {
                // Play audio for: audio clips, OR videos in the audio track
                const isAudioOnly = clip.type === 'audio' || (clip.type === 'video' && clip.track.startsWith('audio'));

                if (isAudioOnly && clip.element) {
                    const trimStart = clip.trimStart || 0;
                    const clipActualStartTime = clip.startTime + trimStart;
                    const clipTime = Math.max(0, Math.min(currentTime - clipActualStartTime, clip.duration));
                    const targetTime = Math.max(0, Math.min(trimStart + clipTime, clip.element.duration || trimStart + clipTime));
                    clip.element.volume = clip.volume / 100;
                    clip.element.playbackRate = clip.speed / 100;

                    if (isPlaying) {
                        // Sync audio time if needed (with larger tolerance)
                        const timeDiff = Math.abs(clip.element.currentTime - targetTime);
                        if (timeDiff > 0.5) {
                            clip.element.currentTime = targetTime;
                        }

                        // Ensure audio is playing
                        if (clip.element.paused && clip.element.readyState >= 2) {
                            const playPromise = clip.element.play();
                            if (playPromise !== undefined) {
                                playPromise.catch(e => {
                                    // Silently handle play failures
                                    console.log('Audio play failed:', e);
                                });
                            }
                        }
                    } else {
                        // When paused, ensure audio is synced but don't pause repeatedly
                        if (!clip.element.paused) {
                            clip.element.pause();
                        }
                        const timeDiff = Math.abs(clip.element.currentTime - targetTime);
                        if (timeDiff > 0.1) {
                            clip.element.currentTime = targetTime;
                        }
                    }
                }
            });

            // Pause clips that are no longer active
            timelineClips.forEach(clip => {
                if (clip.element && (clip.type === 'video' || clip.type === 'audio')) {
                    const isActive = activeClips.includes(clip);
                    if (!isActive && !clip.element.paused) {
                        clip.element.pause();
                    }
                }
            });
        }

        function updateTotalDuration() {
            if (timelineClips.length === 0) {
                totalDuration = 0;
            } else {
                // Calculate based on the end of each clip including its original duration
                totalDuration = Math.max(...timelineClips.map(c => {
                    const originalItem = mediaLibraryItems.find(i => i.id === c.itemId);
                    const originalDuration = originalItem ? originalItem.duration : c.duration;
                    return c.startTime + originalDuration;
                }), 0);
            }

            // Update timeline width dynamically - ensure enough space for content plus padding
            const timelineTracks = document.getElementById('timelineTracks');
            const contentWidth = totalDuration * pixelsPerSecond + TRACK_START + 200;
            const viewportWidth = window.innerWidth - 250; // Subtract sidebar width
            const minWidth = Math.max(contentWidth, viewportWidth);
            timelineTracks.style.minWidth = minWidth + 'px';

            updatePlaybackUI();
        }

        // Export
        function exportVideo() {
            if (timelineClips.length === 0) {
                alert('Please add clips to the timeline before exporting');
                return;
            }
            document.getElementById('exportModal').classList.add('show');
        }

        function closeExportModal() {
            document.getElementById('exportModal').classList.remove('show');
        }

        async function confirmExport() {
            const format = document.getElementById('exportFormat').value;
            const fileName = document.getElementById('exportFileName').value;

            if (format !== 'webm') {
                alert('Only WebM format is supported for browser-based export. MP4 requires server-side processing.');
                return;
            }

            closeExportModal();
            alert('Starting export... This may take a moment.');

            try {
                const stream = canvas.captureStream(30);
                const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
                const chunks = [];

                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = fileName + '.webm';
                    a.click();
                    URL.revokeObjectURL(url);
                    alert('Export complete!');
                };

                recorder.start();

                // Record the video
                currentTime = 0;
                isPlaying = true;

                const recordInterval = setInterval(() => {
                    renderFrame();
                    currentTime += 1/30;

                    if (currentTime >= totalDuration) {
                        clearInterval(recordInterval);
                        recorder.stop();
                        isPlaying = false;
                        currentTime = 0;
                        renderFrame();
                    }
                }, 1000/30);

            } catch (err) {
                alert('Export failed: ' + err.message);
            }
        }

        // Save/Load
        function saveProject() {
            const projectState = {
                clips: timelineClips.map(c => ({
                    ...c,
                    element: null // Can't serialize DOM elements
                })),
                textOverlays: textOverlays,
                duration: totalDuration
            };

            localStorage.setItem(`project_${projectData.id}`, JSON.stringify(projectState));
            alert('Project saved successfully!');
        }

        function loadProjectData() {
            if (projectData.id) {
                const saved = localStorage.getItem(`project_${projectData.id}`);
                if (saved) {
                    const state = JSON.parse(saved);
                    // Restore would require re-importing media
                }
            }
        }

        // Utility
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function goBack() {
            if (confirm('Are you sure you want to go back? Unsaved changes will be lost.')) {
                window.location.href = 'image-and-video-editor.html';
            }
        }
    </script>
