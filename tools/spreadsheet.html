            window.location.href = '../Tools.html';
        }

        // Auto-save to localStorage
        function autoSave() {
            // Sync current cell value before saving
            if (currentCell) {
                const cell = document.getElementById(currentCell);
                if (cell) {
                    cellData[currentCell] = cell.value;
                }
            }
            localStorage.setItem('spreadsheetData', JSON.stringify(cellData));
            localStorage.setItem('spreadsheetStyles', JSON.stringify(cellStyles));
            localStorage.setItem('spreadsheetRows', ROWS);
            localStorage.setItem('spreadsheetCols', COLS);
        }

        // Load saved data
        function loadSavedData() {
            const savedData = localStorage.getItem('spreadsheetData');
            const savedStyles = localStorage.getItem('spreadsheetStyles');

            if (savedData) {
                cellData = JSON.parse(savedData);
                Object.keys(cellData).forEach(cellId => {
                    const cell = document.getElementById(cellId);
                    if (cell) {
                        const value = cellData[cellId];
                        if (value.startsWith('=')) {
                            cell.value = evaluateFormula(value, cellId);
                        } else {
                            cell.value = value;
                        }
                    }
                });
            }

            if (savedStyles) {
                cellStyles = JSON.parse(savedStyles);
                Object.keys(cellStyles).forEach(cellId => {
                    const cell = document.getElementById(cellId);
                    if (cell) {
                        const styles = {...cellStyles[cellId]};
                        const rowHeight = styles.rowHeight;
                        const imageData = styles.imageData;
                        const imageWidth = styles.imageWidth;
                        const imageHeight = styles.imageHeight;
                        delete styles.rowHeight;
                        delete styles.imageData;
                        delete styles.imageWidth;
                        delete styles.imageHeight;
                        // Remove old background-image style properties (migrating from old format)
                        delete styles.backgroundImage;
                        delete styles.backgroundSize;
                        delete styles.backgroundRepeat;
                        delete styles.backgroundPosition;
                        Object.assign(cell.style, styles);
                        if (rowHeight && cell.parentElement) {
                            cell.parentElement.style.height = rowHeight;
                        }
                        if (imageData) {
                            placeImageInCell(cellId, imageData, imageWidth || 120, imageHeight || 80);
                        }
                    }
                });
            }

            updateStats();
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey || e.metaKey) {
                switch(e.key.toLowerCase()) {
                    case 's':
                        e.preventDefault();
                        saveSpreadsheet();
                        break;
                    case 'b':
                        if (currentCell) {
                            e.preventDefault();
                            formatCell('bold');
                        }
                        break;
                    case 'i':
                        if (currentCell) {
                            e.preventDefault();
                            formatCell('italic');
                        }
                        break;
                    case 'u':
                        if (currentCell) {
                            e.preventDefault();
                            formatCell('underline');
                        }
                        break;
                }
            }

            // Handle Enter key to move to next row
            if (e.key === 'Enter' && currentCell && !e.ctrlKey && !e.metaKey) {
                e.preventDefault();
                // Save current cell
                updateCell(currentCell);

                // Parse current cell reference (e.g., "A1" -> col A, row 1)
                const col = currentCell.charAt(0);
                const row = parseInt(currentCell.substring(1));

                // Move to next row (same column)
                const nextRow = row + 1;
                if (nextRow <= ROWS) {
                    const nextCell = col + nextRow;
                    const nextCellElement = document.getElementById(nextCell);
                    if (nextCellElement) {
                        nextCellElement.focus();
                        selectCell(nextCell);
                    }
                }
            }

            // Handle Tab key to move to next column
            if (e.key === 'Tab' && currentCell) {
                e.preventDefault();
                // Save current cell
                updateCell(currentCell);

                // Parse current cell reference
                const colCode = currentCell.charCodeAt(0);
                const row = parseInt(currentCell.substring(1));

                // Move to next column (same row)
                const nextColCode = e.shiftKey ? colCode - 1 : colCode + 1;
                if (nextColCode >= 65 && nextColCode < 65 + COLS) {
                    const nextCell = String.fromCharCode(nextColCode) + row;
                    const nextCellElement = document.getElementById(nextCell);
                    if (nextCellElement) {
                        nextCellElement.focus();
                        selectCell(nextCell);
                    }
                }
            }
        });

        // Save before unload
        window.addEventListener('beforeunload', () => {
            autoSave();
        });

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'hidden') {
                autoSave();
            }
        });

        // Initialize on load
        initSpreadsheet();
    </script>
