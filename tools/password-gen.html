<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator | Tools Hub</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f172a;--panel:#1e293b;--s2:#334155;--s3:#475569;--border:#334155;--text:#e2e8f0;--t2:#94a3b8;--t3:#64748b;--sky:#0284c7;--sky2:#38bdf8;--sky-d:rgba(2,132,199,.12);--green:#10b981;--amber:#f59e0b;--red:#ef4444;--r:10px}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.header{background:linear-gradient(135deg,#0369a1,#0284c7,#38bdf8);padding:1.5rem 2rem;display:flex;align-items:center;gap:1rem;box-shadow:0 4px 20px rgba(2,132,199,.3)}
.back-btn{display:flex;align-items:center;gap:.5rem;color:#fff;text-decoration:none;font-weight:500;padding:.5rem 1rem;border-radius:8px;background:rgba(255,255,255,.15);font-size:.9rem;transition:background .2s}
.back-btn:hover{background:rgba(255,255,255,.25)}
.header-title{display:flex;align-items:center;gap:.75rem;flex:1}
.header-title i{font-size:1.5rem;color:#fff}
.header-title h1{font-size:1.5rem;font-weight:700;color:#fff}

.main{max-width:600px;margin:0 auto;padding:2rem}

/* Password display */
.pw-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1.5rem;position:relative;overflow:hidden}
.pw-display{font-family:'JetBrains Mono',monospace;font-size:1.4rem;word-break:break-all;line-height:1.6;min-height:2.8rem;color:#fff;letter-spacing:.02em;padding-right:3rem}
.pw-display .ch-upper{color:#38bdf8}
.pw-display .ch-lower{color:var(--text)}
.pw-display .ch-num{color:#fbbf24}
.pw-display .ch-sym{color:#f472b6}
.pw-actions{display:flex;gap:.5rem;margin-top:1rem}
.pw-btn{display:flex;align-items:center;justify-content:center;gap:.4rem;padding:.55rem 1rem;border-radius:8px;font-family:'Outfit',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.pw-btn:active{transform:scale(.97)}
.pw-btn.primary{background:var(--sky);color:#fff;flex:1}
.pw-btn.primary:hover{filter:brightness(1.15)}
.pw-btn.sec{background:var(--s2);color:var(--t2)}
.pw-btn.sec:hover{background:var(--s3);color:var(--text)}

/* Strength bar */
.strength-wrap{margin-top:1rem}
.strength-bar{height:6px;background:var(--s2);border-radius:3px;overflow:hidden}
.strength-fill{height:100%;border-radius:3px;transition:width .3s,background .3s}
.strength-row{display:flex;justify-content:space-between;align-items:center;margin-top:.4rem}
.strength-label{font-size:.75rem;font-weight:600}
.strength-time{font-size:.7rem;color:var(--t3);font-family:'JetBrains Mono',monospace}

/* Options */
.opts-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1.5rem}
.opt-section{margin-bottom:1.25rem}
.opt-section:last-child{margin-bottom:0}
.opt-label{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);margin-bottom:.5rem;display:flex;align-items:center;gap:.4rem}
.opt-label i{color:var(--sky)}

/* Length slider */
.len-row{display:flex;align-items:center;gap:.75rem}
.len-slider{flex:1;-webkit-appearance:none;appearance:none;height:6px;background:var(--s2);border-radius:3px;outline:none}
.len-slider::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--sky);cursor:pointer;box-shadow:0 2px 8px rgba(2,132,199,.4)}
.len-val{font-family:'JetBrains Mono',monospace;font-size:1.5rem;font-weight:700;color:var(--sky2);min-width:3rem;text-align:center}

/* Toggles */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:.5rem 0;border-bottom:1px solid rgba(255,255,255,.04)}
.toggle-row:last-child{border-bottom:none}
.toggle-info{display:flex;align-items:center;gap:.5rem}
.toggle-name{font-size:.9rem;font-weight:500}
.toggle-sample{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--t3)}
.toggle{width:40px;height:22px;background:var(--s2);border-radius:11px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--sky)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;background:#fff;border-radius:50%;transition:left .2s}
.toggle.on::after{left:20px}

/* Custom chars */
.custom-input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:.5rem .75rem;border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:.85rem;outline:none;margin-top:.4rem}
.custom-input:focus{border-color:var(--sky)}
.custom-input::placeholder{color:var(--t3)}

/* Exclude */
.exclude-input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:.5rem .75rem;border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:.85rem;outline:none}
.exclude-input:focus{border-color:var(--sky)}

/* Presets */
.presets-row{display:flex;gap:.4rem;flex-wrap:wrap}
.preset-chip{padding:.4rem .75rem;border-radius:20px;font-size:.75rem;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--t2);font-family:'Outfit',sans-serif;font-weight:500;transition:all .15s}
.preset-chip:hover{border-color:var(--sky);color:var(--sky2)}
.preset-chip.active{background:var(--sky);border-color:var(--sky);color:#fff}

/* History */
.history-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.history-header{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;border-bottom:1px solid var(--border)}
.history-header h3{font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);display:flex;align-items:center;gap:.4rem}
.history-header h3 i{color:var(--sky)}
.clear-btn{background:none;border:none;color:var(--t3);cursor:pointer;font-size:.7rem;font-family:'Outfit',sans-serif;transition:color .15s}
.clear-btn:hover{color:var(--red)}
.history-list{max-height:250px;overflow-y:auto}
.history-list::-webkit-scrollbar{width:4px}
.history-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.history-item{display:flex;align-items:center;gap:.5rem;padding:.5rem 1rem;border-bottom:1px solid rgba(255,255,255,.03);font-family:'JetBrains Mono',monospace;font-size:.75rem;cursor:pointer;transition:background .12s;word-break:break-all}
.history-item:hover{background:var(--s2)}
.history-item:last-child{border-bottom:none}
.history-copy{flex-shrink:0;color:var(--t3);font-size:.7rem;opacity:0;transition:opacity .12s}
.history-item:hover .history-copy{opacity:1}
.history-empty{padding:1.5rem;text-align:center;color:var(--t3);font-size:.8rem}

/* Bulk generate */
.bulk-row{display:flex;gap:.5rem;align-items:center;margin-bottom:1rem}
.bulk-input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:.4rem .6rem;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:.8rem;width:50px;text-align:center;outline:none}
.bulk-input:focus{border-color:var(--sky)}

.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(100px);background:var(--panel);border:1px solid var(--sky);color:var(--text);padding:.75rem 1.5rem;border-radius:12px;font-size:.9rem;z-index:1000;transition:transform .3s;box-shadow:0 8px 30px rgba(0,0,0,.4)}
.toast.show{transform:translateX(-50%) translateY(0)}

@media(max-width:500px){
.main{padding:1rem}
.header{padding:1rem}
.pw-display{font-size:1.1rem}
}
</style>
</head>
<body>

<div class="header">
  <a href="../Tools.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
  <div class="header-title"><i class="fas fa-key"></i><h1>Password Generator</h1></div>
</div>

<div class="main">
  <!-- Password Display -->
  <div class="pw-card">
    <div class="pw-display" id="pwDisplay">Click Generate</div>
    <div class="strength-wrap">
      <div class="strength-bar"><div class="strength-fill" id="strengthFill" style="width:0"></div></div>
      <div class="strength-row">
        <span class="strength-label" id="strengthLabel" style="color:var(--t3)">—</span>
        <span class="strength-time" id="crackTime">—</span>
      </div>
    </div>
    <div class="pw-actions">
      <button class="pw-btn primary" onclick="generate()"><i class="fas fa-rotate"></i> Generate</button>
      <button class="pw-btn sec" onclick="copyPW()"><i class="fas fa-copy"></i> Copy</button>
      <button class="pw-btn sec" onclick="sharePW()"><i class="fas fa-share-nodes"></i></button>
    </div>
  </div>

  <!-- Presets as toggleable filters -->
  <div style="margin-bottom:1rem">
    <div class="opt-label"><i class="fas fa-bolt"></i> Presets</div>
    <div class="presets-row">
      <button class="preset-chip" data-preset="pin" onclick="togglePreset(this,'pin')"><i class="fas fa-hashtag" style="margin-right:3px"></i> PIN</button>
      <button class="preset-chip" data-preset="strong" onclick="togglePreset(this,'strong')"><i class="fas fa-shield-halved" style="margin-right:3px"></i> Strong</button>
      <button class="preset-chip" data-preset="ultra" onclick="togglePreset(this,'ultra')"><i class="fas fa-lock" style="margin-right:3px"></i> Ultra</button>
      <button class="preset-chip" data-preset="passphrase" onclick="togglePreset(this,'passphrase')"><i class="fas fa-quote-left" style="margin-right:3px"></i> Passphrase</button>
      <button class="preset-chip active" data-preset="memorable" onclick="togglePreset(this,'memorable')"><i class="fas fa-brain" style="margin-right:3px"></i> Memorable</button>
      <button class="preset-chip" data-preset="noSymbols" onclick="togglePreset(this,'noSymbols')"><i class="fas fa-font" style="margin-right:3px"></i> No Symbols</button>
      <button class="preset-chip" data-preset="numbersOnly" onclick="togglePreset(this,'numbersOnly')"><i class="fas fa-calculator" style="margin-right:3px"></i> Numbers Only</button>
      <button class="preset-chip" data-preset="hex" onclick="togglePreset(this,'hex')"><i class="fas fa-code" style="margin-right:3px"></i> Hex</button>
    </div>
  </div>

  <!-- Options -->
  <div class="opts-card">
    <!-- Length -->
    <div class="opt-section">
      <div class="opt-label"><i class="fas fa-ruler"></i> Length</div>
      <div class="len-row">
        <input type="range" class="len-slider" id="lenSlider" min="4" max="128" value="20" oninput="updateLen(this.value)">
        <span class="len-val" id="lenVal">20</span>
      </div>
    </div>

    <!-- Character types -->
    <div class="opt-section">
      <div class="opt-label"><i class="fas fa-font"></i> Characters</div>
      <div class="toggle-row">
        <div class="toggle-info"><span class="toggle-name">Uppercase</span><span class="toggle-sample">A-Z</span></div>
        <div class="toggle on" id="togUpper" onclick="this.classList.toggle('on');generate()"></div>
      </div>
      <div class="toggle-row">
        <div class="toggle-info"><span class="toggle-name">Lowercase</span><span class="toggle-sample">a-z</span></div>
        <div class="toggle on" id="togLower" onclick="this.classList.toggle('on');generate()"></div>
      </div>
      <div class="toggle-row">
        <div class="toggle-info"><span class="toggle-name">Numbers</span><span class="toggle-sample">0-9</span></div>
        <div class="toggle on" id="togNum" onclick="this.classList.toggle('on');generate()"></div>
      </div>
      <div class="toggle-row">
        <div class="toggle-info"><span class="toggle-name">Symbols</span><span class="toggle-sample">!@#$%^&*</span></div>
        <div class="toggle on" id="togSym" onclick="this.classList.toggle('on');generate()"></div>
      </div>
      <div class="toggle-row">
        <div class="toggle-info"><span class="toggle-name">Ambiguous</span><span class="toggle-sample">0O l1I</span></div>
        <div class="toggle" id="togAmbig" onclick="this.classList.toggle('on');generate()"></div>
      </div>
      <div class="toggle-row">
        <div class="toggle-info"><span class="toggle-name">Begin with letter</span></div>
        <div class="toggle" id="togBeginLetter" onclick="this.classList.toggle('on');generate()"></div>
      </div>
      <div class="toggle-row">
        <div class="toggle-info"><span class="toggle-name">No repeating chars</span></div>
        <div class="toggle" id="togNoRepeat" onclick="this.classList.toggle('on');generate()"></div>
      </div>
    </div>

    <!-- Exclude chars -->
    <div class="opt-section">
      <div class="opt-label"><i class="fas fa-ban"></i> Exclude Characters</div>
      <input class="exclude-input" id="excludeInput" placeholder="Characters to exclude..." onchange="generate()">
    </div>

    <!-- Custom chars -->
    <div class="opt-section">
      <div class="opt-label"><i class="fas fa-pen"></i> Custom Characters (optional)</div>
      <input class="custom-input" id="customInput" placeholder="Add your own characters to include..." onchange="generate()">
    </div>

    <!-- Bulk -->
    <div class="opt-section">
      <div class="opt-label"><i class="fas fa-layer-group"></i> Bulk Generate</div>
      <div class="bulk-row">
        <input class="bulk-input" id="bulkCount" type="number" min="1" max="100" value="1">
        <button class="pw-btn primary" style="flex:none;padding:.4rem .75rem;font-size:.75rem" onclick="bulkGenerate()"><i class="fas fa-rotate"></i> Generate Multiple</button>
      </div>
    </div>
  </div>

  <!-- History -->
  <div class="history-card">
    <div class="history-header">
      <h3><i class="fas fa-clock-rotate-left"></i> History</h3>
      <button class="clear-btn" onclick="clearHistory()">Clear</button>
    </div>
    <div class="history-list" id="historyList">
      <div class="history-empty">No passwords generated yet</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var UPPER = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
var LOWER = 'abcdefghijklmnopqrstuvwxyz';
var NUMS = '0123456789';
var SYMS = '!@#$%^&*()-_=+[]{}|;:,.<>?/~`';
var AMBIGUOUS = '0OoIl1';
var history = JSON.parse(localStorage.getItem('pwgen_history') || '[]');

var WORDS = ['alpha','brave','coral','delta','eagle','flame','grape','haven','ivory','jewel','karma','lunar','maple','noble','ocean','pearl','quest','royal','solar','titan','ultra','vivid','whale','xenon','yield','zephyr','amber','blaze','cedar','drift','ember','frost','gleam','hover','inlet','joust','knack','lotus','marsh','nexus','orbit','plume','quilt','ridge','spark','trace','unity','vault','weave','azure','bloom','crisp','dusk','flair','grove','haste','jolly','kneel','lyric','mirth','nerve','oasis','prowl','quirk','raven','swift','thorn','unify','vigor','wrath','onyx','prism','quake','storm','trend'];

var currentPW = '';

function getCharset() {
  var chars = '';
  if (document.getElementById('togUpper').classList.contains('on')) chars += UPPER;
  if (document.getElementById('togLower').classList.contains('on')) chars += LOWER;
  if (document.getElementById('togNum').classList.contains('on')) chars += NUMS;
  if (document.getElementById('togSym').classList.contains('on')) chars += SYMS;

  // Remove ambiguous
  if (!document.getElementById('togAmbig').classList.contains('on')) {
    for (var i = 0; i < AMBIGUOUS.length; i++) {
      chars = chars.split(AMBIGUOUS[i]).join('');
    }
  }

  // Remove excluded
  var exclude = document.getElementById('excludeInput').value;
  for (var i = 0; i < exclude.length; i++) {
    chars = chars.split(exclude[i]).join('');
  }

  // Add custom
  var custom = document.getElementById('customInput').value;
  chars += custom;

  // Deduplicate
  var unique = '';
  for (var i = 0; i < chars.length; i++) {
    if (unique.indexOf(chars[i]) === -1) unique += chars[i];
  }

  return unique;
}

function secureRandom(max) {
  var arr = new Uint32Array(1);
  crypto.getRandomValues(arr);
  return arr[0] % max;
}

function generate() {
  // Handle special presets first
  if (activePreset === 'passphrase') { generatePassphrase(); return; }
  if (activePreset === 'memorable') { generateMemorable(); return; }
  if (activePreset === 'hex') { generateHex(); return; }

  var len = parseInt(document.getElementById('lenSlider').value);
  var chars = getCharset();
  if (!chars.length) { toast('Enable at least one character type'); return; }

  var noRepeat = document.getElementById('togNoRepeat').classList.contains('on');
  var beginLetter = document.getElementById('togBeginLetter').classList.contains('on');

  if (noRepeat && len > chars.length) {
    len = chars.length;
    document.getElementById('lenSlider').value = len;
    document.getElementById('lenVal').textContent = len;
  }

  var pw = '';
  var used = {};

  // Gather enabled pools with filtering applied
  var exclude = document.getElementById('excludeInput').value;
  var noAmbig = !document.getElementById('togAmbig').classList.contains('on');
  function filterPool(pool) {
    var out = pool;
    if (noAmbig) for (var a = 0; a < AMBIGUOUS.length; a++) out = out.split(AMBIGUOUS[a]).join('');
    for (var e = 0; e < exclude.length; e++) out = out.split(exclude[e]).join('');
    return out;
  }

  var pools = [];
  if (document.getElementById('togUpper').classList.contains('on')) { var p = filterPool(UPPER); if (p) pools.push(p); }
  if (document.getElementById('togLower').classList.contains('on')) { var p = filterPool(LOWER); if (p) pools.push(p); }
  if (document.getElementById('togNum').classList.contains('on')) { var p = filterPool(NUMS); if (p) pools.push(p); }
  if (document.getElementById('togSym').classList.contains('on')) { var p = filterPool(SYMS); if (p) pools.push(p); }

  if (!pools.length) { toast('Enable at least one character type'); return; }

  // Better distribution: cycle through pools to ensure balanced mix
  // First, add one from each pool (guaranteed)
  for (var r = 0; r < pools.length && pw.length < len; r++) {
    var ch;
    var attempts = 0;
    do { ch = pools[r][secureRandom(pools[r].length)]; attempts++; } while (noRepeat && used[ch] && attempts < 50);
    if (!noRepeat || !used[ch]) { pw += ch; used[ch] = true; }
  }

  // Fill remaining by cycling through pools (not random from combined set)
  // This gives much better distribution than picking from one giant pool
  var poolIdx = 0;
  while (pw.length < len) {
    var pool = pools[poolIdx % pools.length];
    var ch;
    var attempts = 0;
    do { ch = pool[secureRandom(pool.length)]; attempts++; } while (noRepeat && used[ch] && attempts < 50);
    if (attempts >= 50) { poolIdx++; continue; } // pool exhausted
    pw += ch;
    used[ch] = true;
    poolIdx++;
  }

  // Shuffle thoroughly (Fisher-Yates)
  var arr = pw.split('');
  for (var i = arr.length - 1; i > 0; i--) {
    var j = secureRandom(i + 1);
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  pw = arr.join('');

  // Begin with letter
  if (beginLetter) {
    var letters = filterPool(UPPER) + filterPool(LOWER);
    if (letters.length) {
      for (var i = 0; i < pw.length; i++) {
        if (letters.indexOf(pw[i]) !== -1 && i > 0) {
          arr = pw.split('');
          var t = arr[0]; arr[0] = arr[i]; arr[i] = t;
          pw = arr.join('');
          break;
        }
      }
    }
  }

  currentPW = pw;
  displayPW(pw);
  calcStrength(pw, chars.length);
  addToHistory(pw);
}

function generateHex() {
  var len = parseInt(document.getElementById('lenSlider').value);
  var hex = '0123456789abcdef';
  var pw = '';
  for (var i = 0; i < len; i++) pw += hex[secureRandom(16)];
  currentPW = pw;
  displayPW(pw);
  calcStrength(pw, 16);
  addToHistory(pw);
}

function displayPW(pw) {
  var html = '';
  for (var i = 0; i < pw.length; i++) {
    var ch = pw[i];
    var cls = 'ch-lower';
    if (UPPER.indexOf(ch) !== -1) cls = 'ch-upper';
    else if (NUMS.indexOf(ch) !== -1) cls = 'ch-num';
    else if (LOWER.indexOf(ch) === -1) cls = 'ch-sym';
    html += '<span class="' + cls + '">' + escHtml(ch) + '</span>';
  }
  document.getElementById('pwDisplay').innerHTML = html;
}

function calcStrength(pw, poolSize) {
  var entropy = pw.length * Math.log2(poolSize || 2);
  var fill = document.getElementById('strengthFill');
  var label = document.getElementById('strengthLabel');
  var time = document.getElementById('crackTime');

  var pct, color, text;
  if (entropy < 28) { pct = 15; color = var_red; text = 'Very Weak'; }
  else if (entropy < 36) { pct = 30; color = '#f97316'; text = 'Weak'; }
  else if (entropy < 60) { pct = 50; color = var_amber; text = 'Fair'; }
  else if (entropy < 80) { pct = 70; color = '#22c55e'; text = 'Strong'; }
  else if (entropy < 120) { pct = 85; color = var_green; text = 'Very Strong'; }
  else { pct = 100; color = '#06b6d4'; text = 'Insane'; }

  fill.style.width = pct + '%';
  fill.style.background = color;
  label.style.color = color;
  label.textContent = text + ' (' + Math.round(entropy) + ' bits)';

  // Crack time estimate (10 billion guesses/sec)
  var seconds = Math.pow(2, entropy) / 1e10;
  time.textContent = 'Crack time: ' + formatCrackTime(seconds);
}

var var_red = '#ef4444', var_amber = '#f59e0b', var_green = '#10b981';

function formatCrackTime(sec) {
  if (sec < 0.001) return 'instant';
  if (sec < 1) return '< 1 second';
  if (sec < 60) return Math.round(sec) + ' seconds';
  if (sec < 3600) return Math.round(sec / 60) + ' minutes';
  if (sec < 86400) return Math.round(sec / 3600) + ' hours';
  if (sec < 86400 * 365) return Math.round(sec / 86400) + ' days';
  if (sec < 86400 * 365 * 1000) return Math.round(sec / (86400 * 365)) + ' years';
  if (sec < 86400 * 365 * 1e6) return Math.round(sec / (86400 * 365 * 1000)) + 'K years';
  if (sec < 86400 * 365 * 1e9) return Math.round(sec / (86400 * 365 * 1e6)) + 'M years';
  if (sec < 86400 * 365 * 1e12) return Math.round(sec / (86400 * 365 * 1e9)) + 'B years';
  return '∞';
}

function updateLen(v) {
  document.getElementById('lenVal').textContent = v;
  generate();
}

// Presets as toggleable filters
var activePreset = 'memorable';

function togglePreset(el, name) {
  // Deselect all presets
  document.querySelectorAll('.preset-chip').forEach(function(c) { c.classList.remove('active'); });
  // Activate this one (or deselect if same)
  if (activePreset === name) {
    activePreset = '';
  } else {
    activePreset = name;
    el.classList.add('active');
  }
  applyActivePreset();
  generate();
}

function applyActivePreset() {
  var s = document.getElementById('lenSlider');
  var u = document.getElementById('togUpper');
  var l = document.getElementById('togLower');
  var n = document.getElementById('togNum');
  var sy = document.getElementById('togSym');

  function set(upper, lower, num, sym, len) {
    upper ? u.classList.add('on') : u.classList.remove('on');
    lower ? l.classList.add('on') : l.classList.remove('on');
    num ? n.classList.add('on') : n.classList.remove('on');
    sym ? sy.classList.add('on') : sy.classList.remove('on');
    s.value = len;
    document.getElementById('lenVal').textContent = len;
  }

  switch (activePreset) {
    case 'pin': set(false, false, true, false, 6); break;
    case 'strong': set(true, true, true, true, 20); break;
    case 'ultra': set(true, true, true, true, 32); break;
    case 'noSymbols': set(true, true, true, false, 20); break;
    case 'numbersOnly': set(false, false, true, false, 12); break;
    case 'hex': break; // handled in generate
    case 'passphrase': break; // handled in generate
    case 'memorable': break; // handled in generate
    default: set(true, true, true, true, 20); break;
  }
}

function generatePassphrase() {
  var words = [];
  for (var i = 0; i < 5; i++) {
    words.push(WORDS[secureRandom(WORDS.length)]);
  }
  currentPW = words.join('-');
  displayPW(currentPW);
  // Passphrase entropy: log2(wordlist_size ^ word_count)
  var entropy = 5 * Math.log2(WORDS.length);
  var fill = document.getElementById('strengthFill');
  var label = document.getElementById('strengthLabel');
  var time = document.getElementById('crackTime');
  fill.style.width = '80%';
  fill.style.background = var_green;
  label.style.color = var_green;
  label.textContent = 'Strong Passphrase (' + Math.round(entropy) + ' bits)';
  var seconds = Math.pow(2, entropy) / 1e10;
  time.textContent = 'Crack time: ' + formatCrackTime(seconds);
  addToHistory(currentPW);
}

function generateMemorable() {
  // Pattern: Word + Number + Word + Symbol
  var w1 = WORDS[secureRandom(WORDS.length)];
  var w2 = WORDS[secureRandom(WORDS.length)];
  w1 = w1[0].toUpperCase() + w1.slice(1);
  w2 = w2[0].toUpperCase() + w2.slice(1);
  var num = '' + (secureRandom(900) + 100);
  var sym = '!@#$%&*'[secureRandom(7)];
  currentPW = w1 + num + w2 + sym;
  displayPW(currentPW);
  calcStrength(currentPW, 72);
  addToHistory(currentPW);
}

// Bulk
function bulkGenerate() {
  var count = Math.min(100, Math.max(1, parseInt(document.getElementById('bulkCount').value) || 1));
  var results = [];
  for (var i = 0; i < count; i++) {
    generate();
    results.push(currentPW);
  }
  navigator.clipboard.writeText(results.join('\n')).then(function() {
    toast(count + ' passwords copied to clipboard');
  }).catch(function() { toast('Generated ' + count + ' passwords'); });
}

// Copy / Share
function copyPW() {
  if (!currentPW) { toast('Generate a password first'); return; }
  navigator.clipboard.writeText(currentPW).then(function() { toast('Copied!'); }).catch(function() { toast('Copy failed'); });
}

function sharePW() {
  if (!currentPW) return;
  if (navigator.share) {
    navigator.share({ text: currentPW }).catch(function() {});
  } else {
    copyPW();
  }
}

// History
function addToHistory(pw) {
  if (history[0] === pw) return;
  history.unshift(pw);
  if (history.length > 50) history.pop();
  localStorage.setItem('pwgen_history', JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  var list = document.getElementById('historyList');
  if (!history.length) { list.innerHTML = '<div class="history-empty">No passwords generated yet</div>'; return; }
  list.innerHTML = history.map(function(pw) {
    return '<div class="history-item" onclick="navigator.clipboard.writeText(\'' + pw.replace(/'/g, "\\'") + '\');toast(\'Copied!\')">' +
      '<span style="flex:1">' + escHtml(pw) + '</span>' +
      '<span class="history-copy"><i class="fas fa-copy"></i></span>' +
    '</div>';
  }).join('');
}

function clearHistory() {
  history = [];
  localStorage.setItem('pwgen_history', '[]');
  renderHistory();
  toast('History cleared');
}

// Helpers
function escHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}

// Init
renderHistory();
generate();

// Keyboard
document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); generate(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c') copyPW();
});
</script>
