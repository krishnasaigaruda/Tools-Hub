<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Player | Tools Hub</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f172a;--panel:#1e293b;--s2:#334155;--border:#334155;--text:#e2e8f0;--t2:#94a3b8;--t3:#64748b;--purple:#a855f7;--purple-d:rgba(168,85,247,.12);--purple-g:rgba(168,85,247,.3);--fuchsia:#c026d3;--r:10px}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.header{background:linear-gradient(135deg,#7e22ce,#a855f7,#c084fc);padding:1.5rem 2rem;display:flex;align-items:center;gap:1rem;box-shadow:0 4px 20px rgba(168,85,247,.3);position:sticky;top:0;z-index:100}
.back-btn{display:flex;align-items:center;gap:.5rem;color:#fff;text-decoration:none;font-weight:500;padding:.5rem 1rem;border-radius:8px;background:rgba(255,255,255,.15);transition:background .2s;font-size:.9rem}
.back-btn:hover{background:rgba(255,255,255,.25)}
.header-title{display:flex;align-items:center;gap:.75rem;flex:1}
.header-title i{font-size:1.5rem;color:#fff}
.header-title h1{font-size:1.5rem;font-weight:700;color:#fff}

.main{max-width:900px;margin:0 auto;padding:2rem}

/* Upload area */
.upload-area{text-align:center;padding:3rem 2rem}
.upload-area.hidden{display:none}
.upload-icon{font-size:4rem;color:var(--purple);margin-bottom:1rem;opacity:.7}
.upload-title{font-size:1.5rem;font-weight:700;margin-bottom:.5rem}
.upload-sub{color:var(--t2);margin-bottom:1.5rem;font-size:.95rem}
.drop-zone{border:2px dashed var(--border);border-radius:12px;padding:3rem 2rem;cursor:pointer;transition:all .25s;display:flex;flex-direction:column;align-items:center;gap:.75rem;max-width:500px;margin:0 auto}
.drop-zone:hover,.drop-zone.over{border-color:var(--purple);background:var(--purple-d)}
.drop-zone i{font-size:2rem;color:var(--t3)}
.drop-zone p{color:var(--t2);font-size:.9rem}
.drop-zone p b{color:var(--purple)}

/* Now Playing */
.player{display:none}
.player.active{display:block}

/* Track info */
.track-info{text-align:center;margin-bottom:1.5rem}
.track-art{width:200px;height:200px;border-radius:16px;background:linear-gradient(135deg,#7e22ce,#a855f7);margin:0 auto 1.25rem;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 40px rgba(168,85,247,.3)}
.track-art i{font-size:4rem;color:rgba(255,255,255,.6)}
.track-art img{width:100%;height:100%;object-fit:cover;border-radius:16px}
.track-name{font-size:1.4rem;font-weight:700;margin-bottom:.25rem}
.track-meta{font-size:.85rem;color:var(--t3);font-family:'JetBrains Mono',monospace}

/* Waveform */
.waveform-wrap{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:1rem;margin-bottom:1.5rem;position:relative;cursor:pointer;overflow:hidden}
.waveform-canvas{width:100%;height:100px;display:block}
.wave-playhead{position:absolute;top:0;left:0;width:2px;height:100%;background:var(--purple);pointer-events:none;transition:left .05s linear;z-index:2}
.wave-progress{position:absolute;top:0;left:0;width:0;height:100%;background:rgba(168,85,247,.08);pointer-events:none;z-index:1}

/* Time + seek */
.time-row{display:flex;align-items:center;gap:.75rem;margin-bottom:1.25rem}
.time-label{font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--t3);min-width:3.5rem}
.time-label.right{text-align:right}
.seek-bar{flex:1;-webkit-appearance:none;appearance:none;height:4px;background:var(--border);border-radius:2px;outline:none;cursor:pointer}
.seek-bar::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--purple);cursor:pointer;box-shadow:0 0 8px rgba(168,85,247,.4)}

/* Controls */
.controls{display:flex;align-items:center;justify-content:center;gap:1rem;margin-bottom:1.5rem}
.ctrl{background:none;border:none;color:var(--t2);cursor:pointer;font-size:1.2rem;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .15s}
.ctrl:hover{color:var(--text);background:var(--s2)}
.ctrl.play-btn{width:64px;height:64px;background:var(--purple);color:#fff;font-size:1.5rem;box-shadow:0 4px 20px rgba(168,85,247,.4)}
.ctrl.play-btn:hover{filter:brightness(1.15);transform:scale(1.05)}
.ctrl.active{color:var(--purple)}

/* Volume + speed */
.extras-row{display:flex;align-items:center;justify-content:center;gap:2rem;margin-bottom:2rem;flex-wrap:wrap}
.extra-group{display:flex;align-items:center;gap:.5rem}
.extra-group i{color:var(--t3);font-size:.85rem}
.extra-slider{width:90px;-webkit-appearance:none;appearance:none;height:3px;background:var(--border);border-radius:2px;outline:none}
.extra-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--purple);cursor:pointer}
.extra-val{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--t3);min-width:2rem}

/* Queue */
.queue-section{margin-top:1rem}
.section-title{font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);margin-bottom:.75rem;display:flex;align-items:center;justify-content:space-between}
.section-title i{color:var(--purple)}
.add-btn{background:var(--purple);color:#fff;border:none;padding:.35rem .75rem;border-radius:6px;font-family:'Outfit',sans-serif;font-size:.75rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:.35rem;transition:filter .15s}
.add-btn:hover{filter:brightness(1.15)}

.queue-item{display:flex;align-items:center;gap:.75rem;padding:.65rem .75rem;background:var(--panel);border:1px solid var(--border);border-radius:var(--r);margin-bottom:.4rem;cursor:pointer;transition:all .15s}
.queue-item:hover{border-color:var(--purple)}
.queue-item.active{border-color:var(--purple);background:var(--purple-d)}
.queue-num{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--t3);min-width:1.5rem}
.queue-playing{color:var(--purple);font-size:.8rem;min-width:1.5rem;text-align:center}
.queue-info{flex:1;min-width:0}
.queue-name{font-size:.85rem;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.queue-dur{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--t3)}
.queue-actions{display:flex;gap:.25rem}
.q-btn{background:none;border:none;color:var(--t3);cursor:pointer;padding:.3rem;border-radius:4px;font-size:.75rem;transition:all .15s}
.q-btn:hover{color:var(--text);background:var(--s2)}
.q-btn.del:hover{color:#ef4444}

.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(100px);background:var(--panel);border:1px solid var(--purple);color:var(--text);padding:.75rem 1.5rem;border-radius:12px;font-size:.9rem;z-index:1000;transition:transform .3s;box-shadow:0 8px 30px rgba(0,0,0,.4)}
.toast.show{transform:translateX(-50%) translateY(0)}

@media(max-width:600px){
.main{padding:1rem}
.header{padding:1rem}
.header-title h1{font-size:1.2rem}
.track-art{width:150px;height:150px}
.controls{gap:.5rem}
.extras-row{gap:1rem}
}
</style>
</head>
<body>

<div class="header">
  <a href="../Tools.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
  <div class="header-title"><i class="fas fa-music"></i><h1>Music Player</h1></div>
</div>

<div class="main">
  <!-- Upload -->
  <div class="upload-area" id="uploadArea">
    <div class="upload-icon"><i class="fas fa-headphones"></i></div>
    <h2 class="upload-title">Music Player</h2>
    <p class="upload-sub">Upload audio files to listen, visualize, and share.</p>
    <div class="drop-zone" id="dropZone">
      <i class="fas fa-cloud-arrow-up"></i>
      <p><b>Click to upload</b> or drag & drop audio files</p>
      <p style="font-size:.75rem;color:var(--t3)">MP3, WAV, OGG, FLAC, M4A, WEBM</p>
    </div>
    <input type="file" id="fileInput" accept="audio/*" multiple hidden>
  </div>

  <!-- Player -->
  <div class="player" id="player">
    <div class="track-info">
      <div class="track-art" id="trackArt"><i class="fas fa-music"></i></div>
      <div class="track-name" id="trackName">No track loaded</div>
      <div class="track-meta" id="trackMeta">—</div>
    </div>

    <div class="waveform-wrap" id="waveWrap" onclick="seekWave(event)">
      <canvas class="waveform-canvas" id="waveCanvas"></canvas>
      <div class="wave-progress" id="waveProgress"></div>
      <div class="wave-playhead" id="wavePlayhead"></div>
    </div>

    <div class="time-row">
      <span class="time-label" id="timeCur">0:00</span>
      <input type="range" class="seek-bar" id="seekBar" value="0" min="0" max="1000" oninput="seekTo(this.value)">
      <span class="time-label right" id="timeDur">0:00</span>
    </div>

    <div class="controls">
      <button class="ctrl" title="Shuffle" id="shuffleBtn" onclick="toggleShuffle()"><i class="fas fa-shuffle"></i></button>
      <button class="ctrl" title="Previous" onclick="prevTrack()"><i class="fas fa-backward-step"></i></button>
      <button class="ctrl" title="Rewind 10s" onclick="skip(-10)"><i class="fas fa-backward"></i></button>
      <button class="ctrl play-btn" id="playBtn" onclick="togglePlay()"><i class="fas fa-play" id="playIcon"></i></button>
      <button class="ctrl" title="Forward 10s" onclick="skip(10)"><i class="fas fa-forward"></i></button>
      <button class="ctrl" title="Next" onclick="nextTrack()"><i class="fas fa-forward-step"></i></button>
      <button class="ctrl" title="Repeat" id="repeatBtn" onclick="toggleRepeat()"><i class="fas fa-repeat"></i></button>
    </div>

    <div class="extras-row">
      <div class="extra-group">
        <i class="fas fa-volume-low"></i>
        <input type="range" class="extra-slider" id="volSlider" min="0" max="100" value="100" oninput="setVolume(this.value)">
        <span class="extra-val" id="volVal">100%</span>
      </div>
      <div class="extra-group">
        <i class="fas fa-gauge"></i>
        <input type="range" class="extra-slider" id="speedSlider" min="50" max="200" value="100" oninput="setSpeed(this.value)">
        <span class="extra-val" id="speedVal">1.0x</span>
      </div>
    </div>

    <!-- Queue -->
    <div class="queue-section">
      <div class="section-title">
        <span><i class="fas fa-list"></i> Queue (<span id="queueCount">0</span>)</span>
        <button class="add-btn" onclick="document.getElementById('fileInput').click()"><i class="fas fa-plus"></i> Add</button>
      </div>
      <div id="queueList"></div>
    </div>
  </div>
</div>

<audio id="audio" preload="auto"></audio>
<div class="toast" id="toast"></div>

<script>
var queue = [];
var currentIdx = -1;
var isPlaying = false;
var shuffle = false;
var repeat = 0; // 0=off, 1=all, 2=one
var audioEl = document.getElementById('audio');
var waveCanvas = document.getElementById('waveCanvas');
var waveCtx = waveCanvas.getContext('2d');
var animId = null;
var audioCtx = null;
var analyser = null;
var audioSource = null;

// Upload
var dz = document.getElementById('dropZone');
var fi = document.getElementById('fileInput');
dz.onclick = function() { fi.click(); };
dz.ondragover = function(e) { e.preventDefault(); dz.classList.add('over'); };
dz.ondragleave = function() { dz.classList.remove('over'); };
dz.ondrop = function(e) { e.preventDefault(); dz.classList.remove('over'); addFiles(e.dataTransfer.files); };
fi.onchange = function() { if (fi.files.length) addFiles(fi.files); fi.value = ''; };

function addFiles(files) {
  var added = 0;
  for (var i = 0; i < files.length; i++) {
    var f = files[i];
    // Accept by extension if MIME is empty (file:// protocol)
    var ext = f.name.split('.').pop().toLowerCase();
    var audioExts = ['mp3','wav','ogg','flac','m4a','webm','aac','wma','opus'];
    if (!f.type.startsWith('audio/') && audioExts.indexOf(ext) === -1) continue;
    queue.push({
      id: Date.now() + i,
      name: f.name.replace(/\.[^.]+$/, ''),
      file: f,
      url: URL.createObjectURL(f),
      duration: 0,
      waveData: null
    });
    added++;
  }
  if (!added) { toast('No audio files found'); return; }
  if (currentIdx < 0) {
    currentIdx = 0;
    loadTrack(0);
  }
  document.getElementById('uploadArea').classList.add('hidden');
  document.getElementById('player').classList.add('active');
  renderQueue();
  toast(added + ' track' + (added > 1 ? 's' : '') + ' added');
}

// Load track
async function loadTrack(idx) {
  if (idx < 0 || idx >= queue.length) return;
  currentIdx = idx;
  var track = queue[idx];
  audioEl.src = track.url;
  document.getElementById('trackName').textContent = track.name;
  var ext = track.file.name.split('.').pop().toUpperCase();
  document.getElementById('trackMeta').textContent = ext + ' • ' + formatSize(track.file.size);
  renderQueue();
  // Draw waveform
  drawWaveform(track);
  // Reset UI
  document.getElementById('seekBar').value = 0;
  document.getElementById('timeCur').textContent = '0:00';
  document.getElementById('wavePlayhead').style.left = '0';
  document.getElementById('waveProgress').style.width = '0';
}

function playTrack(idx) {
  loadTrack(idx);
  audioEl.oncanplay = function() { audioEl.play(); audioEl.oncanplay = null; };
}

// Waveform
function drawWaveform(track) {
  // Delay to ensure canvas is visible and has dimensions
  setTimeout(function() { _drawWaveform(track); }, 200);
}

async function _drawWaveform(track) {
  var c = document.getElementById('waveCanvas');
  if (!c) return;
  var cw = c.offsetWidth;
  var ch = c.offsetHeight;
  if (cw < 10) cw = 800;
  if (ch < 10) ch = 100;
  c.width = cw * 2;
  c.height = ch * 2;
  var w = c.width, h = c.height;
  var ctx = c.getContext('2d');

  // Clear
  ctx.fillStyle = '#1e293b';
  ctx.fillRect(0, 0, w, h);

  try {
    // Read file as ArrayBuffer
    var buf = await new Promise(function(resolve, reject) {
      var reader = new FileReader();
      reader.onload = function() { resolve(reader.result); };
      reader.onerror = function() { reject(reader.error); };
      reader.readAsArrayBuffer(track.file);
    });

    var actx = new (window.AudioContext || window.webkitAudioContext)();
    var audio = await actx.decodeAudioData(buf);
    track.duration = audio.duration;
    document.getElementById('timeDur').textContent = formatTime(audio.duration);
    actx.close();

    var data = audio.getChannelData(0);
    var step = Math.ceil(data.length / w);

    for (var i = 0; i < w; i++) {
      var min = 1, max = -1;
      for (var j = 0; j < step; j++) {
        var d = data[i * step + j] || 0;
        if (d < min) min = d;
        if (d > max) max = d;
      }
      var y1 = (1 + min) * h / 2;
      var y2 = (1 + max) * h / 2;
      var hue = 270 + (i / w) * 30;
      ctx.fillStyle = 'hsl(' + hue + ',65%,55%)';
      ctx.fillRect(i, y1, 1, Math.max(1, y2 - y1));
    }
    track.waveData = true;
    renderQueue(); // update duration in queue
  } catch(e) {
    console.log('Waveform error:', e);
    ctx.fillStyle = '#334155';
    ctx.fillRect(0, h / 2 - 1, w, 2);
  }
}

// Playback
function togglePlay() {
  if (currentIdx < 0 && queue.length) { playTrack(0); return; }
  if (audioEl.paused) {
    audioEl.play();
  } else {
    audioEl.pause();
  }
}

audioEl.onplay = function() {
  isPlaying = true;
  document.getElementById('playIcon').className = 'fas fa-pause';
  startUpdate();
  // Connect analyser if not done
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    audioSource = audioCtx.createMediaElementSource(audioEl);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    audioSource.connect(analyser);
    analyser.connect(audioCtx.destination);
  }
};

audioEl.onpause = function() {
  isPlaying = false;
  document.getElementById('playIcon').className = 'fas fa-play';
};

audioEl.onended = function() {
  if (repeat === 2) {
    audioEl.currentTime = 0;
    audioEl.play();
  } else if (repeat === 1 || currentIdx < queue.length - 1) {
    nextTrack();
  } else {
    isPlaying = false;
    document.getElementById('playIcon').className = 'fas fa-play';
  }
};

audioEl.ontimeupdate = function() {
  if (!audioEl.duration) return;
  var pct = audioEl.currentTime / audioEl.duration;
  document.getElementById('seekBar').value = Math.round(pct * 1000);
  document.getElementById('timeCur').textContent = formatTime(audioEl.currentTime);
  document.getElementById('timeDur').textContent = formatTime(audioEl.duration);
  document.getElementById('wavePlayhead').style.left = (pct * 100) + '%';
  document.getElementById('waveProgress').style.width = (pct * 100) + '%';
};

function startUpdate() {
  // Nothing extra needed — ontimeupdate handles it
}

function seekTo(val) {
  if (!audioEl.duration) return;
  audioEl.currentTime = (val / 1000) * audioEl.duration;
}

function seekWave(e) {
  if (!audioEl.duration) return;
  var rect = document.getElementById('waveWrap').getBoundingClientRect();
  var pct = (e.clientX - rect.left) / rect.width;
  audioEl.currentTime = pct * audioEl.duration;
}

function skip(sec) {
  audioEl.currentTime = Math.max(0, Math.min(audioEl.duration || 0, audioEl.currentTime + sec));
}

function prevTrack() {
  if (audioEl.currentTime > 3) { audioEl.currentTime = 0; return; }
  var idx = shuffle ? Math.floor(Math.random() * queue.length) : currentIdx - 1;
  if (idx < 0) idx = repeat === 1 ? queue.length - 1 : 0;
  playTrack(idx);
}

function nextTrack() {
  var idx = shuffle ? Math.floor(Math.random() * queue.length) : currentIdx + 1;
  if (idx >= queue.length) idx = repeat === 1 ? 0 : queue.length - 1;
  if (idx !== currentIdx || repeat) playTrack(idx);
}

function setVolume(v) {
  audioEl.volume = v / 100;
  document.getElementById('volVal').textContent = v + '%';
}

function setSpeed(v) {
  var s = v / 100;
  audioEl.playbackRate = s;
  document.getElementById('speedVal').textContent = s.toFixed(1) + 'x';
}

function toggleShuffle() {
  shuffle = !shuffle;
  document.getElementById('shuffleBtn').classList.toggle('active', shuffle);
  toast(shuffle ? 'Shuffle on' : 'Shuffle off');
}

function toggleRepeat() {
  repeat = (repeat + 1) % 3;
  var btn = document.getElementById('repeatBtn');
  btn.classList.toggle('active', repeat > 0);
  btn.innerHTML = repeat === 2 ? '<i class="fas fa-repeat"></i><span style="font-size:.5rem;position:absolute;bottom:6px">1</span>' : '<i class="fas fa-repeat"></i>';
  toast(['Repeat off', 'Repeat all', 'Repeat one'][repeat]);
}

// Queue
function renderQueue() {
  document.getElementById('queueCount').textContent = queue.length;
  var list = document.getElementById('queueList');
  if (!queue.length) {
    list.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--t3);font-size:.85rem">No tracks in queue</div>';
    return;
  }
  list.innerHTML = queue.map(function(t, i) {
    var isActive = i === currentIdx;
    var dur = t.duration ? formatTime(t.duration) : '—';
    return '<div class="queue-item' + (isActive ? ' active' : '') + '" onclick="playTrack(' + i + ')">' +
      (isActive ? '<span class="queue-playing"><i class="fas fa-volume-high"></i></span>' : '<span class="queue-num">' + (i + 1) + '</span>') +
      '<div class="queue-info"><div class="queue-name">' + esc(t.name) + '</div></div>' +
      '<span class="queue-dur">' + dur + '</span>' +
      '<div class="queue-actions">' +
        '<button class="q-btn" onclick="event.stopPropagation();shareTrack(' + i + ')" title="Share"><i class="fas fa-share-nodes"></i></button>' +
        '<button class="q-btn" onclick="event.stopPropagation();downloadTrack(' + i + ')" title="Download"><i class="fas fa-download"></i></button>' +
        '<button class="q-btn del" onclick="event.stopPropagation();removeTrack(' + i + ')" title="Remove"><i class="fas fa-xmark"></i></button>' +
      '</div></div>';
  }).join('');
}

function removeTrack(i) {
  if (i === currentIdx) { audioEl.pause(); audioEl.src = ''; }
  URL.revokeObjectURL(queue[i].url);
  queue.splice(i, 1);
  if (currentIdx >= queue.length) currentIdx = queue.length - 1;
  if (currentIdx >= 0) loadTrack(currentIdx);
  else {
    document.getElementById('player').classList.remove('active');
    document.getElementById('uploadArea').classList.remove('hidden');
    currentIdx = -1;
    clearMDB();
  }
  renderQueue();
}

function downloadTrack(i) {
  var t = queue[i];
  var a = document.createElement('a');
  a.href = t.url;
  a.download = t.name + '.' + (t.file.name.split('.').pop() || 'mp3');
  a.click();
  toast('Downloaded ' + t.name);
}

function shareTrack(i) {
  var t = queue[i];
  if (navigator.share) {
    navigator.share({ files: [t.file], title: t.name }).catch(function() {});
  } else {
    downloadTrack(i);
    toast('Sharing not supported — downloaded instead');
  }
}

// Keyboard shortcuts
document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.key === 'ArrowLeft') skip(-5);
  if (e.key === 'ArrowRight') skip(5);
  if (e.key === 'ArrowUp') { e.preventDefault(); var v = Math.min(100, parseInt(document.getElementById('volSlider').value) + 5); document.getElementById('volSlider').value = v; setVolume(v); }
  if (e.key === 'ArrowDown') { e.preventDefault(); var v2 = Math.max(0, parseInt(document.getElementById('volSlider').value) - 5); document.getElementById('volSlider').value = v2; setVolume(v2); }
  if (e.key === 'n' || e.key === 'N') nextTrack();
  if (e.key === 'p' || e.key === 'P') prevTrack();
  if (e.key === 's' || e.key === 'S') toggleShuffle();
  if (e.key === 'r' || e.key === 'R') toggleRepeat();
});

// Helpers
function formatTime(s) {
  if (!s || !isFinite(s)) return '0:00';
  var m = Math.floor(s / 60);
  var sec = Math.floor(s % 60);
  return m + ':' + String(sec).padStart(2, '0');
}

function formatSize(b) {
  if (b > 1048576) return (b / 1048576).toFixed(1) + ' MB';
  return (b / 1024).toFixed(0) + ' KB';
}

function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}

// ═══════════════════════
// INDEXED DB
// ═══════════════════════
var mdb = null;
function openMDB(cb) {
  var req = indexedDB.open('MusicPlayerDB', 1);
  req.onupgradeneeded = function(e) {
    var d = e.target.result;
    if (!d.objectStoreNames.contains('tracks')) d.createObjectStore('tracks', { keyPath: 'id' });
  };
  req.onsuccess = function(e) { mdb = e.target.result; if (cb) cb(); };
  req.onerror = function() { if (cb) cb(); };
}

function saveQueueToDB() {
  if (!mdb || !queue.length) return;
  var tx = mdb.transaction('tracks', 'readwrite');
  var store = tx.objectStore('tracks');
  store.clear();
  queue.forEach(function(t) {
    store.put({
      id: t.id,
      name: t.name,
      blob: t.file.slice ? t.file : t.blob,
      fileName: t.file.name || t.name,
      duration: t.duration
    });
  });
}

function loadQueueFromDB(cb) {
  if (!mdb) { cb(); return; }
  var tx = mdb.transaction('tracks', 'readonly');
  var req = tx.objectStore('tracks').getAll();
  req.onsuccess = function() {
    var items = req.result || [];
    if (!items.length) { cb(); return; }
    queue = items.map(function(item) {
      var blob = item.blob;
      var file = new File([blob], item.fileName || item.name, { type: blob.type || 'audio/mpeg' });
      return {
        id: item.id,
        name: item.name,
        file: file,
        url: URL.createObjectURL(blob),
        duration: item.duration || 0,
        waveData: null
      };
    });
    currentIdx = 0;
    document.getElementById('uploadArea').classList.add('hidden');
    document.getElementById('player').classList.add('active');
    loadTrack(0);
    renderQueue();
    cb();
  };
  req.onerror = function() { cb(); };
}

function clearMDB() {
  if (!mdb) return;
  var tx = mdb.transaction('tracks', 'readwrite');
  tx.objectStore('tracks').clear();
}

// Auto-save queue after changes
var _origRenderQueue = renderQueue;
renderQueue = function() {
  _origRenderQueue();
  saveQueueToDB();
};

// Init
openMDB(function() { loadQueueFromDB(function() {}); });
</script>
