<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock - Tools Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #111;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: #ea580c;
            color: white;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            transition: background 0.3s;
        }

        .back-btn:hover { background: rgba(255,255,255,0.3); }

        .header h1 { font-size: 1.3rem; font-weight: 600; }

        /* Content */
        .view { display: none; flex: 1; padding: 30px 20px; overflow-y: auto; flex-direction: column; align-items: center; }
        .view.active { display: flex; }

        /* ===== CLOCK ===== */
        .clock-display {
            font-size: 5rem;
            font-weight: 200;
            letter-spacing: 4px;
            font-variant-numeric: tabular-nums;
            margin-top: 80px;
        }

        .clock-seconds { font-size: 3rem; color: #ea580c; }

        .clock-date {
            font-size: 1.3rem;
            color: #888;
            margin-top: 16px;
        }

        .clock-day {
            font-size: 1rem;
            color: #666;
            margin-top: 6px;
        }

        .clock-tz-label {
            font-size: 0.9rem;
            color: #ea580c;
            margin-top: 8px;
            letter-spacing: 1px;
        }

        .clock-ampm {
            font-size: 2rem;
            color: #ea580c;
            margin-left: 8px;
            font-weight: 400;
        }

        .clock-toggle {
            display: flex;
            gap: 0;
            margin-top: 30px;
            background: #222;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #333;
        }

        .clock-toggle button {
            padding: 10px 24px;
            background: transparent;
            border: none;
            color: #888;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .clock-toggle button.active {
            background: #ea580c;
            color: #fff;
        }

        /* ===== ALARM ===== */
        .alarm-section { width: 100%; max-width: 500px; }

        .alarm-add-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            align-items: flex-end;
        }

        .alarm-time-input {
            flex: 1;
            padding: 14px;
            background: #222;
            border: 1px solid #333;
            color: #fff;
            border-radius: 10px;
            font-size: 1.3rem;
            text-align: center;
            font-family: inherit;
        }

        .alarm-time-input:focus { outline: none; border-color: #ea580c; }

        .alarm-label-input {
            flex: 1;
            padding: 14px;
            background: #222;
            border: 1px solid #333;
            color: #fff;
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: inherit;
        }

        .alarm-label-input:focus { outline: none; border-color: #ea580c; }

        .alarm-add-btn {
            padding: 14px 20px;
            background: #ea580c;
            border: none;
            color: #fff;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }

        .alarm-add-btn:hover { background: #c2410c; }

        .alarm-card {
            background: #1a1a1a;
            border-radius: 14px;
            padding: 18px 20px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .alarm-card.ringing {
            border: 1px solid #ea580c;
            animation: pulseGlow 1.5s infinite;
        }

        .alarm-card-left { display: flex; flex-direction: column; gap: 4px; }

        .alarm-card-time {
            font-size: 2rem;
            font-weight: 300;
            font-variant-numeric: tabular-nums;
        }

        .alarm-card-time .alarm-ampm { font-size: 1rem; color: #ea580c; margin-left: 6px; }

        .alarm-card-label { font-size: 0.85rem; color: #888; }

        .alarm-card-days { font-size: 0.75rem; color: #666; margin-top: 2px; }

        .alarm-card-right { display: flex; align-items: center; gap: 14px; }

        .alarm-toggle {
            position: relative;
            width: 50px;
            height: 28px;
            background: #333;
            border-radius: 14px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .alarm-toggle.on { background: #ea580c; }

        .alarm-toggle::after {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            background: #fff;
            border-radius: 50%;
            top: 3px;
            left: 3px;
            transition: transform 0.3s;
        }

        .alarm-toggle.on::after { transform: translateX(22px); }

        .alarm-delete {
            background: none;
            border: none;
            color: #555;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 4px;
        }

        .alarm-delete:hover { color: #f44; }

        .alarm-days-row {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }

        .day-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid #444;
            background: transparent;
            color: #888;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .day-btn.active { background: #ea580c; border-color: #ea580c; color: #fff; }

        .alarm-dismiss-btn {
            padding: 8px 18px;
            background: #ea580c;
            border: none;
            color: #fff;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
        }

        /* ===== WORLD CLOCK ===== */
        .world-clock-section { width: 100%; max-width: 500px; }

        .wc-add-row {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        .wc-select {
            flex: 1;
            padding: 14px;
            background: #222;
            border: 1px solid #333;
            color: #fff;
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: inherit;
        }

        .wc-select:focus { outline: none; border-color: #ea580c; }

        .wc-add-btn {
            padding: 14px 20px;
            background: #ea580c;
            border: none;
            color: #fff;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
        }

        .wc-add-btn:hover { background: #c2410c; }

        .wc-card {
            background: #1a1a1a;
            border-radius: 14px;
            padding: 18px 20px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .wc-card-left { display: flex; flex-direction: column; gap: 2px; }
        .wc-city { font-size: 1.1rem; font-weight: 500; }
        .wc-tz { font-size: 0.75rem; color: #666; }
        .wc-diff { font-size: 0.8rem; color: #888; margin-top: 2px; }

        .wc-card-right { display: flex; align-items: center; gap: 14px; }

        .wc-time {
            font-size: 1.8rem;
            font-weight: 300;
            font-variant-numeric: tabular-nums;
        }

        .wc-time .wc-ampm { font-size: 0.9rem; color: #ea580c; margin-left: 4px; }
        .wc-date { font-size: 0.75rem; color: #888; text-align: right; }

        .wc-remove {
            background: none;
            border: none;
            color: #555;
            cursor: pointer;
            font-size: 1rem;
            padding: 4px;
        }

        .wc-remove:hover { color: #f44; }

        /* ===== TIMEZONE CONVERTER ===== */
        .tz-section { width: 100%; max-width: 500px; }

        .tz-converter-card {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 24px;
        }

        .tz-row {
            margin-bottom: 20px;
        }

        .tz-row:last-child { margin-bottom: 0; }

        .tz-label { font-size: 0.8rem; color: #888; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }

        .tz-select {
            width: 100%;
            padding: 12px;
            background: #222;
            border: 1px solid #333;
            color: #fff;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: inherit;
            margin-bottom: 8px;
        }

        .tz-select:focus { outline: none; border-color: #ea580c; }

        .tz-time-input {
            width: 100%;
            padding: 12px;
            background: #222;
            border: 1px solid #333;
            color: #fff;
            border-radius: 8px;
            font-size: 1.1rem;
            font-family: inherit;
        }

        .tz-time-input:focus { outline: none; border-color: #ea580c; }

        .tz-swap-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 16px 0;
        }

        .tz-swap-btn button {
            background: #333;
            border: none;
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s;
        }

        .tz-swap-btn button:hover { background: #ea580c; }

        .tz-result {
            background: #222;
            border-radius: 10px;
            padding: 16px;
            text-align: center;
            margin-top: 16px;
        }

        .tz-result-time {
            font-size: 2rem;
            font-weight: 300;
            font-variant-numeric: tabular-nums;
        }

        .tz-result-date { font-size: 0.85rem; color: #888; margin-top: 4px; }

        /* ===== TIMER ===== */
        .timer-setup { width: 100%; max-width: 500px; }

        .preset-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 24px;
        }

        .preset-btn {
            padding: 14px 8px;
            background: #222;
            border: 1px solid #333;
            color: #fff;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .preset-btn:hover { background: #ea580c; border-color: #ea580c; }

        .custom-input-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .time-input {
            width: 70px;
            padding: 12px;
            background: #222;
            border: 1px solid #333;
            color: #fff;
            border-radius: 8px;
            text-align: center;
            font-size: 1.3rem;
            font-weight: 500;
        }

        .time-input:focus { outline: none; border-color: #ea580c; }

        .time-separator { font-size: 1.5rem; color: #666; }

        .time-label { font-size: 0.7rem; color: #888; text-align: center; margin-top: 4px; }

        .start-timer-btn {
            width: 100%;
            padding: 16px;
            background: #ea580c;
            border: none;
            color: #fff;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .start-timer-btn:hover { background: #c2410c; }

        /* Active timers */
        .active-timers {
            width: 100%;
            max-width: 500px;
            margin-top: 30px;
        }

        .active-timers h3 {
            font-size: 0.85rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .timer-card {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 14px;
            position: relative;
            overflow: hidden;
        }

        .timer-card.completed {
            border: 1px solid #ea580c;
            animation: pulseGlow 1.5s infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 10px rgba(234,88,12,0.3); }
            50% { box-shadow: 0 0 25px rgba(234,88,12,0.6); }
        }

        .timer-card-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .timer-card-label { font-size: 0.85rem; color: #888; }

        .timer-card-remove {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 4px;
        }

        .timer-card-remove:hover { color: #f44; }

        .timer-ring-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }

        .timer-ring {
            position: relative;
            width: 160px;
            height: 160px;
        }

        .timer-ring svg {
            transform: rotate(-90deg);
            width: 160px;
            height: 160px;
        }

        .timer-ring-bg {
            fill: none;
            stroke: #333;
            stroke-width: 6;
        }

        .timer-ring-progress {
            fill: none;
            stroke: #ea580c;
            stroke-width: 6;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.3s linear;
        }

        .timer-ring-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.8rem;
            font-weight: 300;
            font-variant-numeric: tabular-nums;
        }

        .timer-card-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .timer-ctrl-btn {
            padding: 10px 24px;
            border: none;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-pause { background: #333; color: #fff; }
        .btn-pause:hover { background: #444; }
        .btn-resume { background: #ea580c; color: #fff; }
        .btn-resume:hover { background: #c2410c; }
        .btn-reset { background: #222; color: #aaa; }
        .btn-reset:hover { background: #333; color: #fff; }
        .btn-dismiss { background: #ea580c; color: #fff; }
        .btn-dismiss:hover { background: #c2410c; }

        /* ===== STOPWATCH ===== */
        .stopwatch-display {
            font-size: 4.5rem;
            font-weight: 200;
            font-variant-numeric: tabular-nums;
            margin: 40px 0 10px;
            letter-spacing: 2px;
        }

        .stopwatch-ms {
            font-size: 2.5rem;
            color: #ea580c;
        }

        .stopwatch-controls {
            display: flex;
            gap: 16px;
            margin: 30px 0;
        }

        .sw-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sw-start {
            background: rgba(22,163,74,0.2);
            border-color: #16a34a;
            color: #16a34a;
        }

        .sw-start:hover { background: rgba(22,163,74,0.3); }

        .sw-stop {
            background: rgba(220,38,38,0.2);
            border-color: #dc2626;
            color: #dc2626;
        }

        .sw-stop:hover { background: rgba(220,38,38,0.3); }

        .sw-lap {
            background: rgba(255,255,255,0.05);
            border-color: #555;
            color: #ccc;
        }

        .sw-lap:hover { background: rgba(255,255,255,0.1); }
        .sw-lap:disabled { opacity: 0.3; cursor: default; }

        .sw-reset {
            background: rgba(255,255,255,0.05);
            border-color: #555;
            color: #ccc;
        }

        .sw-reset:hover { background: rgba(255,255,255,0.1); }

        /* Laps */
        .laps-container {
            width: 100%;
            max-width: 440px;
            margin-top: 10px;
        }

        .laps-header, .lap-row {
            display: grid;
            grid-template-columns: 60px 1fr 1fr;
            padding: 10px 0;
            border-bottom: 1px solid #222;
            font-size: 0.9rem;
        }

        .laps-header { color: #888; font-weight: 500; }
        .lap-row { color: #ccc; font-variant-numeric: tabular-nums; }
        .lap-row.best { color: #16a34a; }
        .lap-row.worst { color: #dc2626; }

        /* Responsive */
        @media (max-width: 500px) {
            .clock-display { font-size: 3rem; }
            .clock-seconds { font-size: 1.8rem; }
            .clock-ampm { font-size: 1.2rem; }
            .stopwatch-display { font-size: 3rem; }
            .stopwatch-ms { font-size: 1.8rem; }
            .preset-grid { grid-template-columns: repeat(3, 1fr); }
            .timer-ring { width: 130px; height: 130px; }
            .timer-ring svg { width: 130px; height: 130px; }
            .alarm-card-time { font-size: 1.5rem; }
            .wc-time { font-size: 1.4rem; }
            .alarm-add-row { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <button class="back-btn" onclick="goBack()">
                <i class="fas fa-arrow-left"></i> Back
            </button>
            <h1 id="pageTitle"><i class="fas fa-clock"></i> Clock</h1>
        </div>
    </div>

    <!-- CLOCK VIEW -->
    <div class="view" id="view-clock">
        <div class="clock-display" id="clockTime"></div>
        <div class="clock-date" id="clockDate"></div>
        <div class="clock-day" id="clockDay"></div>
        <div class="clock-tz-label" id="clockTzLabel"></div>
        <div class="clock-toggle">
            <button id="btn12h" class="active" onclick="setClockMode(12)">12 Hour</button>
            <button id="btn24h" onclick="setClockMode(24)">24 Hour</button>
        </div>
        <div class="tz-search-wrapper" style="margin-top:10px;position:relative;width:300px;">
            <input type="text" id="clockTzSearch" placeholder="Search timezone or city..." autocomplete="off"
                style="width:100%;background:#222;color:#fff;border:1px solid #444;padding:10px 14px 10px 36px;border-radius:8px;font-size:14px;outline:none;"
                onfocus="showTzDropdown()" oninput="filterTzDropdown(this.value)">
            <i class="fas fa-search" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#666;font-size:13px;pointer-events:none;"></i>
            <div id="clockTzDropdown" style="display:none;position:absolute;top:100%;left:0;right:0;max-height:250px;overflow-y:auto;background:#1a1a1a;border:1px solid #444;border-radius:8px;margin-top:4px;z-index:100;"></div>
        </div>
    </div>

    <!-- TIMER VIEW -->
    <div class="view" id="view-timer">
        <div class="timer-setup">
            <div class="preset-grid">
                <button class="preset-btn" onclick="startPreset(60)">1 min</button>
                <button class="preset-btn" onclick="startPreset(180)">3 min</button>
                <button class="preset-btn" onclick="startPreset(300)">5 min</button>
                <button class="preset-btn" onclick="startPreset(600)">10 min</button>
                <button class="preset-btn" onclick="startPreset(900)">15 min</button>
                <button class="preset-btn" onclick="startPreset(1800)">30 min</button>
                <button class="preset-btn" onclick="startPreset(3600)">1 hour</button>
                <button class="preset-btn" onclick="startPreset(7200)">2 hours</button>
            </div>

            <div class="custom-input-row">
                <div>
                    <input type="number" class="time-input" id="inputH" min="0" max="99" value="0" placeholder="0">
                    <div class="time-label">Hours</div>
                </div>
                <span class="time-separator">:</span>
                <div>
                    <input type="number" class="time-input" id="inputM" min="0" max="59" value="5" placeholder="0">
                    <div class="time-label">Minutes</div>
                </div>
                <span class="time-separator">:</span>
                <div>
                    <input type="number" class="time-input" id="inputS" min="0" max="59" value="0" placeholder="0">
                    <div class="time-label">Seconds</div>
                </div>
            </div>

            <button class="start-timer-btn" onclick="startCustomTimer()">
                <i class="fas fa-play"></i> Start Timer
            </button>
        </div>

        <div class="active-timers" id="activeTimers">
            <h3>Active Timers</h3>
            <div id="timerList"></div>
        </div>
    </div>

    <!-- STOPWATCH VIEW -->
    <div class="view" id="view-stopwatch">
        <div class="stopwatch-display" id="swDisplay">00:00<span class="stopwatch-ms">.00</span></div>

        <div class="stopwatch-controls">
            <button class="sw-btn sw-lap" id="swLapReset" onclick="swLapReset()" disabled>Lap</button>
            <button class="sw-btn sw-start" id="swStartStop" onclick="swStartStop()">Start</button>
        </div>

        <div class="laps-container" id="lapsContainer" style="display:none">
            <div class="laps-header">
                <span>Lap</span>
                <span>Lap Time</span>
                <span>Total Time</span>
            </div>
            <div id="lapsList"></div>
        </div>
    </div>

    <!-- ALARM VIEW -->
    <div class="view" id="view-alarm">
        <div class="alarm-section">
            <div class="clock-toggle" style="margin-top:0;margin-bottom:20px;align-self:center;width:fit-content">
                <button class="clock-mode-btn" data-mode="12" onclick="setClockMode(12)">12 Hour</button>
                <button class="clock-mode-btn" data-mode="24" onclick="setClockMode(24)">24 Hour</button>
            </div>
            <div class="alarm-add-row">
                <input type="time" class="alarm-time-input" id="alarmTimeInput">
                <input type="text" class="alarm-label-input" id="alarmLabelInput" placeholder="Label (optional)">
                <button class="alarm-add-btn" onclick="addAlarm()"><i class="fas fa-plus"></i> Add</button>
            </div>
            <div id="alarmList"></div>
        </div>
    </div>

    <!-- WORLD CLOCK VIEW -->
    <div class="view" id="view-world-clock">
        <div class="world-clock-section">
            <div class="clock-toggle" style="margin-top:0;margin-bottom:20px;align-self:center;width:fit-content">
                <button class="clock-mode-btn" data-mode="12" onclick="setClockMode(12)">12 Hour</button>

    <script>
        // ===== NAVIGATION =====
        function goBack() {
            window.location.href = '../Tools.html';
        }

        // ===== VIEW SWITCHING (based on hash, no tabs) =====
        const titles = {
            clock: '<i class="fas fa-clock"></i> Clock',
            timer: '<i class="fas fa-hourglass-half"></i> Timer',
            stopwatch: '<i class="fas fa-stopwatch"></i> Stopwatch',
            alarm: '<i class="fas fa-bell"></i> Alarm Clock',
            'world-clock': '<i class="fas fa-globe"></i> World Clock',
            timezone: '<i class="fas fa-globe-americas"></i> Timezone Converter'
        };

        const validViews = ['clock', 'timer', 'stopwatch', 'alarm', 'world-clock', 'timezone'];

        function showView(view) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            const el = document.getElementById(`view-${view}`);
            if (el) el.classList.add('active');
            document.getElementById('pageTitle').innerHTML = titles[view] || titles.clock;
            const name = view.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
            document.title = name + ' - Tools Hub';
        }

        const currentView = window.location.hash.replace('#', '') || 'clock';
        showView(validViews.includes(currentView) ? currentView : 'clock');

        // ===== NOTIFICATIONS =====
        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
        }

        // ===== AUDIO — continuous looping alarm =====
        let audioCtx = null;
        const ringingTimers = new Map();

        function ensureAudioCtx() {
            if (!audioCtx || audioCtx.state === 'closed') {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            return audioCtx;
        }

        function startAlarm(timerId) {
            if (ringingTimers.has(timerId)) return;

            function playBurst() {
                const ctx = ensureAudioCtx();
                const pattern = [
                    { freq: 880, start: 0, dur: 0.2 },
                    { freq: 880, start: 0.3, dur: 0.2 },
                    { freq: 880, start: 0.6, dur: 0.2 },
                    { freq: 1100, start: 1.0, dur: 0.2 },
                    { freq: 1100, start: 1.3, dur: 0.2 },
                    { freq: 1100, start: 1.6, dur: 0.2 },
                ];
                pattern.forEach(n => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.frequency.value = n.freq;
                    osc.type = 'sine';
                    gain.gain.setValueAtTime(0.4, ctx.currentTime + n.start);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + n.start + n.dur * 0.9);
                    osc.start(ctx.currentTime + n.start);
                    osc.stop(ctx.currentTime + n.start + n.dur);
                });
            }

            playBurst();
            const interval = setInterval(() => {
                if (!ringingTimers.has(timerId)) {
                    clearInterval(interval);
                    return;
                }
                try { playBurst(); } catch(e) {}
            }, 2500);

            ringingTimers.set(timerId, { interval });
        }

        function stopAlarm(timerId) {
            const entry = ringingTimers.get(timerId);
            if (entry) {
                clearInterval(entry.interval);
                ringingTimers.delete(timerId);
            }
        }

        // ===== CLOCK =====
        let clockMode = parseInt(localStorage.getItem('clockMode')) || 12;
        // Auto-detect local timezone
        const localTz = Intl.DateTimeFormat().resolvedOptions().timeZone;
        let clockTimezone = localStorage.getItem('clockTimezone') || localTz;

        // Build timezone list
        let allTimezones = [];
        try {
            allTimezones = Intl.supportedValuesOf('timeZone');
        } catch(e) {
            allTimezones = ['America/New_York','America/Chicago','America/Denver','America/Los_Angeles','America/Anchorage','Pacific/Honolulu','Europe/London','Europe/Paris','Europe/Berlin','Europe/Moscow','Asia/Tokyo','Asia/Shanghai','Asia/Kolkata','Asia/Dubai','Australia/Sydney','Pacific/Auckland'];
        }

        // Friendly names for single-timezone countries
        const tzCountryNames = {
            'Asia/Calcutta': 'India',
            'Asia/Tokyo': 'Japan',
            'Asia/Seoul': 'South Korea',

        // City aliases for search
        const tzAliases = {
            'Asia/Calcutta': ['India','Mumbai','Delhi','Chennai','Bangalore','Hyderabad','Pune','Kolkata','IST','Indian Standard Time'],
            'Asia/Shanghai': ['Beijing','China','CST','Shenzhen','Guangzhou'],

            'Europe/Istanbul': ['Turkey','TRT','Ankara'],
            'Europe/Amsterdam': ['Netherlands','Holland'],
            'Europe/Dublin': ['Ireland'],
            'Europe/Lisbon': ['Portugal'],
            'America/New_York': ['EST','EDT','Eastern','USA East','Boston','Miami','Washington DC'],
            'America/Chicago': ['CST','CDT','Central','USA Central','Dallas','Houston'],
            'America/Denver': ['MST','MDT','Mountain','USA Mountain','Salt Lake City'],
            'America/Los_Angeles': ['PST','PDT','Pacific','USA West','San Francisco','Seattle','Hollywood'],
            'America/Sao_Paulo': ['Brazil','BRT','Rio'],
            'America/Argentina/Buenos_Aires': ['Argentina'],
            'America/Mexico_City': ['Mexico'],
            'America/Toronto': ['Canada East','Ontario'],
            'America/Vancouver': ['Canada West','British Columbia'],
            'Australia/Sydney': ['AEST','Australia East','Melbourne'],
            'Australia/Perth': ['AWST','Australia West'],
            'Pacific/Auckland': ['New Zealand','NZST','Wellington'],
            'Africa/Cairo': ['Egypt','EET'],
            'Africa/Lagos': ['Nigeria','WAT'],
            'Africa/Johannesburg': ['South Africa','SAST','Cape Town'],
            'Africa/Nairobi': ['Kenya','EAT'],
        };

        function getTzDisplay(tz) {
            if (tzCountryNames[tz]) return tzCountryNames[tz];
            return tz.replace(/_/g, ' ').replace(/\//g, ' / ');
        }


        function setClockTimezone(tz) {
            clockTimezone = tz;
            localStorage.setItem('clockTimezone', tz);
            document.getElementById('clockTzSearch').value = getTzDisplay(tz);
            hideTzDropdown();
            updateClock();
        }

        function showTzDropdown() {
            document.getElementById('clockTzSearch').value = '';
            filterTzDropdown('');
            document.getElementById('clockTzDropdown').style.display = 'block';
        }

        function hideTzDropdown() {
            setTimeout(() => {
                document.getElementById('clockTzDropdown').style.display = 'none';
            }, 150);
        }

        function filterTzDropdown(query) {
            const dropdown = document.getElementById('clockTzDropdown');
            const q = query.toLowerCase();
            // Search by timezone name and aliases
            const seen = new Set();
            const matches = [];
            // First: alias matches (prioritized)
            if (q) {
                for (const [tz, aliases] of Object.entries(tzAliases)) {
                    if (aliases.some(a => a.toLowerCase().includes(q)) || tz.toLowerCase().replace(/_/g, ' ').includes(q)) {
                        if (!seen.has(tz) && allTimezones.includes(tz)) {
                            seen.add(tz);
                            const matchedAlias = aliases.find(a => a.toLowerCase().includes(q));
                            matches.push({ tz, hint: matchedAlias || null });
                        }
                    }
                }
            }
            // Then: direct timezone name matches
            allTimezones.forEach(tz => {
                if (!seen.has(tz) && tz.toLowerCase().replace(/_/g, ' ').includes(q)) {
                    seen.add(tz);
                    matches.push({ tz, hint: null });
                }
            });
            dropdown.innerHTML = '';
            matches.slice(0, 40).forEach(({ tz, hint }) => {
                const item = document.createElement('div');
                const displayName = getTzDisplay(tz);
                const isCountry = !!tzCountryNames[tz];
                const rawTz = tz.replace(/_/g, ' ').replace(/\//g, ' / ');
                // Show country name prominently, with raw tz as subtitle if it's a country
                if (isCountry) {
                    item.innerHTML = displayName + `<span style="color:#666;margin-left:8px;font-size:11px;">${rawTz}</span>` + (hint && hint !== displayName ? `<span style="color:#ea580c;margin-left:6px;font-size:11px;">${hint}</span>` : '');
                } else {
                    item.innerHTML = displayName + (hint ? `<span style="color:#ea580c;margin-left:8px;font-size:11px;">${hint}</span>` : '');
                }
                item.style.cssText = 'padding:8px 14px;cursor:pointer;font-size:13px;color:#ccc;border-bottom:1px solid #2a2a2a;';
                item.onmouseenter = () => item.style.background = '#333';
                item.onmouseleave = () => item.style.background = 'none';
                item.onmousedown = (e) => { e.preventDefault(); setClockTimezone(tz); };
                dropdown.appendChild(item);
            });
            dropdown.style.display = matches.length ? 'block' : 'none';
        }

        document.getElementById('clockTzSearch').addEventListener('blur', hideTzDropdown);
        // Set initial display
        document.getElementById('clockTzSearch').value = getTzDisplay(clockTimezone);

        function setClockMode(mode) {
            clockMode = mode;
            localStorage.setItem('clockMode', mode);
            document.querySelectorAll('.clock-mode-btn').forEach(btn => {
                btn.classList.toggle('active', parseInt(btn.dataset.mode) === mode);
            });
            document.getElementById('btn12h').classList.toggle('active', mode === 12);
            document.getElementById('btn24h').classList.toggle('active', mode === 24);
            updateClock();
            if (typeof renderAlarms === 'function') renderAlarms();
            if (typeof renderWorldClocks === 'function') renderWorldClocks();
            if (typeof convertTimezone === 'function') convertTimezone();
        }

        function updateClock() {
            const now = new Date();
            const tz = clockTimezone;
            const locale = 'en-US';

            const timeParts = new Intl.DateTimeFormat(locale, {
                hour: 'numeric', minute: '2-digit', second: '2-digit',
                hour12: false, timeZone: tz
            }).formatToParts(now);

            const hours24 = parseInt(timeParts.find(p => p.type === 'hour').value);
            const m = timeParts.find(p => p.type === 'minute').value;
            const s = timeParts.find(p => p.type === 'second').value;

            if (clockMode === 12) {
                const ampm = hours24 >= 12 ? 'PM' : 'AM';
                let h12 = hours24 % 12;
                if (h12 === 0) h12 = 12;
                document.getElementById('clockTime').innerHTML =
                    `${h12.toString().padStart(2, '0')}:${m}<span class="clock-seconds">:${s}</span><span class="clock-ampm">${ampm}</span>`;
            } else {
                document.getElementById('clockTime').innerHTML =
                    `${hours24.toString().padStart(2, '0')}:${m}<span class="clock-seconds">:${s}</span>`;
            }

            document.getElementById('clockDate').textContent = now.toLocaleDateString(locale, { year: 'numeric', month: 'long', day: 'numeric', timeZone: tz });
            document.getElementById('clockDay').textContent = now.toLocaleDateString(locale, { weekday: 'long', timeZone: tz });
            document.getElementById('clockTzLabel').textContent = getTzDisplay(tz);
        }

        // Set initial toggle state on all mode buttons
        document.getElementById('btn12h').classList.toggle('active', clockMode === 12);
        document.getElementById('btn24h').classList.toggle('active', clockMode === 24);
        document.querySelectorAll('.clock-mode-btn').forEach(btn => {
            btn.classList.toggle('active', parseInt(btn.dataset.mode) === clockMode);
        });

        updateClock();
        setInterval(updateClock, 1000);

        // ===== TIMER =====
        let timers = [];
        let timerIdCounter = 0;
        const STORAGE_KEY = 'toolshub_timers';

        function loadTimers() {
            try {
                const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
                if (saved && Array.isArray(saved)) {
                    timers = saved.map(t => {
                        if (!t.paused && !t.completed) {
                            if (Date.now() >= t.endTime) {
                                t.completed = true;
                                t.remaining = 0;
                            }
                        }
                        return t;
                    });
                    timerIdCounter = timers.reduce((max, t) => Math.max(max, t.id), 0) + 1;
                }
            } catch(e) {}
        }

        function saveTimers() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(timers));
        }

        function formatTime(sec) {
            // Use floor so the display counts down naturally:
            // shows "05" for the first full second, "04" for the next, etc.
            // "00" shows for the final second before "Done!"
            sec = Math.max(0, Math.floor(sec));
            const h = Math.floor(sec / 3600);
            const m = Math.floor((sec % 3600) / 60);
            const s = sec % 60;
            if (h > 0) return `${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        function formatLabel(totalSec) {
            if (totalSec >= 3600) {
                const h = Math.floor(totalSec / 3600);
                const m = Math.floor((totalSec % 3600) / 60);
                return m > 0 ? `${h}h ${m}m timer` : `${h}h timer`;
            }
            if (totalSec >= 60) {
                const m = Math.floor(totalSec / 60);
                const s = totalSec % 60;
                return s > 0 ? `${m}m ${s}s timer` : `${m}m timer`;
            }
            return `${totalSec}s timer`;
        }

        function addTimer(totalSeconds) {
            const timer = {
                id: timerIdCounter++,
                endTime: Date.now() + totalSeconds * 1000,
                totalSeconds,
                paused: false,
                remaining: totalSeconds,
                completed: false
            };
            timers.push(timer);
            saveTimers();
            renderTimers();
        }

        function startPreset(seconds) { addTimer(seconds); }

        function startCustomTimer() {
            const h = parseInt(document.getElementById('inputH').value) || 0;
            const m = parseInt(document.getElementById('inputM').value) || 0;
            const s = parseInt(document.getElementById('inputS').value) || 0;
            const total = h * 3600 + m * 60 + s;
            if (total <= 0) return;
            addTimer(total);
        }

        function pauseTimer(id) {
            const t = timers.find(x => x.id === id);
            if (!t || t.completed) return;
            t.paused = true;
            t.remaining = Math.max(0, (t.endTime - Date.now()) / 1000);
            saveTimers();
            renderTimers();
        }

        function resumeTimer(id) {
            const t = timers.find(x => x.id === id);
            if (!t || t.completed) return;
            t.paused = false;
            t.endTime = Date.now() + t.remaining * 1000;
            saveTimers();
            renderTimers();
        }

        function resetTimer(id) {
            const t = timers.find(x => x.id === id);
            if (!t) return;
            stopAlarm(id);
            t.endTime = Date.now() + t.totalSeconds * 1000;
            t.remaining = t.totalSeconds;
            t.paused = true;
            t.completed = false;
            alerted.delete(id);
            saveTimers();
            renderTimers();
        }

        function removeTimer(id) {
            stopAlarm(id);
            alerted.delete(id);
            timers = timers.filter(x => x.id !== id);
            saveTimers();
            renderTimers();
        }

        function dismissTimer(id) { removeTimer(id); }

        const circumference = 2 * Math.PI * 70;

        function renderTimers() {
            const container = document.getElementById('timerList');
            const section = document.getElementById('activeTimers');

            if (timers.length === 0) {
                section.style.display = 'none';
                return;
            }
            section.style.display = 'block';

            container.innerHTML = timers.map(t => {
                let remaining;
                if (t.completed) {
                    remaining = 0;
                } else if (t.paused) {
                    remaining = t.remaining;
                } else {
                    remaining = Math.max(0, (t.endTime - Date.now()) / 1000);
                }

                const progress = t.totalSeconds > 0 ? (1 - remaining / t.totalSeconds) : 1;
                const dashOffset = circumference * (1 - progress);
                const strokeColor = t.completed ? '#16a34a' : '#ea580c';

                let controls = '';
                if (t.completed) {
                    controls = `<button class="timer-ctrl-btn btn-dismiss" onclick="dismissTimer(${t.id})">Dismiss</button>`;
                } else if (t.paused) {
                    controls = `
                        <button class="timer-ctrl-btn btn-resume" onclick="resumeTimer(${t.id})">Resume</button>
                        <button class="timer-ctrl-btn btn-reset" onclick="resetTimer(${t.id})">Reset</button>`;
                } else {
                    controls = `
                        <button class="timer-ctrl-btn btn-pause" onclick="pauseTimer(${t.id})">Pause</button>
                        <button class="timer-ctrl-btn btn-reset" onclick="resetTimer(${t.id})">Reset</button>`;
                }

                return `
                    <div class="timer-card ${t.completed ? 'completed' : ''}">
                        <div class="timer-card-top">
                            <span class="timer-card-label">${formatLabel(t.totalSeconds)}</span>
                            <button class="timer-card-remove" onclick="removeTimer(${t.id})"><i class="fas fa-times"></i></button>
                        </div>
                        <div class="timer-ring-container">
                            <div class="timer-ring">
                                <svg viewBox="0 0 160 160">
                                    <circle class="timer-ring-bg" cx="80" cy="80" r="70"/>
                                    <circle class="timer-ring-progress" cx="80" cy="80" r="70"
                                        stroke-dasharray="${circumference}"
                                        stroke-dashoffset="${dashOffset}"
                                        style="stroke: ${strokeColor}"/>
                                </svg>
                                <div class="timer-ring-text">${t.completed ? "Done!" : formatTime(remaining)}</div>
                            </div>
                        </div>
                        <div class="timer-card-controls">${controls}</div>
                    </div>`;
            }).join('');
        }

        // Timer tick
        const alerted = new Set();
        function tickTimers() {
            let needsRender = false;
            timers.forEach(t => {
                if (t.completed || t.paused) return;
                const remaining = (t.endTime - Date.now()) / 1000;
                if (remaining <= 0 && !t.completed) {
                    t.completed = true;
                    t.remaining = 0;
                    needsRender = true;

                    if (!alerted.has(t.id)) {
                        alerted.add(t.id);
                        startAlarm(t.id);
                        if ('Notification' in window && Notification.permission === 'granted') {
                            new Notification('Timer Complete!', {
                                body: `${formatLabel(t.totalSeconds)} has finished.`,
                                requireInteraction: true,
                                icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">⏰</text></svg>'
                            });
                        }
                        saveTimers();
                    }
                } else {
                    needsRender = true;
                }
            });
            if (needsRender || timers.some(t => !t.paused && !t.completed)) {
                renderTimers();
            }
        }

        loadTimers();
        renderTimers();
        setInterval(tickTimers, 250);

        // When page becomes visible again, check for completed timers
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
                timers.forEach(t => {
                    if (!t.paused && !t.completed && Date.now() >= t.endTime) {
                        t.completed = true;
                        t.remaining = 0;
                        if (!alerted.has(t.id)) {
                            alerted.add(t.id);
                            startAlarm(t.id);
                            if ('Notification' in window && Notification.permission === 'granted') {
                                new Notification('Timer Complete!', {
                                    body: `${formatLabel(t.totalSeconds)} has finished.`,
                                    requireInteraction: true
                                });
                            }
                            saveTimers();
                        }
                    }
                    if (t.completed && alerted.has(t.id) && !ringingTimers.has(t.id)) {
                        startAlarm(t.id);
                    }
                });
                renderTimers();
            }
        });

        // ===== STOPWATCH =====
        let swRunning = false;
        let swStartTime = 0;
        let swElapsed = 0;
        let swLaps = [];
        let swLapStart = 0;
        let swInterval = null;

        function swFormat(ms) {
            const totalSec = Math.floor(ms / 1000);
            const mins = Math.floor(totalSec / 60).toString().padStart(2, '0');
            const secs = (totalSec % 60).toString().padStart(2, '0');
            const centis = Math.floor((ms % 1000) / 10).toString().padStart(2, '0');
            return `${mins}:${secs}<span class="stopwatch-ms">.${centis}</span>`;
        }

        function swGetElapsed() {
            if (swRunning) return swElapsed + (Date.now() - swStartTime);
            return swElapsed;
        }

        function swUpdate() {
            document.getElementById('swDisplay').innerHTML = swFormat(swGetElapsed());
        }

        function swStartStop() {
            const btn = document.getElementById('swStartStop');
            const lapBtn = document.getElementById('swLapReset');

            if (!swRunning) {
                swRunning = true;
                swStartTime = Date.now();
                if (swLaps.length === 0) swLapStart = swGetElapsed();
                swInterval = setInterval(swUpdate, 33);
                btn.textContent = 'Stop';
                btn.className = 'sw-btn sw-stop';
                lapBtn.textContent = 'Lap';
                lapBtn.disabled = false;
            } else {
                swElapsed += Date.now() - swStartTime;
                swRunning = false;
                clearInterval(swInterval);
                swUpdate();
                btn.textContent = 'Start';
                btn.className = 'sw-btn sw-start';
                lapBtn.textContent = 'Reset';
                lapBtn.disabled = false;
            }
        }

        function swLapReset() {
            if (swRunning) {
                const total = swGetElapsed();
                const lapTime = total - swLapStart;
                swLaps.unshift({ lapTime, totalTime: total });
                swLapStart = total;
                renderLaps();
            } else {
                swElapsed = 0;
                swLaps = [];
                swLapStart = 0;
                swUpdate();
                document.getElementById('swLapReset').textContent = 'Lap';
                document.getElementById('swLapReset').disabled = true;
                document.getElementById('swStartStop').textContent = 'Start';
                document.getElementById('swStartStop').className = 'sw-btn sw-start';
                document.getElementById('lapsContainer').style.display = 'none';
                document.getElementById('lapsList').innerHTML = '';
            }
        }

        function renderLaps() {
            const container = document.getElementById('lapsContainer');
            const list = document.getElementById('lapsList');

            if (swLaps.length === 0) { container.style.display = 'none'; return; }
            container.style.display = 'block';

            let bestIdx = -1, worstIdx = -1;
            if (swLaps.length >= 2) {
                let minTime = Infinity, maxTime = -1;
                swLaps.forEach((l, i) => {
                    if (l.lapTime < minTime) { minTime = l.lapTime; bestIdx = i; }
                    if (l.lapTime > maxTime) { maxTime = l.lapTime; worstIdx = i; }
                });
            }

            const totalLaps = swLaps.length;
            list.innerHTML = swLaps.map((l, i) => {
                let cls = '';
                if (i === bestIdx) cls = 'best';
                else if (i === worstIdx) cls = 'worst';
                return `<div class="lap-row ${cls}">
                    <span>Lap ${totalLaps - i}</span>
                    <span>${swFormatPlain(l.lapTime)}</span>
                    <span>${swFormatPlain(l.totalTime)}</span>
                </div>`;
            }).join('');
        }

        function swFormatPlain(ms) {
            const totalSec = Math.floor(ms / 1000);
            const mins = Math.floor(totalSec / 60).toString().padStart(2, '0');
            const secs = (totalSec % 60).toString().padStart(2, '0');
            const centis = Math.floor((ms % 1000) / 10).toString().padStart(2, '0');
            return `${mins}:${secs}.${centis}`;
        }

        // ===== ALARM CLOCK =====
        let alarms = JSON.parse(localStorage.getItem('toolshub_alarms') || '[]');
        const ringingAlarms = new Map();

        function saveAlarms() {
            localStorage.setItem('toolshub_alarms', JSON.stringify(alarms));
        }

        function addAlarm() {
            const timeInput = document.getElementById('alarmTimeInput');
            const labelInput = document.getElementById('alarmLabelInput');
            if (!timeInput.value) { timeInput.focus(); return; }
            const [h, m] = timeInput.value.split(':').map(Number);
            alarms.push({
                id: Date.now(),
                hour: h,
                minute: m,
                label: labelInput.value || '',
                enabled: true,
                days: [new Date().getDay()] // default to today, [0-6] for repeat (0=Sun)
            });
            saveAlarms();
            renderAlarms();
            timeInput.value = '';
            labelInput.value = '';
        }

        function toggleAlarm(id) {
            const a = alarms.find(x => x.id === id);
            if (a) {
                a.enabled = !a.enabled;
                if (!a.enabled) dismissAlarmSound(id);
                saveAlarms();
                renderAlarms();
            }
        }

        function toggleAlarmDay(id, day) {
            const a = alarms.find(x => x.id === id);
            if (a) {
                const idx = a.days.indexOf(day);
                if (idx === -1) a.days.push(day);
                else a.days.splice(idx, 1);
                saveAlarms();
                renderAlarms();
            }
        }

        function deleteAlarm(id) {
            dismissAlarmSound(id);
            alarms = alarms.filter(x => x.id !== id);
            saveAlarms();
            renderAlarms();
        }

        function dismissAlarmSound(id) {
            stopAlarm('alarm_' + id);
            ringingAlarms.delete(id);
        }

        function formatAlarmTime(h, m) {
            if (clockMode === 12) {
                const ampm = h >= 12 ? 'PM' : 'AM';
                let h12 = h % 12;
                if (h12 === 0) h12 = 12;
                return `${h12}:${m.toString().padStart(2, '0')}<span class="alarm-ampm">${ampm}</span>`;
            }
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
        }

        const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        const dayLetters = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];

        function renderAlarms() {
            const list = document.getElementById('alarmList');
            if (alarms.length === 0) {
                list.innerHTML = '<div style="text-align:center;color:#666;padding:40px;">No alarms set</div>';
                return;
            }
            list.innerHTML = alarms.map(a => {
                const isRinging = ringingAlarms.has(a.id);
                const daysText = a.days.length === 7 ? 'Every day' :
                    a.days.length === 0 ? 'One time' :
                    a.days.sort().map(d => dayNames[d]).join(', ');
                return `
                    <div class="alarm-card ${isRinging ? 'ringing' : ''}">
                        <div class="alarm-card-left">
                            <div class="alarm-card-time">${formatAlarmTime(a.hour, a.minute)}</div>
                            ${a.label ? `<div class="alarm-card-label">${a.label}</div>` : ''}
                            <div class="alarm-card-days">${daysText}</div>
                            <div class="alarm-days-row">
                                ${dayLetters.map((l, i) => `<button class="day-btn ${a.days.includes(i) ? 'active' : ''}" onclick="toggleAlarmDay(${a.id}, ${i})">${l}</button>`).join('')}
                            </div>
                        </div>
                        <div class="alarm-card-right">
                            ${isRinging ? `<button class="alarm-dismiss-btn" onclick="dismissAlarmSound(${a.id});renderAlarms()">Dismiss</button>` : ''}
                            <div class="alarm-toggle ${a.enabled ? 'on' : ''}" onclick="toggleAlarm(${a.id})"></div>
                            <button class="alarm-delete" onclick="deleteAlarm(${a.id})"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>`;
            }).join('');
        }

        // Check alarms every second
        let lastAlarmMinute = -1;
        function checkAlarms() {
            const now = new Date();
            const h = now.getHours();
            const m = now.getMinutes();
            const day = now.getDay();
            const currentMinute = h * 60 + m;

            if (currentMinute === lastAlarmMinute) return;

            alarms.forEach(a => {
                if (!a.enabled) return;
                if (a.hour === h && a.minute === m) {
                    // Check day match
                    if (a.days.length > 0 && !a.days.includes(day)) return;
                    if (!ringingAlarms.has(a.id)) {
                        ringingAlarms.set(a.id, true);
                        startAlarm('alarm_' + a.id);
                        if ('Notification' in window && Notification.permission === 'granted') {
                            new Notification('Alarm!', {
                                body: a.label || `${formatAlarmTime(a.hour, a.minute).replace(/<[^>]*>/g, '')}`,
                                requireInteraction: true
                            });
                        }
                        // Disable one-time alarms after firing
                        if (a.days.length === 0) {
                            a.enabled = false;
                            saveAlarms();
                        }
                        renderAlarms();
                    }
                }
            });

            lastAlarmMinute = currentMinute;
        }

        renderAlarms();
        setInterval(checkAlarms, 1000);

        // Set default alarm input to current time + 1 hour
        const alarmDefault = new Date();
        alarmDefault.setHours(alarmDefault.getHours() + 1, 0);
        document.getElementById('alarmTimeInput').value =
            alarmDefault.getHours().toString().padStart(2, '0') + ':' +
            alarmDefault.getMinutes().toString().padStart(2, '0');

        // ===== WORLD CLOCK =====
        const worldTimezones = [
            { city: 'New York', tz: 'America/New_York' },
            { city: 'Los Angeles', tz: 'America/Los_Angeles' },
            { city: 'Chicago', tz: 'America/Chicago' },
            { city: 'London', tz: 'Europe/London' },
            { city: 'Paris', tz: 'Europe/Paris' },
            { city: 'Berlin', tz: 'Europe/Berlin' },
            { city: 'Moscow', tz: 'Europe/Moscow' },
            { city: 'Dubai', tz: 'Asia/Dubai' },
            { city: 'Mumbai', tz: 'Asia/Kolkata' },
            { city: 'Kolkata', tz: 'Asia/Kolkata' },
            { city: 'Bangkok', tz: 'Asia/Bangkok' },
            { city: 'Singapore', tz: 'Asia/Singapore' },
            { city: 'Hong Kong', tz: 'Asia/Hong_Kong' },
            { city: 'Shanghai', tz: 'Asia/Shanghai' },
            { city: 'Tokyo', tz: 'Asia/Tokyo' },
            { city: 'Seoul', tz: 'Asia/Seoul' },
            { city: 'Sydney', tz: 'Australia/Sydney' },
            { city: 'Auckland', tz: 'Pacific/Auckland' },
            { city: 'Honolulu', tz: 'Pacific/Honolulu' },
            { city: 'Toronto', tz: 'America/Toronto' },
            { city: 'Vancouver', tz: 'America/Vancouver' },
            { city: 'São Paulo', tz: 'America/Sao_Paulo' },
            { city: 'Buenos Aires', tz: 'America/Argentina/Buenos_Aires' },
            { city: 'Cairo', tz: 'Africa/Cairo' },
            { city: 'Johannesburg', tz: 'Africa/Johannesburg' },
            { city: 'Istanbul', tz: 'Europe/Istanbul' },
            { city: 'Jakarta', tz: 'Asia/Jakarta' },
            { city: 'Taipei', tz: 'Asia/Taipei' },
            { city: 'Riyadh', tz: 'Asia/Riyadh' },
            { city: 'Karachi', tz: 'Asia/Karachi' }
        ];

        let worldClocks = JSON.parse(localStorage.getItem('toolshub_worldclocks') || '[]');

        // Populate searchable datalist
        const wcDatalist = document.getElementById('wcDatalist');
        worldTimezones.forEach(tz => {
            const opt = document.createElement('option');
            opt.value = `${tz.city} (${tz.tz})`;
            wcDatalist.appendChild(opt);
        });

        function saveWorldClocks() {
            localStorage.setItem('toolshub_worldclocks', JSON.stringify(worldClocks));
        }

        function addWorldClock() {
            const input = document.getElementById('wcSearchInput');
            const text = input.value.trim();
            if (!text) { input.focus(); return; }
            // Match against city list
            const match = worldTimezones.find(tz =>
                `${tz.city} (${tz.tz})` === text ||
                tz.city.toLowerCase() === text.toLowerCase() ||
                tz.tz.toLowerCase() === text.toLowerCase()
            );
            if (!match) { alert('City not found. Please select from the list.'); return; }
            if (worldClocks.find(w => w.tz === match.tz && w.city === match.city)) {
                input.value = '';
                return;
            }
            worldClocks.push({ city: match.city, tz: match.tz });
            saveWorldClocks();
            renderWorldClocks();
            input.value = '';
        }

        function removeWorldClock(index) {
            worldClocks.splice(index, 1);
            saveWorldClocks();
            renderWorldClocks();
        }

        function getTimeDiff(tz) {
            const now = new Date();
            const local = new Date(now.toLocaleString('en-US', { timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone }));
            const remote = new Date(now.toLocaleString('en-US', { timeZone: tz }));
            const diffMs = remote - local;
            const diffH = Math.round(diffMs / 3600000);
            if (diffH === 0) return 'Same time';
            return diffH > 0 ? `+${diffH}h` : `${diffH}h`;
        }

        function renderWorldClocks() {
            const list = document.getElementById('wcList');
            if (worldClocks.length === 0) {
                list.innerHTML = '<div style="text-align:center;color:#666;padding:40px;">No world clocks added</div>';
                return;
            }
            const now = new Date();
            list.innerHTML = worldClocks.map((w, i) => {
                const opts = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: clockMode === 12, timeZone: w.tz };
                const timeStr = now.toLocaleTimeString('en-US', opts);
                const dateStr = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', timeZone: w.tz });
                const diff = getTimeDiff(w.tz);
                return `
                    <div class="wc-card">
                        <div class="wc-card-left">
                            <div class="wc-city">${w.city}</div>
                            <div class="wc-tz">${w.tz}</div>
                            <div class="wc-diff">${diff} from local</div>
                        </div>
                        <div class="wc-card-right">
                            <div>
                                <div class="wc-time">${timeStr}</div>
                                <div class="wc-date">${dateStr}</div>
                            </div>
                            <button class="wc-remove" onclick="removeWorldClock(${i})"><i class="fas fa-times"></i></button>
                        </div>
                    </div>`;
            }).join('');
        }

        renderWorldClocks();
        setInterval(renderWorldClocks, 1000);

        // ===== TIMEZONE CONVERTER =====
        const converterTimezones = Intl.supportedValuesOf ? Intl.supportedValuesOf('timeZone') : worldTimezones.map(t => t.tz);
        const tzFromList = document.getElementById('tzFromList');
        const tzToList = document.getElementById('tzToList');

        converterTimezones.forEach(tz => {
            const label = tz.replace(/_/g, ' ');
            const o1 = document.createElement('option');
            o1.value = tz;
            o1.label = label;
            tzFromList.appendChild(o1);
            const o2 = document.createElement('option');
            o2.value = tz;
            o2.label = label;
            tzToList.appendChild(o2);
        });

        // Set defaults
        document.getElementById('tzFromInput').value = localTz;
        document.getElementById('tzToInput').value = 'America/New_York';

        // Set default time to now
        const nowLocal = new Date();
        const pad2 = n => n.toString().padStart(2, '0');
        document.getElementById('tzTimeInput').value =
            `${nowLocal.getFullYear()}-${pad2(nowLocal.getMonth() + 1)}-${pad2(nowLocal.getDate())}T${pad2(nowLocal.getHours())}:${pad2(nowLocal.getMinutes())}`;

        function convertTimezone() {
            const fromTz = document.getElementById('tzFromInput').value;
            const toTz = document.getElementById('tzToInput').value;
            const inputVal = document.getElementById('tzTimeInput').value;
            if (!inputVal || !converterTimezones.includes(fromTz) || !converterTimezones.includes(toTz)) return;

            // Parse the input as a time in the "from" timezone
            const inputDate = new Date(inputVal);
            // Get the input time string in the fromTz
            const fromStr = inputDate.toLocaleString('en-US', { timeZone: fromTz });
            const fromDate = new Date(fromStr);
            // Get the same instant in local time
            const localStr = inputDate.toLocaleString('en-US');
            const localDate = new Date(localStr);
            // Offset difference
            const offsetDiff = fromDate - localDate;
            const actualDate = new Date(inputDate.getTime() - offsetDiff);

            // Now format in target timezone
            const resultTime = actualDate.toLocaleTimeString('en-US', {
                hour: '2-digit', minute: '2-digit', second: '2-digit',
                hour12: clockMode === 12, timeZone: toTz
            });
            const resultDate = actualDate.toLocaleDateString('en-US', {
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
                timeZone: toTz
            });

            document.getElementById('tzResultTime').textContent = resultTime;
            document.getElementById('tzResultDate').textContent = resultDate;
        }

        function swapTimezones() {
            const fromInput = document.getElementById('tzFromInput');
            const toInput = document.getElementById('tzToInput');
            const temp = fromInput.value;
            fromInput.value = toInput.value;
            toInput.value = temp;
            convertTimezone();
        }

        convertTimezone();
    </script>
</body>
</html>
