<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Maker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #e2e8f0; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #0d9488; color: white; padding: 0 20px; height: 56px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .back-btn { background: rgba(255,255,255,0.15); border: none; color: white; padding: 8px 14px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 14px; }
        .back-btn:hover { background: rgba(255,255,255,0.25); }
        .header h1 { font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .header-right { display: flex; gap: 8px; }
        .header-btn { background: rgba(255,255,255,0.15); border: none; color: white; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 6px; }
        .header-btn:hover { background: rgba(255,255,255,0.25); }

        .main-container { flex: 1; overflow-y: auto; padding: 24px; }

        /* Setup Screen */
        .setup-screen { max-width: 600px; margin: 0 auto; }
        .setup-card { background: #1e293b; border-radius: 16px; padding: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); text-align: center; border: 1px solid #334155; }
        .setup-card h2 { font-size: 28px; color: #f1f5f9; margin-bottom: 8px; }
        .setup-card p { color: #94a3b8; margin-bottom: 32px; font-size: 15px; }
        .setup-card .icon-big { font-size: 64px; color: #14b8a6; margin-bottom: 20px; }
        .category-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin-bottom: 28px; text-align: left; }
        .category-chip { padding: 10px 14px; border-radius: 10px; border: 2px solid #334155; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; display: flex; align-items: center; gap: 8px; color: #94a3b8; }
        .category-chip:hover { border-color: #14b8a6; color: #14b8a6; }
        .category-chip.selected { border-color: #14b8a6; background: rgba(20,184,166,0.1); color: #14b8a6; }
        .category-chip i { width: 16px; text-align: center; }
        .count-selector { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 28px; }
        .count-selector label { font-size: 15px; font-weight: 500; color: #cbd5e1; }
        .count-input { width: 100px; padding: 10px 14px; border: 2px solid #334155; border-radius: 10px; font-size: 16px; text-align: center; outline: none; background: #0f172a; color: #e2e8f0; }
        .count-input:focus { border-color: #14b8a6; }
        .start-btn { background: #0d9488; color: white; border: none; padding: 14px 48px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .start-btn:hover { background: #0f766e; transform: translateY(-1px); }
        .start-btn:disabled { background: #334155; color: #64748b; cursor: not-allowed; transform: none; }
        .available-count { font-size: 13px; color: #64748b; margin-bottom: 20px; }

        /* Quiz Screen */
        .quiz-screen { max-width: 700px; margin: 0 auto; display: none; }
        .progress-bar-container { background: #1e293b; border-radius: 20px; height: 8px; margin-bottom: 20px; overflow: hidden; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #0d9488, #14b8a6); border-radius: 20px; transition: width 0.4s ease; }
        .quiz-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; color: #94a3b8; font-size: 14px; }
        .quiz-info .score { font-weight: 600; color: #14b8a6; }
        .question-card { background: #1e293b; border-radius: 16px; padding: 32px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); margin-bottom: 20px; border: 1px solid #334155; }
        .question-number { font-size: 13px; color: #14b8a6; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
        .question-category { font-size: 12px; color: #94a3b8; margin-bottom: 12px; display: inline-block; background: #334155; padding: 3px 10px; border-radius: 20px; }
        .question-text { font-size: 18px; font-weight: 600; color: #f1f5f9; margin-bottom: 24px; line-height: 1.5; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option-btn { padding: 14px 18px; border: 2px solid #334155; border-radius: 12px; background: #0f172a; cursor: pointer; font-size: 15px; text-align: left; transition: all 0.2s; display: flex; align-items: center; gap: 12px; color: #e2e8f0; }
        .option-btn:hover:not(.disabled):not(.selected) { border-color: #14b8a6; background: rgba(20,184,166,0.05); }
        .option-btn .option-letter { width: 28px; height: 28px; border-radius: 50%; background: #334155; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 13px; color: #94a3b8; flex-shrink: 0; }
        .option-btn.selected { border-color: #14b8a6; background: rgba(20,184,166,0.1); }
        .option-btn.selected .option-letter { background: #14b8a6; color: white; }
        .option-btn.correct { border-color: #22c55e; background: rgba(34,197,94,0.1); }
        .option-btn.correct .option-letter { background: #22c55e; color: white; }
        .option-btn.wrong { border-color: #ef4444; background: rgba(239,68,68,0.1); }
        .option-btn.wrong .option-letter { background: #ef4444; color: white; }
        .option-btn.disabled { cursor: default; opacity: 0.5; }
        .option-btn.disabled.correct { opacity: 1; }
        .option-btn.disabled.selected { opacity: 1; }
        .quiz-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 16px; }
        .confirm-btn { background: #0d9488; color: white; border: none; padding: 12px 32px; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: none; }
        .confirm-btn:hover { background: #0f766e; }
        .confirm-btn:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
        .next-btn { background: #0d9488; color: white; border: none; padding: 12px 32px; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: none; }
        .next-btn:hover { background: #0f766e; }

        /* Results Screen */
        .results-screen { max-width: 600px; margin: 0 auto; display: none; }
        .results-card { background: #1e293b; border-radius: 16px; padding: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); text-align: center; border: 1px solid #334155; }
        .results-card h2 { font-size: 28px; margin-bottom: 8px; color: #f1f5f9; }
        .score-circle { width: 160px; height: 160px; border-radius: 50%; margin: 24px auto; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 42px; font-weight: 700; color: white; }
        .score-circle span { font-size: 14px; font-weight: 400; opacity: 0.9; }
        .score-great { background: linear-gradient(135deg, #22c55e, #16a34a); }
        .score-good { background: linear-gradient(135deg, #eab308, #ca8a04); }
        .score-bad { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .results-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin: 24px 0; }
        .stat-box { padding: 16px; border-radius: 12px; background: #0f172a; border: 1px solid #334155; }
        .stat-box .num { font-size: 24px; font-weight: 700; }
        .stat-box .label { font-size: 12px; color: #64748b; margin-top: 4px; }
        .stat-correct .num { color: #22c55e; }
        .stat-wrong .num { color: #ef4444; }
        .stat-percent .num { color: #14b8a6; }
        .results-actions { display: flex; gap: 12px; justify-content: center; margin-top: 24px; }
        .results-actions button { padding: 12px 28px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; }
        .retry-btn { background: #0d9488; color: white; }
        .retry-btn:hover { background: #0f766e; }
        .new-btn { background: #334155; color: #e2e8f0; }
        .new-btn:hover { background: #475569; }

        /* Review Section */
        .review-section { margin-top: 24px; text-align: left; }
        .review-toggle { background: none; border: 2px solid #334155; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 500; color: #94a3b8; width: 100%; margin-bottom: 16px; }
        .review-toggle:hover { border-color: #14b8a6; color: #14b8a6; }
        .review-list { display: none; }
        .review-list.show { display: block; }
        .review-item { padding: 16px; border-radius: 12px; margin-bottom: 10px; border-left: 4px solid; }
        .review-item.was-correct { background: rgba(34,197,94,0.08); border-color: #22c55e; }
        .review-item.was-wrong { background: rgba(239,68,68,0.08); border-color: #ef4444; }
        .review-item .ri-q { font-weight: 600; margin-bottom: 6px; font-size: 14px; color: #e2e8f0; }
        .review-item .ri-a { font-size: 13px; color: #94a3b8; }
        .review-item .ri-a strong { color: #22c55e; }
        .review-item .ri-your { font-size: 13px; color: #ef4444; }

        @media (max-width: 600px) {
            .main-container { padding: 16px; }
            .setup-card, .question-card, .results-card { padding: 24px; }
            .question-text { font-size: 16px; }
            .category-grid { grid-template-columns: repeat(2, 1fr); }
            .results-stats { grid-template-columns: repeat(3, 1fr); gap: 8px; }
        }

        /* Print Quiz Sheet */
        .print-quiz-container { display: none; }

        @media print {
            body { background: white !important; color: black !important; }
            .header, .setup-screen, .quiz-screen, .results-screen { display: none !important; }
            .main-container { padding: 0 !important; overflow: visible !important; }
            .print-quiz-container { display: block !important; padding: 20px; }
            .print-quiz-container h1 { font-size: 22px; text-align: center; margin-bottom: 4px; color: black; }
            .print-quiz-container .print-meta { text-align: center; font-size: 12px; color: #666; margin-bottom: 20px; border-bottom: 2px solid #333; padding-bottom: 10px; }
            .print-q { margin-bottom: 18px; page-break-inside: avoid; }
            .print-q .pq-text { font-size: 13px; font-weight: 600; margin-bottom: 6px; color: black; }
            .print-q .pq-options { display: flex; flex-direction: column; gap: 3px; font-size: 12px; color: #333; }
            .print-q .pq-opt { padding: 2px 0; display: flex; gap: 6px; }
            .print-q .pq-opt .pq-letter { font-weight: 600; min-width: 16px; }
            .print-q .pq-opt .pq-circle { display: inline-block; width: 12px; height: 12px; border: 1.5px solid #333; border-radius: 50%; margin-right: 4px; flex-shrink: 0; margin-top: 2px; }
            .print-answer-key { page-break-before: always; padding-top: 20px; }
            .print-answer-key h2 { font-size: 18px; margin-bottom: 12px; text-align: center; color: black; border-bottom: 2px solid #333; padding-bottom: 8px; }
            .print-answers-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px 12px; font-size: 12px; color: black; }
            .print-answers-grid .pa-item { display: flex; gap: 4px; }
            .print-answers-grid .pa-num { font-weight: 600; min-width: 28px; }
            .print-name-line { margin: 16px 0; font-size: 14px; color: black; }
            .print-name-line span { display: inline-block; border-bottom: 1px solid #333; width: 250px; margin-left: 8px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <button class="back-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i><span>Back</span></button>
            <h1><i class="fas fa-question-circle"></i> Quiz Maker</h1>
        </div>
        <div class="header-right">
            <button class="header-btn" onclick="resetQuiz()"><i class="fas fa-redo"></i> New Quiz</button>
        </div>
    </div>

    <div class="main-container">
        <!-- Setup -->
        <div class="setup-screen" id="setupScreen">
            <div class="setup-card">
                <div class="icon-big"><i class="fas fa-brain"></i></div>
                <h2>Quiz Maker</h2>
                <p>Test your knowledge with randomized multiple choice questions!</p>

                <div style="text-align:left;margin-bottom:8px;font-weight:600;font-size:14px;color:#f1f5f9;">Select Categories:</div>
                <div class="category-grid" id="categoryGrid"></div>

                <div class="available-count" id="availableCount">0 questions available</div>

                <div class="count-selector">
                    <label for="questionCount">Number of questions:</label>
                    <input type="number" id="questionCount" class="count-input" min="10" max="1000" value="10">
                </div>

                <div style="display:flex;flex-direction:column;gap:10px;align-items:center;">
                    <button class="start-btn" id="startBtn" onclick="startQuiz()" style="width:100%;max-width:300px;">Start Quiz</button>
                    <button class="start-btn" id="printBtn" style="background:#334155;width:100%;max-width:300px;" onclick="printQuiz()"><i class="fas fa-print"></i> Print Quiz</button>
                    <button class="start-btn" id="pdfBtn" style="background:#334155;width:100%;max-width:300px;" onclick="downloadPDF()"><i class="fas fa-file-pdf"></i> Download PDF</button>
                </div>
            </div>
        </div>

        <!-- Quiz -->
        <div class="quiz-screen" id="quizScreen">
            <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
            <div class="quiz-info">
                <span id="questionCounter">Question 1 of 10</span>
                <span class="score">Score: <span id="scoreDisplay">0</span></span>
            </div>
            <div class="question-card">
                <div class="question-category" id="qCategory"></div>
                <div class="question-number" id="qNumber">Question 1</div>
                <div class="question-text" id="qText"></div>
                <div class="options" id="optionsContainer"></div>
                <div class="quiz-actions">
                    <button class="confirm-btn" id="confirmBtn" onclick="confirmAnswer()"><i class="fas fa-check"></i> Confirm</button>
                    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next <i class="fas fa-arrow-right"></i></button>
                </div>
            </div>
        </div>

        <!-- Results -->
        <div class="results-screen" id="resultsScreen">
            <div class="results-card">
                <h2>Quiz Complete!</h2>
                <div class="score-circle" id="scoreCircle">
                    <div id="scorePct">0%</div>
                    <span id="scoreLabel">0 / 0</span>
                </div>
                <div class="results-stats">
                    <div class="stat-box stat-correct"><div class="num" id="rCorrect">0</div><div class="label">Correct</div></div>
                    <div class="stat-box stat-wrong"><div class="num" id="rWrong">0</div><div class="label">Wrong</div></div>
                    <div class="stat-box stat-percent"><div class="num" id="rPercent">0%</div><div class="label">Score</div></div>
                </div>
                <div class="results-actions">
                    <button class="retry-btn" onclick="retryQuiz()"><i class="fas fa-redo"></i> Retry Same</button>
                    <button class="new-btn" onclick="resetQuiz()"><i class="fas fa-plus"></i> New Quiz</button>
                </div>
                <div class="review-section">
                    <button class="review-toggle" onclick="toggleReview()"><i class="fas fa-list"></i> Review Answers</button>
                    <div class="review-list" id="reviewList"></div>
                </div>
            </div>
        </div>

        <!-- Print/PDF Container (hidden on screen) -->
        <div class="print-quiz-container" id="printContainer"></div>
    </div>

// ============== QUIZ STATE ==============
let selectedCategories = new Set();
let quizQuestions = [];
let currentIndex = 0;
let score = 0;
let answered = false;
let selectedOption = -1;
let userAnswers = [];

// ============== CATEGORIES ==============
const categoryIcons = {
    "Science": "fa-flask",
    "History": "fa-landmark",
    "Geography": "fa-globe-americas",
    "Math": "fa-calculator",
    "English": "fa-book",
    "Technology": "fa-laptop-code",
    "Sports": "fa-futbol",
    "Music & Arts": "fa-palette",
    "Food": "fa-utensils",
    "Nature": "fa-leaf"
};

function initCategories() {
    const grid = document.getElementById('categoryGrid');
    const cats = [...new Set(allQuestions.map(q => q.c))];
    grid.innerHTML = '';
    cats.forEach(cat => {
        const chip = document.createElement('div');
        chip.className = 'category-chip';
        chip.innerHTML = `<i class="fas ${categoryIcons[cat] || 'fa-circle'}"></i> ${cat}`;
        chip.onclick = () => {
            chip.classList.toggle('selected');
            if (selectedCategories.has(cat)) selectedCategories.delete(cat);
            else selectedCategories.add(cat);
            updateAvailableCount();
        };
        grid.appendChild(chip);
    });
    updateAvailableCount();
}

function updateAvailableCount() {
    const count = allQuestions.filter(q => selectedCategories.has(q.c)).length;
    document.getElementById('availableCount').textContent = count + ' questions available';
    const input = document.getElementById('questionCount');
    input.max = count;
    const val = parseInt(input.value) || 10;
    if (val > count) input.value = Math.max(count, 10);
    if (val < 10) input.value = 10;
    const disabled = count < 10;
    document.getElementById('startBtn').disabled = disabled;
    document.getElementById('printBtn').disabled = disabled;
    document.getElementById('pdfBtn').disabled = disabled;
}

// Enforce min 10 on input
document.getElementById('questionCount').addEventListener('change', function() {
    let v = parseInt(this.value) || 10;
    if (v < 10) v = 10;
    const pool = allQuestions.filter(q => selectedCategories.has(q.c)).length;
    if (v > pool) v = pool;
    if (v < 10) v = 10;
    this.value = v;
});

// ============== SHUFFLE ==============
function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

// ============== START QUIZ ==============
function startQuiz() {
    const pool = allQuestions.filter(q => selectedCategories.has(q.c));
    const count = Math.min(Math.max(parseInt(document.getElementById('questionCount').value) || 10, 10), pool.length);
    if (count < 10 || pool.length < 10) { alert('Select categories with at least 10 questions.'); return; }

    quizQuestions = shuffle(pool).slice(0, count);
    currentIndex = 0;
    score = 0;
    userAnswers = [];

    document.getElementById('setupScreen').style.display = 'none';
    document.getElementById('quizScreen').style.display = 'block';
    document.getElementById('resultsScreen').style.display = 'none';

    showQuestion();
}

// ============== SHOW QUESTION ==============
function showQuestion() {
    answered = false;
    selectedOption = -1;
    const q = quizQuestions[currentIndex];
    const total = quizQuestions.length;

    document.getElementById('progressBar').style.width = ((currentIndex / total) * 100) + '%';
    document.getElementById('questionCounter').textContent = `Question ${currentIndex + 1} of ${total}`;
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('qNumber').textContent = `Question ${currentIndex + 1}`;
    document.getElementById('qCategory').textContent = q.c;
    document.getElementById('qText').textContent = q.q;

    const letters = ['A', 'B', 'C', 'D'];
    const container = document.getElementById('optionsContainer');
    container.innerHTML = '';
    q.o.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerHTML = `<span class="option-letter">${letters[i]}</span><span>${opt}</span>`;
        btn.onclick = () => selectAnswer(i);
        container.appendChild(btn);
    });

    document.getElementById('confirmBtn').style.display = 'none';
    document.getElementById('nextBtn').style.display = 'none';
}

// ============== SELECT ANSWER (just highlight, don't confirm yet) ==============
function selectAnswer(index) {
    if (answered) return;
    selectedOption = index;

    const btns = document.querySelectorAll('.option-btn');
    btns.forEach(b => b.classList.remove('selected'));
    btns[index].classList.add('selected');

    document.getElementById('confirmBtn').style.display = 'inline-flex';
}

// ============== CONFIRM ANSWER ==============
function confirmAnswer() {
    if (answered || selectedOption === -1) return;
    answered = true;

    const q = quizQuestions[currentIndex];
    const btns = document.querySelectorAll('.option-btn');

    btns.forEach(b => b.classList.add('disabled'));
    btns[selectedOption].classList.remove('selected');
    btns[q.a].classList.add('correct');

    if (selectedOption === q.a) {
        score++;
    } else {
        btns[selectedOption].classList.add('wrong');
    }

    userAnswers.push({ question: q, selected: selectedOption });
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('confirmBtn').style.display = 'none';
    document.getElementById('nextBtn').style.display = 'inline-flex';
    document.getElementById('nextBtn').textContent = currentIndex === quizQuestions.length - 1 ? 'See Results' : 'Next';
}

// ============== NEXT QUESTION ==============
function nextQuestion() {
    currentIndex++;
    if (currentIndex >= quizQuestions.length) {
        showResults();
    } else {
        showQuestion();
    }
}

// ============== RESULTS ==============
function showResults() {
    document.getElementById('quizScreen').style.display = 'none';
    document.getElementById('resultsScreen').style.display = 'block';

    const total = quizQuestions.length;
    const pct = Math.round((score / total) * 100);
    const wrong = total - score;

    const circle = document.getElementById('scoreCircle');
    circle.className = 'score-circle ' + (pct >= 80 ? 'score-great' : pct >= 50 ? 'score-good' : 'score-bad');
    document.getElementById('scorePct').textContent = pct + '%';
    document.getElementById('scoreLabel').textContent = score + ' / ' + total;
    document.getElementById('rCorrect').textContent = score;
    document.getElementById('rWrong').textContent = wrong;
    document.getElementById('rPercent').textContent = pct + '%';

    // Build review
    const reviewList = document.getElementById('reviewList');
    reviewList.innerHTML = '';
    reviewList.classList.remove('show');
    userAnswers.forEach((ua, i) => {
        const correct = ua.selected === ua.question.a;
        const div = document.createElement('div');
        div.className = 'review-item ' + (correct ? 'was-correct' : 'was-wrong');
        div.innerHTML = `
            <div class="ri-q">${i + 1}. ${ua.question.q}</div>
            <div class="ri-a">Correct: <strong>${ua.question.o[ua.question.a]}</strong></div>
            ${!correct ? `<div class="ri-your">Your answer: ${ua.question.o[ua.selected]}</div>` : ''}
        `;
        reviewList.appendChild(div);
    });
}

function toggleReview() {
    document.getElementById('reviewList').classList.toggle('show');
}

// ============== RETRY / RESET ==============
function retryQuiz() {
    currentIndex = 0;
    score = 0;
    userAnswers = [];
    document.getElementById('resultsScreen').style.display = 'none';
    document.getElementById('quizScreen').style.display = 'block';
    quizQuestions = shuffle(quizQuestions);
    showQuestion();
}

function resetQuiz() {
    document.getElementById('setupScreen').style.display = 'block';
    document.getElementById('quizScreen').style.display = 'none';
    document.getElementById('resultsScreen').style.display = 'none';
    initCategories();
}

// ============== PRINT / PDF ==============
function buildPrintHTML() {
    const pool = allQuestions.filter(q => selectedCategories.has(q.c));
    const count = Math.min(Math.max(parseInt(document.getElementById('questionCount').value) || 10, 10), pool.length);
    if (pool.length < 10) { alert('Select categories with at least 10 questions.'); return null; }

    const questions = shuffle(pool).slice(0, count);
    const letters = ['A', 'B', 'C', 'D'];
    const cats = [...new Set(questions.map(q => q.c))].join(', ');
    const date = new Date().toLocaleDateString();

    let html = `<h1>Quiz</h1>`;
    html += `<div class="print-meta">${count} Questions &bull; Categories: ${cats} &bull; ${date}</div>`;
    html += `<div class="print-name-line">Name:<span></span> &nbsp;&nbsp;&nbsp; Score: _____ / ${count}</div>`;

    questions.forEach((q, i) => {
        html += `<div class="print-q">`;
        html += `<div class="pq-text">${i + 1}. ${q.q}</div>`;
        html += `<div class="pq-options">`;
        q.o.forEach((opt, j) => {
            html += `<div class="pq-opt"><span class="pq-circle"></span><span class="pq-letter">${letters[j]}.</span> ${opt}</div>`;
        });
        html += `</div></div>`;
    });

    html += `<div class="print-answer-key"><h2>Answer Key</h2>`;
    html += `<div class="print-answers-grid">`;
    questions.forEach((q, i) => {
        html += `<div class="pa-item"><span class="pa-num">${i + 1}.</span> ${letters[q.a]}</div>`;
    });
    html += `</div></div>`;

    return html;
}

function printQuiz() {
    const html = buildPrintHTML();
    if (!html) return;
    document.getElementById('printContainer').innerHTML = html;
    setTimeout(() => { window.print(); }, 100);
}

    const html = buildPrintHTML();
    if (!html) return;

    const container = document.getElementById('printContainer');

    container.style.display = 'block';
    container.style.background = 'white';
    container.style.color = 'black';

    container.querySelectorAll('.pq-text').forEach(el => el.style.color = 'black');

    container.querySelectorAll('h1').forEach(el => { el.style.color = 'black'; el.style.textAlign = 'center'; el.style.fontSize = '22px'; });

    container.querySelectorAll('.pq-letter').forEach(el => { el.style.fontWeight = '600'; el.style.minWidth = '16px'; });
    container.querySelectorAll('.print-answers-grid').forEach(el => { el.style.display = 'grid'; el.style.gridTemplateColumns = 'repeat(5, 1fr)'; el.style.gap = '4px 12px'; el.style.fontSize = '12px'; });
    container.querySelectorAll('.pa-num').forEach(el => { el.style.fontWeight = '600'; el.style.minWidth = '28px'; });
    container.querySelectorAll('.pa-item').forEach(el => { el.style.display = 'flex'; el.style.gap = '4px'; });
    container.querySelectorAll('.print-name-line').forEach(el => { el.style.margin = '16px 0'; el.style.fontSize = '14px'; el.style.color = 'black'; });
    container.querySelectorAll('.print-name-line span').forEach(el => { el.style.display = 'inline-block'; el.style.borderBottom = '1px solid #333'; el.style.width = '250px'; el.style.marginLeft = '8px'; });
    container.querySelectorAll('.print-answer-key').forEach(el => { el.style.paddingTop = '30px'; el.style.marginTop = '30px'; el.style.borderTop = '2px dashed #999'; });

    const count = container.querySelectorAll('.print-q').length;
    html2pdf().set({
        margin: [10, 10, 10, 10],
        filename: `quiz-${count}q-${Date.now()}.pdf`,
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
        pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
    }).from(container).save().then(() => {
        container.style.display = 'none';
        container.innerHTML = '';
    });
}

// ============== INIT ==============
initCategories();
</script>
</body>
</html>
