<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Recorder | Tools Hub</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f172a;--panel:#1e293b;--s2:#334155;--border:#334155;--text:#e2e8f0;--t2:#94a3b8;--t3:#64748b;--fuchsia:#c026d3;--fuchsia-d:rgba(192,38,211,.12);--fuchsia-g:rgba(192,38,211,.3);--green:#10b981;--red:#ef4444;--amber:#f59e0b;--r:10px}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

.header{background:linear-gradient(135deg,#86198f,#c026d3,#e879f9);padding:1.5rem 2rem;display:flex;align-items:center;gap:1rem;box-shadow:0 4px 20px rgba(192,38,211,.3);position:sticky;top:0;z-index:100}
.back-btn{display:flex;align-items:center;gap:.5rem;color:#fff;text-decoration:none;font-weight:500;padding:.5rem 1rem;border-radius:8px;background:rgba(255,255,255,.15);transition:background .2s;font-size:.9rem}
.back-btn:hover{background:rgba(255,255,255,.25)}
.header-title{display:flex;align-items:center;gap:.75rem;flex:1}
.header-title i{font-size:1.5rem;color:#fff}
.header-title h1{font-size:1.5rem;font-weight:700;color:#fff}

.main{max-width:800px;margin:0 auto;padding:2rem}

/* Record section */
.record-section{text-align:center;margin-bottom:2rem}
.mic-wrap{position:relative;width:140px;height:140px;margin:0 auto 1.5rem}
.mic-ring{position:absolute;inset:0;border-radius:50%;border:3px solid var(--border);transition:all .3s}
.mic-ring.active{border-color:var(--red);animation:ring-pulse 1.5s ease-in-out infinite}
@keyframes ring-pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.15);opacity:.4}}
.mic-ring2{position:absolute;inset:-12px;border-radius:50%;border:2px solid transparent;transition:all .3s}
.mic-ring2.active{border-color:rgba(239,68,68,.3);animation:ring-pulse 1.5s ease-in-out infinite .3s}
.mic-btn{width:100%;height:100%;border-radius:50%;background:var(--panel);border:3px solid var(--border);color:var(--t2);font-size:3rem;cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;z-index:2;transition:all .3s}
.mic-btn:hover{border-color:var(--fuchsia);color:var(--fuchsia);transform:scale(1.05)}
.mic-btn.recording{background:rgba(239,68,68,.15);border-color:var(--red);color:var(--red)}
.mic-btn.paused{border-color:var(--amber);color:var(--amber)}
.mic-label{font-size:.95rem;color:var(--t3);margin-bottom:.5rem}
.mic-label.recording{color:var(--red);font-weight:600}
.mic-label.paused{color:var(--amber);font-weight:600}
.timer{font-family:'JetBrains Mono',monospace;font-size:2rem;font-weight:600;color:var(--text);margin-bottom:1rem;letter-spacing:.05em}
.timer.recording{color:var(--red)}

.record-controls{display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap}
.ctrl-btn{display:flex;align-items:center;justify-content:center;gap:.5rem;padding:.7rem 1.25rem;border-radius:var(--r);font-family:'Outfit',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;border:none;transition:all .2s}
.ctrl-btn:active{transform:scale(.97)}
.ctrl-btn.primary{background:var(--fuchsia);color:#fff}
.ctrl-btn.primary:hover{filter:brightness(1.1)}
.ctrl-btn.secondary{background:var(--panel);border:1px solid var(--border);color:var(--t2)}
.ctrl-btn.secondary:hover{background:var(--s2);color:var(--text)}
.ctrl-btn.danger{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:var(--red)}
.ctrl-btn.danger:hover{background:rgba(239,68,68,.25)}
.ctrl-btn:disabled{opacity:.3;pointer-events:none}
.ctrl-btn i{font-size:.85rem}

/* Visualizer */
.viz-wrap{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:1rem;margin-bottom:1.5rem;overflow:hidden}
.viz-canvas{width:100%;height:80px;display:block}

/* Recordings list */
.recordings-section{margin-top:1.5rem}
.section-title{font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);margin-bottom:.75rem;display:flex;align-items:center;gap:.5rem}
.section-title i{color:var(--fuchsia)}

.recording-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;margin-bottom:.75rem;overflow:hidden;transition:border-color .15s}
.recording-card:hover{border-color:var(--fuchsia)}
.rec-header{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;border-bottom:1px solid var(--border)}
.rec-name{flex:1;font-size:.9rem;font-weight:500;background:none;border:none;color:var(--text);font-family:'Outfit',sans-serif;outline:none;min-width:0}
.rec-name:focus{color:var(--fuchsia)}
.rec-date{font-size:.7rem;color:var(--t3);font-family:'JetBrains Mono',monospace;white-space:nowrap}
.rec-duration{font-size:.7rem;color:var(--fuchsia);font-family:'JetBrains Mono',monospace;white-space:nowrap}

/* Player */
.rec-player{padding:.75rem 1rem;display:flex;align-items:center;gap:.75rem}
.play-btn{width:36px;height:36px;border-radius:50%;background:var(--fuchsia);color:#fff;border:none;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.play-btn:hover{filter:brightness(1.15);transform:scale(1.05)}
.waveform-bar{flex:1;height:40px;position:relative;cursor:pointer}
.waveform-bar canvas{width:100%;height:100%;display:block;border-radius:4px}
.playhead{position:absolute;top:0;left:0;width:2px;height:100%;background:var(--fuchsia);transition:left .05s linear;pointer-events:none}
.time-label{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--t3);min-width:3rem;text-align:right}

/* Editor */
.rec-editor{padding:.75rem 1rem;border-top:1px solid var(--border);display:none}
.rec-editor.open{display:block}
.editor-row{display:flex;gap:.75rem;align-items:center;margin-bottom:.6rem;flex-wrap:wrap}
.editor-label{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--t3);min-width:4rem}
.editor-slider{flex:1;-webkit-appearance:none;appearance:none;height:4px;background:var(--border);border-radius:2px;outline:none;min-width:100px}
.editor-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--fuchsia);cursor:pointer}
.editor-val{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--fuchsia);min-width:2.5rem;text-align:right}

.trim-row{display:flex;gap:.5rem;align-items:center}
.trim-input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:.35rem .5rem;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:.75rem;width:60px;text-align:center;outline:none}
.trim-input:focus{border-color:var(--fuchsia)}

/* Actions */
.rec-actions{display:flex;gap:.4rem;padding:.6rem 1rem;border-top:1px solid var(--border);flex-wrap:wrap}
.act-btn{background:none;border:none;color:var(--t3);cursor:pointer;padding:.4rem .6rem;border-radius:6px;font-size:.75rem;font-family:'Outfit',sans-serif;font-weight:500;display:flex;align-items:center;gap:.35rem;transition:all .15s}
.act-btn:hover{background:var(--s2);color:var(--text)}
.act-btn.del:hover{color:var(--red)}

.empty-msg{text-align:center;padding:2.5rem;color:var(--t3);font-size:.9rem}
.empty-msg i{font-size:2rem;display:block;margin-bottom:.75rem;color:var(--border)}

.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(100px);background:var(--panel);border:1px solid var(--fuchsia);color:var(--text);padding:.75rem 1.5rem;border-radius:12px;font-family:'Outfit',sans-serif;font-size:.9rem;z-index:1000;transition:transform .3s;box-shadow:0 8px 30px rgba(0,0,0,.4)}
.toast.show{transform:translateX(-50%) translateY(0)}

@media(max-width:600px){
.main{padding:1rem}
.header{padding:1rem}
.header-title h1{font-size:1.2rem}
.mic-wrap{width:110px;height:110px}
.mic-btn{font-size:2.2rem}
.timer{font-size:1.5rem}
}
</style>
</head>
<body>

<div class="header">
  <a href="../Tools.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
  <div class="header-title">
    <i class="fas fa-microphone-alt"></i>
    <h1>Voice Recorder</h1>
  </div>
</div>

<div class="main">
  <!-- Visualizer -->
  <div class="viz-wrap">
    <canvas class="viz-canvas" id="vizCanvas"></canvas>
  </div>

  <!-- Record -->
  <div class="record-section">
    <div class="timer" id="timer">00:00.0</div>
    <div class="mic-wrap">
      <div class="mic-ring" id="micRing"></div>
      <div class="mic-ring2" id="micRing2"></div>
      <button class="mic-btn" id="micBtn" onclick="toggleRecord()">
        <i class="fas fa-microphone" id="micIcon"></i>
      </button>
    </div>
    <div class="mic-label" id="micLabel">Click to start recording</div>
    <div class="record-controls">
      <button class="ctrl-btn secondary" id="pauseBtn" disabled onclick="togglePause()"><i class="fas fa-pause"></i> Pause</button>
      <button class="ctrl-btn danger" id="stopBtn" disabled onclick="stopRecording()"><i class="fas fa-stop"></i> Stop & View</button>
    </div>
  </div>

  <!-- Recordings -->
  <div class="recordings-section">
    <div class="section-title"><i class="fas fa-list"></i> Recordings</div>
    <div id="recordingsList">
      <div class="empty-msg" id="emptyMsg"><i class="fas fa-microphone-lines"></i>No recordings yet. Hit the mic to start.</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var mediaRecorder = null;
var audioChunks = [];
var stream = null;
var isRecording = false;
var isPaused = false;
var startTime = 0;
var elapsed = 0;
var timerInterval = null;
var recordings = [];
var playingAudio = null;
var playingId = null;
var animFrame = null;

// Audio context for visualizer
var audioCtx = null;
var analyser = null;
var vizCanvas = document.getElementById('vizCanvas');
var vizCtx = vizCanvas.getContext('2d');

function resizeViz() {
  vizCanvas.width = vizCanvas.offsetWidth * 2;
  vizCanvas.height = vizCanvas.offsetHeight * 2;
}
resizeViz();
window.addEventListener('resize', resizeViz);

// ═══════════════════════
// RECORDING
// ═══════════════════════
async function toggleRecord() {
  if (isRecording) return;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch(e) {
    toast('Microphone access denied');
    return;
  }

  // Setup visualizer
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  var source = audioCtx.createMediaStreamSource(stream);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  source.connect(analyser);
  drawViz();

  audioChunks = [];
  mediaRecorder = new MediaRecorder(stream);
  mediaRecorder.ondataavailable = function(e) { if (e.data.size > 0) audioChunks.push(e.data); };
  mediaRecorder.onstop = function() { setTimeout(finishRecording, 100); };
  mediaRecorder.start(200); // collect chunks every 200ms

  isRecording = true;
  isPaused = false;
  startTime = Date.now();
  elapsed = 0;
  timerInterval = setInterval(updateTimer, 50);

  updateRecordUI();
}

function togglePause() {
  if (!isRecording) return;
  if (isPaused) {
    mediaRecorder.resume();
    isPaused = false;
    startTime = Date.now() - elapsed;
    timerInterval = setInterval(updateTimer, 50);
  } else {
    mediaRecorder.pause();
    isPaused = true;
    elapsed = Date.now() - startTime;
    clearInterval(timerInterval);
  }
  updateRecordUI();
}

function stopRecording() {
  if (!isRecording) return;
  // Capture elapsed time before stopping
  if (!isPaused) elapsed = Date.now() - startTime;
  clearInterval(timerInterval);
  isRecording = false;
  isPaused = false;
  mediaRecorder.stop();
  stream.getTracks().forEach(function(t) { t.stop(); });
  cancelAnimationFrame(animFrame);
  clearViz();
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  updateRecordUI();
}

function finishRecording() {
  if (!audioChunks.length) return;
  var blob = new Blob(audioChunks, { type: 'audio/webm' });
  audioChunks = []; // clear for next recording
  var url = URL.createObjectURL(blob);
  var duration = elapsed;

  var rec = {
    id: Date.now(),
    name: 'Recording ' + (recordings.length + 1),
    blob: blob,
    url: url,
    duration: duration,
    date: new Date().toLocaleString(),
    pitch: 1,
    speed: 1,
    volume: 1,
    trimStart: 0,
    trimEnd: duration / 1000
  };

  recordings.push(rec);
  renderRecordings();
  document.getElementById('timer').textContent = '00:00.0';
  toast('Recording saved!');
}

function updateTimer() {
  elapsed = Date.now() - startTime;
  var s = elapsed / 1000;
  var m = Math.floor(s / 60);
  s = s % 60;
  document.getElementById('timer').textContent =
    String(m).padStart(2, '0') + ':' + s.toFixed(1).padStart(4, '0');
}

function updateRecordUI() {
  var btn = document.getElementById('micBtn');
  var icon = document.getElementById('micIcon');
  var label = document.getElementById('micLabel');
  var ring = document.getElementById('micRing');
  var ring2 = document.getElementById('micRing2');
  var timer = document.getElementById('timer');
  var pauseBtn = document.getElementById('pauseBtn');
  var stopBtn = document.getElementById('stopBtn');

  btn.classList.toggle('recording', isRecording && !isPaused);
  btn.classList.toggle('paused', isPaused);
  ring.classList.toggle('active', isRecording && !isPaused);
  ring2.classList.toggle('active', isRecording && !isPaused);
  timer.classList.toggle('recording', isRecording && !isPaused);

  if (isRecording && !isPaused) {
    icon.className = 'fas fa-circle';
    label.textContent = 'Recording...';
    label.className = 'mic-label recording';
  } else if (isPaused) {
    icon.className = 'fas fa-pause';
    label.textContent = 'Paused';
    label.className = 'mic-label paused';
  } else {
    icon.className = 'fas fa-microphone';
    label.textContent = 'Click to start recording';
    label.className = 'mic-label';
  }

  pauseBtn.disabled = !isRecording;
  stopBtn.disabled = !isRecording;
  pauseBtn.innerHTML = isPaused ? '<i class="fas fa-play"></i> Resume' : '<i class="fas fa-pause"></i> Pause';
}

// ═══════════════════════
// VISUALIZER
// ═══════════════════════
function drawViz() {
  animFrame = requestAnimationFrame(drawViz);
  if (!analyser) return;
  var bufLen = analyser.frequencyBinCount;
  var data = new Uint8Array(bufLen);
  analyser.getByteFrequencyData(data);

  var w = vizCanvas.width, h = vizCanvas.height;
  vizCtx.fillStyle = '#1e293b';
  vizCtx.fillRect(0, 0, w, h);

  var barW = (w / bufLen) * 2;
  var x = 0;
  for (var i = 0; i < bufLen; i++) {
    var barH = (data[i] / 255) * h * 0.9;
    var hue = 280 + (data[i] / 255) * 40;
    vizCtx.fillStyle = 'hsl(' + hue + ',70%,' + (40 + data[i] / 255 * 30) + '%)';
    vizCtx.fillRect(x, h - barH, barW - 1, barH);
    x += barW;
  }
}

function clearViz() {
  var w = vizCanvas.width, h = vizCanvas.height;
  vizCtx.fillStyle = '#1e293b';
  vizCtx.fillRect(0, 0, w, h);
  // Draw flat line
  vizCtx.strokeStyle = '#334155';
  vizCtx.lineWidth = 1;
  vizCtx.beginPath();
  vizCtx.moveTo(0, h / 2);
  vizCtx.lineTo(w, h / 2);
  vizCtx.stroke();
}
clearViz();

// ═══════════════════════
// RECORDINGS LIST
// ═══════════════════════
function renderRecordings() {
  var list = document.getElementById('recordingsList');
  if (!recordings.length) {
    list.innerHTML = '<div class="empty-msg"><i class="fas fa-microphone-lines"></i>No recordings yet. Hit the mic to start.</div>';
    return;
  }

  list.innerHTML = recordings.map(function(rec) {
    var durSec = rec.duration / 1000;
    var durStr = Math.floor(durSec / 60) + ':' + (durSec % 60).toFixed(1).padStart(4, '0');
    return '<div class="recording-card" id="card-' + rec.id + '">' +
      '<div class="rec-header">' +
        '<input class="rec-name" value="' + escAttr(rec.name) + '" onchange="renameRec(' + rec.id + ',this.value)">' +
        '<span class="rec-duration">' + durStr + '</span>' +
        '<span class="rec-date">' + rec.date + '</span>' +
      '</div>' +
      '<div class="rec-player">' +
        '<button class="play-btn" id="play-' + rec.id + '" onclick="togglePlay(' + rec.id + ')"><i class="fas fa-play"></i></button>' +
        '<div class="waveform-bar" id="wave-' + rec.id + '" onclick="seekAudio(event,' + rec.id + ')"><canvas id="wavecanvas-' + rec.id + '"></canvas><div class="playhead" id="playhead-' + rec.id + '"></div></div>' +
        '<span class="time-label" id="time-' + rec.id + '">0:00</span>' +
      '</div>' +
      '<div class="rec-actions">' +
        '<button class="act-btn" onclick="toggleEditor(' + rec.id + ')"><i class="fas fa-sliders"></i> Edit</button>' +
        '<button class="act-btn" onclick="downloadRec(' + rec.id + ')"><i class="fas fa-download"></i> Download</button>' +
        '<button class="act-btn" onclick="shareRec(' + rec.id + ')"><i class="fas fa-share-nodes"></i> Share</button>' +
        '<button class="act-btn del" onclick="deleteRec(' + rec.id + ')"><i class="fas fa-trash"></i> Delete</button>' +
      '</div>' +
      '<div class="rec-editor" id="editor-' + rec.id + '">' +
        '<div class="editor-row"><span class="editor-label">Speed</span><input type="range" class="editor-slider" min="0.5" max="2" step="0.05" value="' + rec.speed + '" oninput="updateEffect(' + rec.id + ',\'speed\',this.value)"><span class="editor-val" id="speed-val-' + rec.id + '">' + rec.speed + 'x</span></div>' +
        '<div class="editor-row"><span class="editor-label">Pitch</span><input type="range" class="editor-slider" min="0.5" max="2" step="0.05" value="' + rec.pitch + '" oninput="updateEffect(' + rec.id + ',\'pitch\',this.value)"><span class="editor-val" id="pitch-val-' + rec.id + '">' + rec.pitch + 'x</span></div>' +
        '<div class="editor-row"><span class="editor-label">Volume</span><input type="range" class="editor-slider" min="0" max="2" step="0.05" value="' + rec.volume + '" oninput="updateEffect(' + rec.id + ',\'volume\',this.value)"><span class="editor-val" id="volume-val-' + rec.id + '">' + Math.round(rec.volume * 100) + '%</span></div>' +
        '<div class="editor-row"><span class="editor-label">Trim</span><div class="trim-row"><input class="trim-input" value="' + rec.trimStart.toFixed(1) + '" onchange="updateTrim(' + rec.id + ',\'start\',this.value)"><span style="color:var(--t3);font-size:.75rem">to</span><input class="trim-input" value="' + rec.trimEnd.toFixed(1) + '" onchange="updateTrim(' + rec.id + ',\'end\',this.value)"><span style="color:var(--t3);font-size:.7rem">sec</span><button class="ctrl-btn secondary" style="padding:.3rem .6rem;font-size:.72rem" onclick="applyTrim(' + rec.id + ')"><i class="fas fa-scissors"></i> Apply Trim</button></div></div>' +
      '</div>' +
    '</div>';
  }).join('');

  // Draw waveforms
  recordings.forEach(function(rec) { drawWaveform(rec); });
}

// ═══════════════════════
// WAVEFORM
// ═══════════════════════
async function drawWaveform(rec) {
  var canvas = document.getElementById('wavecanvas-' + rec.id);
  if (!canvas) return;
  canvas.width = canvas.offsetWidth * 2;
  canvas.height = canvas.offsetHeight * 2;
  var ctx = canvas.getContext('2d');
  var w = canvas.width, h = canvas.height;

  try {
    var actx = new (window.AudioContext || window.webkitAudioContext)();
    var buf = await rec.blob.arrayBuffer();
    var audio = await actx.decodeAudioData(buf);
    var data = audio.getChannelData(0);
    actx.close();

    var step = Math.ceil(data.length / w);
    ctx.fillStyle = '#1e293b';
    ctx.fillRect(0, 0, w, h);

    for (var i = 0; i < w; i++) {
      var min = 1, max = -1;
      for (var j = 0; j < step; j++) {
        var d = data[i * step + j] || 0;
        if (d < min) min = d;
        if (d > max) max = d;
      }
      var y1 = (1 + min) * h / 2;
      var y2 = (1 + max) * h / 2;
      ctx.fillStyle = '#c026d3';
      ctx.fillRect(i, y1, 1, y2 - y1 || 1);
    }
  } catch(e) {
    ctx.fillStyle = '#1e293b';
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = '#334155';
    ctx.fillRect(0, h / 2 - 1, w, 2);
  }
}

// ═══════════════════════
// PLAYBACK
// ═══════════════════════
function togglePlay(id) {
  var rec = recordings.find(function(r) { return r.id === id; });
  if (!rec) return;

  if (playingId === id && playingAudio && !playingAudio.paused) {
    playingAudio.pause();
    document.getElementById('play-' + id).innerHTML = '<i class="fas fa-play"></i>';
    return;
  }

  // Stop any playing
  if (playingAudio) { playingAudio.pause(); if (playingId) document.getElementById('play-' + playingId).innerHTML = '<i class="fas fa-play"></i>'; }

  playingAudio = new Audio(rec.url);
  playingAudio.playbackRate = rec.speed;
  playingAudio.volume = Math.min(rec.volume, 1);
  playingId = id;

  if (rec.trimStart > 0) playingAudio.currentTime = rec.trimStart;

  playingAudio.play();
  document.getElementById('play-' + id).innerHTML = '<i class="fas fa-pause"></i>';

  function updatePlayhead() {
    if (!playingAudio || playingAudio.paused) return;
    var cur = playingAudio.currentTime;
    var dur = playingAudio.duration || rec.duration / 1000;

    // Stop at trim end
    if (rec.trimEnd && cur >= rec.trimEnd) {
      playingAudio.pause();
      document.getElementById('play-' + id).innerHTML = '<i class="fas fa-play"></i>';
      return;
    }

    var pct = (cur / dur) * 100;
    var ph = document.getElementById('playhead-' + id);
    if (ph) ph.style.left = pct + '%';
    var tl = document.getElementById('time-' + id);
    if (tl) tl.textContent = Math.floor(cur / 60) + ':' + (cur % 60).toFixed(0).padStart(2, '0');
    requestAnimationFrame(updatePlayhead);
  }
  updatePlayhead();

  playingAudio.onended = function() {
    document.getElementById('play-' + id).innerHTML = '<i class="fas fa-play"></i>';
    var ph = document.getElementById('playhead-' + id);
    if (ph) ph.style.left = '0';
  };
}

function seekAudio(e, id) {
  var rec = recordings.find(function(r) { return r.id === id; });
  if (!rec) return;
  var bar = e.currentTarget;
  var rect = bar.getBoundingClientRect();
  var pct = (e.clientX - rect.left) / rect.width;
  if (playingAudio && playingId === id) {
    playingAudio.currentTime = pct * (playingAudio.duration || rec.duration / 1000);
  }
}

// ═══════════════════════
// EDITOR
// ═══════════════════════
function toggleEditor(id) {
  var el = document.getElementById('editor-' + id);
  if (el) el.classList.toggle('open');
}

function updateEffect(id, prop, val) {
  var rec = recordings.find(function(r) { return r.id === id; });
  if (!rec) return;
  val = parseFloat(val);
  rec[prop] = val;
  if (prop === 'speed') document.getElementById('speed-val-' + id).textContent = val.toFixed(2) + 'x';
  if (prop === 'pitch') document.getElementById('pitch-val-' + id).textContent = val.toFixed(2) + 'x';
  if (prop === 'volume') document.getElementById('volume-val-' + id).textContent = Math.round(val * 100) + '%';
  // Apply to playing audio
  if (playingAudio && playingId === id) {
    if (prop === 'speed') playingAudio.playbackRate = val;
    if (prop === 'volume') playingAudio.volume = Math.min(val, 1);
  }
}

function updateTrim(id, which, val) {
  var rec = recordings.find(function(r) { return r.id === id; });
  if (!rec) return;
  val = parseFloat(val) || 0;
  if (which === 'start') rec.trimStart = Math.max(0, val);
  else rec.trimEnd = val;
}

async function applyTrim(id) {
  var rec = recordings.find(function(r) { return r.id === id; });
  if (!rec) return;
  try {
    var actx = new (window.AudioContext || window.webkitAudioContext)();
    var buf = await rec.blob.arrayBuffer();
    var audio = await actx.decodeAudioData(buf);

    var start = Math.max(0, Math.floor(rec.trimStart * audio.sampleRate));
    var end = Math.min(audio.length, Math.floor(rec.trimEnd * audio.sampleRate));
    if (end <= start) { toast('Invalid trim range'); actx.close(); return; }

    var trimmed = actx.createBuffer(audio.numberOfChannels, end - start, audio.sampleRate);
    for (var ch = 0; ch < audio.numberOfChannels; ch++) {
      var src = audio.getChannelData(ch);
      var dst = trimmed.getChannelData(ch);
      for (var i = 0; i < dst.length; i++) dst[i] = src[start + i];
    }

    // Encode back to wav blob
    var wavBlob = audioBufferToWav(trimmed);
    rec.blob = wavBlob;
    rec.url = URL.createObjectURL(wavBlob);
    rec.duration = (end - start) / audio.sampleRate * 1000;
    rec.trimStart = 0;
    rec.trimEnd = rec.duration / 1000;
    actx.close();

    renderRecordings();
    toast('Trim applied!');
  } catch(e) {
    toast('Trim failed: ' + e.message);
  }
}

// WAV encoder
function audioBufferToWav(buffer) {
  var numCh = buffer.numberOfChannels;
  var sr = buffer.sampleRate;
  var len = buffer.length * numCh * 2 + 44;
  var buf = new ArrayBuffer(len);
  var view = new DataView(buf);
  var pos = 0;
  function w(s) { for (var i = 0; i < s.length; i++) view.setUint8(pos++, s.charCodeAt(i)); }
  function u16(v) { view.setUint16(pos, v, true); pos += 2; }
  function u32(v) { view.setUint32(pos, v, true); pos += 4; }
  w('RIFF'); u32(len - 8); w('WAVE'); w('fmt '); u32(16); u16(1); u16(numCh); u32(sr); u32(sr * numCh * 2); u16(numCh * 2); u16(16); w('data'); u32(len - 44);
  for (var i = 0; i < buffer.length; i++) {
    for (var ch = 0; ch < numCh; ch++) {
      var s = Math.max(-1, Math.min(1, buffer.getChannelData(ch)[i]));
      view.setInt16(pos, s < 0 ? s * 32768 : s * 32767, true);
      pos += 2;
    }
  }
  return new Blob([buf], { type: 'audio/wav' });
}

// ═══════════════════════
// ACTIONS
// ═══════════════════════
function renameRec(id, name) {
  var rec = recordings.find(function(r) { return r.id === id; });
  if (rec) rec.name = name;
}

function downloadRec(id) {
  var rec = recordings.find(function(r) { return r.id === id; });
  if (!rec) return;
  var a = document.createElement('a');
  a.href = rec.url;
  a.download = rec.name + (rec.blob.type.includes('wav') ? '.wav' : '.webm');
  a.click();
  toast('Downloaded ' + rec.name);
}

function shareRec(id) {
  var rec = recordings.find(function(r) { return r.id === id; });
  if (!rec) return;
  if (navigator.share) {
    var file = new File([rec.blob], rec.name + '.webm', { type: rec.blob.type });
    navigator.share({ files: [file], title: rec.name }).catch(function() {});
  } else {
    downloadRec(id);
    toast('Sharing not supported — downloaded instead');
  }
}

function duplicateRec(id) {
  var rec = recordings.find(function(r) { return r.id === id; });
  if (!rec) return;
  var copy = Object.assign({}, rec);
  copy.id = Date.now();
  copy.name = rec.name + ' (copy)';
  copy.url = URL.createObjectURL(rec.blob);
  recordings.unshift(copy);
  renderRecordings();
  toast('Duplicated');
}

function deleteRec(id) {
  if (!confirm('Delete this recording?')) return;
  recordings = recordings.filter(function(r) { return r.id !== id; });
  if (playingId === id && playingAudio) { playingAudio.pause(); playingAudio = null; playingId = null; }
  renderRecordings();
  toast('Deleted');
}

// ═══════════════════════
// HELPERS
// ═══════════════════════
function escAttr(s) { return s.replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}

// ═══════════════════════
// INDEXED DB
// ═══════════════════════
var vdb = null;
function openVDB(cb) {
  var req = indexedDB.open('VoiceRecorderDB', 1);
  req.onupgradeneeded = function(e) {
    var d = e.target.result;
    if (!d.objectStoreNames.contains('recordings')) d.createObjectStore('recordings', { keyPath: 'id' });
  };
  req.onsuccess = function(e) { vdb = e.target.result; if (cb) cb(); };
  req.onerror = function() { if (cb) cb(); };
}

function saveAllToDB() {
  if (!vdb) return;
  var tx = vdb.transaction('recordings', 'readwrite');
  var store = tx.objectStore('recordings');
  store.clear();
  recordings.forEach(function(rec) {
    store.put({
      id: rec.id,
      name: rec.name,
      blob: rec.blob,
      duration: rec.duration,
      date: rec.date,
      pitch: rec.pitch,
      speed: rec.speed,
      volume: rec.volume,
      trimStart: rec.trimStart,
      trimEnd: rec.trimEnd
    });
  });
}

function loadFromDB(cb) {
  if (!vdb) { cb(); return; }
  var tx = vdb.transaction('recordings', 'readonly');
  var req = tx.objectStore('recordings').getAll();
  req.onsuccess = function() {
    var items = req.result || [];
    if (items.length) {
      recordings = items.map(function(item) {
        item.url = URL.createObjectURL(item.blob);
        return item;
      }).sort(function(a, b) { return a.id - b.id; });
      renderRecordings();
    }
    cb();
  };
  req.onerror = function() { cb(); };
}

// Auto-save to DB after any change
var _origFinish = finishRecording;
var _saveTimer = null;
function scheduleSave() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(saveAllToDB, 500);
}

// Patch functions to auto-save
var _origRender = renderRecordings;
renderRecordings = function() {
  _origRender();
  scheduleSave();
};

// Init
openVDB(function() { loadFromDB(function() {}); });
</script>
</body>
