<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            display: flex;
            align-items: center;
            padding: 14px 24px;
            background: #1e293b;
            border-bottom: 1px solid #334155;
            gap: 16px;
        }
        .back-btn {
            background: none;
            border: 1px solid #475569;
            color: #94a3b8;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .back-btn:hover { background: #334155; color: #e2e8f0; }
        .header h1 { font-size: 1.3rem; color: #818cf8; font-weight: 700; }

        .calc-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px;
        }
        .calculator {
            width: 380px;
            background: #1e293b;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(99,102,241,0.1);
        }

        /* Display */
        .display {
            padding: 28px 28px 20px;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            min-height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end;
            position: relative;
        }
        .display::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20px; right: 20px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #334155, transparent);
        }
        .history-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            color: #64748b;
            min-height: 24px;
            word-break: break-all;
            text-align: right;
            margin-bottom: 8px;
        }
        .main-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2.8rem;
            font-weight: 700;
            color: #f1f5f9;
            word-break: break-all;
            text-align: right;
            line-height: 1.1;
            transition: font-size 0.15s;
        }
        .main-display.small { font-size: 2rem; }
        .main-display.smaller { font-size: 1.5rem; }

        /* Buttons */
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1px;
            padding: 12px;
            gap: 8px;
        }
        .btn {
            height: 64px;
            border: none;
            border-radius: 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.25rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }
        .btn:active { transform: scale(0.95); }

        .btn-num {
            background: #334155;
            color: #f1f5f9;
        }
        .btn-num:hover { background: #3f4f63; }
        .btn-num:active { background: #475569; }

        .btn-op {
            background: #4f46e5;
            color: #fff;
        }
        .btn-op:hover { background: #5b52f0; }
        .btn-op:active { background: #6366f1; }
        .btn-op.active-op {
            background: #818cf8;
            box-shadow: 0 0 16px rgba(129,140,248,0.4);
        }

        .btn-func {
            background: #1e293b;
            color: #94a3b8;
            border: 1px solid #334155;
        }
        .btn-func:hover { background: #283548; color: #cbd5e1; }

        .btn-eq {
            background: linear-gradient(135deg, #6366f1, #818cf8);
            color: #fff;
            font-size: 1.5rem;
        }
        .btn-eq:hover { background: linear-gradient(135deg, #7072f5, #9299fc); }
        .btn-eq:active { background: linear-gradient(135deg, #5558e8, #6366f1); }

        .btn-zero { grid-column: span 2; }

        /* History panel */
        .history-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            background: #0f172a;
            border-top: 1px solid #1e293b;
        }
        .history-panel.open { max-height: 250px; overflow-y: auto; }
        .history-panel::-webkit-scrollbar { width: 4px; }
        .history-panel::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
        .history-list { padding: 12px 20px; }
        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #1e293b;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            cursor: pointer;
            transition: color 0.15s;
        }
        .history-item:hover { color: #818cf8; }
        .history-item .hi-expr { color: #64748b; }
        .history-item .hi-result { color: #cbd5e1; font-weight: 600; }
        .history-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6px;
            color: #475569;
            font-size: 0.7rem;
            cursor: pointer;
            gap: 6px;
            transition: color 0.2s;
        }
        .history-toggle:hover { color: #94a3b8; }

        @media (max-width: 420px) {
            .calculator { width: 100%; border-radius: 0; }
            .calc-container { padding: 0; }
            .btn { height: 56px; font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="window.location.href='../Tools.html'"><i class="fas fa-arrow-left"></i> Back</button>
        <h1><i class="fas fa-calculator"></i> Calculator</h1>
    </div>

    <div class="calc-container">
        <div class="calculator">
            <div class="display">
                <div class="history-display" id="historyDisplay"></div>
                <div class="main-display" id="mainDisplay">0</div>
            </div>

            <div class="buttons">
                <button class="btn btn-func" onclick="clearAll()">AC</button>
                <button class="btn btn-func" onclick="toggleSign()">+/−</button>
                <button class="btn btn-func" onclick="percent()">%</button>
                <button class="btn btn-op" data-op="/" onclick="setOp('/')">÷</button>

                <button class="btn btn-num" onclick="inputNum('7')">7</button>
                <button class="btn btn-num" onclick="inputNum('8')">8</button>
                <button class="btn btn-num" onclick="inputNum('9')">9</button>
                <button class="btn btn-op" data-op="*" onclick="setOp('*')">×</button>

                <button class="btn btn-num" onclick="inputNum('4')">4</button>
                <button class="btn btn-num" onclick="inputNum('5')">5</button>
                <button class="btn btn-num" onclick="inputNum('6')">6</button>
                <button class="btn btn-op" data-op="-" onclick="setOp('-')">−</button>

                <button class="btn btn-num" onclick="inputNum('1')">1</button>
                <button class="btn btn-num" onclick="inputNum('2')">2</button>
                <button class="btn btn-num" onclick="inputNum('3')">3</button>
                <button class="btn btn-op" data-op="+" onclick="setOp('+')">+</button>

                <button class="btn btn-num btn-zero" onclick="inputNum('0')">0</button>
                <button class="btn btn-num" onclick="inputDot()">.</button>
                <button class="btn btn-eq" onclick="calculate()">=</button>
            </div>

            <div class="history-toggle" onclick="toggleHistory()">
                <i class="fas fa-history"></i> History
                <i class="fas fa-chevron-down" id="histChevron"></i>
            </div>
            <div class="history-panel" id="historyPanel">
                <div class="history-list" id="historyList"></div>
            </div>
        </div>
    </div>

    <script>
    let current = '0';
    let previous = null;
    let operator = null;
    let resetNext = false;
    let history = [];

    // IndexedDB
    function openDB() {
        return new Promise((resolve, reject) => {
            const req = indexedDB.open('CalcDB', 1);
            req.onupgradeneeded = e => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains('history')) db.createObjectStore('history');
            };
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
        });
    }
    async function dbLoad() {
        try {
            const db = await openDB();
            const tx = db.transaction('history', 'readonly');
            const store = tx.objectStore('history');
            const req = store.get('calcHistory');
            return new Promise(res => {
                req.onsuccess = () => res(req.result || []);
                req.onerror = () => res([]);
            });
        } catch { return []; }
    }
    async function dbSave() {
        try {
            const db = await openDB();
            const tx = db.transaction('history', 'readwrite');
            tx.objectStore('history').put(history, 'calcHistory');
        } catch {}
    }

    function updateDisplay() {
        const el = document.getElementById('mainDisplay');
        el.textContent = current;
        el.className = 'main-display' + (current.length > 12 ? ' smaller' : current.length > 9 ? ' small' : '');

        document.querySelectorAll('.btn-op').forEach(b => {
            b.classList.toggle('active-op', b.dataset.op === operator && !resetNext);
        });
    }

    function inputNum(n) {
        if (resetNext) { current = ''; resetNext = false; }
        if (current === '0' && n !== '0') current = '';
        if (current.length > 15) return;
        current += n;
        updateDisplay();
    }

    function inputDot() {
        if (resetNext) { current = '0'; resetNext = false; }
        if (!current.includes('.')) current += '.';
        updateDisplay();
    }

    function setOp(op) {
        if (operator && !resetNext) calculate();
        previous = parseFloat(current);
        operator = op;
        resetNext = true;
        const sym = { '/': '÷', '*': '×', '-': '−', '+': '+' };
        document.getElementById('historyDisplay').textContent = formatNum(previous) + ' ' + sym[op];
        updateDisplay();
    }

    function calculate() {
        if (operator === null || previous === null) return;
        const b = parseFloat(current);
        let result;
        switch (operator) {
            case '+': result = previous + b; break;
            case '-': result = previous - b; break;
            case '*': result = previous * b; break;
            case '/': result = b === 0 ? 'Error' : previous / b; break;
        }
        const sym = { '/': '÷', '*': '×', '-': '−', '+': '+' };
        const expr = formatNum(previous) + ' ' + sym[operator] + ' ' + formatNum(b);

        if (result === 'Error') {
            current = 'Error';
        } else {
            result = parseFloat(result.toPrecision(12));
            current = formatNum(result);
            addHistory(expr, current);
        }

        document.getElementById('historyDisplay').textContent = expr + ' =';
        previous = null;
        operator = null;
        resetNext = true;
        updateDisplay();
    }

    function clearAll() {
        current = '0'; previous = null; operator = null; resetNext = false;
        document.getElementById('historyDisplay').textContent = '';
        updateDisplay();
    }

    function toggleSign() {
        if (current === '0' || current === 'Error') return;
        current = current.startsWith('-') ? current.slice(1) : '-' + current;
        updateDisplay();
    }

    function percent() {
        current = formatNum(parseFloat(current) / 100);
        updateDisplay();
    }

    function formatNum(n) {
        if (typeof n === 'string') return n;
        const s = String(n);
        if (s.includes('e')) return n.toExponential(6);
        return s;
    }

    function addHistory(expr, result) {
        history.unshift({ expr, result });
        if (history.length > 30) history.pop();
        dbSave();
        renderHistory();
    }

    function renderHistory() {
        const list = document.getElementById('historyList');
        if (history.length === 0) {
            list.innerHTML = '<div style="text-align:center;color:#475569;padding:16px;font-size:0.8rem;">No history yet</div>';
            return;
        }
        list.innerHTML = history.map(h => `
            <div class="history-item" onclick="useHistory('${h.result}')">
                <span class="hi-expr">${h.expr}</span>
                <span class="hi-result">= ${h.result}</span>
            </div>
        `).join('');
    }

    function useHistory(val) {
        current = val;
        resetNext = true;
        updateDisplay();
    }

    function toggleHistory() {
        document.getElementById('historyPanel').classList.toggle('open');
        document.getElementById('histChevron').style.transform =
            document.getElementById('historyPanel').classList.contains('open') ? 'rotate(180deg)' : '';
    }

    // Keyboard support
    document.addEventListener('keydown', e => {
        if (e.key >= '0' && e.key <= '9') inputNum(e.key);
        else if (e.key === '.') inputDot();
        else if (e.key === '+') setOp('+');
        else if (e.key === '-') setOp('-');
        else if (e.key === '*') setOp('*');
        else if (e.key === '/') { e.preventDefault(); setOp('/'); }
        else if (e.key === 'Enter' || e.key === '=') calculate();
        else if (e.key === 'Escape') clearAll();
        else if (e.key === 'Backspace') {
            if (current.length > 1) current = current.slice(0, -1);
            else current = '0';
            updateDisplay();
        }
    });

    // Init: load from IndexedDB
    dbLoad().then(h => { history = h; renderHistory(); });
    updateDisplay();
    </script>
</body>
</html>
