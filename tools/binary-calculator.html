<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Calculator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }

        header {
            background: #1f2937;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-btn {
            color: #e2e8f0;
            text-decoration: none;
            font-size: 1.25rem;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .back-btn:hover { background: rgba(255,255,255,0.1); }

        header h1 {
            font-size: 1.4rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        header h1 i { color: #38bdf8; }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        .panel {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #334155;
        }

        .panel-title {
            font-size: 1rem;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .panel-title i { color: #38bdf8; }

        /* Input Section */
        .inputs-row {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 16px;
            align-items: start;
        }

        .input-group { width: 100%; }

        .input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #cbd5e1;
            font-size: 0.9rem;
        }

        .binary-input {
            width: 100%;
            padding: 14px 16px;
            background: #0f172a;
            border: 2px solid #334155;
            border-radius: 10px;
            color: #38bdf8;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.2rem;
            letter-spacing: 2px;
            transition: border-color 0.2s;
        }

        .binary-input:focus {
            outline: none;
            border-color: #38bdf8;
        }

        .binary-input.invalid { border-color: #ef4444; }

        .decimal-equiv {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 6px;
            min-height: 20px;
        }

        .decimal-equiv span { color: #a78bfa; }

        .swap-btn {
            background: #334155;
            border: none;
            color: #94a3b8;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.2s;
            align-self: center;
            margin-top: 14px;
        }

        .swap-btn:hover { background: #475569; color: #e2e8f0; transform: rotate(180deg); }

        .bit-width-selector {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .bit-width-btn {
            padding: 6px 16px;
            border-radius: 8px;
            border: 2px solid #334155;
            background: transparent;
            color: #94a3b8;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .bit-width-btn.active {
            border-color: #38bdf8;
            color: #38bdf8;
            background: rgba(56, 189, 248, 0.1);
        }

        .bit-width-btn:hover:not(.active) { border-color: #475569; color: #cbd5e1; }

        /* Operation Buttons */
        .ops-grid {
            display: grid;
            gap: 12px;
        }

        .ops-section-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 4px;
            margin-top: 8px;
        }

        .ops-section-title:first-child { margin-top: 0; }

        .ops-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .op-btn {
            padding: 10px 16px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #e2e8f0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .op-btn:hover {
            background: #1e293b;
            border-color: #38bdf8;
            color: #38bdf8;
            transform: translateY(-1px);
        }

        .op-btn.arithmetic { border-left: 3px solid #22c55e; }
        .op-btn.bitwise { border-left: 3px solid #f59e0b; }
        .op-btn.shift { border-left: 3px solid #a78bfa; }
        .op-btn.unary { border-left: 3px solid #ec4899; }

        .shift-amount-wrap {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-left: 8px;
        }

        .shift-amount-wrap label {
            font-size: 0.8rem;
            color: #64748b;
        }

        .shift-amount {
            width: 50px;
            padding: 6px 8px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            color: #a78bfa;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            text-align: center;
        }

        .shift-amount:focus { outline: none; border-color: #a78bfa; }

        /* Result Display */
        .result-expression {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            color: #94a3b8;
            margin-bottom: 12px;
            padding: 10px 14px;
            background: #0f172a;
            border-radius: 8px;
            min-height: 40px;
            display: flex;
            align-items: center;
        }

        .result-binary {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.6rem;
            font-weight: 700;
            color: #22c55e;
            letter-spacing: 3px;
            word-break: break-all;
            margin-bottom: 14px;
        }

        .result-conversions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
            margin-bottom: 16px;
        }

        .conversion-item {
            background: #0f172a;
            padding: 10px 14px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .conversion-label {
            font-size: 0.75rem;
            color: #64748b;
            text-transform: uppercase;
            font-weight: 600;
        }

        .conversion-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            color: #f8fafc;
        }

        .copy-btn {
            background: none;
            border: none;
            color: #475569;
            cursor: pointer;
            font-size: 0.85rem;
            padding: 4px 6px;
            border-radius: 4px;
            transition: color 0.2s;
            margin-left: 8px;
        }

        .copy-btn:hover { color: #38bdf8; }
        .copy-btn.copied { color: #22c55e; }

        /* Bit Visualization */
        .bit-vis-section { margin-top: 16px; }

        .bit-vis-label {
            font-size: 0.75rem;
            color: #64748b;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .bit-vis-row {
            display: flex;
            gap: 3px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .bit-square {
            width: 28px;
            height: 28px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            font-weight: 700;
            transition: all 0.2s;
        }

        .bit-square.one {
            background: #22c55e;
            color: #0f172a;
        }

        .bit-square.zero {
            background: #1e293b;
            color: #475569;
            border: 1px solid #334155;
        }

        .bit-square.separator {
            width: 8px;
            background: none;
            border: none;
        }

        /* Carry display for step-by-step */
        .step-breakdown {
            margin-top: 16px;
            padding: 14px;
            background: #0f172a;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            line-height: 1.8;
            overflow: auto;
            max-height: 50vh;
            -webkit-overflow-scrolling: touch;
        }

        .step-breakdown .carry-row { color: #f59e0b; }
        .step-breakdown .a-row { color: #38bdf8; }
        .step-breakdown .b-row { color: #a78bfa; }
        .step-breakdown .divider { color: #475569; }
        .step-breakdown .result-row { color: #22c55e; font-weight: 700; }
        .step-breakdown .label-col { color: #64748b; display: inline-block; width: 80px; }

        /* Truth Table */
        .truth-table-wrap {
            max-height: 400px;
            overflow-y: auto;
        }

        .truth-table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
        }

        .truth-table th {
            background: #0f172a;
            padding: 8px 12px;
            text-align: center;
            color: #94a3b8;
            font-weight: 600;
            position: sticky;
            top: 0;
        }

        .truth-table td {
            padding: 6px 12px;
            text-align: center;
            border-bottom: 1px solid #1e293b;
            color: #cbd5e1;
        }

        .truth-table tr:hover td { background: rgba(56, 189, 248, 0.05); }

        .truth-table-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .truth-table-controls select {
            padding: 6px 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            color: #e2e8f0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
        }

        .truth-table-controls select:focus { outline: none; border-color: #38bdf8; }

        .truth-table-controls label {
            font-size: 0.85rem;
            color: #94a3b8;
        }

        .gen-btn {
            padding: 8px 16px;
            background: #38bdf8;
            border: none;
            border-radius: 8px;
            color: #0f172a;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: background 0.2s;
        }

        .gen-btn:hover { background: #7dd3fc; }

        /* History */
        .history-list {
            max-height: 350px;
            overflow-y: auto;
        }

        .history-item {
            padding: 10px 14px;
            background: #0f172a;
            border-radius: 8px;
            margin-bottom: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: #cbd5e1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .history-item:hover { background: #1a2744; }

        .history-item .expr { flex: 1; }
        .history-item .time { color: #475569; font-size: 0.7rem; margin-left: 10px; white-space: nowrap; }

        .clear-history-btn {
            padding: 6px 14px;
            background: #7f1d1d;
            border: 1px solid #991b1b;
            border-radius: 6px;
            color: #fca5a5;
            font-size: 0.8rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .clear-history-btn:hover { background: #991b1b; }

        .clear-calc-btn {
            padding: 8px 16px;
            background: #334155;
            border: none;
            border-radius: 8px;
            color: #94a3b8;
            font-family: 'Outfit', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .clear-calc-btn:hover { background: #475569; color: #e2e8f0; }

        .top-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-bottom: 12px;
        }

        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .result-extra-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .no-result {
            color: #475569;
            font-style: italic;
            text-align: center;
            padding: 20px;
        }

        .quotient-remainder {
            display: flex;
            gap: 20px;
            margin-bottom: 14px;
        }

        .quotient-remainder > div {
            flex: 1;
        }

        .qr-label {
            font-size: 0.75rem;
            color: #64748b;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .qr-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.2rem;
            font-weight: 700;
            color: #22c55e;
            letter-spacing: 2px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        @media (max-width: 768px) {
            .inputs-row { grid-template-columns: 1fr; }
            .swap-btn { margin: 0 auto; transform: rotate(90deg); }
            .swap-btn:hover { transform: rotate(270deg); }
            .two-col, .result-extra-row { grid-template-columns: 1fr; }
            .result-binary { font-size: 1.1rem; }
            .bit-square { width: 22px; height: 22px; font-size: 0.65rem; }
        }
    </style>
</head>
<body>
    <header>
        <a href="../Tools.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
        <h1><i class="fas fa-microchip"></i> Binary Calculator</h1>
    </header>

    <div class="container">
        <!-- Top Actions -->
        <div class="top-actions">
            <button class="clear-calc-btn" onclick="clearAll()"><i class="fas fa-eraser"></i> Clear All</button>
        </div>

        <!-- Input Section -->
        <div class="panel">
            <div class="panel-title"><i class="fas fa-keyboard"></i> Input</div>
            <div class="inputs-row">
                <div class="input-group">
                    <label for="inputA">Value A</label>
                    <input type="text" id="inputA" class="binary-input" placeholder="e.g. 1010 1100" autocomplete="off" spellcheck="false">
                    <div class="decimal-equiv" id="decA"></div>
                </div>
                <button class="swap-btn" onclick="swapInputs()" title="Swap A and B"><i class="fas fa-right-left"></i></button>
                <div class="input-group">
                    <label for="inputB">Value B</label>
                    <input type="text" id="inputB" class="binary-input" placeholder="e.g. 0000 1111" autocomplete="off" spellcheck="false">
                    <div class="decimal-equiv" id="decB"></div>
                </div>
            </div>
            <div class="bit-width-selector">
                <span style="font-size:0.85rem;color:#64748b;margin-right:4px;">Bit Width:</span>
                <button class="bit-width-btn active" data-bits="8" onclick="setBitWidth(8)">8-bit</button>
                <button class="bit-width-btn" data-bits="16" onclick="setBitWidth(16)">16-bit</button>
                <button class="bit-width-btn" data-bits="32" onclick="setBitWidth(32)">32-bit</button>
            </div>
        </div>

        <!-- Operations -->
        <div class="panel">
            <div class="panel-title"><i class="fas fa-calculator"></i> Operations</div>

            <div class="ops-section-title">Arithmetic</div>
            <div class="ops-buttons">
                <button class="op-btn arithmetic" onclick="doOp('ADD')">ADD (A+B)</button>
                <button class="op-btn arithmetic" onclick="doOp('SUB')">SUB (A-B)</button>
                <button class="op-btn arithmetic" onclick="doOp('MUL')">MUL (A&times;B)</button>
                <button class="op-btn arithmetic" onclick="doOp('DIV')">DIV (A&divide;B)</button>
            </div>

            <div class="ops-section-title">Bitwise / Logic</div>
            <div class="ops-buttons">
                <button class="op-btn bitwise" onclick="doOp('AND')">AND</button>
                <button class="op-btn bitwise" onclick="doOp('OR')">OR</button>
                <button class="op-btn bitwise" onclick="doOp('XOR')">XOR</button>
                <button class="op-btn bitwise" onclick="doOp('NOT')">NOT (~A)</button>
                <button class="op-btn bitwise" onclick="doOp('NAND')">NAND</button>
                <button class="op-btn bitwise" onclick="doOp('NOR')">NOR</button>
                <button class="op-btn bitwise" onclick="doOp('XNOR')">XNOR</button>
            </div>

            <div class="ops-section-title">Shift / Rotate</div>
            <div class="ops-buttons">
                <button class="op-btn shift" onclick="doOp('SHL')">A &lt;&lt; n</button>
                <button class="op-btn shift" onclick="doOp('SHR')">A &gt;&gt; n</button>
                <button class="op-btn shift" onclick="doOp('ROL')">Rotate L</button>
                <button class="op-btn shift" onclick="doOp('ROR')">Rotate R</button>
                <span class="shift-amount-wrap">
                    <label for="shiftN">n =</label>
                    <input type="number" id="shiftN" class="shift-amount" value="1" min="0" max="32">
                </span>
            </div>

            <div class="ops-section-title">Unary (on A)</div>
            <div class="ops-buttons">
                <button class="op-btn unary" onclick="doOp('TWOS')">Two's Comp</button>
                <button class="op-btn unary" onclick="doOp('POPCNT')">Count 1s</button>
                <button class="op-btn unary" onclick="doOp('CNTZERO')">Count 0s</button>
                <button class="op-btn unary" onclick="doOp('REVERSE')">Reverse</button>
                <button class="op-btn unary" onclick="doOp('CLZ')">Leading 0s</button>
                <button class="op-btn unary" onclick="doOp('CTZ')">Trailing 0s</button>
            </div>
        </div>

        <!-- Result -->
        <div class="panel" id="resultPanel">
            <div class="panel-title"><i class="fas fa-equals"></i> Result</div>
            <div id="resultContent">
                <div class="no-result">Select an operation to see results</div>
            </div>
        </div>

        <!-- Bit Visualization & Step Breakdown -->
        <div class="result-extra-row" id="extraRow" style="display:none;">
            <div class="panel">
                <div class="panel-title"><i class="fas fa-th"></i> Bit Visualization</div>
                <div id="bitVisContent"></div>
            </div>
            <div class="panel" id="stepPanel" style="display:none;">
                <div class="panel-title"><i class="fas fa-list-ol"></i> Step-by-Step</div>
                <div class="step-breakdown" id="stepContent"></div>
            </div>
        </div>

        <!-- Truth Table & History -->
        <div class="two-col">
            <div class="panel">
                <div class="panel-title"><i class="fas fa-table"></i> Truth Table Generator</div>
                <div class="truth-table-controls">
                    <label>Operation:</label>
                    <select id="ttOperation">
                        <option value="AND">AND</option>
                        <option value="OR">OR</option>
                        <option value="XOR">XOR</option>
                        <option value="NAND">NAND</option>
                        <option value="NOR">NOR</option>
                        <option value="XNOR">XNOR</option>
                    </select>
                    <label>Bits:</label>
                    <select id="ttBits">
                        <option value="1">1-bit</option>
                        <option value="2">2-bit</option>
                        <option value="3">3-bit</option>
                        <option value="4">4-bit</option>
                    </select>
                    <button class="gen-btn" onclick="generateTruthTable()">Generate</button>
                </div>
                <div class="truth-table-wrap" id="truthTableWrap"></div>
            </div>

            <div class="panel">
                <div class="panel-title" style="justify-content:space-between;">
                    <span><i class="fas fa-clock-rotate-left"></i> History</span>
                    <button class="clear-history-btn" onclick="clearHistory()"><i class="fas fa-trash"></i> Clear</button>
                </div>
                <div class="history-list" id="historyList">
                    <div class="no-result">No calculations yet</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let bitWidth = 8;
        let history = JSON.parse(localStorage.getItem('binCalcHistory') || '[]');
        const maxMask = () => (1 << bitWidth) - 1; // only for <=30 bits; for 32 we handle separately

        function mask(val) {
            if (bitWidth === 32) return val >>> 0;
            return val & ((1 << bitWidth) - 1);
        }

        function parseBin(str) {
            const clean = str.replace(/\s/g, '');
            if (clean === '' || !/^[01]+$/.test(clean)) return NaN;
            return parseInt(clean, 2);
        }

        function toBin(val, pad) {
            val = mask(val);
            let s = (val >>> 0).toString(2);
            while (s.length < (pad || bitWidth)) s = '0' + s;
            return s;
        }

        function formatBin(binStr) {
            // group in 4s from right
            let s = binStr;
            let groups = [];
            while (s.length > 4) {
                groups.unshift(s.slice(-4));
                s = s.slice(0, -4);
            }
            if (s.length > 0) groups.unshift(s);
            return groups.join(' ');
        }

        function autoFormat(input) {
            const pos = input.selectionStart;
            const raw = input.value.replace(/\s/g, '');
            const formatted = formatBin(raw);
            // count spaces before cursor in old value
            const oldSpaces = (input.value.substring(0, pos).match(/\s/g) || []).length;
            input.value = formatted;
            // restore cursor roughly
            const rawPos = pos - oldSpaces;
            const newSpaces = (formatted.substring(0, rawPos + Math.floor(rawPos / 4)).match(/\s/g) || []).length;
            const newPos = rawPos + newSpaces;
            input.setSelectionRange(newPos, newPos);
        }

        function validateInput(input) {
            const raw = input.value.replace(/\s/g, '');
            if (raw !== '' && !/^[01]+$/.test(raw)) {
                input.classList.add('invalid');
            } else {
                input.classList.remove('invalid');
            }
        }

        function updateDecimal(inputId, decId) {
            const input = document.getElementById(inputId);
            const dec = document.getElementById(decId);
            const val = parseBin(input.value);
            if (isNaN(val)) {
                dec.innerHTML = input.value.replace(/\s/g, '') === '' ? '' : '<span style="color:#ef4444">Invalid binary</span>';
            } else {
                dec.innerHTML = `Decimal: <span>${val}</span> | Hex: <span>0x${val.toString(16).toUpperCase()}</span>`;
            }
        }

        // Input event listeners
        ['inputA', 'inputB'].forEach((id, i) => {
            const input = document.getElementById(id);
            const decId = i === 0 ? 'decA' : 'decB';
            input.addEventListener('input', () => {
                // filter non-binary chars (keep spaces)
                input.value = input.value.replace(/[^01\s]/g, '');
                validateInput(input);
                autoFormat(input);
                updateDecimal(id, decId);
            });
            input.addEventListener('blur', () => {
                autoFormat(input);
            });
        });

        function setBitWidth(bits) {
            bitWidth = bits;
            document.querySelectorAll('.bit-width-btn').forEach(b => {
                b.classList.toggle('active', parseInt(b.dataset.bits) === bits);
            });
            updateDecimal('inputA', 'decA');
            updateDecimal('inputB', 'decB');
        }

        function swapInputs() {
            const a = document.getElementById('inputA');
            const b = document.getElementById('inputB');
            [a.value, b.value] = [b.value, a.value];
            updateDecimal('inputA', 'decA');
            updateDecimal('inputB', 'decB');
        }

        function clearAll() {
            document.getElementById('inputA').value = '';
            document.getElementById('inputB').value = '';
            document.getElementById('decA').innerHTML = '';
            document.getElementById('decB').innerHTML = '';
            document.getElementById('resultContent').innerHTML = '<div class="no-result">Select an operation to see results</div>';
            document.getElementById('extraRow').style.display = 'none';
            document.getElementById('inputA').classList.remove('invalid');
            document.getElementById('inputB').classList.remove('invalid');
        }

        function doOp(op) {
            const rawA = document.getElementById('inputA').value.replace(/\s/g, '');
            const a = parseBin(rawA);

            const needsB = ['ADD','SUB','MUL','DIV','AND','OR','XOR','NAND','NOR','XNOR'].includes(op);
            let b = 0, rawB = '';
            if (needsB) {
                rawB = document.getElementById('inputB').value.replace(/\s/g, '');
                b = parseBin(rawB);
                if (isNaN(b)) {
                    alert('Please enter a valid binary number for B');
                    return;
                }
            }

            if (isNaN(a)) {
                alert('Please enter a valid binary number for A');
                return;
            }

            const n = parseInt(document.getElementById('shiftN').value) || 0;
            let result, opSymbol, exprStr, quotient, remainder, isDivision = false, showStep = false;

            switch(op) {
                case 'ADD':
                    result = mask(a + b);
                    opSymbol = '+';
                    showStep = true;
                    break;
                case 'SUB':
                    result = mask(a - b);
                    opSymbol = '-';
                    showStep = true;
                    break;
                case 'MUL':
                    result = mask(a * b);
                    opSymbol = '\u00d7';
                    break;
                case 'DIV':
                    if (b === 0) { alert('Division by zero!'); return; }
                    quotient = mask(Math.floor(a / b));
                    remainder = mask(a % b);
                    result = quotient;
                    isDivision = true;
                    opSymbol = '\u00f7';
                    break;
                case 'AND':
                    result = mask(a & b);
                    opSymbol = 'AND';
                    break;
                case 'OR':
                    result = mask(a | b);
                    opSymbol = 'OR';
                    break;
                case 'XOR':
                    result = mask(a ^ b);
                    opSymbol = 'XOR';
                    break;
                case 'NOT':
                    result = mask(~a);
                    opSymbol = 'NOT';
                    break;
                case 'NAND':
                    result = mask(~(a & b));
                    opSymbol = 'NAND';
                    break;
                case 'NOR':
                    result = mask(~(a | b));
                    opSymbol = 'NOR';
                    break;
                case 'XNOR':
                    result = mask(~(a ^ b));
                    opSymbol = 'XNOR';
                    break;
                case 'SHL':
                    result = mask(a << n);
                    opSymbol = `<< ${n}`;
                    break;
                case 'SHR':
                    result = mask(a >>> n);
                    opSymbol = `>> ${n}`;
                    break;
                case 'ROL': {
                    const shift = n % bitWidth;
                    const masked = mask(a);
                    result = mask((masked << shift) | (masked >>> (bitWidth - shift)));
                    opSymbol = `ROL ${n}`;
                    break;
                }
                case 'ROR': {
                    const shift = n % bitWidth;
                    const masked = mask(a);
                    result = mask((masked >>> shift) | (masked << (bitWidth - shift)));
                    opSymbol = `ROR ${n}`;
                    break;
                }
                case 'TWOS':
                    result = mask((~a) + 1);
                    opSymbol = "Two's Complement";
                    break;
                case 'POPCNT': {
                    const binA = toBin(a);
                    const count = binA.split('').filter(c => c === '1').length;
                    result = count;
                    opSymbol = 'popcount';
                    break;
                }
                case 'CNTZERO': {
                    const binA = toBin(a);
                    const count = binA.split('').filter(c => c === '0').length;
                    result = count;
                    opSymbol = 'count 0s';
                    break;
                }
                case 'REVERSE': {
                    const binA = toBin(a);
                    result = parseInt(binA.split('').reverse().join(''), 2);
                    opSymbol = 'reverse';
                    break;
                }
                case 'CLZ': {
                    const binA = toBin(a);
                    let count = 0;
                    for (const ch of binA) { if (ch === '0') count++; else break; }
                    result = count;
                    opSymbol = 'leading 0s';
                    break;
                }
                case 'CTZ': {
                    const binA = toBin(a);
                    let count = 0;
                    for (let i = binA.length - 1; i >= 0; i--) { if (binA[i] === '0') count++; else break; }
                    result = count;
                    opSymbol = 'trailing 0s';
                    break;
                }
            }

            // Build expression string
            const isCount = ['POPCNT','CNTZERO','CLZ','CTZ'].includes(op);
            const binAFmt = formatBin(toBin(a));
            const binBFmt = needsB ? formatBin(toBin(b)) : '';
            const resBinFmt = isCount ? result.toString() : formatBin(toBin(result));

            if (needsB) {
                exprStr = `${binAFmt} ${opSymbol} ${binBFmt} = ${resBinFmt}`;
            } else if (['SHL','SHR','ROL','ROR'].includes(op)) {
                exprStr = `${binAFmt} ${opSymbol} = ${resBinFmt}`;
            } else if (op === 'NOT') {
                exprStr = `NOT(${binAFmt}) = ${resBinFmt}`;
            } else if (op === 'TWOS') {
                exprStr = `Two's Complement(${binAFmt}) = ${resBinFmt}`;
            } else if (op === 'REVERSE') {
                exprStr = `Reverse(${binAFmt}) = ${resBinFmt}`;
            } else {
                exprStr = `${opSymbol}(${binAFmt}) = ${resBinFmt}`;
            }

            // Render result
            let html = `<div class="result-expression">${exprStr}</div>`;

            if (isDivision) {
                html += `<div class="quotient-remainder">
                    <div><div class="qr-label">Quotient</div><div class="qr-value">${formatBin(toBin(quotient))}</div></div>
                    <div><div class="qr-label">Remainder</div><div class="qr-value">${formatBin(toBin(remainder))}</div></div>
                </div>`;
            } else if (isCount) {
                html += `<div class="result-binary" style="font-size:2rem;">${result}</div>`;
            } else {
                html += `<div class="result-binary">${resBinFmt}</div>`;
            }

            const displayVal = isCount ? result : mask(result);
            html += `<div class="result-conversions">
                <div class="conversion-item">
                    <div><div class="conversion-label">Decimal</div><div class="conversion-value">${displayVal}</div></div>
                    <button class="copy-btn" onclick="copyText('${displayVal}', this)"><i class="fas fa-copy"></i></button>
                </div>
                <div class="conversion-item">
                    <div><div class="conversion-label">Binary</div><div class="conversion-value">${isCount ? toBin(result) : formatBin(toBin(result))}</div></div>
                    <button class="copy-btn" onclick="copyText('${isCount ? toBin(result) : toBin(result)}', this)"><i class="fas fa-copy"></i></button>
                </div>
                <div class="conversion-item">
                    <div><div class="conversion-label">Hexadecimal</div><div class="conversion-value">0x${(displayVal >>> 0).toString(16).toUpperCase()}</div></div>
                    <button class="copy-btn" onclick="copyText('0x${(displayVal >>> 0).toString(16).toUpperCase()}', this)"><i class="fas fa-copy"></i></button>
                </div>
                <div class="conversion-item">
                    <div><div class="conversion-label">Octal</div><div class="conversion-value">0o${(displayVal >>> 0).toString(8)}</div></div>
                    <button class="copy-btn" onclick="copyText('0o${(displayVal >>> 0).toString(8)}', this)"><i class="fas fa-copy"></i></button>
                </div>
            </div>`;

            document.getElementById('resultContent').innerHTML = html;

            // Bit visualization
            const extraRow = document.getElementById('extraRow');
            extraRow.style.display = 'grid';

            let visHtml = '';
            visHtml += renderBitVis('A', toBin(a));
            if (needsB) visHtml += renderBitVis('B', toBin(b));
            if (!isCount) {
                visHtml += renderBitVis('Result', toBin(result));
            }
            document.getElementById('bitVisContent').innerHTML = visHtml;

            // Step breakdown
            const stepPanel = document.getElementById('stepPanel');
            if (showStep && op === 'ADD') {
                stepPanel.style.display = 'block';
                document.getElementById('stepContent').innerHTML = additionSteps(a, b);
            } else if (showStep && op === 'SUB') {
                stepPanel.style.display = 'block';
                document.getElementById('stepContent').innerHTML = subtractionSteps(a, b);
            } else {
                stepPanel.style.display = 'none';
            }

            // Save to history
            addHistory(exprStr);

            // Scroll to result (just enough to see it)
            document.getElementById('resultContent').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function renderBitVis(label, binStr) {
            let html = `<div class="bit-vis-label">${label}</div><div class="bit-vis-row">`;
            for (let i = 0; i < binStr.length; i++) {
                if (i > 0 && (binStr.length - i) % 4 === 0) {
                    html += '<div class="bit-square separator"></div>';
                }
                html += `<div class="bit-square ${binStr[i] === '1' ? 'one' : 'zero'}">${binStr[i]}</div>`;
            }
            html += '</div>';
            return html;
        }

        function additionSteps(a, b) {
            const binA = toBin(a);
            const binB = toBin(b);
            const result = toBin(mask(a + b));

            // Compute carries
            let carries = '';
            let carry = 0;
            let carryArr = new Array(bitWidth).fill(' ');
            for (let i = bitWidth - 1; i >= 0; i--) {
                const bitA = parseInt(binA[i]);
                const bitB = parseInt(binB[i]);
                const sum = bitA + bitB + carry;
                carry = sum >= 2 ? 1 : 0;
                if (carry && i > 0) carryArr[i - 1] = '1';
            }
            carries = carryArr.join('');

            let html = '';
            html += `<div class="carry-row"><span class="label-col">Carry:</span> ${carries}</div>`;
            html += `<div class="a-row"><span class="label-col">A:</span> ${binA}</div>`;
            html += `<div class="b-row"><span class="label-col">B:</span> ${binB}</div>`;
            html += `<div class="divider"><span class="label-col"></span>${'-'.repeat(bitWidth)}</div>`;
            html += `<div class="result-row"><span class="label-col">Result:</span> ${result}</div>`;
            if (carry) html += `<div style="color:#f59e0b;margin-top:6px;font-size:0.8rem;">Overflow: carry out = 1</div>`;
            return html;
        }

        function subtractionSteps(a, b) {
            const binA = toBin(a);
            const binB = toBin(b);
            const twosB = toBin(mask((~b) + 1));
            const result = toBin(mask(a - b));

            let html = '';
            html += `<div style="color:#94a3b8;margin-bottom:8px;">A - B = A + Two's Complement(B)</div>`;
            html += `<div class="a-row"><span class="label-col">A:</span> ${binA}</div>`;
            html += `<div class="b-row"><span class="label-col">B:</span> ${binB}</div>`;
            html += `<div class="b-row"><span class="label-col">~B + 1:</span> ${twosB}</div>`;
            html += `<div class="divider"><span class="label-col"></span>${'-'.repeat(bitWidth)}</div>`;
            html += `<div class="result-row"><span class="label-col">Result:</span> ${result}</div>`;
            return html;
        }

        function copyText(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                btn.classList.add('copied');
                btn.innerHTML = '<i class="fas fa-check"></i>';
                setTimeout(() => {
                    btn.classList.remove('copied');
                    btn.innerHTML = '<i class="fas fa-copy"></i>';
                }, 1500);
            });
        }

        // History
        function addHistory(expr) {
            const entry = { expr, time: new Date().toLocaleTimeString() };
            history.unshift(entry);
            if (history.length > 20) history.pop();
            localStorage.setItem('binCalcHistory', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            if (history.length === 0) {
                list.innerHTML = '<div class="no-result">No calculations yet</div>';
                return;
            }
            list.innerHTML = history.map(h =>
                `<div class="history-item"><span class="expr">${h.expr}</span><span class="time">${h.time}</span></div>`
            ).join('');
        }

        function clearHistory() {
            history = [];
            localStorage.removeItem('binCalcHistory');
            renderHistory();
        }

        // Truth Table
        function generateTruthTable() {
            const op = document.getElementById('ttOperation').value;
            const bits = parseInt(document.getElementById('ttBits').value);
            const max = 1 << bits;

            if (bits > 4) { alert('Max 4 bits for truth table'); return; }

            let opFn;
            switch(op) {
                case 'AND': opFn = (a, b) => a & b; break;
                case 'OR': opFn = (a, b) => a | b; break;
                case 'XOR': opFn = (a, b) => a ^ b; break;
                case 'NAND': opFn = (a, b) => (~(a & b)) & ((1 << bits) - 1); break;
                case 'NOR': opFn = (a, b) => (~(a | b)) & ((1 << bits) - 1); break;
                case 'XNOR': opFn = (a, b) => (~(a ^ b)) & ((1 << bits) - 1); break;
            }

            let html = '<table class="truth-table"><thead><tr>';
            html += `<th>A (${bits}-bit)</th><th>B (${bits}-bit)</th><th>${op}</th>`;
            html += '</tr></thead><tbody>';

            for (let a = 0; a < max; a++) {
                for (let b = 0; b < max; b++) {
                    const r = opFn(a, b);
                    const binA = a.toString(2).padStart(bits, '0');
                    const binB = b.toString(2).padStart(bits, '0');
                    const binR = r.toString(2).padStart(bits, '0');
                    html += `<tr><td>${binA}</td><td>${binB}</td><td>${binR}</td></tr>`;
                }
            }

            html += '</tbody></table>';
            document.getElementById('truthTableWrap').innerHTML = html;
        }

        // Init
        renderHistory();
    </script>
</body>
</html>
