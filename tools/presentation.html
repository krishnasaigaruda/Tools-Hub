                    <input type="color" class="color-picker" id="textColor" value="#000000" onchange="formatText('foreColor', this.value)" title="Text Color">
                    <input type="color" class="color-picker" id="highlightColor" value="#ffff00" onchange="formatText('hiliteColor', this.value)" title="Highlight">
                </div>

                <!-- Alignment -->
                <div class="toolbar-group">
                    <button class="toolbar-btn" onclick="formatText('justifyLeft')" title="Align Left">
                        <i class="fas fa-align-left"></i>
                    </button>
                    <button class="toolbar-btn" onclick="formatText('justifyCenter')" title="Align Center">
                        <i class="fas fa-align-center"></i>
                    </button>
                    <button class="toolbar-btn" onclick="formatText('justifyRight')" title="Align Right">
                        <i class="fas fa-align-right"></i>
                    </button>
                </div>

                <!-- Lists -->
                <div class="toolbar-group">
                    <button class="toolbar-btn" onclick="formatText('insertUnorderedList')" title="Bullet List">
                        <i class="fas fa-list-ul"></i>
                    </button>
                    <button class="toolbar-btn" onclick="formatText('insertOrderedList')" title="Numbered List">
                        <i class="fas fa-list-ol"></i>
                    </button>
                </div>

                <!-- Insert -->
                <div class="toolbar-group">
                    <button class="toolbar-btn" onclick="insertHeading(1)" title="Heading 1">
                        H1
                    </button>
                    <button class="toolbar-btn" onclick="insertHeading(2)" title="Heading 2">
                        H2
                    </button>
                    <button class="toolbar-btn" onclick="document.getElementById('imageInput').click()" title="Insert Image">
                        <i class="fas fa-image"></i>
                    </button>
                    <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="insertImage(event)">
                    <div style="position: relative; display: inline-block;">
                        <button class="toolbar-btn" onclick="toggleShapeMenu()" title="Insert Shape">
                            <i class="fas fa-shapes"></i>
                        </button>
                        <div class="shape-menu" id="shapeMenu">
                            <div class="shape-menu-title">Shapes</div>
                            <div class="shape-grid">
                                <button class="shape-option" onclick="insertShape('rectangle')" title="Rectangle">
                                    <div style="width:28px;height:20px;background:#7c3aed;border-radius:2px;"></div>
                                </button>
                                <button class="shape-option" onclick="insertShape('rounded-rect')" title="Rounded Rectangle">
                                    <div style="width:28px;height:20px;background:#7c3aed;border-radius:6px;"></div>
                                </button>
                                <button class="shape-option" onclick="insertShape('circle')" title="Circle">
                                    <div style="width:24px;height:24px;background:#7c3aed;border-radius:50%;"></div>
                                </button>
                                <button class="shape-option" onclick="insertShape('oval')" title="Oval">
                                    <div style="width:30px;height:20px;background:#7c3aed;border-radius:50%;"></div>
                                </button>
                                <button class="shape-option" onclick="insertShape('triangle')" title="Triangle">
                                    <div style="width:0;height:0;border-left:14px solid transparent;border-right:14px solid transparent;border-bottom:24px solid #7c3aed;"></div>
                                </button>
                                <button class="shape-option" onclick="insertShape('diamond')" title="Diamond">
                                    <div style="width:20px;height:20px;background:#7c3aed;transform:rotate(45deg);"></div>
                                </button>
                                <button class="shape-option" onclick="insertShape('pentagon')" title="Pentagon">
                                    <div style="width:26px;height:26px;background:#7c3aed;clip-path:polygon(50% 0%,100% 38%,82% 100%,18% 100%,0% 38%);"></div>
                                </button>
                                <button class="shape-option" onclick="insertShape('hexagon')" title="Hexagon">
                                    <div style="width:28px;height:24px;background:#7c3aed;clip-path:polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%);"></div>
                                </button>
                                <button class="shape-option" onclick="insertShape('star')" title="Star">
                                    <div style="width:26px;height:26px;background:#7c3aed;clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);"></div>
                                </button>
                                <button class="shape-option" onclick="insertShape('arrow-right')" title="Arrow Right">
                                    <div style="width:28px;height:20px;background:#7c3aed;clip-path:polygon(0% 20%,60% 20%,60% 0%,100% 50%,60% 100%,60% 80%,0% 80%);"></div>
                                </button>
                                <button class="shape-option" onclick="insertShape('arrow-left')" title="Arrow Left">
                                    <div style="width:28px;height:20px;background:#7c3aed;clip-path:polygon(40% 0%,40% 20%,100% 20%,100% 80%,40% 80%,40% 100%,0% 50%);"></div>
                                </button>
                                <button class="shape-option" onclick="insertShape('heart')" title="Heart">
                                    <div style="width:26px;height:24px;background:#7c3aed;clip-path:polygon(50% 100%,0% 35%,0% 15%,15% 0%,35% 0%,50% 15%,65% 0%,85% 0%,100% 15%,100% 35%);"></div>
                                </button>
                                <button class="shape-option" onclick="insertShape('cross')" title="Cross">
                                    <div style="width:24px;height:24px;background:#7c3aed;clip-path:polygon(35% 0%,65% 0%,65% 35%,100% 35%,100% 65%,65% 65%,65% 100%,35% 100%,35% 65%,0% 65%,0% 35%,35% 35%);"></div>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Themes -->
                <div class="toolbar-group">
                    <div class="theme-selector">
                        <button class="theme-btn theme-white active" onclick="setTheme('white')" title="White"></button>
                        <button class="theme-btn theme-dark" onclick="setTheme('dark')" title="Dark"></button>
                        <button class="theme-btn theme-blue" onclick="setTheme('blue')" title="Blue Gradient"></button>
                        <button class="theme-btn theme-green" onclick="setTheme('green')" title="Green Gradient"></button>
                        <button class="theme-btn theme-orange" onclick="setTheme('orange')" title="Orange Gradient"></button>
                        <button class="theme-btn theme-purple" onclick="setTheme('purple')" title="Purple Gradient"></button>
                    </div>
                </div>
            </div>

            <!-- Slide Canvas -->
            <div class="slide-canvas-container">
                <div class="slide-canvas" id="slideCanvas">
                    <div class="slide-content" id="slideContent" contenteditable="true"></div>
                </div>
            </div>

            <!-- Shape Color Picker -->
            <div class="shape-color-picker" id="shapeColorPicker">
                <div class="shape-color-picker-title">Shape Color</div>
                <div class="shape-color-grid">
                    <div class="shape-color-swatch" style="background:#7c3aed;" onclick="setShapeColor('#7c3aed')"></div>
                    <div class="shape-color-swatch" style="background:#2563eb;" onclick="setShapeColor('#2563eb')"></div>
                    <div class="shape-color-swatch" style="background:#0891b2;" onclick="setShapeColor('#0891b2')"></div>
                    <div class="shape-color-swatch" style="background:#16a34a;" onclick="setShapeColor('#16a34a')"></div>
                    <div class="shape-color-swatch" style="background:#eab308;" onclick="setShapeColor('#eab308')"></div>
                    <div class="shape-color-swatch" style="background:#ea580c;" onclick="setShapeColor('#ea580c')"></div>
                    <div class="shape-color-swatch" style="background:#ef4444;" onclick="setShapeColor('#ef4444')"></div>
                    <div class="shape-color-swatch" style="background:#ec4899;" onclick="setShapeColor('#ec4899')"></div>
                    <div class="shape-color-swatch" style="background:#8b5cf6;" onclick="setShapeColor('#8b5cf6')"></div>
                    <div class="shape-color-swatch" style="background:#333333;" onclick="setShapeColor('#333333')"></div>
                    <div class="shape-color-swatch" style="background:#666666;" onclick="setShapeColor('#666666')"></div>
                    <div class="shape-color-swatch" style="background:#ffffff;border-color:#555;" onclick="setShapeColor('#ffffff')"></div>
                </div>
                <div class="shape-color-custom">
                    <label>Custom:</label>
                    <input type="color" id="shapeCustomColor" value="#7c3aed" onchange="setShapeColor(this.value)">
                </div>
            </div>

            <!-- Status Bar -->
            <div class="status-bar">
                <span id="slideInfo">Slide 1 of 1</span>
                <span id="saveStatus">Ready</span>
            </div>
        </div>
    </div>

    <!-- Presentation Mode -->
    <div class="presentation-mode" id="presentationMode">
        <div class="presentation-slide" id="presentationSlide"></div>
        <div class="presentation-controls">
            <button onclick="prevSlide()"><i class="fas fa-chevron-left"></i> Previous</button>
            <span class="slide-counter" id="presentationCounter">1 / 1</span>
            <button onclick="nextSlide()">Next <i class="fas fa-chevron-right"></i></button>
            <button onclick="exitPresentation()"><i class="fas fa-times"></i> Exit</button>
        </div>
    </div>

    <!-- Print Container (hidden, only shows when printing) -->
    <div id="printContainer"></div>

    <script>
        // Slide data
        let slides = [];
        let currentSlideIndex = 0;
        let presentationSlideIndex = 0;
        let currentPresentationId = null;
        let currentPresentationName = 'Untitled Presentation';
        let hasUnsavedChanges = false;
        let savedPresentations = [];

        // Theme styles
        const themes = {
            white: { background: '#ffffff', color: '#333333' },
            dark: { background: 'linear-gradient(135deg, #1a1a2e, #16213e)', color: '#ffffff' },
            blue: { background: 'linear-gradient(135deg, #667eea, #764ba2)', color: '#ffffff' },
            green: { background: 'linear-gradient(135deg, #11998e, #38ef7d)', color: '#ffffff' },
            orange: { background: 'linear-gradient(135deg, #f12711, #f5af19)', color: '#ffffff' },
            purple: { background: 'linear-gradient(135deg, #8e2de2, #4a00e0)', color: '#ffffff' }
        };

        // Clean up stale data from previous attempts
        try { indexedDB.deleteDatabase('PresentationDB'); } catch(e) {}
        localStorage.removeItem('presentationSlides');
        localStorage.removeItem('presentationSlideIndex');

        let initialized = false;

        // Initialize (SIMPLE)
        function init() {
            loadAllPresentations();
            loadPresentation();

            if (slides.length === 0) {
                addSlide();
            } else {
                // IMPORTANT: set content on DOM BEFORE renderSlidesList,
                // because renderSlidesList syncs DOM → array
                const slide = slides[currentSlideIndex];
                if (slide) {
                    const canvas = document.getElementById('slideCanvas');
                    const content = document.getElementById('slideContent');
                    const theme = themes[slide.theme] || themes.white;

                    canvas.style.background = theme.background;
                    content.style.color = theme.color;
                    content.innerHTML = slide.content || '';

                    updateSlideInfo();
                }
                renderSlidesList();
            }
            initialized = true;
            setTimeout(setupShapeHandlers, 100);
        }

        // Toggle presentations menu
        function togglePresentationsMenu() {
            const menu = document.getElementById('presentationsMenu');
            menu.classList.toggle('open');
            if (menu.classList.contains('open')) {
                renderPresentationsList();
            }
        }

        // Render presentations list
        function renderPresentationsList() {
            // Render current presentation section
            const currentSection = document.getElementById('currentPresentationSection');
            const slideCount = slides.length;
            const statusBadge = hasUnsavedChanges ? '<span class="unsaved-badge">Unsaved</span>' :
                                (currentPresentationId ? '<span class="saved-badge">Saved</span>' : '');

            currentSection.innerHTML = `
                <div class="presentation-item active">
                    <div class="presentation-item-title">${currentPresentationName}${statusBadge}</div>
                    <div class="presentation-item-meta">${slideCount} slide${slideCount !== 1 ? 's' : ''}</div>
                    <div class="presentation-item-actions">
                        <button class="pres-action-btn load" onclick="saveCurrentPresentation()">
                            <i class="fas fa-save"></i> Save
                        </button>
                        <button class="pres-action-btn rename" onclick="renameCurrentPresentation()">
                            <i class="fas fa-edit"></i> Rename
                        </button>
                    </div>
                </div>
            `;

            // Render saved presentations list
            const list = document.getElementById('presentationsList');

            if (savedPresentations.length === 0) {
                list.innerHTML = `
                    <div class="empty-presentations">
                        <i class="fas fa-desktop"></i>
                        <p>No saved presentations yet</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = savedPresentations.map((pres, index) => {
                const date = new Date(pres.savedAt).toLocaleDateString();
                const slideCount = pres.slides.length;

                return `
                    <div class="presentation-item">
                        <div class="presentation-item-title">${pres.name || 'Untitled Presentation'}</div>
                        <div class="presentation-item-meta">${slideCount} slide${slideCount !== 1 ? 's' : ''} • ${date}</div>
                        <div class="presentation-item-actions">
                            <button class="pres-action-btn load" onclick="loadPresentationData(${index})">
                                <i class="fas fa-folder-open"></i> Load
                            </button>
                            <button class="pres-action-btn rename" onclick="renameSavedPresentation(${index})">
                                <i class="fas fa-edit"></i> Rename
                            </button>
                            <button class="pres-action-btn delete" onclick="deletePresentation(${index})">
                                <i class="fas fa-trash"></i> Delete
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Save current presentation
        function saveCurrentPresentation() {
            // Sync current slide editor content before saving
            const slideContent = document.getElementById('slideContent');
            if (slideContent && slides[currentSlideIndex]) {
                slides[currentSlideIndex].content = slideContent.innerHTML;
            }

            if (!currentPresentationId) {
                const name = prompt('Enter presentation name:', currentPresentationName);
                if (!name) return;
                currentPresentationName = name;
            }

            const pres = {
                id: currentPresentationId || Date.now(),
                name: currentPresentationName,
                slides: JSON.parse(JSON.stringify(slides)),
                savedAt: new Date().toISOString()
            };

            if (currentPresentationId) {
                const index = savedPresentations.findIndex(p => p.id === currentPresentationId);
                if (index !== -1) {
                    savedPresentations[index] = pres;
                } else {
                    savedPresentations.push(pres);
                }
            } else {
                savedPresentations.push(pres);
                currentPresentationId = pres.id;
            }

            hasUnsavedChanges = false;
            localStorage.setItem('savedPresentations', JSON.stringify(savedPresentations));
            document.getElementById('saveStatus').textContent = 'Presentation Saved!';
            setTimeout(() => {
                document.getElementById('saveStatus').textContent = 'Ready';
            }, 2000);

            renderPresentationsList();
        }

        // Rename current presentation
        function renameCurrentPresentation() {
            const name = prompt('Enter new presentation name:', currentPresentationName);
            if (name && name !== currentPresentationName) {
                currentPresentationName = name;
                hasUnsavedChanges = true;
                renderPresentationsList();
            }
        }

        // Rename saved presentation
        function renameSavedPresentation(index) {
            const pres = savedPresentations[index];
            const name = prompt('Enter new presentation name:', pres.name);
            if (name && name !== pres.name) {
                pres.name = name;
                pres.savedAt = new Date().toISOString();
                localStorage.setItem('savedPresentations', JSON.stringify(savedPresentations));

                if (pres.id === currentPresentationId) {
                    currentPresentationName = name;
                }

                renderPresentationsList();
            }
        }

        // Load presentation
        function loadPresentationData(index) {
            const pres = savedPresentations[index];
            if (pres) {
                slides = JSON.parse(JSON.stringify(pres.slides));
                currentPresentationId = pres.id;
                currentPresentationName = pres.name;
                hasUnsavedChanges = false;
                currentSlideIndex = 0;
                renderSlidesList();
                selectSlide(0);
                togglePresentationsMenu();
                document.getElementById('saveStatus').textContent = `Loaded: ${pres.name}`;
                setTimeout(() => {
                    document.getElementById('saveStatus').textContent = 'Ready';
                }, 2000);
            }
        }

        // Delete presentation
        function deletePresentation(index) {
            if (confirm('Delete this presentation?')) {
                const pres = savedPresentations[index];
                savedPresentations.splice(index, 1);
                localStorage.setItem('savedPresentations', JSON.stringify(savedPresentations));

                if (pres.id === currentPresentationId) {
                    currentPresentationId = null;
                    hasUnsavedChanges = true;
                }

                renderPresentationsList();
            }
        }

        // Load all presentations
        function loadAllPresentations() {
            const saved = localStorage.getItem('savedPresentations');
            if (saved) {
                try {
                    savedPresentations = JSON.parse(saved);
                } catch (e) {
                    savedPresentations = [];
                }
            }
        }

        // Close menu when clicking outside
        document.addEventListener('click', (e) => {
            const menu = document.getElementById('presentationsMenu');
            const target = e.target;

            if (!menu.contains(target) && !target.closest('.header-btn')) {
                menu.classList.remove('open');
            }
        });

        // Add new slide
        function addSlide() {
            const slide = {
                id: Date.now(),
                content: '',
                theme: 'white'
            };
            slides.push(slide);
            renderSlidesList();
            selectSlide(slides.length - 1);
            autoSave();
        }

        // Delete slide
        function deleteSlide(index, event) {
            event.stopPropagation();
            if (slides.length <= 1) {
                alert('Cannot delete the only slide');
                return;
            }
            if (confirm('Delete this slide?')) {
                slides.splice(index, 1);
                if (currentSlideIndex >= slides.length) {
                    currentSlideIndex = slides.length - 1;
                }
                renderSlidesList();
                selectSlide(currentSlideIndex);
                autoSave();
            }
        }

        // Render slides list (SIMPLE)
        function renderSlidesList() {
            // Sync current slide content before rendering previews
            const slideContent = document.getElementById('slideContent');
            if (slideContent && slides[currentSlideIndex]) {
                slides[currentSlideIndex].content = slideContent.innerHTML;
            }

            const list = document.getElementById('slidesList');
            list.innerHTML = '';

            slides.forEach((slide, index) => {
                const thumb = document.createElement('div');
                thumb.className = 'slide-thumbnail' + (index === currentSlideIndex ? ' active' : '');
                thumb.onclick = () => selectSlide(index);

                const theme = themes[slide.theme] || themes.white;
                thumb.style.background = theme.background;

                // Create a mini preview div that renders the actual HTML
                const previewContent = document.createElement('div');
                previewContent.className = 'slide-thumbnail-content';
                previewContent.style.color = theme.color;
                previewContent.innerHTML = slide.content;

                thumb.innerHTML = `
                    <span class="slide-number">${index + 1}</span>
                    <button class="slide-delete" onclick="deleteSlide(${index}, event)">
                        <i class="fas fa-times"></i>
                    </button>
                `;

                // Insert the preview content first
                thumb.insertBefore(previewContent, thumb.firstChild);

                list.appendChild(thumb);
            });

            updateSlideInfo();
        }

        // Select slide (SIMPLE)
        function selectSlide(index) {
            // Save current slide before switching
            if (slides[currentSlideIndex]) {
                const slideContent = document.getElementById('slideContent');
                if (slideContent) {
                    slides[currentSlideIndex].content = slideContent.innerHTML;
                }
            }

            currentSlideIndex = index;
            const slide = slides[index];

            if (!slide) return;

            // Display the slide
            const canvas = document.getElementById('slideCanvas');
            const content = document.getElementById('slideContent');
            const theme = themes[slide.theme] || themes.white;

            canvas.style.background = theme.background;
            content.style.color = theme.color;
            content.innerHTML = slide.content || '';

            // Update theme buttons
            document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.theme-${slide.theme}`)?.classList.add('active');

            // Update thumbnails
            document.querySelectorAll('.slide-thumbnail').forEach((thumb, i) => {
                thumb.classList.toggle('active', i === index);
            });

            updateSlideInfo();
            autoSave();
            setTimeout(setupShapeHandlers, 50);
        }

        // Update slide info
        function updateSlideInfo() {
            document.getElementById('slideInfo').textContent = `Slide ${currentSlideIndex + 1} of ${slides.length}`;
        }

        // Format text
        function formatText(command, value = null) {
            document.execCommand(command, false, value);
            document.getElementById('slideContent').focus();
            updateToolbarState();
        }

        // Update toolbar state
        function updateToolbarState() {
            document.getElementById('btn-bold').classList.toggle('active', document.queryCommandState('bold'));
            document.getElementById('btn-italic').classList.toggle('active', document.queryCommandState('italic'));
            document.getElementById('btn-underline').classList.toggle('active', document.queryCommandState('underline'));
        }

        // Insert heading
        function insertHeading(level) {
            const selection = window.getSelection();
            if (selection.rangeCount > 0) {
                document.execCommand('formatBlock', false, `h${level}`);
            }
        }

        // Insert image from file
        function insertImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = `<img src="${e.target.result}" style="max-width: 100%; max-height: 400px; height: auto; display: block; margin: 10px auto;">`;
                    document.execCommand('insertHTML', false, img);
                    setupImageHandlers();
                    autoSave();
                    renderSlidesList();
                };
                reader.readAsDataURL(file);
            }
            event.target.value = '';
        }

        // Image resize and drag handlers
        let selectedImage = null;
        let isResizing = false;
        let isDraggingImage = false;
        let resizeStartX, resizeStartY, resizeStartWidth, resizeStartHeight;
        let dragStartX, dragStartY, dragOffsetX, dragOffsetY;

        function setupImageHandlers() {
            const content = document.getElementById('slideContent');
            const images = content.querySelectorAll('img');
            images.forEach(img => {
                if (!img.dataset.handlersAttached) {
                    img.dataset.handlersAttached = 'true';
                    img.addEventListener('click', function(e) {
                        e.preventDefault();
                        e.stopPropagation();
                        selectImage(this);
                    });
                    img.addEventListener('mousedown', function(e) {
                        if (this.classList.contains('selected-img') && !e.target.classList.contains('img-resize-handle')) {
                            startDragImage(e, this);
                        }
                    });
                }
            });
        }

        function selectImage(img) {
            deselectAllImages();
            selectedImage = img;
            img.classList.add('selected-img');

            // Wrap image in resize wrapper if not already wrapped
            if (!img.parentElement.classList.contains('img-resize-wrapper')) {
                const wrapper = document.createElement('div');
                wrapper.className = 'img-resize-wrapper';
                wrapper.contentEditable = 'false';
                img.parentNode.insertBefore(wrapper, img);
                wrapper.appendChild(img);
            }

            // Add resize handle
            const wrapper = img.parentElement;
            if (!wrapper.querySelector('.img-resize-handle')) {
                const handle = document.createElement('div');
                handle.className = 'img-resize-handle';
                handle.addEventListener('mousedown', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    startResize(e, img);
                });
                wrapper.appendChild(handle);
            }
        }

        function deselectAllImages() {
            selectedImage = null;
            const content = document.getElementById('slideContent');
            content.querySelectorAll('img.selected-img').forEach(img => {
                img.classList.remove('selected-img');
            });
            content.querySelectorAll('.img-resize-handle').forEach(handle => {
                handle.remove();
            });
            content.querySelectorAll('.img-resize-wrapper').forEach(wrapper => {
                const img = wrapper.querySelector('img');
                if (img) {
                    wrapper.parentNode.insertBefore(img, wrapper);
                    wrapper.remove();
                }
            });
        }

        function startResize(e, img) {
            isResizing = true;
            resizeStartX = e.clientX;
            resizeStartY = e.clientY;
            resizeStartWidth = img.offsetWidth;
            resizeStartHeight = img.offsetHeight;
            selectedImage = img;

            document.addEventListener('mousemove', doResize);
            document.addEventListener('mouseup', stopResize);
        }

        function doResize(e) {
            if (!isResizing || !selectedImage) return;
            const dx = e.clientX - resizeStartX;
            const aspectRatio = resizeStartWidth / resizeStartHeight;
            const newWidth = Math.max(30, resizeStartWidth + dx);
            const newHeight = newWidth / aspectRatio;
            selectedImage.style.width = newWidth + 'px';
            selectedImage.style.height = newHeight + 'px';
            selectedImage.style.maxWidth = 'none';
            selectedImage.style.maxHeight = 'none';
        }

        function stopResize(e) {
            isResizing = false;
            document.removeEventListener('mousemove', doResize);
            document.removeEventListener('mouseup', stopResize);
            autoSave();
            renderSlidesList();
        }

        function startDragImage(e, img) {
            isDraggingImage = true;
            selectedImage = img;
            const rect = img.getBoundingClientRect();
            dragOffsetX = e.clientX - rect.left;
            dragOffsetY = e.clientY - rect.top;

            // Make image absolutely positioned for free movement
            if (img.style.position !== 'absolute') {
                const slideContent = document.getElementById('slideContent');
                const slideRect = slideContent.getBoundingClientRect();
                const imgLeft = rect.left - slideRect.left;
                const imgTop = rect.top - slideRect.top;
                img.style.position = 'absolute';
                img.style.left = imgLeft + 'px';
                img.style.top = imgTop + 'px';
                img.style.margin = '0';
            }

            document.addEventListener('mousemove', doDragImage);
            document.addEventListener('mouseup', stopDragImage);
            e.preventDefault();
        }

        function doDragImage(e) {
            if (!isDraggingImage || !selectedImage) return;
            const slideContent = document.getElementById('slideContent');
            const slideRect = slideContent.getBoundingClientRect();
            let newLeft = e.clientX - slideRect.left - dragOffsetX;
            let newTop = e.clientY - slideRect.top - dragOffsetY;
            selectedImage.style.left = newLeft + 'px';
            selectedImage.style.top = newTop + 'px';
        }

        function stopDragImage(e) {
            isDraggingImage = false;
            document.removeEventListener('mousemove', doDragImage);
            document.removeEventListener('mouseup', stopDragImage);
            autoSave();
            renderSlidesList();
        }

        // Deselect images when clicking outside
        document.addEventListener('click', function(e) {
            if (!e.target.closest('img') && !e.target.closest('.img-resize-handle') && !e.target.closest('.img-resize-wrapper')) {
                deselectAllImages();
            }
        });

        // Toggle shape menu
        function toggleShapeMenu() {
            const menu = document.getElementById('shapeMenu');
            menu.classList.toggle('open');
        }

        // Close shape menu when clicking outside
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.shape-menu') && !e.target.closest('[onclick*="toggleShapeMenu"]')) {
                const menu = document.getElementById('shapeMenu');
                if (menu) menu.classList.remove('open');
            }
        });

        // Insert shape
        function insertShape(shape) {
            let html = '';
            const color = '#7c3aed';
            switch(shape) {
                case 'rectangle':
                    html = `<div style="width:150px;height:100px;background:${color};display:inline-block;" contenteditable="false"></div>`;
                    break;
                case 'rounded-rect':
                    html = `<div style="width:150px;height:100px;background:${color};border-radius:15px;display:inline-block;" contenteditable="false"></div>`;
                    break;
                case 'circle':
                    html = `<div style="width:100px;height:100px;background:${color};border-radius:50%;display:inline-block;" contenteditable="false"></div>`;
                    break;
                case 'oval':
                    html = `<div style="width:150px;height:100px;background:${color};border-radius:50%;display:inline-block;" contenteditable="false"></div>`;
                    break;
                case 'triangle':
                    html = `<div style="width:0;height:0;border-left:60px solid transparent;border-right:60px solid transparent;border-bottom:100px solid ${color};display:inline-block;" contenteditable="false"></div>`;
                    break;
                case 'diamond':
                    html = `<div style="width:100px;height:100px;background:${color};transform:rotate(45deg);display:inline-block;margin:25px;" contenteditable="false"></div>`;
                    break;
                case 'pentagon':
                    html = `<div style="width:120px;height:120px;background:${color};clip-path:polygon(50% 0%,100% 38%,82% 100%,18% 100%,0% 38%);display:inline-block;" contenteditable="false"></div>`;
                    break;
                case 'hexagon':
                    html = `<div style="width:120px;height:104px;background:${color};clip-path:polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%);display:inline-block;" contenteditable="false"></div>`;
                    break;
                case 'star':
                    html = `<div style="width:120px;height:120px;background:${color};clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);display:inline-block;" contenteditable="false"></div>`;
                    break;
                case 'arrow-right':
                    html = `<div style="width:150px;height:80px;background:${color};clip-path:polygon(0% 20%,60% 20%,60% 0%,100% 50%,60% 100%,60% 80%,0% 80%);display:inline-block;" contenteditable="false"></div>`;
                    break;
                case 'arrow-left':
                    html = `<div style="width:150px;height:80px;background:${color};clip-path:polygon(40% 0%,40% 20%,100% 20%,100% 80%,40% 80%,40% 100%,0% 50%);display:inline-block;" contenteditable="false"></div>`;
                    break;
                case 'heart':
                    html = `<div style="width:120px;height:110px;background:${color};clip-path:polygon(50% 100%,0% 35%,0% 15%,15% 0%,35% 0%,50% 15%,65% 0%,85% 0%,100% 15%,100% 35%);display:inline-block;" contenteditable="false"></div>`;
                    break;
                case 'cross':
                    html = `<div style="width:100px;height:100px;background:${color};clip-path:polygon(35% 0%,65% 0%,65% 35%,100% 35%,100% 65%,65% 65%,65% 100%,35% 100%,35% 65%,0% 65%,0% 35%,35% 35%);display:inline-block;" contenteditable="false"></div>`;
                    break;
            }
            document.execCommand('insertHTML', false, html);
            document.getElementById('shapeMenu').classList.remove('open');
            setTimeout(setupShapeHandlers, 50);
            autoSave();
            renderSlidesList();
        }

        // Shape selection and color
        let selectedShape = null;

        function setupShapeHandlers() {
            const content = document.getElementById('slideContent');
            content.querySelectorAll('div[contenteditable="false"]').forEach(shape => {
                if (shape.dataset.shapeHandlers) return;
                shape.dataset.shapeHandlers = 'true';
                shape.style.cursor = 'pointer';
                shape.addEventListener('mousedown', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    if (this.classList.contains('selected-shape')) {
                        startDragShape(e, this);
                    } else {
                        selectShape(this);
                    }
                });
            });
        }

        function selectShape(shape) {
            deselectAllShapes();
            selectedShape = shape;
            shape.classList.add('selected-shape');
            showShapeColorPicker(shape);
        }

        function deselectAllShapes() {
            if (selectedShape) {
                selectedShape.classList.remove('selected-shape');
                selectedShape = null;
            }
            const picker = document.getElementById('shapeColorPicker');
            if (picker) picker.classList.remove('open');
        }

        function showShapeColorPicker(shape) {
            const picker = document.getElementById('shapeColorPicker');
            const rect = shape.getBoundingClientRect();
            const container = document.querySelector('.slide-canvas-container').getBoundingClientRect();
            picker.style.left = (rect.right - container.left + 8) + 'px';
            picker.style.top = (rect.top - container.top) + 'px';
            picker.classList.add('open');

            const currentColor = shape.style.background || shape.style.backgroundColor || shape.style.borderBottomColor || '#7c3aed';
            document.getElementById('shapeCustomColor').value = rgbToHex(currentColor);
        }

        function setShapeColor(color) {
            if (!selectedShape) return;
            if (selectedShape.style.borderBottomColor) {
                selectedShape.style.borderBottomColor = color;
            } else {
                selectedShape.style.background = color;
            }
            autoSave();
            renderSlidesList();
        }

        function rgbToHex(color) {
            if (!color) return '#7c3aed';
            if (color.startsWith('#')) return color;
            const match = color.match(/\d+/g);
            if (!match || match.length < 3) return '#7c3aed';
            return '#' + match.slice(0, 3).map(x => parseInt(x).toString(16).padStart(2, '0')).join('');
        }

        // Shape dragging
        let isDraggingShape = false;
        let dragShapeOffsetX, dragShapeOffsetY;

        function startDragShape(e, shape) {
            isDraggingShape = true;
            const rect = shape.getBoundingClientRect();
            dragShapeOffsetX = e.clientX - rect.left;
            dragShapeOffsetY = e.clientY - rect.top;

            if (shape.style.position !== 'absolute') {
                const slideContent = document.getElementById('slideContent');
                const slideRect = slideContent.getBoundingClientRect();
                shape.style.position = 'absolute';
                shape.style.left = (rect.left - slideRect.left) + 'px';
                shape.style.top = (rect.top - slideRect.top) + 'px';
                shape.style.margin = '0';
            }

            document.addEventListener('mousemove', doDragShape);
            document.addEventListener('mouseup', stopDragShape);
        }

        function doDragShape(e) {
            if (!isDraggingShape || !selectedShape) return;
            const slideContent = document.getElementById('slideContent');
            const slideRect = slideContent.getBoundingClientRect();
            selectedShape.style.left = (e.clientX - slideRect.left - dragShapeOffsetX) + 'px';
            selectedShape.style.top = (e.clientY - slideRect.top - dragShapeOffsetY) + 'px';
        }

        function stopDragShape() {
            isDraggingShape = false;
            document.removeEventListener('mousemove', doDragShape);
            document.removeEventListener('mouseup', stopDragShape);
            if (selectedShape) showShapeColorPicker(selectedShape);
            autoSave();
            renderSlidesList();
        }

        // Deselect shapes when clicking elsewhere (use mousedown to fire before shape handlers)
        document.addEventListener('mousedown', function(e) {
            if (!selectedShape) return;
            // Don't deselect if clicking on a shape, the color picker, or its swatches
            if (e.target.closest('div[contenteditable="false"]')) return;
            if (e.target.closest('#shapeColorPicker')) return;
            deselectAllShapes();
        });

        // Handle shape deletion and background color cleanup
        document.getElementById('slideContent').addEventListener('keydown', function(e) {
            // If a shape is selected via our system, delete it
            if (selectedShape && (e.key === 'Delete' || e.key === 'Backspace')) {
                e.preventDefault();
                const shapeEl = selectedShape;
                deselectAllShapes();
                shapeEl.remove();
                document.execCommand('hiliteColor', false, 'transparent');
                document.execCommand('backColor', false, 'transparent');
                this.focus();
                autoSave();
                renderSlidesList();
                return;
            }
            // If backspace/delete next to a shape, manually remove it
            if (e.key === 'Backspace' || e.key === 'Delete') {
                const sel = window.getSelection();
                if (sel.rangeCount > 0 && sel.isCollapsed) {
                    const range = sel.getRangeAt(0);
                    const node = range.startContainer;
                    const offset = range.startOffset;

                    if (e.key === 'Backspace') {
                        // Check node before cursor
                        let prev = null;
                        if (node.nodeType === 1 && offset > 0) {
                            prev = node.childNodes[offset - 1];
                        } else if (node.nodeType === 3 && offset === 0) {
                            prev = node.previousSibling;
                        }
                        if (prev && prev.nodeType === 1 && prev.getAttribute('contenteditable') === 'false') {
                            e.preventDefault();
                            prev.remove();
                            document.execCommand('hiliteColor', false, 'transparent');
                            document.execCommand('backColor', false, 'transparent');
                            autoSave();
                            renderSlidesList();
                            return;
                        }
                    }

                    if (e.key === 'Delete') {
                        // Check node after cursor
                        let next = null;
                        if (node.nodeType === 1 && offset < node.childNodes.length) {
                            next = node.childNodes[offset];
                        } else if (node.nodeType === 3 && offset === node.length) {
                            next = node.nextSibling;
                        }
                        if (next && next.nodeType === 1 && next.getAttribute('contenteditable') === 'false') {
                            e.preventDefault();
                            next.remove();
                            document.execCommand('hiliteColor', false, 'transparent');
                            document.execCommand('backColor', false, 'transparent');
                            autoSave();
                            renderSlidesList();
                            return;
                        }
                    }
                }
            }
        });

        // Set theme
        function setTheme(themeName) {
            slides[currentSlideIndex].theme = themeName;
            const theme = themes[themeName];

            document.getElementById('slideCanvas').style.background = theme.background;
            document.getElementById('slideContent').style.color = theme.color;

            document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.theme-${themeName}`)?.classList.add('active');

            renderSlidesList();
            autoSave();
        }

        // Start presentation
        function startPresentation() {
            // Save current slide
            slides[currentSlideIndex].content = document.getElementById('slideContent').innerHTML;

            presentationSlideIndex = 0;
            showPresentationSlide();
            document.getElementById('presentationMode').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // Show presentation slide
        function showPresentationSlide() {
            const slide = slides[presentationSlideIndex];
            const theme = themes[slide.theme] || themes.white;
            const container = document.getElementById('presentationSlide');

            container.style.background = theme.background;
            container.innerHTML = `<div class="presentation-slide-content" style="color: ${theme.color}">${slide.content}</div>`;
            container.style.animation = 'fadeIn 0.3s ease';

            document.getElementById('presentationCounter').textContent = `${presentationSlideIndex + 1} / ${slides.length}`;
        }

        // Next slide
        function nextSlide() {
            if (presentationSlideIndex < slides.length - 1) {
                presentationSlideIndex++;
                showPresentationSlide();
            }
        }

        // Previous slide
        function prevSlide() {
            if (presentationSlideIndex > 0) {
                presentationSlideIndex--;
                showPresentationSlide();
            }
        }

        // Exit presentation
        function exitPresentation() {
            document.getElementById('presentationMode').classList.remove('active');
            document.body.style.overflow = '';
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (document.getElementById('presentationMode').classList.contains('active')) {
                switch(e.key) {
                    case 'ArrowRight':
                    case ' ':
                    case 'Enter':
                        nextSlide();
                        break;
                    case 'ArrowLeft':
                        prevSlide();
                        break;
                    case 'Escape':
                        exitPresentation();
                        break;
                }
            } else {
                if (e.ctrlKey || e.metaKey) {
                    switch(e.key.toLowerCase()) {
                        case 's':
                            e.preventDefault();
                            savePresentation();
                            break;
                        case 'b':
                            e.preventDefault();
                            formatText('bold');
                            break;
                        case 'i':
                            e.preventDefault();
                            formatText('italic');
                            break;
                        case 'u':
                            e.preventDefault();
                            formatText('underline');
                            break;
                    }
                }
            }
        });

        // New presentation
        function newPresentation() {
            if (hasUnsavedChanges && !confirm('You have unsaved changes. Create a new presentation anyway?')) {
                return;
            }
            slides = [];
            currentSlideIndex = 0;
            currentPresentationId = null;
            currentPresentationName = 'Untitled Presentation';
            hasUnsavedChanges = false;
            localStorage.removeItem('presentationData');
            addSlide();
            document.getElementById('saveStatus').textContent = 'New Presentation Created';
            setTimeout(() => {
                document.getElementById('saveStatus').textContent = 'Ready';
            }, 2000);
        }

        // Print presentation
        function printPresentation() {
            if (slides.length === 0) {
                alert('No slides to print');
                return;
            }

            // Save current slide content before printing
            if (slides[currentSlideIndex]) {
                const slideContent = document.getElementById('slideContent');
                if (slideContent) {
                    slides[currentSlideIndex].content = slideContent.innerHTML;
                }
            }

            // Populate print container with all slides
            const printContainer = document.getElementById('printContainer');
            printContainer.innerHTML = '';

            slides.forEach((slide, index) => {
                const slideDiv = document.createElement('div');
                slideDiv.className = 'print-slide';
                const theme = themes[slide.theme] || themes.white;
                slideDiv.style.background = theme.background;
                slideDiv.style.color = theme.color;
                slideDiv.innerHTML = slide.content;
                printContainer.appendChild(slideDiv);
            });

            // Trigger print
            window.print();
        }

        // Save presentation as PDF
        async function savePresentation() {
            // Save current slide first
            slides[currentSlideIndex].content = document.getElementById('slideContent').innerHTML;

            document.getElementById('saveStatus').textContent = 'Generating PDF...';

            // Always ask for presentation name with previous name as suggestion
            const name = prompt('Enter presentation name:', currentPresentationName);
            if (!name) {
                document.getElementById('saveStatus').textContent = 'Save cancelled';
                setTimeout(() => {
                    document.getElementById('saveStatus').textContent = 'Ready';
                }, 2000);
                return;
            }
            currentPresentationName = name;
            if (!currentPresentationId) {
                currentPresentationId = Date.now();
            }

            // Create a container for all slides
            const pdfContainer = document.createElement('div');

            slides.forEach((slide) => {
                const slideDiv = document.createElement('div');
                const theme = themes[slide.theme] || themes.white;
                slideDiv.style.cssText = `
                    width: 960px; height: 540px;
                    background: ${theme.background}; color: ${theme.color};
                    padding: 40px; box-sizing: border-box;
                `;
                slideDiv.innerHTML = slide.content;
                pdfContainer.appendChild(slideDiv);
            });

            document.body.appendChild(pdfContainer);
            await new Promise(resolve => setTimeout(resolve, 100));

            const opt = {
                margin: 0,
                filename: currentPresentationName + '.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true, letterRendering: true },
                jsPDF: { unit: 'px', format: [960, 540], orientation: 'landscape' }
            };

            try {
                await html2pdf().set(opt).from(pdfContainer).save();
                document.body.removeChild(pdfContainer);
                document.getElementById('saveStatus').textContent = 'Downloaded ' + currentPresentationName + '.pdf';
                setTimeout(() => {
                    document.getElementById('saveStatus').textContent = 'Ready';
                }, 2000);
            } catch (error) {
                console.error('PDF generation error:', error);
                if (pdfContainer.parentNode) document.body.removeChild(pdfContainer);
                document.getElementById('saveStatus').textContent = 'PDF generation failed';
                setTimeout(() => {
                    document.getElementById('saveStatus').textContent = 'Ready';
                }, 2000);
            }
        }

        // Auto-save to localStorage (SIMPLE like document.html)
        function autoSave() {
            try {
                // Save current slide content to array
                const slideContent = document.getElementById('slideContent');
                if (slideContent && slides[currentSlideIndex]) {
                    slides[currentSlideIndex].content = slideContent.innerHTML;
                }

                // Save everything to localStorage
                localStorage.setItem('presentationData', JSON.stringify(slides));
                localStorage.setItem('currentSlideIndex', currentSlideIndex.toString());
            } catch (e) {
                console.error('[Presentation] Save failed:', e);
            }
        }

        // Load saved content (SIMPLE like document.html)
        function loadPresentation() {
            const saved = localStorage.getItem('presentationData');
            if (saved) {
                try {
                    slides = JSON.parse(saved);
                    if (!Array.isArray(slides) || slides.length === 0) {
                        slides = [];
                    }
                } catch (e) {
                    slides = [];
                }
            }

            const savedIndex = localStorage.getItem('currentSlideIndex');
            if (savedIndex) {
                currentSlideIndex = parseInt(savedIndex) || 0;
                if (currentSlideIndex >= slides.length) {
                    currentSlideIndex = 0;
                }
            }
        }

        // Go back
        function goBack() {
            autoSave();
            window.location.href = '../Tools.html';
        }

        // Content change listener (SIMPLE)
        let thumbnailUpdateTimer = null;
        document.getElementById('slideContent').addEventListener('input', () => {
            hasUnsavedChanges = true;
            // Update slide content in array
            if (slides[currentSlideIndex]) {
                slides[currentSlideIndex].content = document.getElementById('slideContent').innerHTML;
            }
            // Update thumbnail preview with debounce
            clearTimeout(thumbnailUpdateTimer);
            thumbnailUpdateTimer = setTimeout(() => {
                const thumb = document.querySelectorAll('.slide-thumbnail')[currentSlideIndex];
                if (thumb) {
                    const preview = thumb.querySelector('.slide-thumbnail-content');
                    if (preview) {
                        preview.innerHTML = slides[currentSlideIndex].content;
                    }
                }
            }, 300);
        });

        // Selection change listener
        document.addEventListener('selectionchange', () => {
            if (document.activeElement.id === 'slideContent') {
                updateToolbarState();
            }
        });

        // Auto-save every 3 seconds and update preview
        setInterval(() => {
            autoSave();
            renderSlidesList();
        }, 3000);

        // Save when page visibility changes or before unload
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'hidden') {
                autoSave();
            }
        });

        window.addEventListener('beforeunload', () => {
            autoSave();
        });

        // Initialize on load
        init();
    </script>

</body>
