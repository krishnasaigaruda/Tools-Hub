<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistics Calculator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            display: flex;
            align-items: center;
            padding: 14px 24px;
            background: #4f46e5;
            border-bottom: 1px solid #6366f1;
            gap: 16px;
        }
        .back-btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
            color: #e0e7ff;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
            font-family: inherit;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .back-btn:hover { background: rgba(255,255,255,0.25); color: #fff; }
        .header h1 {
            font-size: 1.3rem;
            color: #fff;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header h1 i { font-size: 1.1rem; }

        .main-content {
            flex: 1;
            display: flex;
            gap: 24px;
            padding: 24px;
            overflow: auto;
        }

        /* Left panel - input */
        .input-panel {
            width: 340px;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .panel-card {
            background: #1e293b;
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
            border: 1px solid #334155;
        }
        .panel-card h3 {
            font-size: 0.82rem;
            font-weight: 700;
            color: #818cf8;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .panel-card h3 i { font-size: 0.85rem; }

        #dataInput {
            width: 100%;
            height: 180px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            color: #e2e8f0;
            padding: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.88rem;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
            line-height: 1.6;
        }
        #dataInput:focus { border-color: #818cf8; }
        #dataInput::placeholder { color: #475569; }

        .btn-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .btn {
            padding: 8px 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary {
            background: #4f46e5;
            color: #fff;
        }
        .btn-primary:hover { background: #4338ca; }
        .btn-secondary {
            background: #334155;
            color: #cbd5e1;
        }
        .btn-secondary:hover { background: #475569; color: #fff; }
        .btn-danger {
            background: #991b1b;
            color: #fca5a5;
        }
        .btn-danger:hover { background: #b91c1c; color: #fff; }
        .btn-success {
            background: #065f46;
            color: #6ee7b7;
        }
        .btn-success:hover { background: #047857; }

        .sample-btn {
            padding: 6px 12px;
            background: #1e293b;
            border: 1px solid #475569;
            color: #94a3b8;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.75rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        .sample-btn:hover { background: #334155; color: #c7d2fe; border-color: #818cf8; }

        .sorted-data {
            margin-top: 10px;
            padding: 10px;
            background: #0f172a;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: #94a3b8;
            max-height: 100px;
            overflow-y: auto;
            display: none;
            word-break: break-all;
            line-height: 1.6;
        }
        .sorted-data.show { display: block; }

        /* Right panel - results */
        .results-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            min-width: 0;
        }

        /* Stats grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(195px, 1fr));
            gap: 12px;
        }
        .stat-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 14px 16px;
            border: 1px solid #334155;
            transition: border-color 0.2s, transform 0.15s;
        }
        .stat-card:hover {
            border-color: #6366f1;
            transform: translateY(-1px);
        }
        .stat-label {
            font-size: 0.72rem;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }
        .stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.2rem;
            font-weight: 700;
            color: #c7d2fe;
        }
        .stat-value.small { font-size: 0.95rem; }

        /* Charts */
        .charts-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .chart-card {
            background: #1e293b;
            border-radius: 14px;
            padding: 18px;
            border: 1px solid #334155;
        }
        .chart-card h3 {
            font-size: 0.8rem;
            font-weight: 700;
            color: #818cf8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .chart-card h3 i { font-size: 0.8rem; }
        .chart-card canvas {
            width: 100%;
            border-radius: 8px;
            background: #0f172a;
        }

        /* Frequency table */
        .freq-section {
            background: #1e293b;
            border-radius: 14px;
            padding: 18px;
            border: 1px solid #334155;
        }
        .freq-section h3 {
            font-size: 0.8rem;
            font-weight: 700;
            color: #818cf8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .freq-section h3 i { font-size: 0.8rem; }
        .freq-table-wrap {
            max-height: 250px;
            overflow-y: auto;
            border-radius: 8px;
        }
        .freq-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.82rem;
        }
        .freq-table th {
            background: #0f172a;
            color: #94a3b8;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.72rem;
            letter-spacing: 0.05em;
            padding: 10px 14px;
            text-align: left;
            position: sticky;
            top: 0;
            z-index: 1;
        }
        .freq-table td {
            padding: 8px 14px;
            border-top: 1px solid #1e293b;
            color: #cbd5e1;
            font-family: 'JetBrains Mono', monospace;
        }
        .freq-table tr:nth-child(even) td { background: rgba(15,23,42,0.4); }
        .freq-table tr:hover td { background: rgba(99,102,241,0.08); }
        .freq-bar {
            height: 6px;
            background: #6366f1;
            border-radius: 3px;
            min-width: 4px;
            transition: width 0.3s;
        }

        /* Status bar */
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 24px;
            background: #1e293b;
            border-top: 1px solid #334155;
            font-size: 0.78rem;
            color: #64748b;
        }
        .status-bar span { display: flex; align-items: center; gap: 6px; }
        .status-indicator {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #334155;
            transition: background 0.3s;
        }
        .status-indicator.active { background: #22c55e; }

        /* Empty state */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            color: #475569;
            text-align: center;
        }
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 16px;
            color: #334155;
        }
        .empty-state p { font-size: 0.9rem; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* Copy toast */
        .toast {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #22c55e;
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.82rem;
            font-weight: 600;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s;
            z-index: 100;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* Responsive */
        @media (max-width: 1100px) {
            .charts-row { grid-template-columns: 1fr; }
        }
        @media (max-width: 900px) {
            .main-content { flex-direction: column; }
            .input-panel { width: 100%; min-width: 0; }
            .stats-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
        }
    </style>
</head>
<body>

<div class="header">
    <a href="../Tools.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
    <h1><i class="fas fa-chart-bar"></i> Statistics Calculator</h1>
</div>

<div class="main-content">
    <!-- Left: Input Panel -->
    <div class="input-panel">
        <div class="panel-card">
            <h3><i class="fas fa-keyboard"></i> Data Input</h3>
            <textarea id="dataInput" placeholder="Enter numbers separated by commas, spaces, newlines, or tabs...&#10;&#10;Example: 12, 45, 23, 67, 34, 89, 12, 56"></textarea>
            <div class="btn-row">
                <button class="btn btn-primary" onclick="calculate()"><i class="fas fa-calculator"></i> Calculate</button>
                <button class="btn btn-secondary" onclick="sortData()"><i class="fas fa-sort-numeric-down"></i> Sort</button>
                <button class="btn btn-success" onclick="copyResults()"><i class="fas fa-copy"></i> Copy</button>
                <button class="btn btn-danger" onclick="clearAll()"><i class="fas fa-trash"></i> Clear</button>
            </div>
            <div id="sortedData" class="sorted-data"></div>
        </div>

        <div class="panel-card">
            <h3><i class="fas fa-flask"></i> Sample Datasets</h3>
            <div class="btn-row">
                <button class="sample-btn" onclick="loadSample('scores')">Test Scores</button>
                <button class="sample-btn" onclick="loadSample('random')">Random 20</button>
                <button class="sample-btn" onclick="loadSample('dice')">Dice Rolls</button>
                <button class="sample-btn" onclick="loadSample('heights')">Heights (cm)</button>
                <button class="sample-btn" onclick="loadSample('temps')">Temperatures</button>
            </div>
        </div>

        <div class="panel-card">
            <h3><i class="fas fa-file-import"></i> Import CSV</h3>
            <input type="file" id="csvFile" accept=".csv,.txt" style="display:none" onchange="importCSV(event)">
            <button class="btn btn-secondary" onclick="document.getElementById('csvFile').click()"><i class="fas fa-upload"></i> Choose File</button>
        </div>
    </div>

    <!-- Right: Results Panel -->
    <div class="results-panel" id="resultsPanel">
        <div class="empty-state" id="emptyState">
            <i class="fas fa-chart-line"></i>
            <p>Enter data on the left to see statistics, charts, and frequency analysis.</p>
        </div>

        <!-- Stats Grid (hidden initially) -->
        <div id="statsSection" style="display:none;">
            <div class="stats-grid" id="statsGrid"></div>
        </div>

        <!-- Charts -->
        <div id="chartsSection" style="display:none;">
            <div class="charts-row">
                <div class="chart-card">
                    <h3><i class="fas fa-chart-column"></i> Histogram</h3>
                    <canvas id="histogramCanvas" height="220"></canvas>
                </div>
                <div class="chart-card">
                    <h3><i class="fas fa-diagram-project"></i> Box Plot</h3>
                    <canvas id="boxplotCanvas" height="220"></canvas>
                </div>
            </div>
        </div>

        <!-- Frequency Table -->
        <div id="freqSection" class="freq-section" style="display:none;">
            <h3><i class="fas fa-table"></i> Frequency Distribution</h3>
            <div class="freq-table-wrap">
                <table class="freq-table">
                    <thead><tr><th>Value</th><th>Frequency</th><th>Rel. Freq.</th><th>Distribution</th></tr></thead>
                    <tbody id="freqBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="status-bar">
    <span><span class="status-indicator" id="statusDot"></span> <span id="statusText">No data loaded</span></span>
    <span id="statusRight"></span>
</div>

<div class="toast" id="toast">Copied to clipboard!</div>

<script>
    const dataInput = document.getElementById('dataInput');
    let currentStats = null;

    // Real-time calculation on input
    dataInput.addEventListener('input', () => {
        const nums = parseInput(dataInput.value);
        if (nums.length >= 2) {
            calculate();
        } else if (nums.length === 0) {
            showEmpty();
        }
    });

    function parseInput(text) {
        return text
            .replace(/[,\t]+/g, ' ')
            .split(/[\s]+/)
            .map(s => s.trim())
            .filter(s => s !== '' && !isNaN(Number(s)))
            .map(Number);
    }

    function calculate() {
        const nums = parseInput(dataInput.value);
        if (nums.length === 0) { showEmpty(); return; }

        const sorted = [...nums].sort((a, b) => a - b);
        const n = nums.length;
        const sum = nums.reduce((a, b) => a + b, 0);
        const mean = sum / n;

        // Median
        const median = n % 2 === 0
            ? (sorted[n/2 - 1] + sorted[n/2]) / 2
            : sorted[Math.floor(n/2)];

        // Mode
        const freq = {};
        nums.forEach(v => freq[v] = (freq[v] || 0) + 1);
        const maxFreq = Math.max(...Object.values(freq));
        const modes = Object.keys(freq).filter(k => freq[k] === maxFreq).map(Number);
        const modeStr = maxFreq === 1 ? 'None' : modes.join(', ');

        // Range, Min, Max
        const min = sorted[0];
        const max = sorted[n - 1];
        const range = max - min;

        // Variance & Std Dev
        const sumSq = nums.reduce((s, v) => s + (v - mean) ** 2, 0);
        const popVariance = sumSq / n;
        const sampleVariance = n > 1 ? sumSq / (n - 1) : 0;
        const popStdDev = Math.sqrt(popVariance);
        const sampleStdDev = Math.sqrt(sampleVariance);

        // Quartiles
        function quartile(arr, q) {
            const pos = (arr.length - 1) * q;
            const lo = Math.floor(pos);
            const hi = Math.ceil(pos);
            const frac = pos - lo;
            return arr[lo] + frac * (arr[hi] - arr[lo]);
        }
        const q1 = quartile(sorted, 0.25);
        const q2 = quartile(sorted, 0.50);
        const q3 = quartile(sorted, 0.75);
        const iqr = q3 - q1;

        // Skewness (Fisher-Pearson)
        let skewness = 0;
        if (n >= 3 && sampleStdDev > 0) {
            const m3 = nums.reduce((s, v) => s + ((v - mean) / sampleStdDev) ** 3, 0);
            skewness = (n / ((n - 1) * (n - 2))) * m3;
        }

        // Sum of Squares
        const sumOfSquares = nums.reduce((s, v) => s + v * v, 0);

        currentStats = {
            n, sum, mean, median, modeStr, range, min, max,
            popVariance, sampleVariance, popStdDev, sampleStdDev,
            q1, q2, q3, iqr, skewness, sumOfSquares, sorted, freq, nums
        };

        renderStats(currentStats);
        renderCharts(currentStats);
        renderFrequency(currentStats);
        updateStatus(n);
    }

    function fmt(v) {
        if (Number.isInteger(v)) return v.toLocaleString();
        return parseFloat(v.toFixed(4)).toLocaleString(undefined, { maximumFractionDigits: 4 });
    }

    function renderStats(s) {
        document.getElementById('emptyState').style.display = 'none';
        document.getElementById('statsSection').style.display = 'block';
        document.getElementById('chartsSection').style.display = 'block';
        document.getElementById('freqSection').style.display = 'block';

        const items = [
            ['Count (n)', s.n, 'fas fa-hashtag'],
            ['Sum', fmt(s.sum), 'fas fa-plus'],
            ['Mean', fmt(s.mean), 'fas fa-equals'],
            ['Median', fmt(s.median), 'fas fa-arrows-left-right-to-line'],
            ['Mode', s.modeStr, 'fas fa-clone'],
            ['Range', fmt(s.range), 'fas fa-arrows-left-right'],
            ['Minimum', fmt(s.min), 'fas fa-arrow-down'],
            ['Maximum', fmt(s.max), 'fas fa-arrow-up'],
            ['Pop. Variance', fmt(s.popVariance), 'fas fa-chart-area'],
            ['Sample Variance', fmt(s.sampleVariance), 'fas fa-chart-area'],
            ['Pop. Std Dev', fmt(s.popStdDev), 'fas fa-wave-square'],
            ['Sample Std Dev', fmt(s.sampleStdDev), 'fas fa-wave-square'],
            ['Q1 (25th)', fmt(s.q1), 'fas fa-layer-group'],
            ['Q2 (50th)', fmt(s.q2), 'fas fa-layer-group'],
            ['Q3 (75th)', fmt(s.q3), 'fas fa-layer-group'],
            ['IQR', fmt(s.iqr), 'fas fa-ruler-horizontal'],
            ['Skewness', fmt(s.skewness), 'fas fa-chart-line'],
            ['Sum of Squares', fmt(s.sumOfSquares), 'fas fa-square'],
        ];

        const grid = document.getElementById('statsGrid');
        grid.innerHTML = items.map(([label, value, icon]) => `
            <div class="stat-card">
                <div class="stat-label"><i class="${icon}" style="margin-right:4px;color:#6366f1;font-size:0.7rem;"></i>${label}</div>
                <div class="stat-value${String(value).length > 10 ? ' small' : ''}">${value}</div>
            </div>
        `).join('');
    }

    function renderCharts(s) {
        drawHistogram(s);
        drawBoxPlot(s);
    }

    function drawHistogram(s) {
        const canvas = document.getElementById('histogramCanvas');
        const ctx = canvas.getContext('2d');
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.height = 220 * dpr;
        ctx.scale(dpr, dpr);
        const W = rect.width, H = 220;
        ctx.clearRect(0, 0, W, H);

        const sorted = s.sorted;
        const min = s.min, max = s.max;
        const range = max - min || 1;

        // Determine bins
        const binCount = Math.min(Math.max(Math.ceil(Math.sqrt(s.n)), 5), 25);
        const binWidth = range / binCount;
        const bins = new Array(binCount).fill(0);
        sorted.forEach(v => {
            let idx = Math.floor((v - min) / binWidth);
            if (idx >= binCount) idx = binCount - 1;
            bins[idx]++;
        });
        const maxBin = Math.max(...bins);

        const pad = { top: 15, right: 15, bottom: 35, left: 45 };
        const plotW = W - pad.left - pad.right;
        const plotH = H - pad.top - pad.bottom;
        const barW = plotW / binCount;

        // Y-axis labels
        ctx.fillStyle = '#64748b';
        ctx.font = '10px JetBrains Mono';
        ctx.textAlign = 'right';
        for (let i = 0; i <= 4; i++) {
            const val = Math.round(maxBin * i / 4);
            const y = pad.top + plotH - (plotH * i / 4);
            ctx.fillText(val, pad.left - 6, y + 3);
            ctx.strokeStyle = '#1e293b';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(pad.left, y);
            ctx.lineTo(W - pad.right, y);
            ctx.stroke();
        }

        // Bars
        bins.forEach((count, i) => {
            const x = pad.left + i * barW;
            const barH = (count / maxBin) * plotH;
            const y = pad.top + plotH - barH;
            const gradient = ctx.createLinearGradient(x, y, x, pad.top + plotH);
            gradient.addColorStop(0, '#818cf8');
            gradient.addColorStop(1, '#4f46e5');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.roundRect(x + 1, y, barW - 2, barH, [3, 3, 0, 0]);
            ctx.fill();
        });

        // X-axis labels
        ctx.fillStyle = '#64748b';
        ctx.font = '9px JetBrains Mono';
        ctx.textAlign = 'center';
        for (let i = 0; i <= binCount; i += Math.max(1, Math.floor(binCount / 6))) {
            const val = min + i * binWidth;
            const x = pad.left + i * barW;
            ctx.fillText(fmt(val), x, H - pad.bottom + 14);
        }
    }

    function drawBoxPlot(s) {
        const canvas = document.getElementById('boxplotCanvas');
        const ctx = canvas.getContext('2d');
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.height = 220 * dpr;
        ctx.scale(dpr, dpr);
        const W = rect.width, H = 220;
        ctx.clearRect(0, 0, W, H);

        const pad = { left: 45, right: 25, top: 40, bottom: 40 };
        const plotW = W - pad.left - pad.right;
        const midY = H / 2;
        const boxH = 50;

        // Outlier bounds
        const lowerFence = s.q1 - 1.5 * s.iqr;
        const upperFence = s.q3 + 1.5 * s.iqr;
        const whiskerLow = Math.max(s.min, lowerFence);
        const whiskerHigh = Math.min(s.max, upperFence);
        const outliers = s.sorted.filter(v => v < lowerFence || v > upperFence);

        const dataMin = s.min;
        const dataMax = s.max;
        const range = dataMax - dataMin || 1;

        function xPos(v) {
            return pad.left + ((v - dataMin) / range) * plotW;
        }

        // Whisker line
        ctx.strokeStyle = '#64748b';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(xPos(whiskerLow), midY);
        ctx.lineTo(xPos(whiskerHigh), midY);
        ctx.stroke();

        // Whisker caps
        [whiskerLow, whiskerHigh].forEach(v => {
            ctx.beginPath();
            ctx.moveTo(xPos(v), midY - 15);
            ctx.lineTo(xPos(v), midY + 15);
            ctx.stroke();
        });

        // Box
        const boxX = xPos(s.q1);
        const boxW = xPos(s.q3) - boxX;
        const gradient = ctx.createLinearGradient(boxX, midY - boxH/2, boxX, midY + boxH/2);
        gradient.addColorStop(0, 'rgba(99,102,241,0.4)');
        gradient.addColorStop(1, 'rgba(79,70,229,0.25)');
        ctx.fillStyle = gradient;
        ctx.strokeStyle = '#818cf8';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.roundRect(boxX, midY - boxH/2, boxW, boxH, 4);
        ctx.fill();
        ctx.stroke();

        // Median line
        ctx.strokeStyle = '#f59e0b';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(xPos(s.median), midY - boxH/2);
        ctx.lineTo(xPos(s.median), midY + boxH/2);
        ctx.stroke();

        // Outliers
        ctx.fillStyle = '#f87171';
        outliers.forEach(v => {
            ctx.beginPath();
            ctx.arc(xPos(v), midY, 4, 0, Math.PI * 2);
            ctx.fill();
        });

        // Labels
        ctx.fillStyle = '#64748b';
        ctx.font = '9px JetBrains Mono';
        ctx.textAlign = 'center';
        const labels = [
            [whiskerLow, 'Min'],
            [s.q1, 'Q1'],
            [s.median, 'Med'],
            [s.q3, 'Q3'],
            [whiskerHigh, 'Max']
        ];
        labels.forEach(([v, label]) => {
            ctx.fillText(label, xPos(v), midY + boxH/2 + 20);
            ctx.fillText(fmt(v), xPos(v), midY + boxH/2 + 32);
        });

        // Outlier label
        if (outliers.length > 0) {
            ctx.fillStyle = '#f87171';
            ctx.font = '9px JetBrains Mono';
            ctx.textAlign = 'left';
            ctx.fillText(`${outliers.length} outlier${outliers.length > 1 ? 's' : ''}`, pad.left, pad.top - 10);
        }
    }

    function renderFrequency(s) {
        const body = document.getElementById('freqBody');
        const entries = Object.entries(s.freq)
            .map(([val, count]) => [Number(val), count])
            .sort((a, b) => a[0] - b[0]);
        const maxF = Math.max(...entries.map(e => e[1]));

        body.innerHTML = entries.map(([val, count]) => {
            const relFreq = (count / s.n * 100).toFixed(1);
            const barW = (count / maxF * 100);
            return `<tr>
                <td>${fmt(val)}</td>
                <td>${count}</td>
                <td>${relFreq}%</td>
                <td><div class="freq-bar" style="width:${barW}%"></div></td>
            </tr>`;
        }).join('');
    }

    function showEmpty() {
        document.getElementById('emptyState').style.display = 'flex';
        document.getElementById('statsSection').style.display = 'none';
        document.getElementById('chartsSection').style.display = 'none';
        document.getElementById('freqSection').style.display = 'none';
        updateStatus(0);
        currentStats = null;
    }

    function updateStatus(n) {
        const dot = document.getElementById('statusDot');
        const text = document.getElementById('statusText');
        const right = document.getElementById('statusRight');
        if (n > 0) {
            dot.classList.add('active');
            text.textContent = `${n} data point${n !== 1 ? 's' : ''} loaded`;
            right.textContent = 'Results updated';
        } else {
            dot.classList.remove('active');
            text.textContent = 'No data loaded';
            right.textContent = '';
        }
    }

    function sortData() {
        const nums = parseInput(dataInput.value);
        if (nums.length === 0) return;
        const sorted = [...nums].sort((a, b) => a - b);
        const el = document.getElementById('sortedData');
        el.textContent = sorted.join(', ');
        el.classList.add('show');
    }

    function clearAll() {
        dataInput.value = '';
        document.getElementById('sortedData').classList.remove('show');
        document.getElementById('sortedData').textContent = '';
        showEmpty();
    }

    function copyResults() {
        if (!currentStats) { showToast('No data to copy'); return; }
        const s = currentStats;
        const text = [
            `Statistics Calculator Results`,
            `============================`,
            `Count: ${s.n}`,
            `Sum: ${fmt(s.sum)}`,
            `Mean: ${fmt(s.mean)}`,
            `Median: ${fmt(s.median)}`,
            `Mode: ${s.modeStr}`,
            `Range: ${fmt(s.range)}`,
            `Min: ${fmt(s.min)}`,
            `Max: ${fmt(s.max)}`,
            `Population Variance: ${fmt(s.popVariance)}`,
            `Sample Variance: ${fmt(s.sampleVariance)}`,
            `Population Std Dev: ${fmt(s.popStdDev)}`,
            `Sample Std Dev: ${fmt(s.sampleStdDev)}`,
            `Q1: ${fmt(s.q1)}`,
            `Q2: ${fmt(s.q2)}`,
            `Q3: ${fmt(s.q3)}`,
            `IQR: ${fmt(s.iqr)}`,
            `Skewness: ${fmt(s.skewness)}`,
            `Sum of Squares: ${fmt(s.sumOfSquares)}`,
        ].join('\n');
        navigator.clipboard.writeText(text).then(() => showToast('Results copied to clipboard!'));
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function loadSample(type) {
        const samples = {
            scores: '85, 92, 78, 90, 88, 76, 95, 89, 84, 91, 73, 87, 93, 80, 86, 94, 77, 82, 88, 79',
            random: Array.from({length: 20}, () => Math.floor(Math.random() * 100) + 1).join(', '),
            dice: Array.from({length: 30}, () => Math.floor(Math.random() * 6) + 1).join(', '),
            heights: '162, 175, 168, 180, 155, 170, 178, 165, 172, 183, 160, 177, 169, 174, 158, 181, 167, 171, 176, 163',
            temps: '22.5, 24.1, 19.8, 26.3, 21.0, 23.7, 25.2, 20.4, 27.1, 18.5, 24.8, 22.0, 26.9, 21.5, 23.3'
        };
        dataInput.value = samples[type];
        calculate();
    }

    function importCSV(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            dataInput.value = e.target.result;
            calculate();
        };
        reader.readAsText(file);
        event.target.value = '';
    }
</script>

</body>
