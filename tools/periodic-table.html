<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Periodic Table - Enhanced</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            overflow-x: auto;
        }
        .header {
            display: flex;
            align-items: center;
            padding: 16px 24px;
            background: #1e293b;
            border-bottom: 1px solid #334155;
            gap: 16px;
        }
        .back-btn {
            background: none;
            border: 1px solid #475569;
            color: #94a3b8;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .back-btn:hover { background: #334155; color: #e2e8f0; }
        .header h1 { font-size: 1.5rem; color: #14b8a6; }
        .header .legend {
            display: flex;
            gap: 10px;
            margin-left: auto;
            flex-wrap: wrap;
            font-size: 0.7rem;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }
        .table-container {
            padding: 16px;
            overflow-x: auto;
        }
        .periodic-grid {
            display: grid;
            grid-template-columns: repeat(18, minmax(58px, 1fr));
            gap: 3px;
            min-width: 1080px;
        }
        .element-cell {
            aspect-ratio: 1;
            border-radius: 6px;
            padding: 3px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            border: 1px solid transparent;
            position: relative;
            min-height: 58px;
        }
        .element-cell:hover {
            transform: scale(1.15);
            z-index: 10;
            border-color: #14b8a6;
            box-shadow: 0 0 16px rgba(20,184,166,0.4);
        }
        .element-cell .atomic-num { font-size: 0.55rem; opacity: 0.8; line-height: 1; }
        .element-cell .symbol { font-size: 1.1rem; font-weight: 700; line-height: 1.2; }
        .element-cell .name { font-size: 0.42rem; opacity: 0.8; line-height: 1; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; }
        .element-cell .mass { font-size: 0.42rem; opacity: 0.6; line-height: 1; }
        .empty-cell { background: transparent; cursor: default; }
        .empty-cell:hover { transform: none; box-shadow: none; }
        .spacer-row { grid-column: 1 / -1; height: 10px; }
        .lanthanide-label, .actinide-label {
            grid-column: 1 / 4;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            color: #94a3b8;
            font-weight: 600;
        }

        /* Category colors */
        .cat-alkali-metal { background: #b91c1c; }
        .cat-alkaline-earth { background: #c2410c; }
        .cat-transition-metal { background: #1d4ed8; }
        .cat-post-transition-metal { background: #0f766e; }
        .cat-metalloid { background: #7e22ce; }
        .cat-nonmetal { background: #15803d; }
        .cat-noble-gas { background: #6d28d9; }
        .cat-lanthanide { background: #a16207; }
        .cat-actinide { background: #92400e; }
        .cat-unknown { background: #475569; }

        /* State indicators */
        .state-gas .symbol { color: #fef3c7; }
        .state-liquid .symbol { color: #bfdbfe; }

        /* Detail panel */
        .detail-overlay {
            display: none;
            position: fixed;
            top: 0; right: 0; bottom: 0;
            width: 380px;
            background: #1e293b;
            border-left: 2px solid #14b8a6;
            z-index: 1000;
            overflow-y: auto;
            transform: translateX(100%);
            transition: transform 0.3s ease;
        }
        .detail-overlay.open {
            display: block;
            transform: translateX(0);
        }
        .detail-backdrop {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }
        .detail-backdrop.open { display: block; }
        .detail-header {
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
        }
        .detail-close {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .detail-close:hover { color: #e2e8f0; }
        .detail-body { padding: 24px; }
        .detail-symbol-block {
            text-align: center;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .detail-symbol-block .big-symbol {
            font-size: 4rem;
            font-weight: 800;
            line-height: 1;
        }
        .detail-symbol-block .big-name {
            font-size: 1.4rem;
            font-weight: 600;
            margin-top: 4px;
        }
        .detail-symbol-block .big-number {
            font-size: 0.9rem;
            opacity: 0.7;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #1e293b;
        }
        .detail-row .label {
            color: #94a3b8;
            font-size: 0.85rem;
        }
        .detail-row .value {
            font-weight: 600;
            font-size: 0.9rem;
            text-align: right;
        }
        .detail-section {
            background: #0f172a;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .detail-section h3 {
            color: #14b8a6;
            font-size: 0.85rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .state-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .state-badge.solid { background: #374151; color: #d1d5db; }
        .state-badge.liquid { background: #1e3a5f; color: #93c5fd; }
        .state-badge.gas { background: #3f2a06; color: #fcd34d; }
        .state-badge.unknown { background: #1f2937; color: #6b7280; }
        .description-text {
            font-size: 0.85rem;
            line-height: 1.6;
            color: #cbd5e1;
        }
        @media (max-width: 768px) {
            .header .legend { display: none; }
            .detail-overlay { width: 100%; }
        }
    </style>
</head>

    const catClass = {
        "alkali-metal":"cat-alkali-metal",
        "alkaline-earth":"cat-alkaline-earth",
        "transition-metal":"cat-transition-metal",
        "post-transition-metal":"cat-post-transition-metal",
        "metalloid":"cat-metalloid",
        "nonmetal":"cat-nonmetal",
        "noble-gas":"cat-noble-gas",
        "lanthanide":"cat-lanthanide",
        "actinide":"cat-actinide",
        "unknown":"cat-unknown"
    };

    const catLabel = {
        "alkali-metal":"Alkali Metal",
        "alkaline-earth":"Alkaline Earth Metal",
        "transition-metal":"Transition Metal",
        "post-transition-metal":"Post-Transition Metal",
        "metalloid":"Metalloid",
        "nonmetal":"Nonmetal",
        "noble-gas":"Noble Gas",
        "lanthanide":"Lanthanide",
        "actinide":"Actinide",
        "unknown":"Unknown Properties"
    };

    function buildTable() {
        const grid = document.getElementById('periodicGrid');
        // Build a map: "row-col" -> element
        const map = {};
        elements.forEach(el => { map[el.row + '-' + el.col] = el; });

        // Rows 1-7: main table
        for (let r = 1; r <= 7; r++) {
            for (let c = 1; c <= 18; c++) {
                const el = map[r + '-' + c];
                if (el) {
                    grid.appendChild(makeCell(el));
                } else {
                    // Special: row 6 col 3 -> lanthanide pointer
                    if (r === 6 && c === 3) {
                        const ptr = document.createElement('div');
                        ptr.className = 'element-cell cat-lanthanide';
                        ptr.style.fontSize = '0.55rem';
                        ptr.style.textAlign = 'center';
                        ptr.style.opacity = '0.7';
                        ptr.innerHTML = '57-71<br><small>La-Lu</small>';
                        ptr.style.cursor = 'default';
                        grid.appendChild(ptr);
                    } else if (r === 7 && c === 3) {
                        const ptr = document.createElement('div');
                        ptr.className = 'element-cell cat-actinide';
                        ptr.style.fontSize = '0.55rem';
                        ptr.style.textAlign = 'center';
                        ptr.style.opacity = '0.7';
                        ptr.innerHTML = '89-103<br><small>Ac-Lr</small>';
                        ptr.style.cursor = 'default';
                        grid.appendChild(ptr);
                    } else {
                        const empty = document.createElement('div');
                        empty.className = 'element-cell empty-cell';
                        grid.appendChild(empty);
                    }
                }
            }
        }

        // Spacer
        const spacer = document.createElement('div');
        spacer.className = 'spacer-row';
        grid.appendChild(spacer);

        // Row 9: Lanthanides
        // 3 empty + 15 elements (cols 4-18)
        const lanLabel = document.createElement('div');
        lanLabel.className = 'lanthanide-label';
        lanLabel.textContent = 'Lanthanides';
        grid.appendChild(lanLabel);
        const lanEmpty = document.createElement('div');
        lanEmpty.className = 'element-cell empty-cell';
        grid.appendChild(lanEmpty);
        for (let c = 4; c <= 18; c++) {
            const el = map['9-' + c];
            if (el) grid.appendChild(makeCell(el));
            else { const e = document.createElement('div'); e.className = 'element-cell empty-cell'; grid.appendChild(e); }
        }

        // Row 10: Actinides
        const actLabel = document.createElement('div');
        actLabel.className = 'actinide-label';
        actLabel.textContent = 'Actinides';
        grid.appendChild(actLabel);
        const actEmpty = document.createElement('div');
        actEmpty.className = 'element-cell empty-cell';
        grid.appendChild(actEmpty);
        for (let c = 4; c <= 18; c++) {
            const el = map['10-' + c];
            if (el) grid.appendChild(makeCell(el));
            else { const e = document.createElement('div'); e.className = 'element-cell empty-cell'; grid.appendChild(e); }
        }
    }

    function makeCell(el) {
        const cell = document.createElement('div');
        cell.className = `element-cell ${catClass[el.cat] || 'cat-unknown'} state-${el.state}`;
        cell.innerHTML = `
            <span class="atomic-num">${el.z}</span>
            <span class="symbol">${el.sym}</span>
            <span class="name">${el.name}</span>
            <span class="mass">${el.mass}</span>
        `;
        cell.onclick = () => showDetail(el);
        return cell;
    }

    function showDetail(el) {
        const body = document.getElementById('detailBody');
        const stateClass = el.state === 'unknown' ? 'unknown' : el.state;
        const stateLabel = el.state.charAt(0).toUpperCase() + el.state.slice(1);
        const catBg = catClass[el.cat] || 'cat-unknown';

        body.innerHTML = `
            <div class="detail-symbol-block ${catBg}">
                <div class="big-number">${el.z}</div>
                <div class="big-symbol">${el.sym}</div>
                <div class="big-name">${el.name}</div>
            </div>

            <div class="detail-section">
                <h3>Properties</h3>
                <div class="detail-row">
                    <span class="label">Atomic Number</span>
                    <span class="value">${el.z}</span>
                </div>
                <div class="detail-row">
                    <span class="label">Atomic Mass</span>
                    <span class="value">${el.mass} u</span>
                </div>
                <div class="detail-row">
                    <span class="label">Category</span>
                    <span class="value">${catLabel[el.cat] || 'Unknown'}</span>
                </div>
                <div class="detail-row">
                    <span class="label">State (Room Temp)</span>
                    <span class="value"><span class="state-badge ${stateClass}">${stateLabel}</span></span>
                </div>
            </div>

            <div class="detail-section">
                <h3>Electron Configuration</h3>
                <div style="font-family:monospace;font-size:1rem;color:#14b8a6;padding:4px 0;">${el.econfig}</div>
            </div>

            <div class="detail-section">
                <h3>Discovery</h3>
                <div class="detail-row">
                    <span class="label">Year</span>
                    <span class="value">${el.year}</span>
                </div>
            </div>

            <div class="detail-section">
                <h3>About</h3>
                <p class="description-text">${el.desc}</p>
            </div>
        `;

        document.getElementById('detailPanel').classList.add('open');
        document.getElementById('detailBackdrop').classList.add('open');
    }

    function closeDetail() {
        document.getElementById('detailPanel').classList.remove('open');
        document.getElementById('detailBackdrop').classList.remove('open');
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

    buildTable();
    </script>
