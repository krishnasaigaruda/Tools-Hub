<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Periodic Table - Enhanced</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            overflow-x: auto;
        }
        .header {
            display: flex;
            align-items: center;
            padding: 16px 24px;
            background: #1e293b;
            border-bottom: 1px solid #334155;
            gap: 16px;
        }
        .back-btn {
            background: none;
            border: 1px solid #475569;
            color: #94a3b8;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .back-btn:hover { background: #334155; color: #e2e8f0; }
        .header h1 { font-size: 1.5rem; color: #14b8a6; }
        .header .legend {
            display: flex;
            gap: 10px;
            margin-left: auto;
            flex-wrap: wrap;
            font-size: 0.7rem;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }
        .table-container {
            padding: 16px;
            overflow-x: auto;
        }
        .periodic-grid {
            display: grid;
            grid-template-columns: repeat(18, minmax(62px, 1fr));
            gap: 4px;
            min-width: 1150px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .element-cell {
            aspect-ratio: 1;
            border-radius: 6px;
            padding: 3px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            border: 1px solid transparent;
            position: relative;
            min-height: 58px;
        }
        .element-cell:hover {
            transform: scale(1.15);
            z-index: 10;
            border-color: #14b8a6;
            box-shadow: 0 0 16px rgba(20,184,166,0.4);
        }
        .element-cell .atomic-num { font-size: 0.55rem; opacity: 0.8; line-height: 1; }
        .element-cell .symbol { font-size: 1.1rem; font-weight: 700; line-height: 1.2; }
        .element-cell .name { font-size: 0.42rem; opacity: 0.8; line-height: 1; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; }
        .element-cell .mass { font-size: 0.42rem; opacity: 0.6; line-height: 1; }
        .empty-cell { background: transparent; cursor: default; }
        .empty-cell:hover { transform: none; box-shadow: none; }
        .spacer-row { grid-column: 1 / -1; height: 10px; }
        .search-wrap {
            position: relative;
            margin-left: auto;
        }
        .search-wrap input {
            background: #0f172a;
            border: 1px solid #475569;
            color: #e2e8f0;
            padding: 8px 14px 8px 34px;
            border-radius: 8px;
            font-size: 0.85rem;
            width: 200px;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-wrap input:focus { border-color: #14b8a6; }
        .search-wrap i {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            font-size: 0.8rem;
        }
        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            margin-top: 4px;
            max-height: 240px;
            overflow-y: auto;
            z-index: 100;
            display: none;
        }
        .search-results.active { display: block; }
        .search-result-item {
            padding: 8px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            border-bottom: 1px solid #0f172a;
        }
        .search-result-item:hover { background: #334155; }
        .search-result-item .sr-sym {
            font-weight: 700;
            width: 32px;
            text-align: center;
            font-size: 1rem;
        }
        .search-result-item .sr-num {
            color: #64748b;
            font-size: 0.75rem;
            margin-left: auto;
        }
        .pointer-cell {
            aspect-ratio: 1;
            border-radius: 6px;
            padding: 3px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #e2e8f0;
            min-height: 58px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
            position: relative;
        }
        .pointer-cell:hover {
            transform: scale(1.15);
            z-index: 10;
            border-color: #14b8a6;
            box-shadow: 0 0 16px rgba(20,184,166,0.4);
        }
        .pointer-cell .ptr-range { font-size: 0.55rem; opacity: 0.8; }
        .pointer-cell .ptr-symbol { font-size: 0.85rem; font-weight: 700; }
        .pointer-cell .ptr-label { font-size: 0.42rem; opacity: 0.7; }
        .lanthanide-label, .actinide-label {
            grid-column: 1 / 4;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            color: #94a3b8;
            font-weight: 600;
        }

        /* Category colors */
        .cat-alkali-metal { background: #b91c1c; }
        .cat-alkaline-earth { background: #c2410c; }
        .cat-transition-metal { background: #1d4ed8; }
        .cat-post-transition-metal { background: #0f766e; }
        .cat-metalloid { background: #7e22ce; }
        .cat-nonmetal { background: #15803d; }
        .cat-noble-gas { background: #6d28d9; }
        .cat-lanthanide { background: #a16207; }
        .cat-actinide { background: #92400e; }
        .cat-unknown { background: #475569; }

        /* State indicators */
        .state-gas .symbol { color: #fef3c7; }
        .state-liquid .symbol { color: #bfdbfe; }

        /* Detail panel */
        .detail-overlay {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 600px;
            max-height: 85vh;
            background: #1e293b;
            border: 2px solid #14b8a6;
            border-radius: 16px;
            z-index: 1000;
            overflow-y: auto;
            opacity: 0;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }
        .detail-overlay.open {
            display: block;
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }
        .detail-backdrop {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }
        .detail-backdrop.open { display: block; }
        .detail-header {
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
        }
        .detail-close {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .detail-close:hover { color: #e2e8f0; }
        .detail-body { padding: 24px; }
        .detail-top {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            align-items: stretch;
        }
        .detail-img-wrap {
            width: 200px;
            min-height: 160px;
            border-radius: 12px;
            overflow: hidden;
            background: #0f172a;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .detail-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .detail-img-wrap .img-fallback {
            font-size: 3.5rem;
            font-weight: 800;
            opacity: 0.3;
        }
        .detail-symbol-block {
            text-align: center;
            padding: 20px;
            border-radius: 12px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .detail-symbol-block .big-symbol {
            font-size: 4rem;
            font-weight: 800;
            line-height: 1;
        }
        .detail-symbol-block .big-name {
            font-size: 1.4rem;
            font-weight: 600;
            margin-top: 4px;
        }
        .detail-symbol-block .big-number {
            font-size: 0.9rem;
            opacity: 0.7;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #1e293b;
        }
        .detail-row .label {
            color: #94a3b8;
            font-size: 0.85rem;
        }
        .detail-row .value {
            font-weight: 600;
            font-size: 0.9rem;
            text-align: right;
        }
        .detail-section {
            background: #0f172a;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .detail-section h3 {
            color: #14b8a6;
            font-size: 0.85rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .state-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .state-badge.solid { background: #374151; color: #d1d5db; }
        .state-badge.liquid { background: #1e3a5f; color: #93c5fd; }
        .state-badge.gas { background: #3f2a06; color: #fcd34d; }
        .state-badge.unknown { background: #1f2937; color: #6b7280; }
        .description-text {
            font-size: 0.9rem;
            line-height: 1.7;
            color: #cbd5e1;
        }
        .uses-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }
        .uses-list li {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.78rem;
            color: #94a3b8;
        }
        @media (max-width: 768px) {
            .header .legend { display: none; }
            .detail-overlay { width: 95vw; }
            .detail-top { flex-direction: column; align-items: center; }
            .detail-img-wrap { width: 100%; max-width: 250px; height: 180px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="window.location.href='../Tools.html'"><i class="fas fa-arrow-left"></i> Back</button>
        <h1><i class="fas fa-atom"></i> Periodic Table</h1>
        <div class="search-wrap">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search elements..." autocomplete="off">
            <div class="search-results" id="searchResults"></div>
        </div>
        <div class="legend">
            <span class="legend-item"><span class="legend-color" style="background:#b91c1c"></span>Alkali</span>
            <span class="legend-item"><span class="legend-color" style="background:#c2410c"></span>Alk. Earth</span>
            <span class="legend-item"><span class="legend-color" style="background:#1d4ed8"></span>Transition</span>
            <span class="legend-item"><span class="legend-color" style="background:#0f766e"></span>Post-Trans.</span>
            <span class="legend-item"><span class="legend-color" style="background:#7e22ce"></span>Metalloid</span>
            <span class="legend-item"><span class="legend-color" style="background:#15803d"></span>Nonmetal</span>
            <span class="legend-item"><span class="legend-color" style="background:#6d28d9"></span>Noble Gas</span>
            <span class="legend-item"><span class="legend-color" style="background:#a16207"></span>Lanthanide</span>
            <span class="legend-item"><span class="legend-color" style="background:#92400e"></span>Actinide</span>
        </div>
    </div>

    <div class="table-container">
        <div class="periodic-grid" id="periodicGrid"></div>
    </div>

    <div class="detail-backdrop" id="detailBackdrop" onclick="closeDetail()"></div>
    <div class="detail-overlay" id="detailPanel">
        <div class="detail-header">
            <span style="color:#14b8a6;font-weight:600;">Element Details</span>
            <button class="detail-close" onclick="closeDetail()">&times;</button>
        </div>
        <div class="detail-body" id="detailBody"></div>
    </div>

    <script>
    const elements = [
        {z:1,sym:"H",name:"Hydrogen",mass:1.008,cat:"nonmetal",state:"gas",econfig:"1s1",year:"1766",desc:"Hydrogen is the lightest and most abundant element in the universe, making up about 75% of all normal matter by mass. Stars like our Sun are powered by the fusion of hydrogen into helium. On Earth, it is most commonly found in water (H2O). Hydrogen gas is colorless, odorless, and highly flammable. It is increasingly important as a clean energy carrier in fuel cells, where it combines with oxygen to produce electricity and water vapor with zero emissions. It is also essential in the Haber process for producing ammonia, which is vital for agriculture.",row:1,col:1},
        {z:2,sym:"He",name:"Helium",mass:4.003,cat:"noble-gas",state:"gas",econfig:"1s2",year:"1868",desc:"Helium is the second lightest and second most abundant element in the observable universe. It was first detected in the solar spectrum before being found on Earth. As a noble gas, it is completely inert and non-toxic. Its extremely low boiling point (-269 C) makes it essential as a cryogenic coolant for MRI machines and particle accelerators. Helium is also famously used to fill balloons and airships because it is lighter than air and non-flammable, unlike hydrogen.",row:1,col:18},
        {z:3,sym:"Li",name:"Lithium",mass:6.941,cat:"alkali-metal",state:"solid",econfig:"[He] 2s1",year:"1817",desc:"Lithium is the lightest metal and the least dense solid element. It is so soft it can be cut with a knife and so light it floats on water (though it reacts with it). Lithium-ion batteries power nearly all modern smartphones, laptops, and electric vehicles, making it one of the most strategically important elements of the 21st century. In medicine, lithium salts have been used for decades as a mood stabilizer to treat bipolar disorder.",row:2,col:1},
        {z:4,sym:"Be",name:"Beryllium",mass:9.012,cat:"alkaline-earth",state:"solid",econfig:"[He] 2s2",year:"1798",desc:"Beryllium is a hard, lightweight metal with an exceptionally high melting point for its weight. It is transparent to X-rays, making it ideal for X-ray tube windows and radiation detectors. Beryllium-copper alloys are prized in aerospace and defense for being strong, lightweight, and non-sparking. However, beryllium dust is highly toxic when inhaled, causing a serious lung disease called berylliosis.",row:2,col:2},
        {z:5,sym:"B",name:"Boron",mass:10.81,cat:"metalloid",state:"solid",econfig:"[He] 2s2 2p1",year:"1808",desc:"Boron is a metalloid that exists in several allotropes, with crystalline boron being extremely hard, second only to diamond. It is a crucial element in fiberglass insulation, heat-resistant borosilicate glass (like Pyrex), and powerful neodymium magnets. Boron compounds like borax have been used for centuries as cleaning agents. In agriculture, boron is an essential micronutrient for plants, and its compounds are used as semiconductor dopants in electronics.",row:2,col:13},
        {z:6,sym:"C",name:"Carbon",mass:12.011,cat:"nonmetal",state:"solid",econfig:"[He] 2s2 2p2",year:"Ancient",desc:"Carbon is the backbone of all known life on Earth. It can form more compounds than any other element due to its unique ability to create four strong covalent bonds. Carbon exists in remarkable allotropes: diamond (the hardest natural material), graphite (used in pencils and lubricants), graphene (a single atom-thick sheet stronger than steel), and fullerenes (soccer ball-shaped molecules). Carbon-based fossil fuels power much of civilization, while carbon dioxide in the atmosphere plays a key role in climate.",row:2,col:14},
        {z:7,sym:"N",name:"Nitrogen",mass:14.007,cat:"nonmetal",state:"gas",econfig:"[He] 2s2 2p3",year:"1772",desc:"Nitrogen makes up about 78% of Earth's atmosphere, making it the most abundant uncombined element accessible on the planet's surface. It is essential for all living things, as it is a key component of amino acids, proteins, and DNA. The Haber-Bosch process converts atmospheric nitrogen into ammonia for fertilizers, a breakthrough that feeds roughly half the world's population. Liquid nitrogen, at -196 C, is widely used for cryogenic freezing and preservation.",row:2,col:15},
        {z:8,sym:"O",name:"Oxygen",mass:15.999,cat:"nonmetal",state:"gas",econfig:"[He] 2s2 2p4",year:"1774",desc:"Oxygen is essential for respiration in most living organisms and makes up about 21% of Earth's atmosphere. It is the third most abundant element in the universe and the most abundant element in Earth's crust (about 46% by mass). Oxygen is highly reactive and forms oxides with nearly every other element. It is used in steel manufacturing, medical therapy, welding, water treatment, and rocket propulsion. The ozone layer (O3) in the upper atmosphere protects life from harmful UV radiation.",row:2,col:16},
        {z:9,sym:"F",name:"Fluorine",mass:18.998,cat:"nonmetal",state:"gas",econfig:"[He] 2s2 2p5",year:"1886",desc:"Fluorine is the most electronegative and reactive of all elements. It reacts with virtually every other element and even noble gases under certain conditions. Despite its danger in pure form, fluorine compounds are incredibly useful. Sodium fluoride is added to toothpaste and water supplies to prevent tooth decay. PTFE (Teflon), a fluorine compound, provides the non-stick coating on cookware. Fluorine compounds also serve as refrigerants and in the production of uranium fuel for nuclear power.",row:2,col:17},
        {z:10,sym:"Ne",name:"Neon",mass:20.180,cat:"noble-gas",state:"gas",econfig:"[He] 2s2 2p6",year:"1898",desc:"Neon is a colorless, inert noble gas that produces a distinctive bright reddish-orange glow when used in discharge tubes and neon signs. Discovered in 1898 by William Ramsay and Morris Travers, it gets its name from the Greek 'neos' meaning new. Neon is the fifth most abundant element in the universe but rare on Earth. Beyond signage, it is used in high-voltage indicators, lightning arrestors, television tubes, and helium-neon lasers used in barcode scanners.",row:2,col:18},
        {z:11,sym:"Na",name:"Sodium",mass:22.990,cat:"alkali-metal",state:"solid",econfig:"[Ne] 3s1",year:"1807",desc:"Sodium is a soft, silvery-white, highly reactive metal that must be stored in oil to prevent reaction with air and moisture. It reacts explosively with water. Despite this, sodium compounds are everywhere in daily life. Table salt (NaCl) is essential for human health, regulating fluid balance and nerve function. Sodium vapor lamps produce the distinctive yellow glow of many streetlights. Sodium hydroxide (lye) is crucial in soap making, paper production, and chemical manufacturing.",row:3,col:1},
        {z:12,sym:"Mg",name:"Magnesium",mass:24.305,cat:"alkaline-earth",state:"solid",econfig:"[Ne] 3s2",year:"1755",desc:"Magnesium is a lightweight, silvery-white metal that burns with an intensely bright white flame, making it historically important in photography flash powder and modern fireworks. It is the eighth most abundant element in Earth's crust and the fourth most common element in the Earth overall. Magnesium alloys are prized in aerospace and automotive industries for their excellent strength-to-weight ratio. Biologically, magnesium is essential for over 300 enzyme reactions in the human body, including energy production and muscle function.",row:3,col:2},
        {z:13,sym:"Al",name:"Aluminium",mass:26.982,cat:"post-transition-metal",state:"solid",econfig:"[Ne] 3s2 3p1",year:"1825",desc:"Aluminium is the most abundant metal in Earth's crust, comprising about 8% by weight. Despite this abundance, it was once more precious than gold because it was extremely difficult to extract. Today, the Hall-Heroult process makes it affordable and it is the second most used metal after iron. Aluminium is lightweight, corrosion-resistant, and infinitely recyclable. It is used in aircraft, beverage cans, window frames, kitchen foil, and electrical wiring. Recycling aluminium uses only 5% of the energy needed to produce it from raw ore.",row:3,col:13},
        {z:14,sym:"Si",name:"Silicon",mass:28.086,cat:"metalloid",state:"solid",econfig:"[Ne] 3s2 3p2",year:"1824",desc:"Silicon is the second most abundant element in Earth's crust after oxygen, primarily found as silicon dioxide (sand) and silicates. It is the foundation of the modern electronics industry. Ultra-pure silicon wafers are the base material for computer chips, enabling the digital revolution. Silicon is also crucial for solar photovoltaic cells that convert sunlight to electricity. Silicone (with an 'e') polymers made from silicon are used in sealants, lubricants, medical implants, and cookware.",row:3,col:14},
        {z:15,sym:"P",name:"Phosphorus",mass:30.974,cat:"nonmetal",state:"solid",econfig:"[Ne] 3s2 3p3",year:"1669",desc:"Phosphorus is essential for all known forms of life. It forms the backbone of DNA and RNA molecules, and adenosine triphosphate (ATP), the primary energy currency of cells. It was the first element to be discovered through scientific inquiry, when alchemist Hennig Brand isolated it from urine in 1669. White phosphorus glows in the dark and is highly toxic and flammable. Red phosphorus is more stable and used on matchbox striking surfaces. Phosphate fertilizers are critical for global agriculture.",row:3,col:15},
        {z:16,sym:"S",name:"Sulfur",mass:32.06,cat:"nonmetal",state:"solid",econfig:"[Ne] 3s2 3p4",year:"Ancient",desc:"Sulfur is a bright yellow solid known since ancient times, often associated with volcanic activity and hot springs. It has a distinctive smell when burned (brimstone). Sulfur is essential for life, found in the amino acids cysteine and methionine. Sulfuric acid is the most produced industrial chemical in the world, used in fertilizer production, oil refining, metal processing, and batteries. Sulfur is also used in vulcanizing rubber, making it more durable, and in fungicides for agriculture.",row:3,col:16},
        {z:17,sym:"Cl",name:"Chlorine",mass:35.45,cat:"nonmetal",state:"gas",econfig:"[Ne] 3s2 3p5",year:"1774",desc:"Chlorine is a yellow-green gas with a pungent, suffocating odor. It is the third most abundant element in the ocean (as chloride ions in salt). Chlorine's ability to kill bacteria has made it indispensable for water purification, saving countless lives from waterborne diseases. It is used to produce PVC plastic, solvents, pesticides, and pharmaceutical drugs. Sodium hypochlorite (bleach) is one of the most common household cleaning agents. Despite its toxicity in gas form, chloride ions are essential for human biology.",row:3,col:17},
        {z:18,sym:"Ar",name:"Argon",mass:39.948,cat:"noble-gas",state:"gas",econfig:"[Ne] 3s2 3p6",year:"1894",desc:"Argon is the third most abundant gas in Earth's atmosphere at about 0.93%. As a noble gas, it is completely inert, which makes it invaluable for creating protective atmospheres. Welders use argon gas to shield the weld area from oxygen and nitrogen contamination. Argon fills the space between double-pane windows for insulation. It is used in fluorescent and incandescent light bulbs to prevent filament oxidation, and in the production of titanium and other reactive metals.",row:3,col:18},
        {z:19,sym:"K",name:"Potassium",mass:39.098,cat:"alkali-metal",state:"solid",econfig:"[Ar] 4s1",year:"1807",desc:"Potassium is a soft, silvery-white alkali metal that reacts vigorously with water, producing hydrogen gas and enough heat to ignite it with a lilac-colored flame. It is the seventh most abundant element in Earth's crust. Potassium is vital for all living cells, playing a critical role in nerve signal transmission, muscle contraction, and maintaining fluid balance. Bananas are famously rich in potassium. Potassium compounds are key ingredients in fertilizers, glass, soap, and gunpowder.",row:4,col:1},
        {z:20,sym:"Ca",name:"Calcium",mass:40.078,cat:"alkaline-earth",state:"solid",econfig:"[Ar] 4s2",year:"1808",desc:"Calcium is the most abundant metal in the human body, primarily found in bones and teeth. It is the fifth most abundant element in Earth's crust. Pure calcium is a soft, silvery-white metal, but it is never found in pure form in nature due to its reactivity. Calcium compounds are everywhere: limestone, marble, and chalk are all forms of calcium carbonate. Calcium is essential for muscle function, blood clotting, nerve signaling, and cellular processes. Calcium oxide (quicklime) is crucial in cement and steel production.",row:4,col:2},
        {z:21,sym:"Sc",name:"Scandium",mass:44.956,cat:"transition-metal",state:"solid",econfig:"[Ar] 3d1 4s2",year:"1879",desc:"Scandium is a soft, silvery transition metal that is relatively rare and expensive. When added to aluminium alloys, even in small amounts, it dramatically improves strength and heat resistance while keeping the material lightweight. This makes scandium-aluminium alloys highly valued in aerospace, high-end bicycle frames, and baseball bats. Scandium iodide is used in mercury vapor lamps to produce light that closely resembles natural sunlight, used in film and television production.",row:4,col:3},
        {z:22,sym:"Ti",name:"Titanium",mass:47.867,cat:"transition-metal",state:"solid",econfig:"[Ar] 3d2 4s2",year:"1791",desc:"Titanium is famous for its exceptional strength-to-weight ratio, being as strong as steel but 45% lighter. It is highly resistant to corrosion, even by seawater and chlorine. These properties make it essential in aerospace (jet engines, airframes), medical implants (hip and knee replacements, dental implants), and high-performance sports equipment. Titanium dioxide is the world's most popular white pigment, used in paint, sunscreen, toothpaste, and food coloring. It is the ninth most abundant element in Earth's crust.",row:4,col:4},
        {z:23,sym:"V",name:"Vanadium",mass:50.942,cat:"transition-metal",state:"solid",econfig:"[Ar] 3d3 4s2",year:"1801",desc:"Vanadium is a hard, silvery-grey metal named after Vanadis, the Scandinavian goddess of beauty, due to its beautifully multicolored compounds. About 80% of vanadium produced is used as ferrovanadium in steel alloys, dramatically increasing strength and resistance to corrosion. Vanadium steel is used in axles, crankshafts, gears, and armor plating. Vanadium redox flow batteries are emerging as a promising technology for large-scale energy storage to complement renewable power sources.",row:4,col:5},
        {z:24,sym:"Cr",name:"Chromium",mass:51.996,cat:"transition-metal",state:"solid",econfig:"[Ar] 3d5 4s1",year:"1797",desc:"Chromium is a hard, lustrous, steel-grey metal known for its mirror-like finish when polished. Its name comes from the Greek 'chroma' meaning color, due to the many colorful compounds it forms. Chromium is essential in stainless steel, making it resistant to rust and tarnishing. Chrome plating provides a decorative, shiny finish to car parts, bathroom fixtures, and more. Chromium compounds give rubies their red color and emeralds their green. Trivalent chromium is an essential trace mineral for human metabolism.",row:4,col:6},
        {z:25,sym:"Mn",name:"Manganese",mass:54.938,cat:"transition-metal",state:"solid",econfig:"[Ar] 3d5 4s2",year:"1774",desc:"Manganese is a hard, brittle, silvery metal essential for industrial steel production. About 90% of all manganese produced goes into steel alloys, where it improves strength, hardness, and wear resistance. Railroad tracks and prison bars contain high-manganese steel. Manganese dioxide has been used since prehistoric times as a black pigment in cave paintings. Today, it is used in dry-cell batteries and as a catalyst. Biologically, manganese is a trace element needed for bone formation, blood clotting, and metabolism.",row:4,col:7},
        {z:26,sym:"Fe",name:"Iron",mass:55.845,cat:"transition-metal",state:"solid",econfig:"[Ar] 3d6 4s2",year:"Ancient",desc:"Iron is the most used and most important metal in human civilization. The Iron Age transformed human society, and today steel (an iron alloy) forms the backbone of modern infrastructure: buildings, bridges, vehicles, ships, and tools. Iron is the fourth most abundant element in Earth's crust and the most abundant element on Earth by mass (forming much of the core). In biology, iron is crucial for hemoglobin, the protein in red blood cells that carries oxygen throughout the body. Iron deficiency is the most common nutritional deficiency worldwide.",row:4,col:8},
        {z:27,sym:"Co",name:"Cobalt",mass:58.933,cat:"transition-metal",state:"solid",econfig:"[Ar] 3d7 4s2",year:"1735",desc:"Cobalt is a hard, lustrous, bluish-grey metal that has been used for thousands of years to produce brilliant blue pigments in glass, ceramics, and paints. Today, cobalt is critical for lithium-ion battery cathodes in smartphones, laptops, and electric vehicles. It is essential for making superalloys used in jet engine turbine blades that withstand extreme temperatures. Cobalt-60, a radioactive isotope, is used in cancer radiation therapy and food sterilization. Vitamin B12 contains a cobalt atom at its center.",row:4,col:9},
        {z:28,sym:"Ni",name:"Nickel",mass:58.693,cat:"transition-metal",state:"solid",econfig:"[Ar] 3d8 4s2",year:"1751",desc:"Nickel is a silvery-white metal with a slight golden tinge, known for its excellent corrosion resistance. About 68% of nickel production goes into stainless steel. Nickel is used in coins worldwide (the US five-cent 'nickel' is 75% copper, 25% nickel). It is essential in rechargeable batteries, including nickel-metal hydride and nickel-cadmium types. Nickel superalloys withstand extreme temperatures in jet engines and power plants. Nickel plating provides a decorative and protective coating for many consumer products.",row:4,col:10},
        {z:29,sym:"Cu",name:"Copper",mass:63.546,cat:"transition-metal",state:"solid",econfig:"[Ar] 3d10 4s1",year:"Ancient",desc:"Copper was one of the first metals used by humans, dating back over 10,000 years. The Copper Age and Bronze Age (copper-tin alloy) were pivotal in human development. Copper has the second-highest electrical conductivity of any element (after silver), making it the standard material for electrical wiring worldwide. It is also an excellent thermal conductor, used in cookware and heat exchangers. Copper naturally kills bacteria on contact, leading to its use in hospital surfaces. The Statue of Liberty is clad in 80 tons of copper.",row:4,col:11},
        {z:30,sym:"Zn",name:"Zinc",mass:65.38,cat:"transition-metal",state:"solid",econfig:"[Ar] 3d10 4s2",year:"1746",desc:"Zinc is a bluish-white metal that is essential for human health and widely used in industry. About half of all zinc produced is used for galvanizing, coating iron and steel to protect against corrosion. Zinc alloys are used in die-casting for automotive parts, hardware, and toys. Zinc oxide is used in sunscreen, rubber production, and as a white pigment. Biologically, zinc is the second most abundant trace metal in the body (after iron), essential for immune function, wound healing, DNA synthesis, and the sense of taste and smell.",row:4,col:12},
        {z:31,sym:"Ga",name:"Gallium",mass:69.723,cat:"post-transition-metal",state:"solid",econfig:"[Ar] 3d10 4s2 4p1",year:"1875",desc:"Gallium is a fascinating soft metal that melts at just 29.76 C, meaning it can literally melt in your hand. Despite this low melting point, it has an unusually high boiling point of 2,204 C. Gallium arsenide (GaAs) is a crucial semiconductor used in microwave circuits, high-speed electronics, and solar cells on spacecraft. Gallium nitride (GaN) enables the bright blue and white LEDs found in screens and energy-efficient lighting worldwide. Gallium has no known biological role but is used in medical imaging.",row:4,col:13},
        {z:32,sym:"Ge",name:"Germanium",mass:72.630,cat:"metalloid",state:"solid",econfig:"[Ar] 3d10 4s2 4p2",year:"1886",desc:"Germanium is a metalloid whose existence was predicted by Mendeleev 15 years before its discovery, validating the periodic table. It was the material used in the first transistor in 1947, launching the electronics revolution, before being largely replaced by silicon. Today, germanium is essential in fiber optic systems, infrared optics for night vision and thermal imaging, and polymerization catalysts for PET plastic. Germanium is transparent to infrared light, making it ideal for thermal cameras and military targeting systems.",row:4,col:14},
        {z:33,sym:"As",name:"Arsenic",mass:74.922,cat:"metalloid",state:"solid",econfig:"[Ar] 3d10 4s2 4p3",year:"Ancient",desc:"Arsenic is a metalloid with a notorious reputation as a poison throughout history, earning the nickname 'inheritance powder' in medieval times because it was used in many high-profile poisonings. Despite its toxicity, arsenic has important uses. Gallium arsenide is a vital semiconductor for electronics. Arsenic-based compounds were among the first effective treatments for syphilis and are still used in treating certain types of leukemia. Arsenic is used in lead alloys for car batteries and in wood preservation (CCA-treated lumber).",row:4,col:15},
        {z:34,sym:"Se",name:"Selenium",mass:78.971,cat:"nonmetal",state:"solid",econfig:"[Ar] 3d10 4s2 4p4",year:"1817",desc:"Selenium is an essential trace element for humans and animals, important for thyroid function and as an antioxidant. It was discovered in 1817 and named after Selene, the Greek moon goddess. Selenium's electrical conductivity changes when exposed to light, which made it important in early photocells and light meters. Today it is used in glass manufacturing to decolorize glass and produce red-colored glass, in photovoltaic solar cells, and as a dietary supplement. Brazil nuts are one of the richest food sources of selenium.",row:4,col:16},
        {z:35,sym:"Br",name:"Bromine",mass:79.904,cat:"nonmetal",state:"liquid",econfig:"[Ar] 3d10 4s2 4p5",year:"1826",desc:"Bromine is one of only two elements that exist as a liquid at room temperature (the other is mercury). It is a dark reddish-brown fuming liquid with a strong, unpleasant odor. Its name comes from the Greek 'bromos' meaning stench. Bromine compounds are widely used as flame retardants in electronics, furniture, and textiles. Silver bromide was essential in photographic film. Bromine is used in water treatment, agricultural pesticides, and pharmaceutical drugs. The Dead Sea is one of the richest sources of bromine on Earth.",row:4,col:17},
        {z:36,sym:"Kr",name:"Krypton",mass:83.798,cat:"noble-gas",state:"gas",econfig:"[Ar] 3d10 4s2 4p6",year:"1898",desc:"Krypton is a colorless, odorless noble gas found in trace amounts in Earth's atmosphere. Despite sharing its name with Superman's home planet, real krypton is not from another world. It produces a brilliant white light when electrically excited, used in high-performance flashlights and photographic flash equipment. From 1960 to 1983, the international standard meter was defined based on the emission spectrum of krypton-86. Krypton is also used in energy-efficient windows and fluorescent lighting.",row:4,col:18},
        {z:37,sym:"Rb",name:"Rubidium",mass:85.468,cat:"alkali-metal",state:"solid",econfig:"[Kr] 5s1",year:"1861",desc:"Rubidium is a soft, silvery-white alkali metal that ignites spontaneously in air and reacts violently with water. It was discovered spectroscopically in 1861, and its name comes from the Latin 'rubidus' meaning deep red, after the prominent red lines in its emission spectrum. Rubidium is used in atomic clocks, specialty glass, and photoelectric cells. Rubidium-87 is mildly radioactive and is used in radiometric dating of rocks. It has potential applications in thermoelectric generators and ion propulsion engines for spacecraft.",row:5,col:1},
        {z:38,sym:"Sr",name:"Strontium",mass:87.62,cat:"alkaline-earth",state:"solid",econfig:"[Kr] 5s2",year:"1790",desc:"Strontium is a soft, silvery metal best known for the brilliant crimson-red color it produces when burned, making it essential in fireworks and signal flares. Named after the Scottish village of Strontian where it was discovered in a lead mine, strontium compounds are used in ferrite magnets for small electric motors and loudspeakers. Strontium ranelate is used to treat osteoporosis. Strontium-90, a radioactive isotope produced by nuclear fallout, is dangerous because it mimics calcium and can accumulate in bones.",row:5,col:2},
        {z:39,sym:"Y",name:"Yttrium",mass:88.906,cat:"transition-metal",state:"solid",econfig:"[Kr] 4d1 5s2",year:"1794",desc:"Yttrium is a silvery-metallic transition metal named after the village of Ytterby in Sweden, which also lent its name to three other elements. Yttrium oxide is used to make red phosphors in television and computer screens. Yttrium-aluminium-garnet (YAG) crystals are used in powerful lasers for cutting metal and in medical and dental procedures. Yttrium is added to aluminium and magnesium alloys to improve strength. Yttrium barium copper oxide was the first material found to superconduct above the temperature of liquid nitrogen.",row:5,col:3},
        {z:40,sym:"Zr",name:"Zirconium",mass:91.224,cat:"transition-metal",state:"solid",econfig:"[Kr] 4d2 5s2",year:"1789",desc:"Zirconium is a strong, lustrous metal with exceptional corrosion resistance. Its most critical application is in nuclear reactors, where zirconium alloy tubes contain the nuclear fuel rods because zirconium is transparent to neutrons. Cubic zirconia, a zirconium oxide crystal, is widely used as an affordable diamond substitute in jewelry. Zirconium compounds are used in high-temperature ceramics, dental crowns, antiperspirants, and as catalysts in chemical processes. The mineral zircon is one of the oldest minerals on Earth.",row:5,col:4},
        {z:41,sym:"Nb",name:"Niobium",mass:92.906,cat:"transition-metal",state:"solid",econfig:"[Kr] 4d4 5s1",year:"1801",desc:"Niobium is a soft, grey, ductile metal that is remarkably resistant to corrosion. About 90% of niobium production goes into steel alloys, particularly for oil and gas pipelines and structural steel in buildings and bridges. Niobium-tin and niobium-titanium alloys are the most widely used superconducting materials, essential for MRI machines and particle accelerators like the Large Hadron Collider at CERN. Brazil produces about 90% of the world's niobium. Niobium is also used in jet and rocket engines and hypoallergenic jewelry.",row:5,col:5},
        {z:42,sym:"Mo",name:"Molybdenum",mass:95.95,cat:"transition-metal",state:"solid",econfig:"[Kr] 4d5 5s1",year:"1781",desc:"Molybdenum is a silvery metal with one of the highest melting points of any element (2,623 C). About 80% of molybdenum goes into steel alloys, where it increases strength, hardness, and resistance to corrosion and high temperatures. High-speed steel tools contain molybdenum. It is used in catalysts for petroleum refining and in lubricants for extreme temperatures. Biologically, molybdenum is an essential trace element for nearly all life forms, required by enzymes that process nitrogen and sulfur.",row:5,col:6},
        {z:43,sym:"Tc",name:"Technetium",mass:98,cat:"transition-metal",state:"solid",econfig:"[Kr] 4d5 5s2",year:"1937",desc:"Technetium was the first element to be artificially produced, fulfilling a gap in the periodic table. Its name comes from the Greek 'technetos' meaning artificial. All isotopes of technetium are radioactive, and it does not occur naturally on Earth in significant amounts. Technetium-99m is the most widely used radioactive isotope in medical diagnostic imaging, used in over 30 million procedures annually worldwide. It is ideal because it emits easily detectable gamma rays but has a short half-life of just 6 hours.",row:5,col:7},
        {z:44,sym:"Ru",name:"Ruthenium",mass:101.07,cat:"transition-metal",state:"solid",econfig:"[Kr] 4d7 5s1",year:"1844",desc:"Ruthenium is a rare, hard, silvery-white platinum group metal named after Russia (Ruthenia in Latin). It is one of the most effective hardeners for platinum and palladium alloys, used in electrical contacts and chip resistors in electronics. Ruthenium catalysts are important in organic chemistry for reactions that won Nobel Prizes. Ruthenium compounds are being researched as anti-cancer drugs as alternatives to cisplatin. It is also used in solar cells and as a catalyst in the production of ammonia.",row:5,col:8},
        {z:45,sym:"Rh",name:"Rhodium",mass:102.91,cat:"transition-metal",state:"solid",econfig:"[Kr] 4d8 5s1",year:"1803",desc:"Rhodium is one of the rarest and most expensive precious metals on Earth, often more valuable than gold. Its primary use is in catalytic converters in automobiles, where it reduces harmful nitrogen oxide emissions. Rhodium is also used to plate white gold and sterling silver jewelry, giving them a bright, reflective finish. Rhodium is extremely resistant to corrosion and has a very high melting point. It is produced as a byproduct of nickel and platinum mining, with South Africa producing about 80% of the world's supply.",row:5,col:9},
        {z:46,sym:"Pd",name:"Palladium",mass:106.42,cat:"transition-metal",state:"solid",econfig:"[Kr] 4d10",year:"1803",desc:"Palladium is a rare, silvery-white metal that is the least dense and lowest melting of the platinum group metals. Its largest use is in catalytic converters, converting up to 90% of harmful exhaust gases into less harmful substances. Palladium is also widely used in electronics (multilayer ceramic capacitors), dentistry (dental crowns and bridges), and jewelry (as white gold alloy). Palladium can absorb up to 900 times its own volume of hydrogen, making it important for hydrogen purification and storage research.",row:5,col:10},
        {z:47,sym:"Ag",name:"Silver",mass:107.87,cat:"transition-metal",state:"solid",econfig:"[Kr] 4d10 5s1",year:"Ancient",desc:"Silver has the highest electrical and thermal conductivity of any element, as well as the highest reflectivity of visible light. It has been valued as a precious metal for thousands of years, used in jewelry, coins, and tableware. Today, its largest use is in industrial applications: electronics (conductive pastes for circuit boards), solar panels, photography, and water purification. Silver compounds are naturally antimicrobial, used in wound dressings and medical devices. Silver nanoparticles are used in clothing and appliances for their antibacterial properties.",row:5,col:11},
        {z:48,sym:"Cd",name:"Cadmium",mass:112.41,cat:"transition-metal",state:"solid",econfig:"[Kr] 4d10 5s2",year:"1817",desc:"Cadmium is a soft, bluish-white metal that is highly toxic to humans and the environment. Despite its toxicity, it has important industrial uses. Nickel-cadmium (NiCd) rechargeable batteries powered portable electronics for decades. Cadmium telluride is used in thin-film solar cells. Cadmium pigments produce vibrant yellows, oranges, and reds used by artists including Claude Monet and Vincent van Gogh. Cadmium is also used in nuclear reactor control rods because it absorbs neutrons effectively. Environmental regulations have increasingly restricted its use.",row:5,col:12},
        {z:49,sym:"In",name:"Indium",mass:114.82,cat:"post-transition-metal",state:"solid",econfig:"[Kr] 4d10 5s2 5p1",year:"1863",desc:"Indium is a soft, silvery metal that is so malleable it can be scratched with a fingernail. Its most important application is indium tin oxide (ITO), a transparent conducting film used in virtually all touchscreens, flat panel displays, and OLED screens. Indium is also used in semiconductors, solders, and low-melting-point alloys. Indium was named for the indigo blue line in its emission spectrum. It sticks to glass and is used to make mirrors. Indium is relatively rare, primarily obtained as a byproduct of zinc mining.",row:5,col:13},
        {z:50,sym:"Sn",name:"Tin",mass:118.71,cat:"post-transition-metal",state:"solid",econfig:"[Kr] 4d10 5s2 5p2",year:"Ancient",desc:"Tin has been used by humans for over 5,000 years, primarily in bronze (a tin-copper alloy) which gave its name to the Bronze Age. Today, about half of all tin is used in solder for electronics assembly. Tin-plated steel ('tin cans') protects food from corrosion. Tin compounds are used in glass coatings, ceramics, and as catalysts. Tin exhibits an unusual phenomenon called 'tin cry', a crackling sound when a bar is bent, caused by crystal twinning. In very cold temperatures, tin can transform from the metallic form to a brittle grey powder ('tin pest').",row:5,col:14},
        {z:51,sym:"Sb",name:"Antimony",mass:121.76,cat:"metalloid",state:"solid",econfig:"[Kr] 4d10 5s2 5p3",year:"Ancient",desc:"Antimony is a lustrous, silvery-grey metalloid known since ancient times. The Egyptians used antimony sulfide (stibnite) as eye cosmetics (kohl). Today, antimony trioxide is the most important antimony compound, used as a flame retardant in plastics, textiles, rubber, and adhesives. Antimony is also used in lead-acid batteries for cars, in type metal for printing, and in semiconductor devices. Antimony compounds are used in medicines to treat tropical parasitic diseases like leishmaniasis. China produces about 80% of the world's antimony.",row:5,col:15},
        {z:52,sym:"Te",name:"Tellurium",mass:127.60,cat:"metalloid",state:"solid",econfig:"[Kr] 4d10 5s2 5p4",year:"1783",desc:"Tellurium is a brittle, silvery-white metalloid that is rarer than gold in Earth's crust. Its most important modern use is in cadmium telluride (CdTe) thin-film solar cells, one of the most cost-effective photovoltaic technologies. Tellurium is also used in thermoelectric cooling devices and as an alloying agent to improve the machinability of steel and copper. Bismuth telluride is used in thermoelectric generators that convert heat to electricity. People who are exposed to tellurium develop a garlic-like odor in their breath and sweat.",row:5,col:16},
        {z:53,sym:"I",name:"Iodine",mass:126.90,cat:"nonmetal",state:"solid",econfig:"[Kr] 4d10 5s2 5p5",year:"1811",desc:"Iodine is a lustrous, purple-black solid that sublimes into a violet gas with a sharp odor. It is essential for human health, as the thyroid gland uses iodine to produce hormones that regulate metabolism, growth, and development. Iodine deficiency is the leading preventable cause of intellectual disability worldwide, which led to the widespread iodization of table salt. Iodine is a powerful antiseptic, used as a wound disinfectant (tincture of iodine). Radioactive iodine-131 is used to treat thyroid cancer and hyperthyroidism.",row:5,col:17},
        {z:54,sym:"Xe",name:"Xenon",mass:131.29,cat:"noble-gas",state:"gas",econfig:"[Kr] 4d10 5s2 5p6",year:"1898",desc:"Xenon is a dense, colorless noble gas that produces a beautiful blue glow when excited electrically. Its name comes from the Greek 'xenos' meaning stranger. Xenon is used in high-intensity arc lamps for movie projectors, car headlights, and searchlights. Xenon flash lamps are used in photography and scientific instruments. Xenon ion propulsion systems power deep-space probes like NASA's Dawn spacecraft. In medicine, xenon is used as a general anesthetic and in medical imaging. It was the first noble gas found to form true chemical compounds.",row:5,col:18},
        {z:55,sym:"Cs",name:"Caesium",mass:132.91,cat:"alkali-metal",state:"solid",econfig:"[Xe] 6s1",year:"1860",desc:"Caesium is the most electropositive and most alkaline of the stable elements. It is so reactive that it explodes on contact with water and ignites spontaneously in air. Caesium atomic clocks are the most accurate timekeeping devices ever made, losing less than one second in millions of years. The international definition of the second is based on caesium-133 vibrations. Caesium was the first element discovered by spectroscopy, named for the blue lines in its spectrum (Latin 'caesius' meaning sky blue). It is used in oil drilling fluids and photoelectric cells.",row:6,col:1},
        {z:56,sym:"Ba",name:"Barium",mass:137.33,cat:"alkaline-earth",state:"solid",econfig:"[Xe] 6s2",year:"1808",desc:"Barium is a soft, silvery alkaline earth metal that is never found in nature in its pure form due to its reactivity. Its most familiar use is in barium sulfate 'barium meals', which patients swallow before X-rays or CT scans of the digestive system. Because barium sulfate is insoluble, it is non-toxic and blocks X-rays, providing clear images. Barium compounds produce green colors in fireworks. Barium titanate is used in capacitors and piezoelectric devices. The mineral barite (barium sulfate) is used as a weighting agent in oil well drilling fluids.",row:6,col:2},
        {z:57,sym:"La",name:"Lanthanum",mass:138.91,cat:"lanthanide",state:"solid",econfig:"[Xe] 5d1 6s2",year:"1839",desc:"Lanthanum is a soft, silvery-white rare earth metal that gives its name to the entire lanthanide series. It tarnishes rapidly when exposed to air. Lanthanum is used in high-quality camera and telescope lenses because it improves optical clarity. Lanthanum-nickel alloys are used in rechargeable nickel-metal hydride (NiMH) batteries found in hybrid vehicles like the Toyota Prius. It is also used in fluid catalytic cracking catalysts for petroleum refining and in lighting carbon arc lamps for studio lights.",row:9,col:4},
        {z:58,sym:"Ce",name:"Cerium",mass:140.12,cat:"lanthanide",state:"solid",econfig:"[Xe] 4f1 5d1 6s2",year:"1803",desc:"Cerium is the most abundant of all rare earth elements, more common in Earth's crust than copper. It is a soft, silvery metal that oxidizes readily in air. Cerium oxide is an excellent glass polishing agent and is used in catalytic converters to reduce vehicle emissions. Cerium compounds are used in self-cleaning ovens, UV-absorbing glass, and as a catalyst in oil refining. Mischmetal, an alloy containing cerium, creates the sparks in cigarette lighters and flint strikers.",row:9,col:5},
        {z:59,sym:"Pr",name:"Praseodymium",mass:140.91,cat:"lanthanide",state:"solid",econfig:"[Xe] 4f3 6s2",year:"1885",desc:"Praseodymium is a soft, silvery metal whose name means 'green twin' in Greek, due to its green salts. It is used to create high-strength alloys for aircraft engines. Praseodymium compounds give glass and ceramics a distinctive yellow color and are used in welder's goggles to filter out infrared radiation. Combined with neodymium, it creates powerful magnets used in electric vehicles and wind turbines. It is also used in fiber optic amplifiers and as a component of mischmetal for lighter flints.",row:9,col:6},
        {z:60,sym:"Nd",name:"Neodymium",mass:144.24,cat:"lanthanide",state:"solid",econfig:"[Xe] 4f4 6s2",year:"1885",desc:"Neodymium is the source of the strongest permanent magnets in the world. Neodymium-iron-boron (NdFeB) magnets are found in virtually every smartphone, headphone, hard drive, electric vehicle motor, and wind turbine generator. A magnet the size of a coin can lift thousands of times its own weight. Neodymium is also used in powerful lasers (Nd:YAG) for industrial cutting, medical surgery, and scientific research. Neodymium glass is used in astronomical telescopes and gives glass a distinctive purple tint.",row:9,col:7},
        {z:61,sym:"Pm",name:"Promethium",mass:145,cat:"lanthanide",state:"solid",econfig:"[Xe] 4f5 6s2",year:"1945",desc:"Promethium is the only radioactive element in the lanthanide series and does not occur naturally on Earth in significant amounts. Named after Prometheus, the Greek Titan who stole fire from the gods, it was first produced in a nuclear reactor in 1945. Promethium is used in nuclear-powered batteries (betavoltaic devices) for spacecraft and guided missiles. It was once used in luminous paint for watches and instruments. Its radioactive decay produces soft beta radiation useful for measuring thickness of materials.",row:9,col:8},
        {z:62,sym:"Sm",name:"Samarium",mass:150.36,cat:"lanthanide",state:"solid",econfig:"[Xe] 4f6 6s2",year:"1879",desc:"Samarium is a moderately hard, silvery metal named after the mineral samarskite. Samarium-cobalt magnets were the first rare-earth magnets developed and remain important where high-temperature stability is needed, such as in military and aerospace applications. Samarium-153 is used in medicine to treat bone cancer pain by targeting cancerous cells in the skeleton. Samarium oxide is used as a neutron absorber in nuclear reactor control rods. It is also used in carbon arc lighting for film and television production.",row:9,col:9},
        {z:63,sym:"Eu",name:"Europium",mass:151.96,cat:"lanthanide",state:"solid",econfig:"[Xe] 4f7 6s2",year:"1901",desc:"Europium is the most reactive of the rare earth elements and is named after the continent of Europe. It is responsible for the red color in television screens, LED lights, and fluorescent lamps. Europium compounds are used as anti-forgery phosphors in Euro banknotes, glowing red under UV light to verify authenticity. Europium-doped yttrium oxide creates the red phosphor in color displays. It is the softest and least dense of the lanthanides, and it must be stored under an inert atmosphere to prevent rapid oxidation.",row:9,col:10},
        {z:64,sym:"Gd",name:"Gadolinium",mass:157.25,cat:"lanthanide",state:"solid",econfig:"[Xe] 4f7 5d1 6s2",year:"1880",desc:"Gadolinium is a silvery-white metal with remarkable magnetic properties. It is strongly attracted to magnets at room temperature but loses its magnetism when heated above 20°C (Curie point), making it useful as a magnetic refrigerant. Gadolinium-based compounds are the most widely used contrast agents in MRI scans, enhancing image quality of organs and blood vessels. Gadolinium is also used in nuclear reactor shielding as it has the highest neutron absorption cross-section of any known element. It is used in green phosphors for displays.",row:9,col:11},
        {z:65,sym:"Tb",name:"Terbium",mass:158.93,cat:"lanthanide",state:"solid",econfig:"[Xe] 4f9 6s2",year:"1843",desc:"Terbium is a silvery-white rare earth metal named after Ytterby, Sweden. It produces a bright green phosphor used in fluorescent lighting, LED screens, and color television tubes. Terbium alloys are used in Terfenol-D, a magnetostrictive material that changes shape in a magnetic field, used in naval sonar systems, sensors, and actuators. Terbium is also used in solid-state devices, fuel cells, and as a crystal stabilizer for high-temperature fuel cells. It is one of the less abundant rare earth elements.",row:9,col:12},
        {z:66,sym:"Dy",name:"Dysprosium",mass:162.50,cat:"lanthanide",state:"solid",econfig:"[Xe] 4f10 6s2",year:"1886",desc:"Dysprosium's name comes from the Greek 'dysprositos' meaning 'hard to get,' reflecting the difficulty of isolating it. It is critical for modern technology: dysprosium is added to neodymium magnets to maintain their strength at high temperatures, essential for electric vehicle motors and wind turbine generators. Without dysprosium, these magnets would demagnetize under operating conditions. It is also used in nuclear reactor control rods, data storage devices, and high-intensity lighting. Dysprosium has the highest magnetic susceptibility of any element.",row:9,col:13},
        {z:67,sym:"Ho",name:"Holmium",mass:164.93,cat:"lanthanide",state:"solid",econfig:"[Xe] 4f11 6s2",year:"1878",desc:"Holmium possesses the highest magnetic moment of any naturally occurring element, making it useful for creating the strongest artificially generated magnetic fields when used as a pole piece (flux concentrator) for powerful magnets. Named after Stockholm (Holmia in Latin), holmium is used in YAG lasers for medical procedures including eye surgery and kidney stone removal. Holmium oxide is used to calibrate spectrophotometers because it has sharp absorption peaks. It is also used to color cubic zirconia and glass a yellow or red shade.",row:9,col:14},
        {z:68,sym:"Er",name:"Erbium",mass:167.26,cat:"lanthanide",state:"solid",econfig:"[Xe] 4f12 6s2",year:"1843",desc:"Erbium is essential to modern telecommunications. Erbium-doped fiber amplifiers (EDFAs) boost light signals in fiber optic cables without converting them to electrical signals, enabling long-distance internet and phone communication across oceans. Erbium gives glass and ceramics a beautiful pink color and is used in photographic filters. Erbium lasers are used in dermatology for skin resurfacing treatments. Named after Ytterby, Sweden (like terbium, ytterbium, and yttrium), it is one of four elements named after this single village.",row:9,col:15},
        {z:69,sym:"Tm",name:"Thulium",mass:168.93,cat:"lanthanide",state:"solid",econfig:"[Xe] 4f13 6s2",year:"1879",desc:"Thulium is the least abundant of the naturally occurring lanthanides, making it one of the rarest rare earth elements. Named after Thule, an ancient name for Scandinavia, it is a soft, silvery metal. Thulium's most important application is in portable X-ray devices. Thulium-170, when bombarded with neutrons, emits X-rays and can be used as a radiation source for small, portable X-ray machines used in remote locations. Thulium lasers are used in minimally invasive surgery, and it is used in high-temperature superconductors.",row:9,col:16},
        {z:70,sym:"Yb",name:"Ytterbium",mass:173.05,cat:"lanthanide",state:"solid",econfig:"[Xe] 4f14 6s2",year:"1878",desc:"Ytterbium is a soft, silvery metal named after Ytterby, Sweden. It has interesting properties: under stress, its electrical resistance changes dramatically, making it useful in stress gauges to monitor ground deformations during earthquakes and nuclear explosions. Ytterbium lasers are used in materials processing and dentistry. Ytterbium atomic clocks are among the most precise timekeeping devices ever created. It is also used to improve the strength of stainless steel and as a doping agent in fiber optic cables.",row:9,col:17},
        {z:71,sym:"Lu",name:"Lutetium",mass:174.97,cat:"lanthanide",state:"solid",econfig:"[Xe] 4f14 5d1 6s2",year:"1907",desc:"Lutetium is the hardest, densest, and most expensive of the lanthanide series. Named after Lutetia, the Latin name for Paris, it is a silvery-white metal. Lutetium oxyorthosilicate (LSO) crystals are used as detectors in PET (positron emission tomography) scanners, which are critical for cancer diagnosis and brain imaging. Lutetium is used as a catalyst in petroleum refining and organic chemistry. Lutetium-176 is used in radiometric dating to determine the age of meteorites and the early solar system.",row:9,col:18},
        {z:72,sym:"Hf",name:"Hafnium",mass:178.49,cat:"transition-metal",state:"solid",econfig:"[Xe] 4f14 5d2 6s2",year:"1923",desc:"Hafnium is a lustrous, silvery metal that is remarkably resistant to corrosion. It is almost always found alongside zirconium in nature, and separating the two was one of chemistry's great challenges. Hafnium is an excellent neutron absorber, making it essential for nuclear reactor control rods, the opposite role of its twin zirconium which is transparent to neutrons. In modern electronics, hafnium oxide has replaced silicon dioxide as the gate insulator in advanced microprocessors (since Intel's 45nm chips), enabling continued miniaturization of computer chips.",row:6,col:4},
        {z:73,sym:"Ta",name:"Tantalum",mass:180.95,cat:"transition-metal",state:"solid",econfig:"[Xe] 4f14 5d3 6s2",year:"1802",desc:"Tantalum is a hard, blue-grey metal that is virtually immune to chemical attack at temperatures below 150°C. Named after King Tantalus from Greek mythology, it is essential for miniaturized electronics. Tantalum capacitors are found in smartphones, laptops, gaming consoles, and medical devices because they can store more charge in a smaller volume. Tantalum is biocompatible and used in surgical implants, bone repair, and suture clips. Tantalum is also used in superalloys for jet engines and chemical processing equipment.",row:6,col:5},
        {z:74,sym:"W",name:"Tungsten",mass:183.84,cat:"transition-metal",state:"solid",econfig:"[Xe] 4f14 5d4 6s2",year:"1783",desc:"Tungsten has the highest melting point of any element at 3,422°C and the highest tensile strength at high temperatures. Its name comes from the Swedish 'tung sten' meaning 'heavy stone.' Tungsten filaments in incandescent light bulbs glow white-hot without melting. Tungsten carbide is one of the hardest materials known, used in cutting tools, drill bits, mining equipment, and armor-piercing ammunition. Tungsten is also used in X-ray tubes, welding electrodes, and increasingly in jewelry as a scratch-resistant alternative to gold.",row:6,col:6},
        {z:75,sym:"Re",name:"Rhenium",mass:186.21,cat:"transition-metal",state:"solid",econfig:"[Xe] 4f14 5d5 6s2",year:"1925",desc:"Rhenium is one of the rarest elements in Earth's crust, with an annual world production of only about 50 tonnes. It was the last stable element to be discovered (1925) and was named after the Rhine River. Rhenium's most important use is in nickel-based superalloys for jet engine turbine blades, where it increases high-temperature strength and creep resistance. This allows jet engines to operate at higher temperatures and greater efficiency. Rhenium-platinum catalysts are used in producing lead-free, high-octane gasoline.",row:6,col:7},
        {z:76,sym:"Os",name:"Osmium",mass:190.23,cat:"transition-metal",state:"solid",econfig:"[Xe] 4f14 5d6 6s2",year:"1803",desc:"Osmium is the densest naturally occurring element, approximately twice as dense as lead. Its name comes from the Greek 'osme' meaning smell, due to the toxic, pungent odor of osmium tetroxide. Despite being rare and expensive, osmium is valued for its extreme hardness and wear resistance. Osmium-tipped fountain pen nibs last for decades without wearing out. It is used in electrical contacts, instrument pivots, and as a catalyst. Osmium alloys with iridium and platinum are used in devices that need extreme durability.",row:6,col:8},
        {z:77,sym:"Ir",name:"Iridium",mass:192.22,cat:"transition-metal",state:"solid",econfig:"[Xe] 4f14 5d7 6s2",year:"1803",desc:"Iridium is one of the most corrosion-resistant materials known and the second-densest element after osmium. Named after Iris, the Greek goddess of the rainbow, due to its colorful salts. An iridium-rich layer in Earth's geological record provided key evidence for the asteroid impact that caused the extinction of the dinosaurs 66 million years ago. Iridium is used in spark plugs for high-performance engines, crucibles for growing crystals, and the international prototype kilogram was made from a platinum-iridium alloy until 2019.",row:6,col:9},
        {z:78,sym:"Pt",name:"Platinum",mass:195.08,cat:"transition-metal",state:"solid",econfig:"[Xe] 4f14 5d9 6s1",year:"1735",desc:"Platinum is a dense, precious, silvery-white metal that is among the rarest elements in Earth's crust. About 40% of platinum production goes into catalytic converters that clean vehicle exhaust. Platinum is prized in jewelry for its beauty and durability. In medicine, cisplatin (a platinum compound) is one of the most effective cancer chemotherapy drugs. Platinum is essential in fuel cells that may power the cars of the future. It is also used in laboratory equipment, dental crowns, and as an investment commodity.",row:6,col:10},
        {z:79,sym:"Au",name:"Gold",mass:196.97,cat:"transition-metal",state:"solid",econfig:"[Xe] 4f14 5d10 6s1",year:"Ancient",desc:"Gold has captivated humanity for thousands of years with its lustrous yellow color, malleability, and resistance to tarnish. It is so malleable that one ounce can be beaten into a sheet covering 100 square feet. Gold is an excellent conductor of electricity and is used in high-reliability electronics, connectors, and circuit boards in smartphones and computers. It is used in aerospace for radiation shielding and in medicine for treating rheumatoid arthritis. Gold nanoparticles are used in rapid diagnostic tests, including some COVID-19 tests. The world's oceans contain about 20 million tons of dissolved gold.",row:6,col:11},
        {z:80,sym:"Hg",name:"Mercury",mass:200.59,cat:"transition-metal",state:"liquid",econfig:"[Xe] 4f14 5d10 6s2",year:"Ancient",desc:"Mercury is the only metallic element that is liquid at room temperature, with a freezing point of -39 C. Its silvery, flowing appearance earned it the name 'quicksilver'. Mercury was used for centuries in thermometers, barometers, and dental amalgam fillings. Mercury vapor is used in fluorescent lamps and neon signs. Despite its fascinating properties, mercury is highly toxic, causing neurological damage. The phrase 'mad as a hatter' originated from mercury poisoning among hat makers. Environmental regulations have greatly reduced mercury use due to its persistence in ecosystems.",row:6,col:12},
        {z:81,sym:"Tl",name:"Thallium",mass:204.38,cat:"post-transition-metal",state:"solid",econfig:"[Xe] 4f14 5d10 6s2 6p1",year:"1861",desc:"Thallium is a soft, silvery metal that is extremely toxic, even more so than mercury and lead. Its salts are colorless, odorless, and tasteless, which unfortunately made it a notorious poison in criminal cases throughout the 20th century. Despite its danger, thallium has important applications. Thallium-201 is used in cardiac stress tests to image blood flow to the heart muscle. Thallium sulfide is used in photocells and infrared detectors. Thallium is also used in low-temperature thermometers and specialized optical glass with high refractive index.",row:6,col:13},
        {z:82,sym:"Pb",name:"Lead",mass:207.2,cat:"post-transition-metal",state:"solid",econfig:"[Xe] 4f14 5d10 6s2 6p2",year:"Ancient",desc:"Lead is one of the oldest metals used by humans, dating back at least 9,000 years. The Romans used it extensively for plumbing (the word 'plumbing' comes from 'plumbum', Latin for lead). Today, about 80% of lead production goes into lead-acid batteries for vehicles and backup power systems. Lead is an excellent radiation shield, used in X-ray rooms, nuclear facilities, and protective aprons. Lead's toxicity, particularly its effects on children's brain development, has led to its removal from paint, gasoline, and plumbing in most countries.",row:6,col:14},
        {z:83,sym:"Bi",name:"Bismuth",mass:208.98,cat:"post-transition-metal",state:"solid",econfig:"[Xe] 4f14 5d10 6s2 6p3",year:"1753",desc:"Bismuth is a brittle metal famous for its stunning rainbow-colored, staircase-shaped hopper crystals that can be grown from the molten metal. It is one of the least toxic heavy metals and is used as a safer replacement for lead in many applications. Bismuth subsalicylate is the active ingredient in Pepto-Bismol for treating upset stomachs. Bismuth alloys with very low melting points are used in fire sprinkler systems, solders, and fusible safety plugs. Bismuth is also used in cosmetics, particularly pearlescent pigments in lipstick and eyeshadow.",row:6,col:15},
        {z:84,sym:"Po",name:"Polonium",mass:209,cat:"post-transition-metal",state:"solid",econfig:"[Xe] 4f14 5d10 6s2 6p4",year:"1898",desc:"Polonium was discovered by Marie and Pierre Curie in 1898 and named after Marie's homeland of Poland. It is one of the most radioactive naturally occurring elements, about 250,000 times more radioactive than uranium. A single gram of polonium generates 140 watts of heat, enough to glow blue from the intense radiation. Polonium-210 is used as a heat source in radioisotope thermoelectric generators for space satellites and as an anti-static agent in industrial equipment. It gained notoriety in 2006 when it was used to poison Russian dissident Alexander Litvinenko.",row:6,col:16},
        {z:85,sym:"At",name:"Astatine",mass:210,cat:"metalloid",state:"solid",econfig:"[Xe] 4f14 5d10 6s2 6p5",year:"1940",desc:"Astatine is the rarest naturally occurring element on Earth, with estimates suggesting less than 30 grams exist in the entire Earth's crust at any given time. Its name comes from the Greek 'astatos' meaning unstable, as its most stable isotope has a half-life of only 8.1 hours. Astatine is a radioactive halogen that has never been seen in bulk because any macroscopic sample would immediately vaporize from its own radioactive heat. Astatine-211 is being researched for targeted alpha therapy to treat certain cancers, as it can deliver lethal radiation directly to tumor cells.",row:6,col:17},
        {z:86,sym:"Rn",name:"Radon",mass:222,cat:"noble-gas",state:"gas",econfig:"[Xe] 4f14 5d10 6s2 6p6",year:"1900",desc:"Radon is a colorless, odorless, radioactive noble gas that forms naturally from the decay of uranium and radium in rocks and soil. It can seep into buildings through cracks in foundations, and prolonged exposure is the second leading cause of lung cancer after smoking, causing about 21,000 deaths per year in the United States alone. Radon testing kits are widely recommended for homes. Despite its dangers, radon therapy (radon spas) is used in some European countries for treating arthritis and respiratory conditions. Radon's decay products were once used in cancer radiation therapy.",row:6,col:18},
        {z:87,sym:"Fr",name:"Francium",mass:223,cat:"alkali-metal",state:"solid",econfig:"[Rn] 7s1",year:"1939",desc:"Francium is the most unstable of all naturally occurring elements, with its longest-lived isotope having a half-life of only 22 minutes. Named after France, it was the last element to be discovered in nature (1939) by Marguerite Perey. At any given time, there are estimated to be only 20-30 grams of francium in the entire Earth's crust. It has never been produced in visible quantities. As the heaviest alkali metal, francium would be expected to react with water even more explosively than caesium. It is used only in scientific research, particularly in spectroscopy experiments studying atomic structure.",row:7,col:1},
        {z:88,sym:"Ra",name:"Radium",mass:226,cat:"alkaline-earth",state:"solid",econfig:"[Rn] 7s2",year:"1898",desc:"Radium was discovered by Marie and Pierre Curie in 1898, and its intense radioactivity captivated the world. Radium glows a faint blue color in the dark due to its radiation exciting surrounding air molecules. In the early 1900s, radium was added to toothpaste, water, and patent medicines as a supposed health tonic. The 'Radium Girls' who painted watch dials with radium-based luminous paint suffered devastating health effects, leading to landmark occupational safety legislation. Today, radium-223 is used in targeted cancer therapy for prostate cancer that has spread to the bones.",row:7,col:2},
        {z:89,sym:"Ac",name:"Actinium",mass:227,cat:"actinide",state:"solid",econfig:"[Rn] 6d1 7s2",year:"1899",desc:"Actinium is a radioactive metal that gives its name to the entire actinide series. It glows with an eerie blue light in the dark due to its intense radioactivity exciting the surrounding air. Discovered in 1899 by Andre-Louis Debierne, actinium is about 150 times more radioactive than radium. Actinium-225 is being developed as a revolutionary cancer treatment called targeted alpha therapy (TAT), where it is attached to antibodies that seek out and destroy cancer cells with minimal damage to surrounding healthy tissue. This approach shows remarkable promise for treating leukemia and other cancers.",row:10,col:4},
        {z:90,sym:"Th",name:"Thorium",mass:232.04,cat:"actinide",state:"solid",econfig:"[Rn] 6d2 7s2",year:"1829",desc:"Thorium is a weakly radioactive metal named after Thor, the Norse god of thunder. It is about three times more abundant than uranium in Earth's crust. Thorium is being actively researched as an alternative nuclear fuel that could be safer and produce less long-lived radioactive waste than uranium. India and China are investing heavily in thorium reactor technology. Thorium oxide (thoria) has the highest melting point of any oxide (3,300°C) and was historically used in gas lamp mantles. Thorium is also used in high-quality camera and scientific lenses and as a coating on welding rods.",row:10,col:5},
        {z:91,sym:"Pa",name:"Protactinium",mass:231.04,cat:"actinide",state:"solid",econfig:"[Rn] 5f2 6d1 7s2",year:"1913",desc:"Protactinium is one of the rarest and most expensive naturally occurring elements, with a price of about $280,000 per gram. Its name means 'parent of actinium' because it decays into actinium through radioactive decay. Protactinium is intensely radioactive and highly toxic. It has very few practical applications due to its scarcity and radioactivity. It is sometimes used in scientific research to study nuclear properties, and protactinium-231 ratios in ocean sediments help scientists understand past ocean circulation patterns and climate changes.",row:10,col:6},
        {z:92,sym:"U",name:"Uranium",mass:238.03,cat:"actinide",state:"solid",econfig:"[Rn] 5f3 6d1 7s2",year:"1789",desc:"Uranium is a dense, silvery-white radioactive metal that changed the course of human history. Uranium-235 undergoes nuclear fission, releasing enormous energy, which powers both nuclear reactors and atomic weapons. Nuclear power provides about 10% of the world's electricity. Depleted uranium (mostly U-238) is used in armor-piercing ammunition and tank armor due to its extreme density. Uranium was used for centuries as a yellow-green colorant in ceramic glazes and glass before its radioactivity was understood. Uranium-lead dating is one of the most reliable methods for determining the age of rocks and the Earth itself (4.54 billion years).",row:10,col:7},
        {z:93,sym:"Np",name:"Neptunium",mass:237,cat:"actinide",state:"solid",econfig:"[Rn] 5f4 6d1 7s2",year:"1940",desc:"Neptunium was the first synthetic transuranium element, created in 1940 by bombarding uranium with neutrons. Named after the planet Neptune (as uranium was named after Uranus), it was produced by Edwin McMillan and Philip Abelson at Berkeley. Neptunium-237 is a byproduct of nuclear reactors and a component of nuclear waste that remains radioactive for millions of years, making it a concern for long-term waste storage. Neptunium is used in neutron detection instruments and has been studied as potential nuclear fuel. It is a silvery metal that tarnishes in air.",row:10,col:8},
        {z:94,sym:"Pu",name:"Plutonium",mass:244,cat:"actinide",state:"solid",econfig:"[Rn] 5f6 7s2",year:"1940",desc:"Plutonium is one of the most consequential elements in human history. Plutonium-239 was used in the atomic bomb dropped on Nagasaki in 1945 and remains a key component of nuclear weapons. It is also used as fuel in nuclear reactors and in radioisotope thermoelectric generators (RTGs) that power deep-space probes like Voyager, Cassini, and the Mars Curiosity rover. Plutonium is extremely dangerous: even microgram quantities can cause cancer if inhaled. Named after the dwarf planet Pluto, it has at least 20 isotopes and six allotropes, more than any other element.",row:10,col:9},
        {z:95,sym:"Am",name:"Americium",mass:243,cat:"actinide",state:"solid",econfig:"[Rn] 5f7 7s2",year:"1944",desc:"Americium is a synthetic radioactive element found in nearly every home. Americium-241 is used in virtually all ionization-type smoke detectors, where a tiny amount (about 0.3 micrograms) ionizes air molecules and detects smoke particles that disrupt the current. This single application has saved countless lives. Americium was first produced in 1944 by Glenn Seaborg's team at the University of Chicago and named after the Americas, paralleling europium's naming after Europe. Americium-241 is also used in industrial gauges to measure the thickness of materials and in moisture/density gauges for construction.",row:10,col:10},
        {z:96,sym:"Cm",name:"Curium",mass:247,cat:"actinide",state:"solid",econfig:"[Rn] 5f7 6d1 7s2",year:"1944",desc:"Curium was named in honor of Marie and Pierre Curie, pioneers of radioactivity research. It is so radioactive that it glows red in the dark from its own heat. Curium-244 has been used as a power source (alpha particle generator) in space missions and remote weather stations. The Alpha Particle X-Ray Spectrometer (APXS) instruments on NASA's Mars rovers Spirit, Opportunity, and Curiosity used curium-244 to analyze the chemical composition of Martian rocks and soil. Curium was the third transuranium element to be discovered, created in 1944 at the University of Chicago.",row:10,col:11},
        {z:97,sym:"Bk",name:"Berkelium",mass:247,cat:"actinide",state:"solid",econfig:"[Rn] 5f9 7s2",year:"1949",desc:"Berkelium is a synthetic radioactive element named after Berkeley, California, where it was first produced at the University of California Radiation Laboratory in 1949. Only about one gram of berkelium has ever been produced. In 2009, a rare 22-milligram sample of berkelium-249 was produced at Oak Ridge National Laboratory and used as a target to create element 117 (tennessine) for the first time. Berkelium is a silvery metal that accumulates in the skeletal system if ingested. It is used purely in scientific research to produce heavier elements and study nuclear properties.",row:10,col:12},
        {z:98,sym:"Cf",name:"Californium",mass:251,cat:"actinide",state:"solid",econfig:"[Rn] 5f10 7s2",year:"1950",desc:"Californium is a powerful neutron emitter, with one microgram releasing 170 million neutrons per minute. This makes it invaluable for starting up nuclear reactors, neutron radiography (imaging the inside of objects), and detecting gold and silver ores in mining. Californium-252 is used to detect metal fatigue in aircraft structures and to scan luggage for explosives. It costs about $27 million per gram, making it one of the most expensive substances on Earth. Named after the state and University of California, it was first produced in 1950 by bombarding curium with alpha particles.",row:10,col:13},
