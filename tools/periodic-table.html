        {z:99,sym:"Es",name:"Einsteinium",mass:252,cat:"actinide",state:"solid",econfig:"[Rn] 5f11 7s2",year:"1952",desc:"Einsteinium was discovered in the debris of the first thermonuclear (hydrogen bomb) test, 'Ivy Mike,' in 1952. Named after Albert Einstein, it was initially kept secret due to Cold War concerns. Einsteinium is extremely radioactive and has been produced in only tiny quantities. In 2021, scientists at Berkeley Lab managed to study the chemistry of einsteinium for the first time using just 200 nanograms, discovering that it behaves differently than predicted by the periodic table trends. It is used exclusively in scientific research.",row:10,col:14},
        {z:100,sym:"Fm",name:"Fermium",mass:257,cat:"actinide",state:"solid",econfig:"[Rn] 5f12 7s2",year:"1952",desc:"Fermium was discovered alongside einsteinium in the fallout of the first hydrogen bomb test in 1952. Named after Enrico Fermi, the physicist who created the first nuclear reactor, fermium was the heaviest element found in the bomb debris. It can only be produced in nuclear reactors or particle accelerators, and only in microgram quantities. Fermium is the heaviest element that can be formed by neutron bombardment of lighter elements. It is used exclusively in scientific research to study nuclear physics and the properties of heavy elements.",row:10,col:15},
        {z:101,sym:"Md",name:"Mendelevium",mass:258,cat:"actinide",state:"solid",econfig:"[Rn] 5f13 7s2",year:"1955",desc:"Mendelevium was named after Dmitri Mendeleev, the Russian chemist who created the periodic table in 1869. It was first produced in 1955 by bombarding einsteinium with alpha particles at the University of California, Berkeley. Remarkably, mendelevium was first identified on an atom-by-atom basis, with only 17 atoms produced in the original experiment. It was the first element to be synthesized one atom at a time. Mendelevium is used exclusively in scientific research and has no commercial applications due to its extreme scarcity and short half-life.",row:10,col:16},
        {z:102,sym:"No",name:"Nobelium",mass:259,cat:"actinide",state:"solid",econfig:"[Rn] 5f14 7s2",year:"1958",desc:"Nobelium is named after Alfred Nobel, the Swedish inventor of dynamite who established the Nobel Prizes. Its discovery was claimed by multiple laboratories in the late 1950s and 1960s, leading to one of science's great controversies. The credit was eventually shared between Swedish, American, and Russian teams. Nobelium is unique among the heavy actinides because it preferentially forms a +2 oxidation state rather than +3, unlike its neighbors. Only tiny amounts have ever been produced, and it is used exclusively in basic scientific research to understand the behavior of superheavy elements.",row:10,col:17},
        {z:103,sym:"Lr",name:"Lawrencium",mass:266,cat:"actinide",state:"solid",econfig:"[Rn] 5f14 7s2 7p1",year:"1961",desc:"Lawrencium is the last element in the actinide series, named after Ernest O. Lawrence, the inventor of the cyclotron particle accelerator that made the discovery of many transuranium elements possible. First produced in 1961 at Berkeley, only atoms of lawrencium have ever been made. In 2015, scientists determined that lawrencium has the lowest ionization energy of any element in the actinide series, confirming theoretical predictions. Lawrencium marks the boundary between the actinides and the transactinide elements (period 7 transition metals).",row:10,col:18},
        {z:104,sym:"Rf",name:"Rutherfordium",mass:267,cat:"transition-metal",state:"unknown",econfig:"[Rn] 5f14 6d2 7s2",year:"1964",desc:"Rutherfordium is named after Ernest Rutherford, the New Zealand-born physicist known as the father of nuclear physics who discovered the atomic nucleus. It was the subject of a fierce naming dispute between American and Soviet scientists during the Cold War, known as the Transfermium Wars. Rutherfordium is a synthetic superheavy element that can only be produced in particle accelerators. Its most stable isotope has a half-life of about 1.3 hours. Chemical experiments suggest it behaves similarly to hafnium and zirconium in group 4 of the periodic table.",row:7,col:4},
        {z:105,sym:"Db",name:"Dubnium",mass:268,cat:"transition-metal",state:"unknown",econfig:"[Rn] 5f14 6d3 7s2",year:"1967",desc:"Dubnium is named after Dubna, Russia, home of the Joint Institute for Nuclear Research where it was first produced. Like rutherfordium, it was caught up in the Cold War naming disputes. Dubnium is a synthetic element that can only be created in particle accelerators by colliding lighter atoms at very high speeds. Its most stable isotope has a half-life of about 28 hours. Only a few atoms have ever been produced at once. Chemical studies suggest it behaves somewhat like tantalum but with significant deviations due to relativistic effects on its electron configuration.",row:7,col:5},
        {z:106,sym:"Sg",name:"Seaborgium",mass:269,cat:"transition-metal",state:"unknown",econfig:"[Rn] 5f14 6d4 7s2",year:"1974",desc:"Seaborgium is named after Glenn T. Seaborg, the American chemist who co-discovered ten transuranium elements and won the Nobel Prize in Chemistry in 1951. It was controversially named after a living person, the first time this was done for an element. Seaborg himself said this was the greatest honor he had ever received. Seaborgium is a synthetic superheavy element with a half-life of only a few minutes for its most stable known isotope. Chemical experiments conducted on only a few atoms at a time suggest it behaves similarly to tungsten and molybdenum.",row:7,col:6},
        {z:107,sym:"Bh",name:"Bohrium",mass:270,cat:"transition-metal",state:"unknown",econfig:"[Rn] 5f14 6d5 7s2",year:"1981",desc:"Bohrium is named after Niels Bohr, the Danish physicist who made foundational contributions to understanding atomic structure and quantum mechanics, for which he received the Nobel Prize in 1922. Bohrium was first convincingly produced in 1981 at the GSI laboratory in Darmstadt, Germany. Its most stable known isotope has a half-life of about 61 seconds. Only a handful of atoms have ever been produced. Limited chemical experiments suggest bohrium behaves as expected for a group 7 element, similar to rhenium, forming volatile oxychloride compounds.",row:7,col:7},
        {z:108,sym:"Hs",name:"Hassium",mass:277,cat:"transition-metal",state:"unknown",econfig:"[Rn] 5f14 6d6 7s2",year:"1984",desc:"Hassium is named after the German state of Hesse (Hassia in Latin), where the GSI Helmholtz Centre for Heavy Ion Research is located. First created in 1984, hassium is one of the superheavy elements that has been studied chemically despite being produced only atoms at a time. Remarkably, scientists have shown that hassium tetroxide (HsO4) is volatile, similar to osmium tetroxide, confirming that hassium belongs in group 8 of the periodic table. This was a landmark achievement in superheavy element chemistry. Its most stable isotope has a half-life of about 16 seconds.",row:7,col:8},
        {z:109,sym:"Mt",name:"Meitnerium",mass:278,cat:"unknown",state:"unknown",econfig:"[Rn] 5f14 6d7 7s2",year:"1982",desc:"Meitnerium is named after Lise Meitner, the Austrian-Swedish physicist who was instrumental in the discovery of nuclear fission but was overlooked for the Nobel Prize. The naming honored her immense contributions to physics. Meitnerium was first produced in 1982 at GSI in Darmstadt, Germany, by bombarding bismuth with iron atoms. Only a few atoms have ever been created. Its most stable known isotope has a half-life of about 4.5 seconds. No chemical experiments have been performed on meitnerium, but it is predicted to behave similarly to iridium in group 9.",row:7,col:9},
        {z:110,sym:"Ds",name:"Darmstadtium",mass:281,cat:"unknown",state:"unknown",econfig:"[Rn] 5f14 6d8 7s2",year:"1994",desc:"Darmstadtium is named after Darmstadt, the city in Germany where it was first created at the GSI Helmholtz Centre for Heavy Ion Research in 1994. It was produced by fusing nickel and lead atoms together. Only a few atoms of darmstadtium have ever been detected. Its most stable known isotope has a half-life of approximately 14 seconds. Due to relativistic effects on its electrons, darmstadtium is predicted to have some unusual chemical properties that may differ from what would be expected based on its position in group 10 (platinum group).",row:7,col:10},
        {z:111,sym:"Rg",name:"Roentgenium",mass:282,cat:"unknown",state:"unknown",econfig:"[Rn] 5f14 6d9 7s2",year:"1994",desc:"Roentgenium is named after Wilhelm Conrad Röntgen, who discovered X-rays in 1895 and received the first Nobel Prize in Physics in 1901. It was first produced in 1994 at GSI in Darmstadt by bombarding bismuth with nickel atoms. Only a handful of atoms have ever been created. Its most stable known isotope has a half-life of about 2.1 minutes. Roentgenium is predicted to be a noble metal similar to gold, but relativistic effects may give it some unusual properties. No chemical experiments have yet been conducted.",row:7,col:11},
        {z:112,sym:"Cn",name:"Copernicium",mass:285,cat:"unknown",state:"unknown",econfig:"[Rn] 5f14 6d10 7s2",year:"1996",desc:"Copernicium is named after Nicolaus Copernicus, who proposed the heliocentric model of the solar system. First created in 1996 at GSI in Darmstadt, Germany, by fusing zinc and lead atoms. Due to strong relativistic effects, copernicium is predicted to be surprisingly volatile for a metal, possibly behaving more like a noble gas than a metal similar to mercury. Initial experiments support this unusual volatility. Its most stable known isotope has a half-life of about 29 seconds. It is one of the most fascinating superheavy elements due to its predicted anomalous properties.",row:7,col:12},
        {z:113,sym:"Nh",name:"Nihonium",mass:286,cat:"unknown",state:"unknown",econfig:"[Rn] 5f14 6d10 7s2 7p1",year:"2003",desc:"Nihonium is named after Japan (Nihon in Japanese), making it the first element discovered in an Asian country. It was first created in 2003 at RIKEN in Japan by Kosuke Morita's team, who bombarded bismuth with zinc atoms. The discovery was a source of immense national pride for Japan. Nihonium's most stable known isotope has a half-life of about 20 seconds. It is predicted to be a heavy metal similar to thallium, but relativistic effects may make it chemically quite different. Only about 100 atoms have ever been detected.",row:7,col:13},
        {z:114,sym:"Fl",name:"Flerovium",mass:289,cat:"unknown",state:"unknown",econfig:"[Rn] 5f14 6d10 7s2 7p2",year:"1998",desc:"Flerovium is named after Georgy Flyorov, the Soviet physicist who founded the Joint Institute for Nuclear Research in Dubna. First created in 1998 by a Russian-American collaboration, flerovium is one of the most intriguing superheavy elements. Theoretical calculations predict that strong relativistic effects might make it behave as a noble gas rather than as a metal like lead (its lighter group 14 relative). Preliminary experiments suggest flerovium is indeed highly volatile. Its most stable known isotope has a half-life of about 2.7 seconds.",row:7,col:14},
        {z:115,sym:"Mc",name:"Moscovium",mass:290,cat:"unknown",state:"unknown",econfig:"[Rn] 5f14 6d10 7s2 7p3",year:"2003",desc:"Moscovium is named after Moscow Oblast, the region surrounding Moscow where the Joint Institute for Nuclear Research (JINR) is located. It was first created in 2003 through a collaboration between JINR and Lawrence Livermore National Laboratory. Moscovium is produced by bombarding americium with calcium ions. Its most stable known isotope has a half-life of about 220 milliseconds. Moscovium is predicted to be a heavy metal with properties somewhat similar to bismuth. It was used as a stepping stone to discover element 117 (tennessine) through its decay chain.",row:7,col:15},
        {z:116,sym:"Lv",name:"Livermorium",mass:293,cat:"unknown",state:"unknown",econfig:"[Rn] 5f14 6d10 7s2 7p4",year:"2000",desc:"Livermorium is named after Lawrence Livermore National Laboratory in California, which collaborated with JINR in Dubna, Russia to produce this element. First created in 2000 by bombarding curium with calcium ions, livermorium is a synthetic superheavy element with a very short half-life. Its most stable known isotope has a half-life of about 61 milliseconds. Livermorium is predicted to be a volatile substance, potentially behaving differently from polonium, its lighter group 16 relative, due to relativistic effects. Only a few dozen atoms have ever been observed.",row:7,col:16},
        {z:117,sym:"Ts",name:"Tennessine",mass:294,cat:"unknown",state:"unknown",econfig:"[Rn] 5f14 6d10 7s2 7p5",year:"2010",desc:"Tennessine is named after the state of Tennessee, home to Oak Ridge National Laboratory, Vanderbilt University, and the University of Tennessee, which contributed to its discovery. First created in 2010, tennessine required a rare berkelium-249 target that took 250 days to produce at Oak Ridge. It is the second-heaviest element ever created. As a member of the halogen group (group 17), it might be expected to behave like astatine, but relativistic effects could make it behave quite differently. Its most stable known isotope has a half-life of about 51 milliseconds.",row:7,col:17},
        {z:118,sym:"Og",name:"Oganesson",mass:294,cat:"unknown",state:"unknown",econfig:"[Rn] 5f14 6d10 7s2 7p6",year:"2002",desc:"Oganesson is the heaviest element ever created and is named after Yuri Oganessian, the Russian nuclear physicist who led the discovery of multiple superheavy elements. It is one of only two elements named after living people (the other being seaborgium). Despite being in the noble gas group (group 18), theoretical calculations predict oganesson might actually be a solid at room temperature and could be reactive, unlike other noble gases. Its electron shell is predicted to be 'smeared out' due to extreme relativistic effects, fundamentally changing how chemical bonding works at this atomic weight.",row:7,col:18}

    function buildTable() {
        const grid = document.getElementById('periodicGrid');
        // Build a map: "row-col" -> element
        const map = {};
        elements.forEach(el => { map[el.row + '-' + el.col] = el; });

        // Rows 1-7: main table
        for (let r = 1; r <= 7; r++) {
            for (let c = 1; c <= 18; c++) {
                const el = map[r + '-' + c];
                if (el) {
                    grid.appendChild(makeCell(el));
                } else {
                    if (r === 6 && c === 3) {
                        const ptr = document.createElement('div');
                        ptr.className = 'pointer-cell cat-lanthanide';
                        ptr.style.cursor = 'pointer';
                        ptr.innerHTML = '<span class="ptr-range">57-71</span><span class="ptr-symbol">La-Lu</span><span class="ptr-label">Lanthanides</span>';
                        ptr.onclick = () => showSeriesDetail('lanthanide');
                        grid.appendChild(ptr);
                    } else if (r === 7 && c === 3) {
                        const ptr = document.createElement('div');
                        ptr.className = 'pointer-cell cat-actinide';
                        ptr.style.cursor = 'pointer';
                        ptr.innerHTML = '<span class="ptr-range">89-103</span><span class="ptr-symbol">Ac-Lr</span><span class="ptr-label">Actinides</span>';
                        ptr.onclick = () => showSeriesDetail('actinide');
                        grid.appendChild(ptr);
                    } else {
                        const empty = document.createElement('div');
                        empty.className = 'element-cell empty-cell';
                        grid.appendChild(empty);
                    }
                }
            }
        }

        // Spacer
        const spacer = document.createElement('div');
        spacer.className = 'spacer-row';
        grid.appendChild(spacer);

        // Row 9: Lanthanides (label spans cols 1-3, elements in cols 4-18)
        const lanLabel = document.createElement('div');
        lanLabel.className = 'lanthanide-label';
        lanLabel.textContent = 'Lanthanides';
        grid.appendChild(lanLabel);
        for (let c = 4; c <= 18; c++) {
            const el = map['9-' + c];
            if (el) grid.appendChild(makeCell(el));
            else { const e = document.createElement('div'); e.className = 'element-cell empty-cell'; grid.appendChild(e); }
        }

        // Row 10: Actinides (label spans cols 1-3, elements in cols 4-18)
        const actLabel = document.createElement('div');
        actLabel.className = 'actinide-label';
        actLabel.textContent = 'Actinides';
        grid.appendChild(actLabel);
        for (let c = 4; c <= 18; c++) {
            const el = map['10-' + c];
            if (el) grid.appendChild(makeCell(el));
            else { const e = document.createElement('div'); e.className = 'element-cell empty-cell'; grid.appendChild(e); }
        }
    }

    function makeCell(el) {
        const cell = document.createElement('div');
        cell.className = `element-cell ${catClass[el.cat] || 'cat-unknown'} state-${el.state}`;
        cell.innerHTML = `
            <span class="atomic-num">${el.z}</span>
            <span class="symbol">${el.sym}</span>
            <span class="name">${el.name}</span>
            <span class="mass">${el.mass}</span>
        `;
        cell.onclick = () => showDetail(el);
        return cell;
    }

    function showDetail(el) {
        const body = document.getElementById('detailBody');
        const stateClass = el.state === 'unknown' ? 'unknown' : el.state;
        const stateLabel = el.state.charAt(0).toUpperCase() + el.state.slice(1);
        const catBg = catClass[el.cat] || 'cat-unknown';

        const imgUrl = `https://images-of-elements.com/${el.name.toLowerCase()}.jpg`;
        body.innerHTML = `
            <div class="detail-top">
                <div class="detail-img-wrap">
                    <img src="${imgUrl}" alt="${el.name}" loading="lazy" onerror="this.onerror=null;this.parentElement.innerHTML='<span class=\\'img-fallback\\'>${el.sym}</span>';">
                </div>
                <div class="detail-symbol-block ${catBg}">
                    <div class="big-number">${el.z}</div>
                    <div class="big-symbol">${el.sym}</div>
                    <div class="big-name">${el.name}</div>
                </div>
            </div>

            <div class="detail-section">
                <h3>Properties</h3>
                <div class="detail-row">
                    <span class="label">Atomic Number</span>
                    <span class="value">${el.z}</span>
                </div>
                <div class="detail-row">
                    <span class="label">Atomic Mass</span>
                    <span class="value">${el.mass} u</span>
                </div>
                <div class="detail-row">
                    <span class="label">Category</span>
                    <span class="value">${catLabel[el.cat] || 'Unknown'}</span>
                </div>
                <div class="detail-row">
                    <span class="label">State (Room Temp)</span>
                    <span class="value"><span class="state-badge ${stateClass}">${stateLabel}</span></span>
                </div>
                ${getUsesHTML(el) ? `<div style="padding-top:10px;"><span class="label" style="color:#94a3b8;font-size:0.85rem;">Common Uses</span>${getUsesHTML(el)}</div>` : ''}
            </div>

            <div class="detail-section">
                <h3>Electron Configuration</h3>
                <div style="font-family:monospace;font-size:1rem;color:#14b8a6;padding:4px 0;">${el.econfig}</div>
            </div>

            <div class="detail-section">
                <h3>Discovery</h3>
                <div class="detail-row">
                    <span class="label">Year</span>
                    <span class="value">${el.year}</span>
                </div>
            </div>

            <div class="detail-section">
                <h3>About</h3>
                <p class="description-text">${el.desc}</p>
            </div>
        `;

        document.getElementById('detailPanel').classList.add('open');
        document.getElementById('detailBackdrop').classList.add('open');
    }

                    <p class="description-text" style="margin-top:10px;">Lanthanides are critical to modern technology. Neodymium creates the strongest permanent magnets used in headphones, hard drives, wind turbines, and electric vehicle motors. Cerium is used in catalytic converters and self-cleaning ovens. Europium provides the red color in TV and phone screens. Erbium amplifies signals in fiber optic cables. Gadolinium is used as an MRI contrast agent. Lanthanum is found in camera lenses and hybrid car batteries.</p>

                <div class="detail-section">

                    <p class="description-text" style="margin-top:10px;">Uranium is the primary fuel for nuclear power plants generating about 10% of the world's electricity. Plutonium powers spacecraft through radioisotope thermoelectric generators (RTGs) and was used in nuclear weapons. Thorium is being researched as a safer alternative nuclear fuel. Americium-241 is used in nearly all household smoke detectors. Curium has powered instruments on Mars rovers.</p>

    function getUsesHTML(el) {
        const uses = usesMap[el.name];
        if (!uses) return '';
        return '<ul class="uses-list">' + uses.map(u => `<li>${u}</li>`).join('') + '</ul>';
    }

    // Search functionality
    const searchInput = document.getElementById('searchInput');
    const searchResults = document.getElementById('searchResults');

    searchInput.addEventListener('input', function() {
        const q = this.value.trim().toLowerCase();
        if (q.length === 0) {
            searchResults.classList.remove('active');
            // Reset highlights
            document.querySelectorAll('.element-cell').forEach(c => c.style.opacity = '');
            return;
        }
        const matches = elements.filter(el =>
            el.name.toLowerCase().includes(q) ||
            el.sym.toLowerCase().includes(q) ||
            String(el.z).includes(q)
        );
        // Dim non-matching cells on the table
        document.querySelectorAll('.element-cell').forEach(c => {
            const sym = c.querySelector('.symbol');
            if (!sym) { c.style.opacity = ''; return; }
            const text = sym.textContent.toLowerCase();
            const nameEl = c.querySelector('.name');
            const name = nameEl ? nameEl.textContent.toLowerCase() : '';
            const numEl = c.querySelector('.atomic-num');
            const num = numEl ? numEl.textContent : '';
            if (text.includes(q) || name.includes(q) || num.includes(q)) {
                c.style.opacity = '1';
            } else {
                c.style.opacity = '0.15';
            }
        });
        if (matches.length === 0) {
            searchResults.innerHTML = '<div style="padding:12px;color:#64748b;text-align:center;">No results</div>';
        } else {
            searchResults.innerHTML = matches.slice(0, 8).map(el => `
                <div class="search-result-item" onclick="searchSelect(${el.z})">
                    <span class="sr-sym">${el.sym}</span>
                    <span>${el.name}</span>
                    <span class="sr-num">#${el.z}</span>
                </div>
            `).join('');
        }
        searchResults.classList.add('active');
    });

    searchInput.addEventListener('blur', () => {
        setTimeout(() => {
            searchResults.classList.remove('active');
        }, 200);
    });

    function searchSelect(z) {
        const el = elements.find(e => e.z === z);
        if (el) {
            showDetail(el);
            searchInput.value = '';
            searchResults.classList.remove('active');
            document.querySelectorAll('.element-cell').forEach(c => c.style.opacity = '');
        }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

    buildTable();
    </script>
